name: 单元测试CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.13']

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-xdist

    - name: 运行单元测试
      env:
        ENVIRONMENT: dev
        OPENAI_API_KEY: test-key-placeholder
        TAVILY_API_KEY: test-tavily-key
        ENABLE_TENCENT_CONTENT_SAFETY: false
      run: |
        pytest tests/unit/ -v --cov=intelligent_project_analyzer --cov-report=xml --cov-report=term -n auto

    - name: 运行P1服务模块测试（重点关注）
      env:
        ENVIRONMENT: dev
        OPENAI_API_KEY: test-key-placeholder
      run: |
        echo "=== P1 Critical Services Tests ==="
        pytest tests/unit/services/ tests/unit/test_llm_factory.py tests/unit/test_input_validator.py tests/unit/security/ -v --tb=short || echo "⚠️ P1服务模块测试发现问题"

    - name: 上传覆盖率报告到Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: 生成覆盖率徽章
      run: |
        pip install coverage-badge
        coverage-badge -o coverage.svg -f

    - name: 检查覆盖率阈值
      run: |
        COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); print(tree.getroot().attrib['line-rate'])")
        COVERAGE_PCT=$(python -c "print(round(float($COVERAGE) * 100, 2))")
        echo "当前覆盖率: ${COVERAGE_PCT}%"
        if (( $(echo "$COVERAGE_PCT < 60.0" | bc -l) )); then
          echo "❌ 覆盖率低于60%阈值"
          exit 1
        else
          echo "✅ 覆盖率达标 (>= 60%)"
        fi

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: 运行集成测试
      env:
        ENVIRONMENT: dev
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        pytest tests/integration/ -v -m integration_critical --cov=intelligent_project_analyzer --cov-report=term

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装linter
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort mypy

    - name: 运行Ruff检查
      run: ruff check intelligent_project_analyzer/ --exit-zero

    - name: 检查代码格式(Black)
      run: black --check intelligent_project_analyzer/ tests/ --diff

    - name: 检查导入顺序(isort)
      run: isort --check-only intelligent_project_analyzer/ tests/ --diff

    - name: 运行类型检查(MyPy)
      run: mypy intelligent_project_analyzer/ --ignore-missing-imports --no-strict-optional --exit-zero
