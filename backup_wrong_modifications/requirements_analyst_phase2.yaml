# 需求分析师 Phase2 配置 - 深度分析 + 专家接口构建
# v7.17 P1架构拆分：单次LLM → 两阶段LLM
# Phase2 专注：L1-L5深度分析 + 专家接口构建（~1800 tokens）
# 前置条件：Phase1 已完成，info_status = "sufficient"
# 🔧 v7.17.1: 引用 expert_autonomy_protocol v4.1 挑战协议

metadata:
  version: "7.19.0-phase2"
  description: "Phase2 深度分析阶段 - L1-L8分析 + 利益相关者系统 + 品牌DNA解码 + 五层为什么追问 + 反套路化检测"
  created_at: "2025-12-17"
  updated_at: "2026-01-24"
  optimization: "接收Phase1输出，专注深度分析，避免重复交付物识别"
  phase: 2
  depends_on: "requirements_analyst_phase1"
  v7_19_0_changes: "新增L2.5利益相关者系统分析、品牌DNA深层解码协议、五层为什么追问机制、反套路化检测、洞察质量评估标准"

# ================================================================================
# 🔗 v4.1 挑战协议引用（与 expert_autonomy_protocol_v4.yaml 协同）
# ================================================================================
challenge_protocol_reference:
  source: "expert_autonomy_protocol_v4.yaml"
  version: "4.1"

  # 挑战类型枚举（专家接口中需要标注）
  challenge_types:
    - resource_conflict      # 资源冲突
    - scope_ambiguity        # 范围模糊
    - stakeholder_conflict   # 利益相关者冲突
    - technical_uncertainty  # 技术不确定性
    - timeline_pressure      # 时间压力
    - quality_tradeoff       # 质量权衡
    - capability_boundary    # 能力边界

  # 在 expert_handoff 中必须包含
  handoff_requirements:
    - "关键问题中应标注潜在挑战类型"
    - "不确定性标记交由专家自主决策"
    - "赋予专家'challenge_protocol'挑战权力"

# 输出质量标准
quality_standards:
  sharpness_threshold: 70  # L5_sharpness.score 最低要求
  assumption_audit_threshold: 3  # L6 最少识别3个假设
  stakeholder_analysis_threshold: 3  # L2.5 最少识别3类利益相关者
  five_whys_depth: 4  # 五层为什么至少追问到第4层（情感层）
  must_include:
    - "design_challenge 必须体现核心对立"
    - "expert_handoff 每个专家至少1个问题"
    - "JTBD 必须符合公式结构"
    - "L6_assumption_audit 必须识别并挑战核心假设"
    - "L2_5_stakeholder_system 必须识别至少3类利益相关者"
    - "brand_dna_decoding 当提及品牌时必须深层解码"

# ================================================================================
# 🆕 v7.19.0: L2.5 利益相关者系统分析框架
# ================================================================================
l2_5_stakeholder_system:
  description: "在L2用户建模和L3杠杆点之间，插入专门的利益相关者分析层"

  # 利益相关者识别矩阵
  stakeholder_identification:
    primary_stakeholders:  # 核心利益相关者（直接影响决策）
      investor_owner:
        role: "投资人/业主"
        focus_dimensions: ["ROI", "资产增值", "风险控制", "品牌价值", "退出策略"]
        typical_concerns: ["回本周期", "运营成本", "市场风险", "政策风险"]
        decision_power: "high"

      end_consumer:
        role: "终端消费者/用户"
        focus_dimensions: ["体验质量", "情感满足", "功能需求", "价格敏感度", "社交价值"]
        typical_concerns: ["是否值得", "体验是否独特", "是否符合身份认同"]
        decision_power: "indirect"

      operator_manager:
        role: "运营者/管理方"
        focus_dimensions: ["运营效率", "维护成本", "人员管理", "合规性", "可持续性"]
        typical_concerns: ["日常运营难度", "员工培训成本", "设备维护", "淡旺季管理"]
        decision_power: "medium"

    secondary_stakeholders:  # 次要利益相关者（间接影响）
      designer_creative:
        role: "设计师/创意团队"
        focus_dimensions: ["设计自由度", "作品价值", "专业认可", "创意表达"]

      supplier_contractor:
        role: "供应商/施工方"
        focus_dimensions: ["利润空间", "工期可行性", "技术难度", "供应链稳定性"]

      community_neighbor:
        role: "社区/邻里"
        focus_dimensions: ["环境影响", "噪音干扰", "社区融合", "公共资源占用"]

      regulator_government:
        role: "监管方/政府"
        focus_dimensions: ["合规性", "社会效益", "示范价值", "税收贡献"]

  # 关注点差异分析维度
  focus_divergence_dimensions:
    - dimension: "时间视角"
      spectrum: "短期回报 ←→ 长期价值"
      typical_conflict: "投资人追求快速回本 vs 设计师追求经典耐久"

    - dimension: "风险偏好"
      spectrum: "保守稳健 ←→ 创新冒险"
      typical_conflict: "运营者偏好成熟方案 vs 业主追求差异化"

    - dimension: "价值排序"
      spectrum: "功能优先 ←→ 体验优先 ←→ 成本优先"
      typical_conflict: "消费者要体验 vs 投资人控成本"

    - dimension: "审美取向"
      spectrum: "大众接受 ←→ 小众精品"
      typical_conflict: "市场部要大众化 vs 设计师要独特性"

    - dimension: "品牌态度"
      spectrum: "强化品牌 ←→ 淡化品牌"
      typical_conflict: "品牌方要强曝光 vs 消费者要沉浸体验"

  # 典型冲突与协同模式
  conflict_synergy_patterns:
    typical_conflicts:
      - conflict_pair: ["投资人", "设计师"]
        tension: "成本控制 vs 设计品质"
        mediation_strategy: "价值工程分析，识别高性价比设计点"

      - conflict_pair: ["运营者", "消费者"]
        tension: "运营效率 vs 体验深度"
        mediation_strategy: "场景分层，区分高频低成本区和低频高体验区"

      - conflict_pair: ["投资人", "社区"]
        tension: "商业价值最大化 vs 社区融合"
        mediation_strategy: "社区共享空间设计，创造双赢"

      - conflict_pair: ["品牌方", "消费者"]
        tension: "品牌曝光 vs 沉浸体验"
        mediation_strategy: "隐性品牌植入，体验即品牌"

    synergy_opportunities:
      - synergy_pair: ["消费者", "品牌"]
        opportunity: "体验即传播，消费者成为品牌大使"

      - synergy_pair: ["运营者", "设计师"]
        opportunity: "可维护性设计，降低长期运营成本"

      - synergy_pair: ["社区", "消费者"]
        opportunity: "在地文化体验，增强真实感和独特性"

  # 权力动态分析
  power_dynamics_analysis:
    questions:
      - "谁有最终决策权？（decision_hierarchy）"
      - "谁能影响决策者？（influence_network）"
      - "谁有否决权？（veto_points）"
      - "是否存在未明确但有影响力的角色？（hidden_stakeholders）"

# ================================================================================
# 🆕 v7.19.0: 品牌DNA深层解码协议
# ================================================================================
brand_dna_decoding_protocol:
  description: "当用户提到品牌名称或风格标签时，强制执行深层解码"

  trigger_keywords:
    - "HAY", "Muji", "无印良品", "IKEA", "宜家"
    - "北欧", "日式", "新中式", "侘寂", "极简"
    - "品牌", "风格", "气质", "调性", "DNA"

  mandatory_analysis_layers:
    # 1. 品牌基因层
    brand_genome:
      origin_story:
        description: "品牌诞生的故事和初心"
        analysis_questions:
          - "品牌为什么存在？解决了什么问题？"
          - "创始人的核心信念是什么？"
          - "品牌的'第一性原理'是什么？"

      design_philosophy:
        description: "品牌的设计哲学和美学主张"
        analysis_dimensions:
          - "形式语言：极简/繁复/有机/几何"
          - "材料态度：天然/工业/混合"
          - "色彩哲学：克制/大胆/自然"
          - "比例原则：黄金比例/人体工学/视觉平衡"

      cultural_roots:
        description: "品牌的文化根基和价值观"
        analysis_dimensions:
          - "地域文化：北欧/日本/意大利/美国/中国"
          - "时代精神：现代主义/后现代/当代"
          - "生活哲学：极简主义/享乐主义/实用主义"
          - "社会立场：可持续/包容/创新/民主"

    # 2. 审美基调层
    aesthetic_tone:
      visual_language:
        color_palette: "品牌核心色、辅助色、点缀色、禁忌色"
        form_vocabulary: "偏好形态、线条质感、比例规则"
        material_signature: "标志性材料、质感偏好、表面处理"

      emotional_register:
        primary_emotion: "品牌传递的核心情绪"
        secondary_emotions: "辅助情绪"
        forbidden_emotions: "品牌禁忌的情绪（如HAY禁忌严肃冷峻）"

    # 3. 空间转译层
    spatial_translation:
      translation_rules:
        description: "品牌语言→空间语言的转译规则"
        format: "brand_element → spatial_expression"

      anti_patterns:
        description: "品牌禁忌的空间表达"
        format: "forbidden_expressions 列表"

  # 品牌解码示例（HAY）
  example_HAY:
    brand_genome:
      origin_story: "2002年丹麦创立，相信好设计应该人人可及（民主设计），反对设计精英主义"
      design_philosophy: "北欧极简+色彩活力，功能与美学的民主化平衡"
      cultural_roots: "斯堪的纳维亚设计传统+当代生活方式，强调日常美学"

    aesthetic_tone:
      color_palette: "柔和中性色为主，明亮色彩点缀，避免深沉暗色"
      form_vocabulary: "圆润边角、轻盈比例、几何但不冷峻"
      material_signature: "木材+金属+织物，哑光为主，触感温润"
      emotional_register: "轻松愉悦（primary）+ 温暖亲切 + 简约宁静，避免严肃冷峻"

    spatial_translation:
      translation_rules:
        - brand_element: "民主设计理念"
          spatial_expression: "开放式布局、无等级空间、可触摸的展示"
        - brand_element: "北欧极简"
          spatial_expression: "留白、自然光、克制的装饰"
        - brand_element: "色彩活力"
          spatial_expression: "中性背景+彩色家具点缀"
        - brand_element: "日常美学"
          spatial_expression: "生活场景化陈列、可使用的展示"

      anti_patterns:
        - "过度装饰、繁复细节"
        - "深色压抑的空间"
        - "高高在上的展示方式"
        - "冷漠的工业感"

# ================================================================================
# 🆕 v7.19.0: 五层为什么追问协议
# ================================================================================
five_whys_protocol:
  description: "强制性深度追问机制，确保洞察穿透表层到达情感/身份层面"

  trigger_conditions:
    - "用户提出功能需求时"
    - "用户描述风格偏好时"
    - "用户表达情感期望时"
    - "用户提及品牌/文化元素时"

  questioning_template:
    level_1_what:
      question: "用户说了什么？（原话提取）"
      output: "用户原话的精确引用"

    level_2_why_surface:
      question: "为什么用户想要这个？（表层原因）"
      output: "直接可见的原因"

    level_3_why_behavior:
      question: "这个需求背后的行为模式是什么？"
      output: "用户希望通过这个需求实现什么行为"

    level_4_why_emotion:
      question: "这个行为背后的情感需求是什么？"
      output: "用户追求什么情感满足？在对抗什么恐惧？"

    level_5_why_identity:
      question: "这个情感需求背后的身份认同是什么？"
      output: "用户希望成为什么样的人？这与TA的自我认同有什么关系？"

  output_requirement:
    must_reach_level: 4  # 至少追问到情感层
    ideal_level: 5  # 理想情况追问到身份层
    format: "从L1到L5的追问链条，每层都有具体内容"

  example:
    user_input: "想要一个温馨的客厅"
    five_whys_chain:
      L1_what: "用户说'想要一个温馨的客厅'"
      L2_why_surface: "因为现在的客厅感觉冷清"
      L3_why_behavior: "用户希望家人能在客厅聚集，而不是各自回房间"
      L4_why_emotion: "用户担心家庭成员之间的情感连接正在减弱"
      L5_why_identity: "用户希望成为一个'能凝聚家庭的人'，这是TA的自我期许"
    design_implication: "空间不仅要'温馨'，更要创造家人自然聚集的'引力点'"

# ================================================================================
# 🆕 v7.19.0: 反套路化检测机制
# ================================================================================
anti_cliche_detector:
  description: "检测并拒绝套路化、空洞化的分析输出"

  forbidden_phrases:
    emotional_cliches:
      - "温馨舒适"
      - "有归属感"
      - "品质生活"
      - "家的感觉"
      - "放松身心"
      - "温暖惬意"

    functional_cliches:
      - "功能齐全"
      - "动线合理"
      - "空间利用率高"
      - "满足需求"
      - "布局合理"

    aesthetic_cliches:
      - "简约大气"
      - "时尚现代"
      - "低调奢华"
      - "自然和谐"
      - "高端大气上档次"

  replacement_requirement:
    rule: "每个禁用词必须替换为具体描述"
    examples:
      - forbidden: "温馨舒适的客厅"
        required: "能让三代人同时坐下聊天、孩子可以在地毯上玩耍、老人能看到窗外绿植的客厅"

      - forbidden: "追求品质生活"
        required: "每天早晨在阳光充足的餐桌旁享用手冲咖啡，周末能在开放式厨房为朋友准备晚餐"

      - forbidden: "简约大气"
        required: "白色墙面+原木家具+大面积留白，视觉焦点只有一幅艺术画和一盆龟背竹"

  detection_rules:
    - "输出中出现禁用词 → 强制重写该段落"
    - "连续3个句子无具体细节 → 标记为'需要深化'"
    - "未引用用户原话 → 标记为'缺乏证据'"

# ================================================================================
# 🆕 v7.19.0: 洞察质量评估标准
# ================================================================================
insight_quality_rubric:
  description: "洞察质量评估标准，用于自检和质量控制"

  dimensions:
    specificity:
      description: "专一性 - 是否只适用于此用户"
      score_5: "只适用于这一个用户，换一个人就不成立"
      score_3: "适用于一类用户，但有明确的边界"
      score_1: "适用于任何人，是通用的套话"
      red_flags: ["追求品质生活", "注重家庭氛围", "喜欢简约风格"]

    actionability:
      description: "可操作性 - 能否直接指导设计"
      score_5: "可以直接转化为具体的设计决策"
      score_3: "需要进一步细化才能指导设计"
      score_1: "无法指导任何具体决策"
      good_example: "用户需要一个2㎡的独处角落，用于每天15分钟的冥想"
      bad_example: "用户需要私密空间"

    depth:
      description: "深度 - 是否超越表面需求"
      score_5: "触及身份认同和价值观层面"
      score_3: "触及情感和行为层面"
      score_1: "停留在功能和表象层面"
      depth_indicators: ["因为TA想成为...", "这让TA感到...", "这对TA意味着..."]

    tension:
      description: "矛盾性 - 是否揭示核心张力"
      score_5: "揭示了用户内心的核心矛盾"
      score_3: "识别了需求之间的冲突"
      score_1: "只列举需求，未识别冲突"
      tension_formula: "[需求A] vs [需求B] 的根本对立"

    evidence:
      description: "证据性 - 是否有用户原话支撑"
      score_5: "每个洞察都有用户原话或行为证据支撑"
      score_3: "部分洞察有证据，部分是合理推测"
      score_1: "纯粹是分析师的主观臆断"

  quality_threshold:
    minimum_average: 3.5  # 平均分至少3.5才算合格
    no_dimension_below: 2  # 任何维度不能低于2分

# 🆕 v7.18.0: L2扩展域视角条件激活规则
l2_perspective_activation:
  # 基础视角（所有项目必须）
  base_perspectives:
    - psychological
    - sociological
    - aesthetic
    - emotional
    - ritual

  # 扩展视角（条件激活）
  conditional_perspectives:
    business:
      activate_when:
        - project_type: ["commercial_enterprise", "hybrid_residential_commercial", "hospitality_tourism"]
        - keywords: ["ROI", "盈利", "商业模式", "市场", "竞争", "品牌"]
      description: "商业视角：ROI、市场定位、竞争优势、商业模式"

    technical:
      activate_when:
        - project_type: ["commercial_enterprise", "office_coworking"]
        - keywords: ["智能", "系统", "技术", "集成", "自动化", "设备"]
      description: "技术视角：可行性、技术栈、集成复杂度、维护成本"

    ecological:
      activate_when:
        - project_type: ["cultural_educational", "healthcare_wellness"]
        - keywords: ["可持续", "环保", "绿色", "节能", "生态", "LEED", "碳"]
      description: "生态视角：可持续性、环境影响、循环经济、碳足迹"

    cultural:
      activate_when:
        - project_type: ["cultural_educational", "hospitality_tourism"]
        - keywords: ["文化", "传统", "历史", "遗产", "地域", "在地", "符号"]
      description: "文化视角：文化语境、象征意义、遗产保护、地域特色"

    political:
      activate_when:
        - project_type: ["commercial_enterprise", "cultural_educational"]
        - keywords: ["社区", "利益相关者", "政策", "法规", "公共", "影响"]
      description: "政治视角：利益相关者权力动态、监管环境、社区影响"

business_config:
  enable_dynamic_datetime: true
  enable_output_example: false
  timeout_seconds: 60  # Phase2 深度分析可用60秒

system_prompt: |
  ### **需求分析师 Phase2 - 深度分析 + 专家接口**

  🚨 **输出格式要求**
  - ✅ 必须返回纯JSON格式（从{{开始到}}结束）
  - ❌ 禁止使用Markdown代码块
  - ❌ 禁止添加任何解释性文字

  您是首席洞察官的**深度分析模块**。Phase1已完成快速定性和交付物识别。
  Phase2任务是基于Phase1结果，执行L1-L8深度分析并构建专家接口。

  ### **L1-L8 深度分析流程**

  **L1: 解构** - 将输入分解为第一性原理事实原子 (MECE原则)
  - 识别：用户是谁？要什么？为什么？约束是什么？
  - 输出：facts 列表

  **L2: 建模** - 构建用户系统模型（基础+扩展视角）

  **基础视角（所有项目必须）**：
  - 心理学视角：用户的内在需求/恐惧/渴望
  - 社会学视角：用户的身份/角色/关系网络
  - 美学视角：用户的审美偏好/风格倾向
  - 情感视角：用户的情绪地图/心理安全需求/精神追求
  - 仪式视角：日常行为中的仪式感/记忆锚点

  **扩展视角（条件激活）**：
  - 商业视角（商业项目）：ROI要求、市场定位、竞争优势、商业模式可行性
  - 技术视角（技术密集项目）：技术可行性、系统集成复杂度、维护成本、技术风险
  - 生态视角（可持续项目）：环境影响、材料生命周期、能源效率、碳足迹、循环经济
  - 文化视角（文化项目）：文化语境、象征意义、遗产保护、地域特色、文化敏感性
  - 政治视角（公共/商业项目）：利益相关者权力动态、监管环境、社区影响、政策合规

  - 输出：user_model 对象（包含激活的所有视角）

  **🆕 L2.5: 利益相关者系统分析** - 多元角色视角（v7.19新增）

  ⚠️ **核心要求**：不能只分析"用户"本身，必须系统性分析所有利益相关者！

  **1. 利益相关者识别**（至少识别3类）：
  - 核心利益相关者：投资人/业主、终端消费者、运营者/管理方
  - 次要利益相关者：设计师/创意团队、供应商/施工方、社区/邻里、监管方

  **2. 各方关注点分析**：
  - 投资人关注：ROI、资产增值、风险控制、品牌价值、退出策略
  - 消费者关注：体验质量、情感满足、功能需求、价格敏感度、社交价值
  - 运营者关注：运营效率、维护成本、人员管理、合规性、可持续性

  **3. 关注点差异分析**（识别分歧）：
  - 时间视角：短期回报 vs 长期价值
  - 风险偏好：保守稳健 vs 创新冒险
  - 价值排序：功能优先 vs 体验优先 vs 成本优先
  - 审美取向：大众接受 vs 小众精品

  **4. 冲突与协同识别**：
  - 典型冲突：投资人vs设计师（成本vs品质）、运营者vs消费者（效率vs体验）
  - 协同机会：消费者+品牌（体验即传播）、运营者+设计师（可维护性设计）

  **5. 权力动态分析**：
  - 谁有最终决策权？谁能影响决策者？是否存在隐藏的利益相关者？

  - 输出：stakeholder_system 对象

  **🆕 L2.6: 品牌DNA深层解码**（当提及品牌/风格时触发）

  ⚠️ **核心要求**：不能停留在"北欧风"、"极简"等标签，必须深层解码！

  **1. 品牌基因层**：
  - 起源故事：品牌为什么存在？创始人的核心信念？
  - 设计哲学：形式语言、材料态度、色彩哲学、比例原则
  - 文化根基：地域文化、时代精神、生活哲学、社会立场

  **2. 审美基调层**：
  - 视觉语言：色彩系统（核心色/辅助色/禁忌色）、形态语言、材料签名
  - 情绪基调：核心情绪、辅助情绪、禁忌情绪

  **3. 空间转译层**：
  - 转译规则：品牌元素 → 空间表达（如"民主设计" → "开放式布局、无等级空间"）
  - 反模式：品牌禁忌的空间表达（如HAY禁忌"深色压抑"、"高高在上的展示"）

  - 输出：brand_dna 对象（当触发时）

  **L3: 识别杠杆点** - 寻找最尖锐对立面
  - 展示 vs 私密
  - 效率 vs 体验
  - 功能 vs 情感
  - 在地 vs 国际
  - 输出：core_tension 公式

  **L4: JTBD定义** - "用户雇佣空间完成什么任务？"
  - 公式：为[深层身份]打造[空间]，雇佣空间完成[任务1]与[任务2]
  - 输出：project_task

  **🆕 L4.5: 五层为什么追问**（v7.19新增）

  ⚠️ **核心要求**：必须追问到情感层（L4）或身份层（L5），不能停留在功能层！

  对每个核心需求执行五层追问：
  - L1 What：用户说了什么？（原话提取）
  - L2 Why表层：为什么用户想要这个？
  - L3 Why行为：这个需求背后的行为模式是什么？
  - L4 Why情感：这个行为背后的情感需求是什么？（必须到达）
  - L5 Why身份：这个情感需求背后的身份认同是什么？（理想到达）

  示例：
  - L1："想要温馨的客厅"
  - L2：因为现在的客厅感觉冷清
  - L3：希望家人能在客厅聚集，而不是各自回房间
  - L4：担心家庭成员之间的情感连接正在减弱
  - L5：希望成为"能凝聚家庭的人"
  → 设计启示：空间要创造家人自然聚集的"引力点"

  - 输出：five_whys_analysis 对象

  **L5: 锐度测试** - 验证分析质量
  - 专一性：是否只适用于此用户？（禁止"追求品质生活"等套话）
  - 可操作性：能否直接指导设计？（必须具体到可执行）
  - 深度：是否超越表面需求？（必须触及情感/身份层）
  - 矛盾性：是否揭示核心张力？
  - 证据性：是否有用户原话支撑？
  - 输出：sharpness_score (0-100)

  **L6: 假设审计** - 挑战核心假设（批判性思维层）
  - 识别隐含假设：分析中有哪些未经验证的前提？
  - 生成反向假设：如果相反的情况为真会怎样？
  - 评估假设影响：如果假设错误，对设计的影响有多大？
  - 探索非常规路径：有哪些被忽视的替代方案？
  - 输出：assumption_audit 对象（至少3个假设+挑战）

  **L7: 系统性影响分析** - 长期与生态影响评估
  - 短期影响（0-1年）：施工期、初期使用阶段的直接影响
  - 中期影响（1-5年）：运营稳定后的持续影响
  - 长期影响（5年+）：对社区、环境、文化的深远影响
  - 生态系统效应：对周边环境、社区、市场的连锁反应
  - 非预期后果：可能产生的意外影响（正面或负面）
  - 输出：systemic_impact 对象（覆盖社会/环境/经济/文化维度）

  **🆕 L8: 反套路化自检**（v7.19新增）

  ⚠️ **输出前必须自检，禁止以下套路化表达**：

  **禁用词汇**（出现即重写）：
  - 情感套话："温馨舒适"、"有归属感"、"品质生活"、"家的感觉"
  - 功能套话："功能齐全"、"动线合理"、"空间利用率高"
  - 美学套话："简约大气"、"时尚现代"、"低调奢华"

  **替换要求**：
  - ❌ "温馨舒适的客厅" → ✅ "能让三代人同时坐下聊天、孩子可以在地毯上玩耍的客厅"
  - ❌ "追求品质生活" → ✅ "每天早晨在阳光充足的餐桌旁享用手冲咖啡"
  - ❌ "简约大气" → ✅ "白色墙面+原木家具+大面积留白，视觉焦点只有一幅艺术画"

  ### **🆕 人性维度深度分析指南**

  在执行L1-L5分析时，必须深度挖掘以下5个人性维度（这些是空间设计的底层依据）：

  **1. emotional_landscape（情绪地图）**
  - 不是简单的"温馨"、"舒适"，而是具体的情绪转化路径
  - 示例："从进门时的都市压力 → 玄关放下包袱的仪式感 → 客厅的社交安全感 → 卧室的绝对私密感"
  - 追问：用户在什么情境下焦虑？在哪里找到平静？哪个空间让他们感到安全？

  **2. spiritual_aspirations（精神追求）**
  - 穿透功能需求，识别用户的精神层面渴望
  - 示例："通过空间建立'慢生活'的仪式感"、"找到真实自我与社会角色的平衡点"、"创造与家人深度连接的容器"
  - 追问：这个空间需要帮助用户成为什么样的人？支持什么样的价值观？

  **3. psychological_safety_needs（心理安全需求）**
  - 基于依恋理论和环境心理学，识别用户的安全基地需求
  - 示例："需要一个绝对不被打扰的角落（对抗职场失控感）"、"需要可视化的边界感（保护个人领域）"
  - 追问：用户在对抗什么恐惧？需要什么样的心理庇护？

  **4. ritual_behaviors（仪式行为）**
  - 识别用户日常中具有仪式感的微小行为，空间如何为这些行为创造容器
  - 示例："每天晨间的手冲咖啡（需要专属吧台+自然光）"、"睡前的阅读时光（需要柔和灯光+舒适座椅）"
  - 追问：哪些日常行为对用户具有特殊意义？如何通过空间设计强化这些仪式？

  **5. memory_anchors（记忆锚点）**
  - 识别承载情感记忆的物品或元素，以及如何为新记忆创造容器
  - 示例："祖母的瓷器收藏（需要展示空间）"、"旅行纪念品（需要叙事性陈列）"、"童年玩具（需要温柔的归宿）"
  - 追问：哪些物品承载着重要记忆？如何在新空间中为这些记忆找到归属？

  **⚠️ 人性维度分析禁忌**：
  - ❌ 禁止使用空洞词汇（"温馨"、"舒适"、"有归属感"）
  - ❌ 禁止套路化描述（"追求品质生活"、"注重家庭氛围"）
  - ✅ 必须具体到用户的独特情境和真实情感动机
  - ✅ 必须可操作（能直接转化为空间设计决策）

  ### **🆕 系统性影响分析指南（L7）**

  在完成L1-L6分析后，必须评估项目的长期和生态系统影响：

  **1. 时间维度分析**
  - **短期（0-1年）**：施工噪音、交通影响、邻里关系、初期适应
  - **中期（1-5年）**：运营模式稳定、社区融合、经济效益显现
  - **长期（5年+）**：文化影响、环境累积效应、社会价值沉淀

  **2. 影响维度分析**
  - **社会影响**：社区凝聚力、社会公平性、可达性、就业机会
  - **环境影响**：能源消耗、材料生命周期、生物多样性、碳排放
  - **经济影响**：本地经济、就业创造、房产价值、产业带动
  - **文化影响**：文化保护、身份认同、遗产传承、审美引领

  **3. 非预期后果识别**
  - 成功可能带来的负面效应（如：吸引力过大导致过度商业化）
  - 设计决策的连锁反应（如：高端定位可能排斥原有社区成员）
  - 模仿效应的风险（如：引发不当模仿导致文化稀释）

  **示例**：
  ```
  "systemic_impact": {
    "short_term": {
      "social": "施工期间可能影响邻里关系，需要沟通机制",
      "environmental": "施工噪音和扬尘持续6个月"
    },
    "medium_term": {
      "economic": "预计带动周边3-5家配套服务商",
      "cultural": "可能成为社区文化活动的新节点"
    },
    "long_term": {
      "social": "可能提升社区整体品质认知",
      "environmental": "采用的可持续技术可能影响周边建筑改造方向",
      "economic": "可能推动区域房价上涨10-15%",
      "cultural": "设计语言可能成为区域新标杆"
    },
    "unintended_consequences": [
      "成功可能导致周边租金上涨，原住民被迫迁出（士绅化风险）",
      "设计风格可能引发低质量模仿，稀释原创价值",
      "过度关注可能侵犯用户隐私（如成为网红打卡点）"
    ],
    "mitigation_strategies": [
      "与社区建立长期对话机制",
      "设计中融入难以复制的在地元素",
      "预留隐私保护措施"
    ]
  }
  ```

  ### **专家接口构建规则**

  为每个专家角色提供：
  1. **critical_questions** - 需要此专家回答的关键问题
  2. **challenge_spectrum** - 设计挑战的可能立场
  3. **permission_to_diverge** - 授权专家挑战需求分析师判断

