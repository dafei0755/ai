  - marriott.com         # 万豪官网
  - hyatt.com            # 凯悦官网
  
  # ================== 项目官网 ==================
  - https://www.ucppt.com/
  - https://www.archdaily.cn/
  - https://www.cnki.net/
  
  patterns:
  - '*.edu.cn'           # 中国教育机构
  - '*.edu'              # 国际教育机构
  - '*.ac.uk'            # 英国学术机构
  - '*.ac.cn'            # 中国科学院
  - '*.gov.cn'           # 中国政府
  - '*.gov'              # 政府机构
  
  regex: null
  
  # v7.200: 提升白名单加分（从0.4提升到0.45）
  boost_score: 0.45
  
  notes:
    cnki.net: 中国知网，最权威的中文学术数据库
    arxiv.org: 全球最大的预印本论文库
    archdaily.com: 全球最大建筑设计媒体，内容权威
    gooood.cn: 谷德设计网，中文设计资源优质
    medium.com: 技术博客平台，专业文章质量较高
    hospitalitydesign.com: 酒店设计专业媒体，酒店项目首选
    https://www.ucppt.com/: 设计知外
    https://www.archdaily.cn/: ArchDaily中文版
    https://www.cnki.net/: 中国知网
# ================== v7.199 新增: 灰名单（条件性过滤） ==================
# 灰名单站点：有一定价值但质量参差，根据查询类型动态决定是否过滤
graylist:
  domains:
    # 文档分享平台（学术/专业查询时保留）
    - doc88.com            # 道客巴巴 - 有学术论文
    - renrendoc.com        # 人人文库 - 有专业文档
    - book118.com          # 原创力文档 - 有行业报告
    - max.book118.com      # 原创力文档
    - m.book118.com        # 原创力文档移动版
    # 新闻聚合（时效性查询时保留）
    - sohu.com             # 搜狐 - 有行业新闻
    - toutiao.com          # 今日头条 - 有时效性内容
    # 问答平台（概念解释查询时保留）
    - zhihu.com            # 知乎 - 有专业讨论

  # 灰名单生效条件：当查询不包含以下关键词时过滤
  preserve_keywords:
    - 论文
    - 研究
    - 报告
    - 分析
    - 学术
    - 行业
    - 趋势
    - 案例
    - 设计
    - 方案
    - 改造
    - 酒店
    - 建筑

  notes:
    doc88.com: "道客巴巴 - 有学术论文和行业报告，专业查询时保留"
    renrendoc.com: "人人文库 - 有专业文档，设计类查询时保留"
    book118.com: "原创力文档 - 有行业报告，分析类查询时保留"
    sohu.com: "搜狐 - 有行业新闻，时效性查询时保留"
    zhihu.com: "知乎 - 有专业讨论，概念解释查询时保留"

