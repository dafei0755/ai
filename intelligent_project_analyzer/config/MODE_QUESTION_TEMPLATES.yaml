# MODE_QUESTION_TEMPLATES.yaml
# 版本: v7.700 P0
# 目的: 10 Mode Engine 问卷模板系统
# 说明: 根据检测到的设计模式(M1-M10)，动态注入模式特定问题
#
# 核心机制:
# 1. Phase2 通过 HybridModeDetector.detect_sync() 检测 detected_modes
# 2. progressive_questionnaire 读取本配置，根据 detected_modes 注入问题
# 3. Step2 雷达图选择维度时，优先覆盖当前模式的核心维度
# 4. Step3 缺口追问时，基于模式特定的验证逻辑生成追问

# ==============================================================================
# M1: 概念驱动型设计 (Concept-Driven Mode)
# ==============================================================================
M1_concept_driven:
  mode_name: "概念驱动型设计"
  description: "空间围绕核心精神主线展开，精神优先于风格和功能"

  # 核心维度（对应雷达图维度优先级）
  priority_dimensions:
    - "D12_文化叙事"      # 核心母题提炼
    - "D03_空间秩序"      # 概念结构化
    - "D09_情绪氛围"      # 空间叙事路径
    - "D01_功能分区"      # 功能服从概念
    - "D04_材料选型"      # 材料服从概念

  # Step1: 任务梳理阶段 - 模式特定引导问题
  step1_questions:
    - question: "这个项目要传达的核心精神主线是什么？（不是风格，而是内在张力/欲望/自我认同）"
      dimension_tag: "D12_文化叙事"
      purpose: "锁定精神主轴"
      example_answer: "例如：克制的权力感 / 归属与漂泊的冲突 / 女性独立意识觉醒"

    - question: "这个概念如何转化为空间规则？（不是PPT层概念，而是可执行的结构逻辑）"
      dimension_tag: "D03_空间秩序"
      purpose: "概念结构化能力验证"
      example_answer: "例如：'克制'→材料控制+体量压缩+光线单一来源+低饱和色彩"

    - question: "项目是否有明确的文化母题来源？"
      dimension_tag: "D12_文化叙事"
      purpose: "文化母题提炼"
      options:
        - "有明确母题（如文人精神、工业理性、女性自我意识）"
        - "有模糊方向，需要提炼"
        - "暂无，需要从项目特质中寻找"

  # Step2: 雷达图阶段 - 模式特定子维度问题
  step2_dimension_prompts:
    D12_文化叙事:
      - "这个项目的文化母题是否能避免符号堆砌？（例如不是简单的'中国风'、'禅意'）"
      - "空间叙事路径是否有明确节奏？（进入→过渡→聚焦→高潮→沉静→收束）"

    D03_空间秩序:
      - "如果删除概念，空间结构是否会崩塌？"
      - "概念是否影响了平面结构、立面设计、材料选择、灯光策略？"

    D09_情绪氛围:
      - "空间是否有明确的'情绪高潮点'？"
      - "叙事节奏是否避免了全程高潮（疲劳）或全程平淡（无记忆）？"

  # Step3: 缺口追问阶段 - 模式特定验证问题
  step3_gap_filling_rules:
    - condition: "未明确精神主轴"
      question: "请描述项目业主/品牌的核心精神张力：内在冲突是什么？欲望是什么？自我认同是什么？"
      required: true

    - condition: "概念无法转化为结构逻辑"
      question: "请具体说明概念如何指导平面？如何影响立面？如何影响材料？如何影响灯光？"
      required: true

    - condition: "缺乏文化母题"
      question: "是否可以从文化/哲学/历史中提炼空间母题？或者从业主的人生阶段/身份冲突中寻找？"
      required: false

# ==============================================================================
# M2: 功能效率型设计 (Function Efficiency Mode)
# ==============================================================================
M2_function_efficiency:
  mode_name: "功能效率型设计"
  description: "以系统效率为第一原则，追求运转更快、更稳、更少摩擦"

  priority_dimensions:
    - "D01_功能分区"      # 功能模块标准化
    - "D02_动线组织"      # 动线最优模型
    - "D06_声学控制"      # 干扰控制
    - "D07_设备集成"      # 后勤隐形系统
    - "D05_照明设计"      # 功能照明优先

  step1_questions:
    - question: "项目的核心效率目标是什么？"
      dimension_tag: "D01_功能分区"
      purpose: "明确效率指标"
      options:
        - "减少无效移动和交叉干扰"
        - "提升流转速度和空间利用率"
        - "降低运营成本和维护难度"
        - "提高人均产出和坪效"

    - question: "动线是否存在潜在冲突点？"
      dimension_tag: "D02_动线组织"
      purpose: "动线优化诊断"
      sub_questions:
        - "主线动线和次级动线是否分层？"
        - "后勤动线和客流动线是否交叉？"
        - "是否存在逆行冲突或瓶颈节点？"

    - question: "空间是否需要模块化和标准化？"
      dimension_tag: "D01_功能分区"
      purpose: "可复制性评估"
      options:
        - "需要高度标准化（连锁/可复制项目）"
        - "需要部分模块化（便于维护升级）"
        - "不需要模块化（定制化项目）"

  step2_dimension_prompts:
    D02_动线组织:
      - "是否有人流热力图数据或行为模拟？"
      - "是否区分了主线/次级/后勤/紧急疏散动线？"

    D01_功能分区:
      - "功能模块是否可独立运行？是否可替换升级？"
      - "是否存在功能回头路或无效移动？"

    D06_声学控制:
      - "是否存在不可控的声学/视觉/气味/社交干扰？"
      - "是否实现了主动分区控制而非被动减少干扰？"

  step3_gap_filling_rules:
    - condition: "动线未分层"
      question: "请明确：主线动线服务谁？次级动线服务谁？后勤动线如何物理分离？"
      required: true

    - condition: "存在干扰源"
      question: "请列出所有潜在干扰源（声学/视觉/气味/社交），并说明如何控制？"
      required: true

    - condition: "模块化需求不明"
      question: "项目是否需要模块化？如果是，哪些部分需要可替换？维护周期是多久？"
      required: false

# ==============================================================================
# M3: 情绪体验型设计 (Emotional Experience Mode)
# ==============================================================================
M3_emotional_experience:
  mode_name: "情绪体验型设计"
  description: "控制人的感知节奏，制造沉浸式体验和记忆锚点"

  priority_dimensions:
    - "D09_情绪氛围"      # 情绪节奏曲线
    - "D05_照明设计"      # 光影情绪控制
    - "D04_材料选型"      # 触感与质感
    - "D03_空间秩序"      # 尺度与压缩释放
    - "D06_声学控制"      # 声学氛围

  step1_questions:
    - question: "项目希望制造什么样的情绪体验？"
      dimension_tag: "D09_情绪氛围"
      purpose: "锁定情绪目标"
      options:
        - "沉浸式体验（让人忘记时间）"
        - "冲击性记忆（制造强烈记忆点）"
        - "舒缓疗愈（降低焦虑和压力）"
        - "社交活跃（激发互动和停留）"

    - question: "空间是否需要明确的情绪节奏曲线？"
      dimension_tag: "D09_情绪氛围"
      purpose: "节奏设计验证"
      sub_questions:
        - "是否有'压缩→释放→提升→高潮→沉静'的节奏？"
        - "情绪高潮点设计在哪个位置？"
        - "是否有情绪缓冲区和沉静区？"

    - question: "除视觉外，哪些感官需要重点调动？"
      dimension_tag: "D04_材料选型"
      purpose: "五感系统评估"
      options:
        - "触觉（材料触感和温度）"
        - "听觉（声学设计和背景音）"
        - "嗅觉（气味记忆和香氛系统）"
        - "仅视觉即可"

  step2_dimension_prompts:
    D09_情绪氛围:
      - "情绪节奏是否避免了全程高潮（疲劳）或全程平稳（无记忆）？"
      - "是否设计了1-3个核心记忆锚点（可拍照节点/沉浸节点/仪式节点）？"

    D05_照明设计:
      - "光线是否有强弱变化和节奏控制？"
      - "是否用光线强化了情绪高潮和沉静区的对比？"

    D04_材料选型:
      - "材料是否有触感层次（粗糙/细腻/温暖/冰冷）？"
      - "材料是否服务于情绪表达而非风格堆砌？"

  step3_gap_filling_rules:
    - condition: "情绪节奏不清晰"
      question: "请明确空间的情绪曲线：入口是什么情绪？核心区域是什么情绪？尾声是什么情绪？"
      required: true

    - condition: "缺乏记忆锚点"
      question: "请指定1-3个核心记忆锚点的位置和设计意图（不要处处都是锚点）"
      required: true

    - condition: "五感调动不足"
      question: "除视觉外，是否可以增强触觉（材料）、听觉（声学）、嗅觉（气味）的设计？"
      required: false

# ==============================================================================
# M4: 资产资本型设计 (Capital Asset Mode)
# ==============================================================================
M4_capital_asset:
  mode_name: "资产资本型设计"
  description: "以资本效率为最高决策原则，所有设计围绕资产回报模型展开"

  priority_dimensions:
    - "D11_经济模型"      # 坪效与转化模型
    - "D01_功能分区"      # 客群资产模型
    - "D13_可持续性"      # 生命周期收益逻辑
    - "D09_情绪氛围"      # 溢价符号构建
    - "D02_动线组织"      # 转化动线设计

  step1_questions:
    - question: "项目的核心盈利模型是什么？"
      dimension_tag: "D11_经济模型"
      purpose: "锁定资产目标"
      options:
        - "提升坪效和客单价（零售/商业）"
        - "提高RevPAR和复购率（酒店/民宿）"
        - "形成溢价和品牌影响力（高端项目）"
        - "构建长期稳定现金流（地产投资）"

    - question: "目标客群的资产等级是什么？"
      dimension_tag: "D01_功能分区"
      purpose: "客群资产建模"
      sub_questions:
        - "资产规模：百万级/千万级/亿级？"
        - "消费频率：高频/中频/低频？"
        - "消费决策路径：冲动型/理性型/社交型？"

    - question: "项目的生命周期预期是多久？"
      dimension_tag: "D13_可持续性"
      purpose: "长期收益评估"
      options:
        - "3-5年（快速回本型）"
        - "5-10年（稳定收益型）"
        - "10年以上（长期资产型）"

  step2_dimension_prompts:
    D11_经济模型:
      - "是否有明确的坪效目标和转化率指标？"
      - "是否设计了高转化区域和冲动消费区？"

    D02_动线组织:
      - "动线是否优化了停留节点和视线引导？"
      - "是否有热力图分析或数据驱动的动线优化？"

    D09_情绪氛围:
      - "空间是否能让用户'觉得贵'但不浮夸？"
      - "溢价结构是否来自克制和稀缺性表达，而非材料堆砌？"

  step3_gap_filling_rules:
    - condition: "盈利模型不清晰"
      question: "请明确项目的关键财务指标：坪效目标？客单价目标？回本周期？"
      required: true

    - condition: "客群资产模型缺失"
      question: "请详细描述目标客群：资产规模？消费能力？消费决策路径？空间需求层级？"
      required: true

    - condition: "长期收益逻辑不明"
      question: "项目如何维持10年以上价值？是否有升级计划？是否考虑二次利用能力？"
      required: false

# ==============================================================================
# M5: 乡建在地型设计 (Rural Context Mode)
# ==============================================================================
M5_rural_context:
  mode_name: "乡建在地型设计"
  description: "文化系统×经济系统×空间系统的再整合，重构乡村结构"

  priority_dimensions:
    - "D12_文化叙事"      # 地域文化解码
    - "D04_材料选型"      # 本地材料系统
    - "D11_经济模型"      # 乡村产业嵌入
    - "D13_可持续性"      # 低成本结构优化
    - "D01_功能分区"      # 生产+生活+展示

  step1_questions:
    - question: "项目的核心文化母题是什么？"
      dimension_tag: "D12_文化叙事"
      purpose: "地域文化解码"
      sub_questions:
        - "这个地域的真实历史路径是什么？"
        - "传统生产方式和生活习惯是什么？"
        - "气候特征和聚落形态的关系是什么？"
        - "如果脱离该地域，空间是否仍然成立？（如果成立，就是伪在地）"

    - question: "是否有本地材料系统构建计划？"
      dimension_tag: "D04_材料选型"
      purpose: "材料系统验证"
      sub_questions:
        - "本地材料：易获得？易维护？可复制？"
        - "是否与现代工艺结合？成本是否可控？"
        - "是否避免了简单的砖瓦木堆砌和'古村落样式'模仿？"

    - question: "项目如何嵌入乡村产业？"
      dimension_tag: "D11_经济模型"
      purpose: "产业闭环评估"
      options:
        - "住宿+餐饮+手工艺+农产品销售+教育体验（完整闭环）"
        - "住宿+部分产业（不完整闭环）"
        - "仅民宿（无产业支撑）"

  step2_dimension_prompts:
    D12_文化叙事:
      - "文化表达是否避免了符号堆砌和风格乡村？"
      - "是否提炼了真实的文化结构而非表面造型？"

    D04_材料选型:
      - "材料是否优先构建逻辑而非风格？"
      - "是否经过长期测试和性能验证？"

    D11_经济模型:
      - "空间是否具备独立现金流？"
      - "是否让村民成为受益者而非旁观者？"

  step3_gap_filling_rules:
    - condition: "文化母题不清晰"
      question: "请描述该地域的核心文化特质：不是风格，而是生产方式、气候适应、聚落逻辑"
      required: true

    - condition: "本地材料系统缺失"
      question: "请明确本地材料清单，并说明：易获得性、可维护性、成本控制、现代工艺结合方案"
      required: true

    - condition: "产业嵌入不足"
      question: "请设计产业闭环：除住宿外，是否有餐饮/手工艺/农产品/教育体验？村民如何参与？"
      required: false

# ==============================================================================
# M6: 城市更新型设计 (Urban Regeneration Mode)
# ==============================================================================
M6_urban_regeneration:
  mode_name: "城市更新型设计"
  description: "重构土地价值、公共界面与产业逻辑，激活区域活力"

  priority_dimensions:
    - "D11_经济模型"      # 土地价值重构
    - "D03_空间秩序"      # 公共界面塑造
    - "D01_功能分区"      # 产业逻辑嵌入
    - "D12_文化叙事"      # 城市IP构建
    - "D13_可持续性"      # 长期运营能力

  step1_questions:
    - question: "项目希望重构什么样的土地价值？"
      dimension_tag: "D11_经济模型"
      purpose: "土地价值定位"
      sub_questions:
        - "原有土地属性是什么？（工业/商业/住宅/混合）"
        - "目标客群升级方向是什么？"
        - "更新后预期改变哪类客群结构？"
        - "是否带动周边租金和地价？"

    - question: "公共界面如何设计？"
      dimension_tag: "D03_空间秩序"
      purpose: "公共界面评估"
      sub_questions:
        - "城市街道界面：可达性如何？"
        - "半开放灰空间：停留点在哪？"
        - "内部公共空间：社交节点如何设计？"

    - question: "产业逻辑是什么？"
      dimension_tag: "D01_功能分区"
      purpose: "产业嵌入评估"
      options:
        - "文化产业+创意办公+餐饮娱乐+社区商业（完整组合）"
        - "部分业态组合（需补充）"
        - "单一业态（风险高）"

  step2_dimension_prompts:
    D11_经济模型:
      - "更新是否改变了业态结构，还是只做外立面翻新？"
      - "是否有稳定流量来源和长期运营计划？"

    D03_空间秩序:
      - "是否形成新的公共聚集区和城市记忆点？"
      - "公共界面是否贯通了城市街道→灰空间→内部公共空间三层？"

    D12_文化叙事:
      - "是否创造了可被识别的城市IP？"
      - "是否有叙事主题和长期品牌运营体系？"

  step3_gap_filling_rules:
    - condition: "土地价值重构不明确"
      question: "请明确：原有土地属性→目标客群→新业态植入→价值提升路径"
      required: true

    - condition: "公共界面薄弱"
      question: "请设计三层公共界面：街道界面（可达性）→灰空间（停留点）→内部空间（社交节点）"
      required: true

    - condition: "产业逻辑缺失"
      question: "请设计产业组合，避免过度文创化和打卡型空城。是否平衡了资本×居民×城市记忆？"
      required: false

# ==============================================================================
# M7: 技术整合型设计 (Technology Integration Mode)
# ==============================================================================
M7_technology_integration:
  mode_name: "技术整合型设计"
  description: "技术在结构阶段就融合，改变空间的结构逻辑"

  priority_dimensions:
    - "D07_设备集成"      # 系统隐形化
    - "D13_可持续性"      # 数据反馈驱动
    - "D08_智能系统"      # 可迭代接口
    - "D01_功能分区"      # 人机关系平衡
    - "D05_照明设计"      # 智能照明系统

  step1_questions:
    - question: "技术系统的核心目标是什么？"
      dimension_tag: "D07_设备集成"
      purpose: "技术定位"
      options:
        - "隐形智能（无感存在）"
        - "可迭代升级（10年后仍可用）"
        - "自我学习（空间感知人的状态）"
        - "数据驱动优化（空间能自我调整）"

    - question: "技术系统的隐形化程度如何？"
      dimension_tag: "D07_设备集成"
      purpose: "隐形化评估"
      sub_questions:
        - "设备是否预埋管线和模块化检修口？"
        - "是否用中央控制替代墙面开关？"
        - "传感器是否隐藏式？"
        - "空间是否被设备破坏纯净感？"

    - question: "是否需要数据反馈驱动结构？"
      dimension_tag: "D13_可持续性"
      purpose: "数据闭环评估"
      sub_questions:
        - "是否记录人流密度/光照/空气质量/噪音/温湿度？"
        - "空间是否能通过数据调整自身状态？"
        - "是否存在自学习系统（L5级）？"

  step2_dimension_prompts:
    D07_设备集成:
      - "技术是否消失在空间中，还是以'科技感'形式外露？"
      - "是否预留了模块化检修口和升级接口？"

    D08_智能系统:
      - "系统是否为未来10年技术迭代预留接口？"
      - "是否可在不拆结构的前提下升级？"

    D01_功能分区:
      - "是否保留了人的决策权（自动化→半自动→手动可控）？"
      - "空间是否过度依赖系统？故障时是否瘫痪？"

  step3_gap_filling_rules:
    - condition: "技术外露影响美学"
      question: "请设计技术隐形化方案：预埋管线、模块化检修口、中央控制、隐藏式传感器"
      required: true

    - condition: "缺乏可迭代接口"
      question: "请明确：10年后哪些技术需要升级？如何在不拆结构的前提下实现升级？"
      required: true

    - condition: "人机关系失衡"
      question: "请确保系统分层：自动化+半自动+手动可控。用户是否保留决策权？"
      required: false

# ==============================================================================
# M8: 极端环境型设计 (Extreme Condition Mode)
# ==============================================================================
M8_extreme_condition:
  mode_name: "极端环境型设计"
  description: "在特殊自然或物理条件下稳定运行，结构优先于形式"

  priority_dimensions:
    - "D13_可持续性"      # 结构抗性系统
    - "D04_材料选型"      # 材料适应系统
    - "D07_设备集成"      # 能源与生存系统
    - "D06_声学控制"      # 生理舒适保障
    - "D03_空间秩序"      # 环境适应性结构

  step1_questions:
    - question: "项目面临的极端环境类型是什么？"
      dimension_tag: "D13_可持续性"
      purpose: "环境诊断"
      options:
        - "高海拔（低氧/强紫外线）"
        - "极寒/极热（温度极端）"
        - "高湿/高盐雾（腐蚀性）"
        - "强风压/地震带（结构抗性）"
        - "沙漠/海岛（资源稀缺）"

    - question: "结构抗性系统如何设计？"
      dimension_tag: "D13_可持续性"
      purpose: "结构抗性评估"
      sub_questions:
        - "是否基于当地气候数据计算了抗风压/抗震/抗雪载？"
        - "是否考虑了盐雾腐蚀/紫外线老化？"
        - "是否避免了套用平原地区结构逻辑？"

    - question: "能源与生存系统的自给能力如何？"
      dimension_tag: "D07_设备集成"
      purpose: "自给系统评估"
      options:
        - "完全自给（太阳能/风能/雨水回收/备用电源/供氧）"
        - "半自给（部分能源独立）"
        - "依赖外部（无自给能力）"

  step2_dimension_prompts:
    D13_可持续性:
      - "结构是否经过极端气候周期测试？"
      - "是否与环境共存而非强行对抗？"

    D04_材料选型:
      - "材料是否适应环境？（如高寒区低导热材料、高盐雾区不锈钢升级）"
      - "材料是否经过长期测试？维护周期是否合理？"

    D07_设备集成:
      - "是否可脱离城市能源稳定运行？"
      - "能源系统是否达到L4半自给或L5完全自给？"

  step3_gap_filling_rules:
    - condition: "结构抗性不足"
      question: "请提供当地气候数据，并明确：抗风压/抗震/抗雪载/抗腐蚀/抗老化的设计标准"
      required: true

    - condition: "材料不适应环境"
      question: "请选择适应环境的材料：高寒区（低导热+三层中空玻璃）、高盐雾区（不锈钢升级+防腐木碳化）"
      required: true

    - condition: "生存系统缺失"
      question: "请设计能源与生存系统：低能耗供暖/太阳能/雨水回收/备用电源/供氧系统（如需）"
      required: false

# ==============================================================================
# M9: 社会结构型设计 (Social Structure Mode)
# ==============================================================================
M9_social_structure:
  mode_name: "社会结构型设计"
  description: "空间组织人与人的关系，处理权力、距离、隐私、代际、冲突"

  priority_dimensions:
    - "D01_功能分区"      # 权力距离建模
    - "D03_空间秩序"      # 隐私分级系统
    - "D02_动线组织"      # 冲突缓冲结构
    - "D06_声学控制"      # 声学隐私
    - "D13_可持续性"      # 关系演化适配

  step1_questions:
    - question: "项目中的社会关系结构是什么？"
      dimension_tag: "D01_功能分区"
      purpose: "社会关系诊断"
      options:
        - "家庭结构（多代同堂/再婚家庭/核心家庭）"
        - "权力等级（企业/政府/机构）"
        - "社交模式（合租/联合办公/社区）"
        - "代际关系（老人+子女+孙辈）"

    - question: "空间如何反映权力关系？"
      dimension_tag: "D01_功能分区"
      purpose: "权力距离建模"
      sub_questions:
        - "谁主导空间？谁拥有视线控制权？谁拥有核心区域？"
        - "是否需要中轴对称结构（权威型）、分散式结构（平权型）、还是环绕式结构（家族型）？"
        - "空间是否无意强化了不平等？"

    - question: "隐私分级系统如何设计？"
      dimension_tag: "D03_空间秩序"
      purpose: "隐私分级评估"
      sub_questions:
        - "是否划分了公共区→半公共区→半私密区→完全私密区？"
        - "是否存在隐私冲突路径？"
        - "隐私隔离是否达到物理/视觉/声学/心理四级？"

  step2_dimension_prompts:
    D01_功能分区:
      - "权力结构是否清晰但不压迫？"
      - "是否避免了无意强化的不平等？"

    D03_空间秩序:
      - "隐私分级是否完整？是否存在隐私冲突？"
      - "是否有独立通道和多入口系统？"

    D02_动线组织:
      - "是否存在'回避路径'和情绪缓冲带？"
      - "冲突缓冲是否包含灰空间、独立通道、时间错峰使用？"

  step3_gap_filling_rules:
    - condition: "权力关系不清晰"
      question: "请明确：谁主导空间？谁拥有视线控制权？核心区域归属谁？是否需要平衡家庭权力？"
      required: true

    - condition: "隐私分级缺失"
      question: "请设计四级隐私系统：公共区→半公共区→半私密区→完全私密区，并说明如何避免隐私冲突"
      required: true

    - condition: "冲突缓冲不足"
      question: "请设计冲突缓冲机制：灰空间、独立通道、多入口系统、时间错峰使用"
      required: false

# ==============================================================================
# M10: 未来推演型设计 (Future Speculation Mode)
# ==============================================================================
M10_future_speculation:
  mode_name: "未来推演型设计"
  description: "基于社会趋势和技术演进，构建可适配未来的空间结构"

  priority_dimensions:
    - "D13_可持续性"      # 趋势推演模型
    - "D08_智能系统"      # 技术接口预留
    - "D01_功能分区"      # 生活方式重构
    - "D03_空间秩序"      # 长周期价值策略
    - "D11_经济模型"      # 未来商业模式

  step1_questions:
    - question: "项目回应的未来趋势是什么？"
      dimension_tag: "D13_可持续性"
      purpose: "趋势推演"
      options:
        - "人口结构变化（老龄化/家庭小型化）"
        - "远程办公普及（居家办公常态化）"
        - "AI自动化（劳动力结构变化）"
        - "健康焦虑上升（疗愈空间需求）"
        - "消费降级/升级（价值观变化）"

    - question: "空间如何为未来技术预留接口？"
      dimension_tag: "D08_智能系统"
      purpose: "技术接口评估"
      sub_questions:
        - "是否预留了可更换墙体和模块化机电？"
        - "是否有隐藏管线冗余和网络升级接口？"
        - "是否可在不拆结构的前提下升级？"

    - question: "未来生活方式如何变化？"
      dimension_tag: "D01_功能分区"
      purpose: "生活方式重构"
      sub_questions:
        - "是否支持居家办公和多功能空间？"
        - "是否平衡了共享与独立？"
        - "是否支持沉浸式娱乐和健康管理？"

  step2_dimension_prompts:
    D13_可持续性:
      - "趋势判断是否基于逻辑推演而非科幻想象？"
      - "空间是否回应未来趋势而非当前需求？"

    D08_智能系统:
      - "接口预留是否足够？10年后是否可升级？"
      - "是否有可替换的界面和软装系统？"

    D03_空间秩序:
      - "空间是否有时间耐久度（5年内不过时）？"
      - "是否采用中性底盘+可变软装的策略？"

  step3_gap_filling_rules:
    - condition: "趋势推演不清晰"
      question: "请明确：项目回应的未来变量是什么？5年后行为模式如何变化？空间如何适配？"
      required: true

    - condition: "技术接口缺失"
      question: "请设计技术接口预留方案：可更换墙体、模块化机电、隐藏管线冗余、网络升级接口"
      required: true

    - condition: "长期价值策略不明"
      question: "请设计长周期价值策略：中性底盘、可变软装、可替换界面、长期审美不过时"
      required: false

# ==============================================================================
# M11: 健康疗愈型设计 (Healthcare & Healing Mode)
# ==============================================================================
M11_healthcare_healing:
  mode_name: "健康疗愈型设计"
  description: "空间作为疗愈工具，安全感优先于美学，降低激活优于制造高潮"

  priority_dimensions:
    - "D09_情绪氛围"      # 心理安全环境系统
    - "D05_照明设计"      # 生理疗愈节律控制
    - "D04_材料选型"      # 材料安全性（低VOC、触感安全）
    - "D02_动线组织"      # 双视角服务动线
    - "D01_功能分区"      # 无障碍尊严设计

  step1_questions:
    - question: "项目的疗愈目标是什么类型？"
      dimension_tag: "D09_情绪氛围"
      purpose: "疗愈类型识别"
      options:
        - "医疗康复（医院、诊所、康复中心）"
        - "心理干预与情绪支持（心理咨询室、危机干预中心）"
        - "养老与临终关怀（养老院、临终病房、护理中心）"
        - "障碍功能支持（无障碍住宅、特殊教育环境）"
        - "高压疗愈需求（正念冥想、睡眠恢复、抗焦虑休息区）"
        - "特殊生命阶段（月子中心、新生儿病房、青少年心理中心）"

    - question: "空间的无障碍和尊严保护需求是什么？"
      dimension_tag: "D01_功能分区"
      purpose: "无障碍需求评估"
      sub_questions:
        - "使用者是否包含轮椅使用者或行动不便人群？"
        - "是否需要功能隐形化（扶手即造型语言、坡道即全人群动线）？"
        - "是否需要坐姿视线与站姿视线平等设计？"

    - question: "是否需要为服务提供者和被服务者分别设计动线？"
      dimension_tag: "D02_动线组织"
      purpose: "双视角动线需求"
      sub_questions:
        - "服务者（护理者/治疗师）是否需要独立的情绪恢复区？"
        - "被服务者动线是否需要'无盲区'和'自主控制感'？"
        - "家属/陪护者是否需要独立的安顿空间？"

  step2_dimension_prompts:
    D09_情绪氛围:
      - "空间是否主动降低使用者的心理防御激活程度？"
      - "是否有'不需要表演'的安全角落和退场位置？"
      - "色彩是否约束为低饱和度、大地色系？是否拒绝高对比度刺激色？"

    D05_照明设计:
      - "是否配置了昼夜节律调光系统（早晨高色温→傍晚低色温→夜间极低照度）？"
      - "是否避免了蓝光过多和眩光？"
      - "夜间照度是否控制在<10lux以避免昼夜节律紊乱？"

    D04_材料选型:
      - "材料是否优先考虑'无害'再考虑'好看'？"
      - "是否使用低VOC材料？新风量是否>=30m³/人/时？"
      - "触感是否安全、无刺激性？"

    D02_动线组织:
      - "服务者的工作状态是否对被服务者不可见？"
      - "被服务者是否可预知路径、可选择路径？"
      - "家属等陪护者是否有自己的'安顿空间'？"

  step3_gap_filling_rules:
    - condition: "心理安全策略不清晰"
      question: "请明确：空间如何降低使用者的心理防御？是否有安全角落、退场位置、隐私分级？色彩和声学控制方案是什么？"
      required: true

    - condition: "生理节律控制缺失"
      question: "请设计昼夜节律调光系统：早晨色温、傍晚色温、夜间照度。温湿度控制范围和空气质量标准是什么？"
      required: true

    - condition: "无障碍尊严设计缺失"
      question: "请设计无障碍尊严方案：功能隐形化（扶手=造型语言）、独立进出路径、感知高度平等"
      required: false

# ==============================================================================
# 全局配置
# ==============================================================================
global_config:
  # 默认模式（当Phase2未检测到明确模式时）
  default_mode: "M2_function_efficiency"

  # 模式权重阈值（confidence > threshold 才注入问题）
  mode_confidence_threshold: 0.3

  # 多模式时的优先级排序
  mode_priority_order:
    - "M1_concept_driven"         # 概念驱动最优先（影响整体结构）
    - "M4_capital_asset"          # 资产型次之（决定投资逻辑）
    - "M11_healthcare_healing"    # 健康疗愈（安全感是底线）
    - "M9_social_structure"       # 社会结构（影响空间组织）
    - "M2_function_efficiency"    # 功能效率（基础需求）
    - "M3_emotional_experience"   # 情绪体验（体验层）
    - "M7_technology_integration" # 技术整合（系统层）
    - "M8_extreme_condition"      # 极端环境（特殊场景）
    - "M5_rural_context"          # 乡建在地（特定场景）
    - "M6_urban_regeneration"     # 城市更新（特定场景）
    - "M10_future_speculation"    # 未来推演（长期视角）

  # 混合模式问题融合策略
  hybrid_mode_strategy:
    max_questions_per_step: 5   # 每步最多问题数（避免过载）
    priority_dimension_limit: 8  # 优先维度最多数量
    merge_overlapping_dimensions: true  # 重叠维度自动合并
