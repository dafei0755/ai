      description: "将项目成果翻译为政策话语体系——对齐乡村振兴/农文旅融合/三产融合等政策框架"
      deliverables:
        - "政策对齐矩阵（项目要素↔政策指标映射）"
        - "量化成效（带动就业人数/农民增收比例/社会资本回流）"
