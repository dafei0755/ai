      deliverables:
        - "四收入结构模型（客房/餐饮/深加工/内容经济）"
        - "投资回报周期测算（保守/中性/乐观三档）"
        - "空间-产业耦合矩阵（客房↔果园认养+农产品订阅+品牌联名）"
        - "风险缓释机制（保底收益/淡季保障基金/退出机制）"
      quality_target:
