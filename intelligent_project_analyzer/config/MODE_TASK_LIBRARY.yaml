        criteria_mapping:
          - "结构是否基于当地气候数据计算？ → L4: 数据驱动设计"
          - "是否避免了套用平原地区结构逻辑？ → L4: 环境适应性"

    - task_id: "M8_T02"
      task_name: "材料适应系统设计"
      priority: "P0"
