      priority: "P0"
      target_expert: "V6-2"  # MEP工程师
      description: "为未知技术预留接口（可更换墙体、模块化机电、隐藏管线冗余、网络升级接口）"
      deliverables:
        - "可更换墙体和模块化机电设计"
        - "隐藏管线冗余和网络升级接口"
        - "10年技术迭代接口预留方案"
      quality_target:
        dimension: "technical_feasibility"
        target_level: "L5"
        reference: "13_Evaluation_Matrix.technical_feasibility.L5"
        criteria_mapping:
          - "是否可在不拆结构的前提下升级？ → L5: 技术迭代能力"
          - "接口预留是否足够？ → L5: 未来适应性"

    - task_id: "M10_T03"
      task_name: "生活方式重构设计"
      priority: "P1"
      target_expert: "V2"  # 设计总监
      description: "预测未来生活节奏变化（居家办公/多功能空间/共享与独立/沉浸娱乐），设计适配空间"
      deliverables:
        - "未来生活方式预测（居家办公/多功能/共享独立/沉浸娱乐）"
        - "适配未来行为模式的空间设计"
        - "功能可转换和灵活性方案"
      quality_target:
        dimension: "functional_efficiency"
        target_level: "L5"
        reference: "13_Evaluation_Matrix.functional_efficiency.L5"
        criteria_mapping:
          - "空间是否适配未来行为模式？ → L5: 功能前瞻性"
          - "是否支持居家办公和多功能空间？ → L5: 功能灵活性"

    - task_id: "M10_T04"
      task_name: "长周期价值策略"
      priority: "P1"
      target_expert: "V2"  # 设计总监
      description: "设计时间耐久度（中性底盘+可变软装+可替换界面+长期审美不过时）"
      deliverables:
        - "中性底盘设计（结构层稳定性）"
        - "可变软装和可替换界面方案"
        - "长期审美不过时策略（5年内不过时）"
      quality_target:
        dimension: "concept_integrity"
        target_level: "L5"
        reference: "13_Evaluation_Matrix.concept_integrity.L5"
        criteria_mapping:
          - "空间是否五年内不过时？ → L5: 概念生成力"
          - "是否采用中性底盘+可变软装策略？ → L5: 长期价值维持"

# ==============================================================================
# M11: 健康疗愈型设计 (Healthcare & Healing Mode)
# ==============================================================================
M11_healthcare_healing:
  mode_name: "健康疗愈型设计"
  core_tasks:
    - task_id: "M11_T01"
      task_name: "心理安全环境系统设计"
      priority: "P0"
      target_expert: "V3"  # 叙事专家
      description: "设计低刺激、高安全感的空间环境系统，通过色彩约束（低饱和度、大地色系）、声学控制（<45dB静区、白噪声引导）、边界感知（安全角落、避免被监视感）和隐私分级，主动降低使用者的心理防御激活程度"
      deliverables:
        - "色彩约束方案（低饱和度、大地色系、拒绝高对比度刺激色）"
        - "声学控制方案（吸音材料、分贝控制、白噪声引导）"
        - "安全角落与退场位置设计（不需要表演的区域）"
        - "隐私分级系统（公共区域也设计半私密退场位置）"
      quality_target:
        dimension: "psychological_safety"
        target_level: "L4"
        criteria_mapping:
          - "使用者进入空间后是否有'不需要表演'的区域？ → L4: 心理安全系统完整"
          - "是否避免了把'开放亮堂'等同于心理安全？ → L4: 理解脆弱状态需求"
          - "是否提供了可退入的安全角落？ → L4: 退场机制设计"

    - task_id: "M11_T02"
      task_name: "生理疗愈节律控制方案"
      priority: "P0"
      target_expert: "V6-2"  # MEP工程师
      description: "通过对光、温度、空气质量和声音的精准控制，支持人体的生理恢复节律。包括昼夜光节律调光系统（早晨5000K+/傍晚2700K/夜间<10lux）、温湿度控制（22-24°C, 40-60%RH）、低VOC新风系统（>=30m³/人/时）"
      deliverables:
        - "昼夜节律调光系统设计（早晨高色温→傍晚低色温→夜间极低照度）"
        - "温湿度精准控制方案（22-24°C, 40-60%RH）"
        - "低VOC材料优先的空气质量方案（新风量>=30m³/人/时）"
        - "声环境控制方案（避免蓝光过多和眩光）"
      quality_target:
        dimension: "physiological_healing"
        target_level: "L4"
        criteria_mapping:
          - "光环境是否配置了昼夜节律调光系统？ → L4: 生理节律支持"
          - "是否避免了高色温LED作为全天照明？ → L4: 避免节律紊乱"

    - task_id: "M11_T03"
      task_name: "无障碍尊严设计"
      priority: "P1"
      target_expert: "V2"  # 设计总监
      description: "无障碍设计不是'允许轮椅通过'，而是'让使用轮椅的人不感到弱势被暴露'。功能隐形化（扶手即造型语言、坡道即全人群动线）、决策权还给使用者（独立进出路径）、感知高度平等（坐姿视线与站姿视线一致）"
      deliverables:
        - "功能隐形化方案（扶手=造型语言、坡道=全人群动线、无障碍卫生间外观一致）"
        - "独立进出路径设计（不强制依赖他人帮助）"
        - "感知高度平等方案（展示高度、柜台高度适配坐姿视线）"
      quality_target:
        dimension: "accessibility_dignity"
        target_level: "L4"
        criteria_mapping:
          - "非轮椅使用者是否会使用同一空间且不感到'特殊对待'？ → L4: 尊严隐形化"
          - "轮椅使用者是否可独立完成所有核心行为？ → L4: 自主性保障"

    - task_id: "M11_T04"
      task_name: "双视角服务动线设计"
      priority: "P1"
      target_expert: "V2"  # 设计总监
      description: "同时为被服务者（减少焦虑、保护尊严的动线）和服务提供者（效率与情绪缓冲的动线）设计。后勤补给路径与使用者日常动线完全分离，服务者有独立情绪恢复区，家属有独立安顿空间"
      deliverables:
        - "被服务者动线设计（无盲区、自主控制感、不暴露服务机制）"
        - "服务者动线设计（后勤分离、独立情绪恢复区）"
        - "家属/陪护者空间设计（情绪释放区、非正式社交区、独处空间）"
      quality_target:
        dimension: "dual_pathway"
        target_level: "L4"
        criteria_mapping:
          - "服务者的工作状态是否对被服务者不可见？ → L4: 动线分离完整"
          - "家属等陪护者是否有自己的'安顿空间'？ → L4: 三方均被设计"

# ==============================================================================
# 全局配置
# ==============================================================================
global_config:
  # 任务注入策略
  task_injection_strategy:
    P0_mandatory: true    # P0任务必须100%分配专家
    P1_recommended: 0.8   # P1任务建议80%以上覆盖
    P2_optional: 0.3      # P2任务建议30%以上覆盖

  # 模式权重阈值（confidence > threshold 才注入任务）
  mode_confidence_threshold: 0.3

  # 多模式时的任务融合策略
  hybrid_mode_strategy:
    max_tasks_per_mode: 4      # 每个模式最多注入任务数
    priority_task_limit: 12    # 所有模式合计最多任务数
    merge_overlapping_tasks: true  # 重叠任务自动合并（如M1+M3都需要叙事专家）

  # 任务验证规则
  validation_rules:
    P0_must_assign: true       # P0任务必须分配专家，否则触发警告
    check_expert_overload: true  # 检查单个专家任务是否过载（>5个任务）
    validate_deliverables: true  # 验证交付物是否符合模式特征

# ==============================================================================
# 任务分配映射（Mode → Expert）
# ==============================================================================
mode_to_expert_mapping:
  M1_concept_driven:
    primary_experts: ["V3", "V2"]      # 叙事专家、设计总监
    supporting_experts: ["V4"]         # 技术专家

  M2_function_efficiency:
    primary_experts: ["V6-1", "V2"]    # 结构工程师、设计总监
    supporting_experts: ["V6-2"]       # MEP工程师

  M3_emotional_experience:
    primary_experts: ["V3", "V4"]      # 叙事专家、技术专家
    supporting_experts: ["V2"]         # 设计总监

  M4_capital_asset:
    primary_experts: ["V1", "V2"]      # 需求分析师、设计总监
    supporting_experts: ["V5"]         # 成本专家

  M5_rural_context:
    primary_experts: ["V3", "V4"]      # 叙事专家、技术专家
    supporting_experts: ["V1", "V5"]   # 需求分析师、成本专家

  M6_urban_regeneration:
    primary_experts: ["V1", "V2"]      # 需求分析师、设计总监
    supporting_experts: ["V3"]         # 叙事专家

  M7_technology_integration:
    primary_experts: ["V6-2", "V7"]    # MEP工程师、智能系统专家
    supporting_experts: ["V6-1"]       # 结构工程师

  M8_extreme_condition:
    primary_experts: ["V6-1", "V4"]    # 结构工程师、技术专家
    supporting_experts: ["V6-2"]       # MEP工程师

  M9_social_structure:
    primary_experts: ["V2"]            # 设计总监
    supporting_experts: ["V1"]         # 需求分析师

  M10_future_speculation:
    primary_experts: ["V1", "V2"]      # 需求分析师、设计总监
    supporting_experts: ["V6-2"]       # MEP工程师

  M11_healthcare_healing:
    primary_experts: ["V2", "V3"]      # 设计总监、叙事专家
    supporting_experts: ["V6-2", "V4"] # MEP工程师、技术专家

# ==============================================================================
# 🆕 跨模式规则 (cross_mode_rules) - 防止任务数量爆炸
# 当多个 Mode 同时激活时触发，控制 P0 任务叠加上限
# ==============================================================================
cross_mode_rules:

  rules:
    # --- 规则1: M1 + M5（概念驱动 + 乡建在地）---
    # 典型场景：狮岭村类项目，文化+哲学双重驱动
    - id: "CR-01"
      trigger_modes: ["M1_concept_driven", "M5_rural_context"]
      max_p0_tasks: 8
      merge_strategy:
        # M1_T01 精神主轴 + M5 文化在地研究 → 合并为"文化根植的精神主轴建模"
        - merge: ["M1_T01", "M5_T01"]
          into: "文化根植的精神主轴建模"
          keep_from: "M1_T01"
          note: "在地文化即是概念来源，无需独立拆分"
      new_task:
        task_name: "命题边界验证（文化+概念复合）"
        priority: "P0"
        target_expert: "V3"
        description: "验证概念是否真正扎根在地文化，避免文化符号表面借用"

    # --- 规则2: M1 + M6（概念驱动 + 城市更新）---
    # 典型场景：菜市场/城市空间改造带强概念
    - id: "CR-02"
      trigger_modes: ["M1_concept_driven", "M6_urban_regeneration"]
      max_p0_tasks: 8
      merge_strategy:
        - merge: ["M1_T02", "M6_P0"]
          into: "概念驱动的城市更新策略"
          keep_from: "M1_T02"
          note: "概念结构化与更新策略可以同步推进"
      new_task:
        task_name: "公众感知与概念接受度评估"
        priority: "P1"
        target_expert: "V4"
        description: "评估抽象概念在公共空间中的可理解性和传播可能"

    # --- 规则3: M1 + M3（概念驱动 + 情绪体验）---
    - id: "CR-03"
      trigger_modes: ["M1_concept_driven", "M3_emotional_experience"]
      max_p0_tasks: 7
      merge_strategy:
        - merge: ["M1_T03", "M3_T01"]
          into: "情绪导向的空间叙事体系"
          keep_from: "M1_T03"
          note: "叙事即情绪设计，两者本质同源"
      new_task: null

    # --- 规则4: M5 + M9（乡建在地 + 社会结构）---
    # 典型场景：村落改造、社区营造、利益相关者复杂
    - id: "CR-04"
      trigger_modes: ["M5_rural_context", "M9_social_structure"]
      max_p0_tasks: 8
      merge_strategy: []
      new_task:
        task_name: "多方利益协调与参与设计机制"
        priority: "P0"
        target_expert: "V1"
        description: "设计社区参与机制，协调村集体/外来投资方/使用者之间的空间权益"

  # --- 通用任务上限规则 ---
  # 任意 3 个及以上 Mode 同时激活时强制生效
  global_task_cap:
    trigger: ">=3 modes activated"
    max_total_p0_tasks: 12
    max_total_tasks: 40
    deduplication_rule: "同一 target_expert 下，相似度 ≥ 0.8 的 P1 任务自动合并"
    note: "防止狮岭村类项目（5+ Mode 激活）产生 47+ 任务"
