          - "是否包含可量化绩效指标？ → L4: 数据驱动汇报"

    - task_id: "M5_T07"
      task_name: "美学锋化与传播"
      priority: "P2"
      target_expert: "V3"  # 叙事/美学专家
      description: "提炼设计美学主张的锋利表达——用建筑评论语言将项目定位为一种立场"
      deliverables:
