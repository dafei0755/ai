          - "能源系统是否达到L4半自给或L5完全自给？ → L4: 系统完整性"

    - task_id: "M8_T04"
      task_name: "生理舒适保障系统"
      priority: "P1"
      target_expert: "V6-2"  # MEP工程师
      description: "保证人体舒适曲线（温度/湿度/氧气浓度/气压/噪音）"
