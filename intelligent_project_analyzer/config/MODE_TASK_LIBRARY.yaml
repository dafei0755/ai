    - task_id: "M6_T04"
      task_name: "城市IP系统构建"
      priority: "P2"
      target_expert: "V3"  # 叙事专家
      description: "创造新的城市记忆点，构建视觉标志+叙事主题+文化活动+长期品牌运营体系"
