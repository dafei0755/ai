          - "材料是否经过长期测试？ → L4: 材料耐久性验证"

    - task_id: "M8_T03"
      task_name: "能源与生存系统设计"
      priority: "P1"
      target_expert: "V6-2"  # MEP工程师
      description: "构建自给系统（低能耗供暖/太阳能/雨水回收/备用电源/供氧系统）"
