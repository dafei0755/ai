# MODE_TASK_LIBRARY.yaml
# 版本: v7.700 P0
# 目的: 10 Mode Engine 任务库系统
# 说明: 根据检测到的设计模式(M1-M10)，保证核心任务100%覆盖
#
# 核心机制:
# 1. Phase2 检测 detected_modes 并输出 JTBD
# 2. project_director 读取本配置，根据 detected_modes 注入必需任务
# 3. 确保核心任务必须分配专家，不会因JTBD表述不清而遗漏
# 4. 任务优先级分层：P0必做、P1推荐、P2可选
#
# 任务结构:
# - task_id: 任务唯一标识
# - task_name: 任务名称
# - priority: P0(必做) / P1(推荐) / P2(可选)
# - target_expert: 目标专家类型（V1-V9）
# - description: 任务描述
# - deliverables: 交付物清单
# - validation_criteria: 验证标准

# ==============================================================================
# M1: 概念驱动型设计 (Concept-Driven Mode)
# ==============================================================================
M1_concept_driven:
  mode_name: "概念驱动型设计"
  core_tasks:
    - task_id: "M1_T01"
      task_name: "精神主轴建模"
      priority: "P0"
      target_expert: "V3"  # 叙事专家
      description: "提炼项目的核心精神张力（不是风格，而是内在冲突/欲望/自我认同），确保概念能指导整体空间结构"
      deliverables:
        - "精神主轴定义（3-5句核心表述）"
        - "身份→冲突→欲望→自我叙事→空间主轴的推演路径"
        - "概念如何转化为空间规则（材料/体量/光线/色彩）"
      quality_target:
        dimension: "concept_integrity"
        target_level: "L3"
        reference: "13_Evaluation_Matrix.concept_integrity.L3"
        criteria_mapping:
          - "如果删除概念，空间结构是否崩塌？ → L3: 概念已影响空间的主要决策"
          - "概念是否影响平面、立面、材料、灯光？ → L3: 概念结构化"
          - "是否避免了风格标签化？ → L2以上: 避免概念空洞化"

    - task_id: "M1_T02"
      task_name: "概念结构化设计"
      priority: "P0"
      target_expert: "V2"  # 设计总监
      description: "将抽象概念转化为可执行的空间规则，确保概念贯穿平面、立面、材料、灯光"
      deliverables:
        - "概念→空间逻辑转译规则（如'克制'→材料控制+体量压缩）"
        - "概念影响的平面结构、立面设计、材料选择、灯光策略"
        - "概念的结构秩序表达方案"
      quality_target:
        dimension: "concept_integrity"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.concept_integrity.L4"
        criteria_mapping:
          - "概念是否从PPT层落地为结构逻辑？ → L4: 概念贯通，贯穿宏观到微观"
          - "每个设计决策是否能回溯到概念？ → L4: 每个设计决策可回溯到概念"
          - "是否形成统一的概念系统？ → L4: 概念系统完整性"

    - task_id: "M1_T03"
      task_name: "文化母题提炼与空间叙事"
      priority: "P1"
      target_expert: "V3"  # 叙事专家
      description: "从文化/哲学/历史中提炼空间母题，构建完整的空间叙事路径"
      deliverables:
        - "文化母题系统（如'文人精神'、'工业理性'、'女性自我意识'）"
        - "空间叙事路径：进入→过渡→聚焦→高潮→沉静→收束"
        - "材料象征+光线强化+结构呼应的母题表达"
      quality_target:
        dimension: "narrative_coherence"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.narrative_coherence.L4"
        criteria_mapping:
          - "是否避免符号堆砌？ → L4: 叙事深度，避免表面符号堆砌"
          - "空间是否有明确的'高潮点'和'记忆锚点'？ → L4: 叙事节奏完整"
          - "叙事节奏是否避免全程高潮或全程平淡？ → L4: 节奏控制"

    - task_id: "M1_T04"
      task_name: "材料与光线强化概念"
      priority: "P1"
      target_expert: "V4"  # 技术专家
      description: "通过材料选择和光线策略强化核心概念表达"
      deliverables:
        - "材料选型逻辑（服从概念而非风格）"
        - "光线策略（强化叙事节奏和情绪高潮）"
        - "材料与光线的概念呼应方案"
      quality_target:
        dimension: "material_expression"
        target_level: "L3"
        reference: "13_Evaluation_Matrix.material_expression.L3"
        criteria_mapping:
          L3:
            - "材料是否服务于概念而非装饰？ → L3: 材料选择有明确逻辑"
            - "光线是否强化了空间叙事节奏？"

# ==============================================================================
# M2: 功能效率型设计 (Function Efficiency Mode)
# ==============================================================================
M2_function_efficiency:
  mode_name: "功能效率型设计"
  core_tasks:
    - task_id: "M2_T01"
      task_name: "动线最优化分析"
      priority: "P0"
      target_expert: "V6-1"  # 结构工程师
      description: "分层设计主线动线、次级动线、后勤动线、紧急疏散动线，消除逆行冲突和瓶颈节点"
      deliverables:
        - "四层动线系统设计（主线/次级/后勤/紧急疏散）"
        - "动线冲突点诊断和优化方案"
        - "瓶颈节点和功能回头路的消除策略"
      quality_target:
        dimension: "spatial_logic"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.spatial_logic.L4"
        criteria_mapping:
          - "是否存在逆行冲突？ → L4: 动线系统完整无冲突"
          - "是否存在瓶颈节点？ → L4: 流线优化"
          - "后勤与客流动线是否物理分离？ → L4: 功能分区清晰"

    - task_id: "M2_T02"
      task_name: "功能模块标准化设计"
      priority: "P0"
      target_expert: "V2"  # 设计总监
      description: "将空间拆解为可复制、可替换的标准模块，提升成本控制和维护便利性"
      deliverables:
        - "标准单元模块定义"
        - "模块组合逻辑和可扩展接口"
        - "模块化施工图和成本预算"
      quality_target:
        dimension: "technical_feasibility"
        target_level: "L3"
        reference: "13_Evaluation_Matrix.technical_feasibility.L3"
        criteria_mapping:
          L3:
            - "模块是否可独立运行？ → L3: 技术方案可行且经济"
            - "模块是否可替换升级？"
            - "是否避免了过度模块化导致的空间单调？"

    - task_id: "M2_T03"
      task_name: "干扰控制系统设计"
      priority: "P1"
      target_expert: "V6-2"  # MEP工程师
      description: "控制声学、视觉、气味、社交、光污染等干扰源，实现主动分区控制"
      deliverables:
        - "干扰源识别清单（声学/视觉/气味/社交/光）"
        - "主动分区控制方案"
        - "声学/气味/光污染解决方案"
      quality_target:
        dimension: "functional_efficiency"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.functional_efficiency.L4"
        criteria_mapping:
          - "是否存在不可控干扰源？ → L4: 干扰源全面识别和控制"
          - "是否实现主动分区控制而非被动减少？ → L4: 主动控制系统"

    - task_id: "M2_T04"
      task_name: "后勤与隐形系统优化"
      priority: "P1"
      target_expert: "V6-2"  # MEP工程师
      description: "将支撑系统从可见层剥离，实现前场系统、半后台系统、全后台系统的物理分离"
      deliverables:
        - "后勤系统分层设计（前场/半后台/全后台）"
        - "后勤动线与主线物理分离方案"
        - "设备机房和管线隐藏策略"
      quality_target:
        dimension: "functional_efficiency"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.functional_efficiency.L4"
        criteria_mapping:
          - "后勤与主线是否交叉？ → L4: 后勤系统完全分离"
          - "是否提高了效率并减少了冲突？ → L4: 系统优化完整"

# ==============================================================================
# M3: 情绪体验型设计 (Emotional Experience Mode)
# ==============================================================================
M3_emotional_experience:
  mode_name: "情绪体验型设计"
  core_tasks:
    - task_id: "M3_T01"
      task_name: "情绪节奏曲线设计"
      priority: "P0"
      target_expert: "V3"  # 叙事专家
      description: "构建完整的情绪曲线（压缩→释放→提升→高潮→沉静），避免平铺直叙或全程高潮"
      deliverables:
        - "情绪曲线设计（压缩→释放→提升→高潮→沉静）"
        - "情绪高潮点位置和设计策略"
        - "空间尺度/光线/材料/声音/视线的节奏变化方案"
      quality_target:
        dimension: "narrative_coherence"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.narrative_coherence.L4"
        criteria_mapping:
          - "空间是否存在明确的'情绪高潮'？ → L4: 叙事节奏完整，有高潮和记忆锚点"
          - "是否避免了全程高潮（疲劳）或全程平稳（无记忆）？ → L4: 节奏控制"
          - "是否有情绪缓冲区和沉静区？ → L4: 呼吸节奏"

    - task_id: "M3_T02"
      task_name: "五感调动系统设计"
      priority: "P0"
      target_expert: "V4"  # 技术专家
      description: "整合视觉、听觉、嗅觉、触觉、温度五感，形成多感官联动体验"
      deliverables:
        - "五感系统设计（视觉+听觉+嗅觉+触觉+温度）"
        - "感官锚点布置（除视觉外的感知节点）"
        - "材料触感/声学控制/气味记忆方案"
      quality_target:
        dimension: "narrative_coherence"
        target_level: "L3"
        reference: "13_Evaluation_Matrix.narrative_coherence.L3"
        criteria_mapping:
          - "是否有除视觉以外的感知锚点？ → L3: 多感官叙事"
          - "是否形成五感系统整合（L3级以上）？ → L3: 感官联动"

    - task_id: "M3_T03"
      task_name: "记忆锚点构建"
      priority: "P1"
      target_expert: "V2"  # 设计总监
      description: "制造1-3个核心记忆锚点（可拍照节点/沉浸节点/仪式节点），避免网红化堆叠"
      deliverables:
        - "核心记忆锚点定义（1-3个）"
        - "锚点类型选择（可拍照/沉浸/仪式/结构转折）"
        - "锚点空间设计和视觉表达"
      quality_target:
        dimension: "narrative_coherence"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.narrative_coherence.L4"
        criteria_mapping:
          - "是否有1-3个核心锚点而非处处都是锚点？ → L4: 记忆锚点精准"
          - "是否避免了网红化堆叠？ → L4: 避免符号堆砌"

    - task_id: "M3_T04"
      task_name: "情绪高潮与沉静控制"
      priority: "P1"
      target_expert: "V3"  # 叙事专家
      description: "平衡高潮与沉静区，确保空间具备'呼吸'节奏"
      deliverables:
        - "高潮区与沉静区的节奏对比设计"
        - "开放/收缩、光强/光暗、声响/安静的对比方案"
        - "空间呼吸节奏路径"
      quality_target:
        dimension: "narrative_coherence"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.narrative_coherence.L4"
        criteria_mapping:
          - "空间是否存在'呼吸'节奏？ → L4: 节奏控制完整"
          - "是否避免了持续压迫或持续释放？ → L4: 高潮与沉静平衡"

# ==============================================================================
# M4: 资产资本型设计 (Capital Asset Mode)
# ==============================================================================
M4_capital_asset:
  mode_name: "资产资本型设计"
  core_tasks:
    - task_id: "M4_T01"
      task_name: "客群资产模型建模"
      priority: "P0"
      target_expert: "V1"  # 需求分析师
      description: "明确'谁付钱'，分析资产规模、消费能力、决策路径、空间需求层级"
      deliverables:
        - "目标客群资产等级分析（百万/千万/亿级）"
        - "消费能力、频率、决策路径模型"
        - "空间需求层级对应方案"
      quality_target:
        dimension: "commercial_closure"
        target_level: "L3"
        reference: "13_Evaluation_Matrix.commercial_closure.L3"
        criteria_mapping:
          - "空间是否精准对应客群资产等级？ → L3: 客群定位清晰"
          - "是否避免了用'年轻化'代替资产分析？ → L3: 避免模糊定位"

    - task_id: "M4_T02"
      task_name: "坪效与转化模型设计"
      priority: "P0"
      target_expert: "V2"  # 设计总监
      description: "优化坪效和转化率，设计高转化区域和冲动消费区"
      deliverables:
        - "坪效目标和转化率指标"
        - "主力动线→停留节点→高转化区域→冲动消费区设计"
        - "客单价、停留时间、转化率、复购率优化策略"
      quality_target:
        dimension: "commercial_closure"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.commercial_closure.L4"
        criteria_mapping:
          - "是否有明确的坪效目标和转化率指标？ → L4: 商业模型完整"
          - "是否设计了高转化区域和冲动消费区？ → L4: 转化路径优化"

    - task_id: "M4_T03"
      task_name: "溢价符号构建"
      priority: "P1"
      target_expert: "V2"  # 设计总监
      description: "通过空间制造'价值感'，实现溢价但不浮夸"
      deliverables:
        - "溢价结构设计（尺度+材料等级+灯光层级+空间留白+稀缺性）"
        - "克制型溢价表达方案（避免材料堆砌）"
        - "用户'觉得贵'的空间塑造策略"
      quality_target:
        dimension: "commercial_closure"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.commercial_closure.L4"
        criteria_mapping:
          - "空间是否让用户'觉得贵'但不浮夸？ → L4: 溢价结构完整"
          - "溢价是否来自克制而非材料堆砌？ → L4: 克制型溢价"

    - task_id: "M4_T04"
      task_name: "生命周期收益逻辑"
      priority: "P1"
      target_expert: "V5"  # 成本专家
      description: "分析建设、运营、维护、升级成本，确保长期收益能力"
      deliverables:
        - "全生命周期成本分析（建设/运营/维护/升级）"
        - "10年以上价值维持策略"
        - "二次利用能力评估"
      quality_target:
        dimension: "commercial_closure"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.commercial_closure.L4"
        criteria_mapping:
          - "是否能维持10年以上价值？ → L4: 长期价值维持"
          - "是否只看开业爆发而忽视长期稳定？ → L4: 全生命周期考量"

# ==============================================================================
# M5: 乡建在地型设计 (Rural Context Mode)
# ==============================================================================
M5_rural_context:
  mode_name: "乡建在地型设计"
  core_tasks:
    - task_id: "M5_T01"
      task_name: "地域文化解码"
      priority: "P0"
      target_expert: "V3"  # 叙事专家
      description: "提炼真正属于该地域的文化结构（历史路径、生产方式、气候特征、聚落形态），避免符号堆砌"
      deliverables:
        - "地域文化结构分析（历史路径+生产方式+气候特征+聚落形态）"
        - "生活习惯和社会结构提炼"
        - "在地性验证（脱离该地域是否仍成立？）"
      quality_target:
        dimension: "cultural_authenticity"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.cultural_authenticity.L4"
        criteria_mapping:
          - "空间是否脱离该地域仍然成立？如果成立，就是伪在地 → L4: 在地性深度"
          - "是否避免了砖瓦木堆砌和'古村落样式'模仿？ → L4: 避免符号堆砌"

    - task_id: "M5_T02"
      task_name: "本地材料系统构建"
      priority: "P0"
      target_expert: "V4"  # 技术专家
      description: "构建本地材料逻辑（易获得、易维护、可复制），与现代工艺结合"
      deliverables:
        - "本地材料清单和性能测试"
        - "材料+现代工艺结合方案"
        - "成本控制和可维护性评估"
      quality_target:
        dimension: "material_expression"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.material_expression.L4"
        criteria_mapping:
          - "材料是否易获得、易维护、可复制？ → L4: 材料系统完整"
          - "是否与现代工艺结合而非简单复古？ → L4: 现代工艺融合"

    - task_id: "M5_T03"
      task_name: "乡村产业嵌入设计"
      priority: "P1"
      target_expert: "V1"  # 需求分析师
      description: "设计产业闭环（住宿+餐饮+手工艺+农产品+教育体验），让村民成为受益者"
      deliverables:
        - "产业闭环设计（住宿/餐饮/手工艺/农产品/教育）"
        - "独立现金流模型"
        - "村民参与和受益机制"
      quality_target:
        dimension: "social_impact"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.social_impact.L4"
        criteria_mapping:
          - "空间是否具备独立现金流？ → L4: 产业闭环完整"
          - "是否让村民成为受益者而非旁观者？ → L4: 社会价值创造"

    - task_id: "M5_T04"
      task_name: "低成本结构优化"
      priority: "P1"
      target_expert: "V5"  # 成本专家
      description: "在有限预算下提升质量，实现结构简化、模块预制、统一施工工艺"
      deliverables:
        - "低成本优化策略（结构简化/模块预制/统一工艺）"
        - "大规模复制可行性评估"
        - "成本与品质的平衡方案"
      quality_target:
        dimension: "technical_feasibility"
        target_level: "L4"
        reference: "13_Evaluation_Matrix.technical_feasibility.L4"
        criteria_mapping:
          - "是否可大规模复制？ → L4: 可复制性"
