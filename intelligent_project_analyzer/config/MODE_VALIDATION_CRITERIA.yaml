# ═══════════════════════════════════════════════════════════
# MODE_VALIDATION_CRITERIA.yaml
# v7.750 P1-Task2
#
# 目的：定义10种设计模式的验证标准
# 使用场景：ability_validator.py Layer 4 模式特征验证
# ═══════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════
# 全局配置
# ═══════════════════════════════════════════════════════════
global_config:
  validation_version: "v7.750"

  # 验证严格程度
  validation_strictness:
    low: 0.3      # 30%的特征匹配即可通过
    medium: 0.5   # 50%的特征匹配
    high: 0.7     # 70%的特征匹配

  # 默认严格程度
  default_strictness: "medium"

  # 模式特定严格程度覆盖
  mode_specific_strictness:
    M4_capital_asset: "high"      # 资产型必须有明确ROI
    M8_extreme_condition: "high"  # 极端环境必须有技术方案
    M11_healthcare_healing: "high"  # 疗愈型必须有安全保障
    M1_concept_driven: "medium"
    M2_function_efficiency: "medium"

  # 验证失败处理策略
  validation_failure_strategy:
    mode: "warning"  # "blocking" | "warning" | "silent"
    log_level: "warning"

# ═══════════════════════════════════════════════════════════
# M1 概念驱动型设计 - 验证标准
# ═══════════════════════════════════════════════════════════
M1_concept_driven:
  mode_name: "概念驱动型设计"
  validation_priority: "medium"

  # 核心特征检查点
  core_features:
    - feature_id: "M1_F1_spiritual_axis"
      feature_name: "精神主轴定义"
      description: "必须明确核心精神主线"
      validation_keywords:
        - "概念"
        - "精神"
        - "主题"
        - "理念"
        - "母题"
        - "叙事"
      validation_rule: "must_contain_at_least_2_keywords"
      weight: 0.35

    - feature_id: "M1_F2_concept_structurable"
      feature_name: "概念可结构化"
      description: "概念必须可转化为空间规则"
      validation_keywords:
        - "空间秩序"
        - "结构"
        - "逻辑"
        - "规则"
        - "转译"
        - "具象化"
      validation_rule: "must_contain_at_least_1_keyword"
      weight: 0.30

    - feature_id: "M1_F3_material_reinforcement"
      feature_name: "材料与光线强化"
      description: "材料、光线必须支持概念表达"
      validation_keywords:
        - "材料"
        - "光线"
        - "灯光"
        - "质感"
        - "色彩"
        - "氛围"
      validation_rule: "must_contain_at_least_1_keyword"
      weight: 0.20

    - feature_id: "M1_F4_narrative_path"
      feature_name: "空间叙事路径"
      description: "空间必须有节奏与高潮"
      validation_keywords:
        - "动线"
        - "序列"
        - "节奏"
        - "高潮"
        - "路径"
        - "体验"
      validation_rule: "recommended"
      weight: 0.15

  # 必需元素（缺失则验证失败）
  required_elements:
    - element_type: "concept_statement"
      element_name: "概念陈述"
      validation_method: "keyword_check"
      min_chars: 20

  # 质量指标
  quality_metrics:
    - metric_id: "concept_clarity"
      metric_name: "概念清晰度"
      target_value: 0.7
      evaluation_method: "keyword_density"

  # 输出验证规则
  output_validation:
    min_content_length: 200  # 字符数
    required_sections:
      - "概念定义"
      - "空间策略"

# ═══════════════════════════════════════════════════════════
# M2 功能效率型设计 - 验证标准
# ═══════════════════════════════════════════════════════════
M2_function_efficiency:
  mode_name: "功能效率型设计"
  validation_priority: "medium"

  core_features:
    - feature_id: "M2_F1_circulation_optimization"
      feature_name: "动线最优化"
      description: "必须有动线优化方案"
      validation_keywords:
        - "动线"
        - "流线"
        - "路径"
        - "优化"
        - "效率"
        - "交叉"
        - "瓶颈"
      validation_rule: "must_contain_at_least_2_keywords"
      weight: 0.40

    - feature_id: "M2_F2_function_modularity"
      feature_name: "功能模块化"
      description: "功能必须可模块化组织"
      validation_keywords:
        - "模块"
        - "标准化"
        - "可复制"
        - "单元"
      validation_rule: "must_contain_at_least_1_keyword"
      weight: 0.25

    - feature_id: "M2_F3_interference_control"
      feature_name: "干扰控制"
      description: "必须有干扰控制策略"
      validation_keywords:
        - "隔离"
        - "分区"
        - "声学"
        - "视线"
        - "干扰"
      validation_rule: "recommended"
      weight: 0.20

    - feature_id: "M2_F4_backend_separation"
      feature_name: "后勤分离"
      description: "后勤系统必须与前场分离"
      validation_keywords:
        - "后勤"
        - "前场"
        - "分离"
        - "隐藏"
      validation_rule: "recommended"
      weight: 0.15

  required_elements:
    - element_type: "circulation_diagram"
      element_name: "动线图示"
      validation_method: "keyword_check"

  quality_metrics:
    - metric_id: "efficiency_improvement"
      metric_name: "效率提升率"
      target_value: 0.2  # 至少20%提升
      evaluation_method: "quantitative_mention"

