      description: "必须考虑长期价值"
      validation_keywords:
        - "长期"
        - "耐久"
        - "可持续"
        - "时间"
      validation_rule: "recommended"
      weight: 0.20

  required_elements:
    - element_type: "future_scenario"
      element_name: "未来场景描述"
      validation_method: "keyword_check"

# ═══════════════════════════════════════════════════════════
# M11 健康疗愈型设计 - 验证标准
# ═══════════════════════════════════════════════════════════
M11_healthcare_healing:
  mode_name: "健康疗愈型设计"
  validation_priority: "high"  # 疗愈场景验证严格：安全感是底线

  core_features:
    - feature_id: "M11_F1_psychological_safety"
      feature_name: "心理安全环境"
      description: "必须有降低心理防御激活的空间策略"
      validation_keywords:
        - "安全"
        - "安全感"
        - "低刺激"
        - "隐私"
        - "边界"
        - "退场"
        - "安静"
        - "色彩约束"
      validation_rule: "must_contain_at_least_2_keywords"
      weight: 0.30

    - feature_id: "M11_F2_circadian_control"
      feature_name: "生理疗愈节律"
      description: "必须有昼夜节律调光和生理恢复支持"
      validation_keywords:
        - "节律"
        - "光环境"
        - "色温"
        - "昼夜"
        - "褪黑素"
        - "调光"
        - "温湿度"
        - "空气质量"
      validation_rule: "must_contain_at_least_1_keyword"
      weight: 0.25

    - feature_id: "M11_F3_accessibility_dignity"
      feature_name: "无障碍尊严设计"
      description: "无障碍功能必须隐形化，不暴露使用者弱势状态"
      validation_keywords:
        - "无障碍"
        - "尊严"
        - "隐形"
        - "坡道"
        - "扶手"
        - "轮椅"
        - "平等"
      validation_rule: "must_contain_at_least_1_keyword"
      weight: 0.25

    - feature_id: "M11_F4_dual_pathway"
      feature_name: "双视角服务动线"
      description: "必须同时为服务提供者和被服务者设计动线"
      validation_keywords:
        - "双动线"
        - "服务动线"
        - "分离"
        - "后勤"
        - "缓冲"
        - "照护者"
        - "家属"
      validation_rule: "recommended"
      weight: 0.20

  required_elements:
    - element_type: "safety_assessment"
      element_name: "安全感评估"
      validation_method: "keyword_check"
      min_chars: 30

    - element_type: "material_safety"
      element_name: "材料安全性说明"
      validation_method: "keyword_check"

  quality_metrics:
    - metric_id: "safety_assurance"
      metric_name: "心理安全保障度"
      target_value: 0.8
      evaluation_method: "keyword_density"
