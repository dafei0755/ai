# Ability Core 5层模型精华提取 (来源: sf/12_Ability_Core)
# 用途: 注入任务生成提示词，使 LLM 产出的任务真正触达各能力的深层判断标准
# 创建时间: 2026-02-19  (Stage1 能力注入深化)
# 格式: 每个能力包含 essence / maturity_L4 / highest_form / judgment_criteria / common_mistakes
# 使用方: core_task_decomposer.py (ability 注入增强块)

A1_concept_architecture:
  name: "概念建构能力"
  essence: "将抽象源转译为具有结构强制力的空间规则——不是创意，是抽象→结构→可执行规则的转译能力"
  maturity_L4: "系统概念：概念贯穿平面/立面/材料/灯光/细部节点，具备全系统一致性控制力"
  maturity_L5: "文明级概念：概念回应一个时代命题，空间成为该命题的物理论证——如'归田不归旧'成为整个村庄的空间秩序"
  highest_form: "概念成为空间的物理秩序——空间本身就是概念的体现，而非贴着概念标签"
  judgment_criteria:
    - "这个项目的真正张力是什么？（区别于'喜欢现代风格'这类表层标签）"
    - "命题是否具备方向性与限制性？（能成为后续设计的约束条件）"
    - "概念是否已转译为可执行规则？（尺度规则/材料规则/光线规则/动线规则/边界规则）"
    - "概念是否贯穿空间所有系统？（局部体现 = 失败）"
  common_mistakes:
    - "把'喜欢现代风格'、'高级感'当做抽象源——这是标签，不是源头"
    - "概念停留在PPT层面，无法转译为空间规则"
    - "施工/软装阶段概念被稀释，设计师未守住命题"
    - "概念过于文艺化，无法生成可执行结构规则"

A2_spatial_structuring:
  name: "空间结构能力"
  essence: "组织尺度、秩序、关系与流动的能力——不是画平面图，是空间逻辑控制力"
  maturity_L4: "复杂系统整合：多层级动线协同、多功能体量主从关系明确、可落地的复杂空间秩序"
  maturity_L5: "空间秩序范式：空间结构本身成为一种可迁移的范式——如'果园型空间秩序'将产业骨架变为第一层空间逻辑，建筑围绕果树而非道路布置"
  highest_form: "空间自带秩序感——人进入无需解释就能理解它"
  judgment_criteria:
    - "是否存在回头动线/交叉冲突/浪费面积/功能错位？"
    - "是否存在尺度高潮？（压缩与释放的节奏）"
    - "四级分区是否清晰：公共区/半公共/半私密/私密？"
    - "主从体量关系是否明确？（主空间vs次空间vs辅助空间）"
    - "是否可施工？梁位/柱位/管井/设备/消防是否整合？"
  common_mistakes:
    - "过度追求造型，忽略空间现实结构"
    - "全程大空间或全程压缩——缺乏尺度节奏"
    - "功能错位（噪音功能与安静功能相邻）"
    - "忽略后勤动线，主线与后勤交叉"

A3_narrative_orchestration:
  name: "叙事节奏能力"
  essence: "控制空间体验时间线的能力——不是讲故事，是让人愿意走完"
  maturity_L4: "情绪结构化：体验曲线经过精密设计，高潮节点、沉静回落、记忆锚点系统完整"
  maturity_L5: "感官剧场：压缩-释放-沉浸三段式成为设计语法，大师冲突美学（几何冷冽vs日常温度）驱动叙事张力，五感协同编排"
  highest_form: "让人忘记时间——愿意停留、游走、再回头"
  judgment_criteria:
    - "入口是否建立了'心理切换'感（压缩/转折/光线变化）？"
    - "是否存在一个'记住的瞬间'（高潮节点）？"
    - "是否存在情绪变化曲线？（压缩→释放→提升→高潮→回落）"
    - "记忆锚点是否与核心概念一致？"
  common_mistakes:
    - "全程高潮——造成疲劳感"
    - "平铺直叙——从入口到结尾无任何节奏变化"
    - "过度装置化——装置成为目的，而非叙事工具"
    - "节奏与概念脱离——叙事另起炉灶"

A4_material_intelligence:
  name: "材料系统能力"
  essence: "建立一套自洽的材料逻辑系统——不是选好材料，是建立主次/等级/过渡的完整体系"
  maturity_L4: "材料逻辑统一：主材极少（不超过3种），等级清晰，过渡系统完整，概念与材料强化彼此"
  maturity_L5: "施工级闭环：概念→规格→做法→造价→风险全链路打通——如'稳定土配比:土+石灰+5%水泥，每层夯筑厚度150mm'，含模板工艺、防水等级、维护周期"
  highest_form: "材料成为空间气质的一部分——触摸材料时能感受到空间性格"
  judgment_criteria:
    - "材料是否强化概念？（材料哲学与概念命题一致）"
    - "主材是否控制在3种以内？"
    - "是否存在生硬断层？（地面/墙面/顶面的过渡是否自然）"
    - "是否考虑了耐磨/抗污/防火/维护周期？"
    - "是否存在'过度投入区'？低成本高质感替代是否被考虑？"
  common_mistakes:
    - "材料过多——超过5种以上等级混乱"
    - "盲目追求进口材料，忽视维护成本"
    - "节点处理粗糙（地面转墙面的收口缝隙/阴阳角问题）"
    - "材料喧宾夺主，压过概念本身"

A5_lighting_architecture:
  name: "灯光系统能力"
  essence: "通过光的层级、方向、强度与节律重构空间秩序——不是布灯，是把光作为第二结构"
  maturity_L4: "商业策略光：灯光直接驱动行为决策，层级完整，昼夜切换，能影响停留时间与转化率"
  maturity_L5: "精神性光构：光成为空间精神锚点——如光缝300-600mm切割天空引入冷冽晨光，自然光为主照明，人工光仅补充节律"
  highest_form: "光成为空间的情绪语言——当光改变人的行为与心境"
  judgment_criteria:
    - "是否存在视觉焦点层？（基础层/中间层/焦点层三层结构）"
    - "是否存在眩光/过度均匀/全场筒灯问题？"
    - "色温是否统一？情绪是否与空间定位一致？"
    - "是否具备多场景切换能力？"
  common_mistakes:
    - "筒灯密集、无层级——所有区域同等亮度"
    - "色温混乱——暖冷光在同一空间没有意图地混用"
    - "过度强调科技感，忽略实际使用场景"
    - "灯光与材料冲突（如哑光材料被强光直射失去质感）"

A6_functional_optimization:
  name: "功能效率能力"
  essence: "在有限面积内实现最低摩擦、最低干扰、最高协同的运行结构——不是功能齐全，是无感运转"
  maturity_L4: "高密度整合：多功能共享系统，干扰精准隔离，面积得房率最优，后勤完全独立"
  maturity_L5: "自适应运营系统：空间功能随时间/季节/使用者自动切换——如淡季民宿转为村民活动中心，公共空间可承载村民大会/收获节/培训/团建"
  highest_form: "使用者感受不到设计的存在——空间运转无感"
  judgment_criteria:
    - "是否存在逆行动线/交叉冲突/回头路？"
    - "高频功能是否靠近主要使用区？噪音功能是否隔离？"
    - "主线动线与后勤动线是否分离？"
    - "面积坪效是否最优？是否存在无效面积？"
  common_mistakes:
    - "只看视觉不看效率——漂亮但不好用"
    - "后勤与主线交叉（清洁/补货路径经过顾客区域）"
    - "功能叠加导致拥挤——书房/卧室/工作区三合一但无隔断"
    - "忽略未来变化（孩子成长/工作方式变化/养老需求）"

A7_capital_strategy:
  name: "资本策略能力"
  essence: "让空间成为资产结构的一部分——不是会算钱，是设计与投资回报周期/溢价逻辑深度整合"
  maturity_L4: "可复制产品：具备标准化产品线模型，溢价逻辑清晰，区域复制可行"
  maturity_L5: "空间-产业-金融耦合：空间与产业链/金融工具结构性绑定——如客房绑定果园认养+农产品订阅+品牌联名，四收入结构（客房/餐饮/深加工/内容经济）"
  highest_form: "空间成为投资结构的一部分——设计参与资本逻辑"
  judgment_criteria:
    - "空间是否精准匹配目标客群的资产等级与消费心理？"
    - "坪效/客单价/翻台率/租金溢价是否被设计策略驱动？"
    - "溢价是否来自稀缺性而非堆砌材料？"
    - "5-10年后是否仍有价值？是否可升级？"
  common_mistakes:
    - "只谈设计，不谈收益——沦为甲方执行工具"
    - "只看短期爆发，忽略运营成本"
    - "溢价靠堆材料——高端感来自密度而非稀缺"
    - "产品定位模糊——高端但无差异化"

A8_technology_integration:
  name: "技术整合能力"
  essence: "在结构阶段就把技术纳入空间逻辑——不是装智能系统，是技术成为骨架而非外挂"
  maturity_L4: "数据闭环：空间能采集使用数据并反馈调整，技术系统全联通，可迭代升级"
  maturity_L5: "隐形基础设施：技术完全消失于空间体验中——Matter协议智能家居面板隐藏于木格栅，5G预埋支持数字游民，太阳能+空气能+雨水收集实现半自持"
  highest_form: "空间具有自我调节能力——感知使用者状态并优化自身"
  judgment_criteria:
    - "技术是否在结构阶段被规划？（强弱电/管线冗余/设备间位置）"
    - "是否具备未来升级的接口预留？"
    - "系统是否统一协议？（灯光/空调/窗帘各系统能否联动）"
    - "隐私保护/系统备份/故障预案是否考虑？"
  common_mistakes:
    - "把科技感当视觉语言——面板裸露、线路可见"
    - "系统不兼容——多个品牌系统各自独立"
    - "维护成本高——技术更新后旧设备无法替换"
    - "技术支配人而非服务人——自动化程度超过用户控制能力"

A9_social_structure_modeling:
  name: "社会关系建模能力"
  essence: "把权力结构、隐私层级、代际关系、冲突机制转译为空间秩序——不是分几个房间"
  maturity_L4: "演化适配：空间为关系变化预留了模块化调整能力，可拆分/可合并/可转换"
  maturity_L5: "治理结构设计：空间嵌入完整的社会治理模型——如村集体30%+项目公司40%+农户合作社20%+运营10%股权结构，含冲突机制/保底收益/淡季保障基金"
  highest_form: "空间让关系自然流动——人不再为边界烦恼"
  judgment_criteria:
    - "空间是否无意识强化压迫关系？（主卧位置/视线控制权）"
    - "是否存在隐私泄露路径？（四级分区是否清晰）"
    - "是否为冲突预留了'退场路径'？（独立通道/灰空间/多入口）"
    - "随着家庭结构演化，空间是否可调整？"
  common_mistakes:
    - "盲目开放——忽略家庭成员对独处空间的需求"
    - "忽略代际冲突——老人/孩子/主人生活节律冲突未被处理"
    - "只做形式平衡，忽略心理边界"
    - "再婚家庭未设计独立套间系统"

A10_environmental_adaptation:
  name: "环境适应能力"
  essence: "让空间与气候、地理、能源、生态系统形成长期稳定关系——不是节能设计，是顺应而非对抗自然"
  maturity_L4: "半自持系统：具备被动式设计+局部能源自持，材料适配当地气候，维护成本显著降低"
  maturity_L5: "生态微循环闭环：600mm夯土墙热惰性+天井拔风效应+人工湿地污水处理+雨水灌溉回用，建筑50年可持续，材料允许自然老化"
  highest_form: "空间成为环境的一部分——建筑顺应风、光、水"
  judgment_criteria:
    - "空间是否顺应主风向？是否利用自然采光？"
    - "材料是否适配当地气候？（海边防盐雾/高原抗紫外/高湿防霉）"
    - "是否降低长期能源成本？（被动式设计优先）"
    - "在没有开空调时，空间是否仍然舒适？"
  common_mistakes:
    - "忽略气候数据，凭感觉设计"
    - "过度依赖空调，未利用自然通风/遮阳/蓄热"
    - "材料选择不适配（美学优先导致快速老化）"
    - "节能只是营销概念，未落实到围护结构和能源系统"

A11_operation_productization:
  name: "运营与产品化能力"
  essence: "把设计转化为可复制、可管理、可迭代的产品体系——不是标准化，是骨架标准+表皮可变"
  maturity_L4: "区域复制：具备标准化单元模块，可在不同城市落地，每3-5年可升级更新"
  maturity_L5: "范式输出系统：从项目到模式的升维——如'狮岭模式'成为丘陵型乡村再生产标准样本，骨架标准(结构/材料/运营)可跨村复制，表皮随在地文化可变"
  highest_form: "设计成为可持续进化的系统——跨城市跨人群复制且持续优化"
  judgment_criteria:
    - "哪些部分可以标准化？哪些必须个性化？"
    - "是否嵌入了运营逻辑？（翻台效率/清洁路径/补货动线）"
    - "品牌一眼可识别？（视觉语言/材料基因/灯光比例系统化）"
    - "是否预留了更新接口？（轻重资产分离/模块可替换）"
  common_mistakes:
    - "过度标准化失去个性——连锁品牌千篇一律"
    - "忽略运营逻辑——设计没有考虑日常运营场景"
    - "产品更新成本过高——改造需要推倒重来"
    - "只做一次性旗舰店，无产品线复制能力"

A12_civilizational_expression:
  name: "文明表达与跨学科整合能力"
  essence: "把社会学/哲学/经济学/技术伦理等抽象系统转译为空间秩序——不是文化表达，是宏观结构转译"
  maturity_L4: "跨学科整合：设计回应具体时代议题，多学科知识体系（社会学/心理学/行为经济学）在空间中有结构性体现"
  maturity_L5: "多受众话语翻译：同一设计实体自动生成工程/政策/商业/学术/传播五重叙事——空间不仅是物理存在，更是可被不同话语系统解读的文明载体"
  highest_form: "空间成为时代的一种立场——不仅被使用，还被讨论"
  judgment_criteria:
    - "项目是否回应一个真实的时代问题？（技术变革/老龄化/迁徙/性别结构/可持续危机）"
    - "抽象理论是否转译为空间结构？（'去中心化'→去中轴结构）"
    - "文化表达是否避免了符号堆砌？"
    - "是否具有50年尺度的文明视角？"
  common_mistakes:
    - "文化符号堆砌——贴满传统纹样、符号，但无结构转译"
    - "过度抽象脱离现实——哲学性十足但无法居住/使用"
    - "只做视觉表达，忽略社会复杂性"
    - "民族/文化元素符号化而非抽象化"

# ================================================================================
# 使用说明
# ================================================================================
# 在 core_task_decomposer.py 的能力注入块中读取此文件：
#
#   _ess_path = os.path.join(..., "config", "ability_core_essentials.yaml")
#   _essentials = yaml.safe_load(open(_ess_path, encoding="utf-8"))
#
# 注入格式（追加到每个能力ID后）：
#   "{ab_id}（{focus}）\n"
#   "  ✓ 判断标准: {criteria[0]} / {criteria[1]}\n"
#   "  ✗ 常见误区: {mistakes[0]} / {mistakes[1]}\n"
#   "  ★ 最高形态: {highest_form}\n"
# ================================================================================
