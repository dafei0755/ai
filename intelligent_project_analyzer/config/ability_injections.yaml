# 能力注入配置（Capability Injection System）
# 版本：v1.1  [2026-02-19 迁移说明]
# 日期：2026-02-12
# 说明：根据检测到的设计模式（M1-M10），向目标专家动态注入特定能力提示
#
# ⚠️  迁移说明（2026-02-19）
# 此文件为旧版「1:1 Mode→单一Ability」映射，仍由 task_oriented_expert_factory.py 使用
# 于专家执行阶段注入 prompt_injection 文本。
#
# 新版「1:N Mode×Ability 矩阵」请参考：
#   - config/mode_ability_activation.yaml    → 任务生成阶段（core_task_decomposer.py）
#   - config/ability_core_essentials.yaml    → 12能力5层模型精华（判断标准/常见误区/最高形态）
#
# 待办：未来将 task_oriented_expert_factory.py 迁移到读取 mode_ability_activation.yaml
# 和 ability_core_essentials.yaml，届时本文件可正式废弃。


# 核心机制：
# 1. CapabilityDetector检测项目的设计模式（M1-M10）
# 2. TaskOrientedExpertFactory在构建expert prompt时读取此配置
# 3. 匹配detected_design_modes，将对应的prompt_injection追加到expert的system_prompt
# 4. 专家获得临时增强能力，输出结果自动包含注入的维度

mode_to_ability_injections:

  # M1: 概念驱动型设计（Concept-Driven Mode）
  M1_concept_driven:
    enabled: true
    target_experts:
      - "V3"  # 叙事专家
      - "V2"  # 设计总监
    inject_ability: "A1_concept_architecture"
    prompt_injection: |
      【M1概念驱动模式激活】

      本项目属于**概念驱动型设计**，你必须强化以下能力：

      1. **概念结构化能力**：将抽象概念转化为可执行的空间规则
         - 确保概念能指导平面、立面、材料、灯光选择
         - 避免概念停留在PPT层，必须落地为结构逻辑

      2. **文化母题提炼**：从文化/哲学/历史中提炼空间母题
         - 识别核心母题（如"文人精神"、"工业理性"、"女性自我意识"）
         - 避免符号堆砌，形成统一母题系统

      3. **空间叙事路径**：构建完整的情绪节奏
         - 进入 → 过渡 → 聚焦 → 高潮 → 沉静 → 收束
         - 确保空间有明确的"高潮点"和"记忆锚点"

      **判断标准**：如果删除概念，整个空间结构是否崩塌？如果会，才是真正的概念驱动。

  # M2: 功能效率型设计（Function Efficiency Mode）
  M2_function_efficiency:
    enabled: true
    target_experts:
      - "V6-1"  # 结构工程师
      - "V6-2"  # MEP工程师
    inject_ability: "A6_functional_optimization"
    prompt_injection: |
      【M2功能效率模式激活】

      本项目属于**功能效率型设计**，优先优化系统效率而非美学表达：

      1. **动线最优模型**：
         - 主线/次级/后勤/紧急疏散动线必须分层
         - 检测是否存在逆行冲突、瓶颈节点、功能回头路

      2. **功能模块标准化**：
         - 拆解为可复制、可替换模块
         - 确保模块可独立运行、可升级

      3. **干扰控制系统**：
         - 声学/视觉/气味/社交干扰/光污染的主动控制
         - 从"减少干扰"升级为"分区控制"

      4. **后勤隐形系统**：
         - 前场/半后台/全后台物理分离
         - 避免后勤与主线交叉

      **判断标准**：空间是否存在无效移动？是否有未被控制的干扰源？

  # M3: 情绪体验型设计（Emotional Experience Mode）
  M3_emotional_experience:
    enabled: true
    target_experts:
      - "V7"   # 社会关系与心理洞察专家
      - "V6-5" # 灯光工程师（如存在）
      - "V3"   # 叙事专家
    inject_ability: "A3_narrative_orchestration"
    prompt_injection: |
      【M3情绪体验模式激活】

      本项目属于**情绪体验型设计**，必须构建情绪调度系统：

      1. **情绪节奏曲线**：
         - 基本结构：压缩 → 释放 → 提升 → 高潮 → 沉静
         - 避免"全程高潮"（疲劳）或"全程平稳"（无记忆）

      2. **五感调动系统**：
         - 视觉（光与形）+ 听觉（声学）+ 嗅觉（气味）+ 触觉（材料）+ 温度（冷暖）
         - 多感官联动，而非仅视觉设计

      3. **记忆锚点构建**：
         - 识别1-3个核心锚点（可拍照/情绪沉浸/仪式/转折节点）
         - 避免处处成为锚点导致的疲劳

      4. **高潮与沉静控制**：
         - 高潮后必须有沉静区
         - 空间必须有"呼吸"而非持续压迫

      **灯光强化（针对V6-5）**：
      - 用灯光强化情绪节奏（光强变化、色温变化、动态照明）
      - 设计情绪照明场景（兴奋/放松/专注/沉浸）

  # M4: 资产资本型设计（Capital Asset Mode）
  M4_capital_asset:
    enabled: true
    target_experts:
      - "V2"    # 设计总监
      - "V6-4"  # 成本工程师
      - "V9"    # 产业链分析师（A7资本策略为其核心能力）
    inject_ability: "A7_capital_strategy"
    prompt_injection: |
      【M4资产资本模式激活】

      本项目属于**资产资本型设计**，空间是资产工具而非表达工具：

      1. **客群资产模型**：
         - 明确"谁付钱"（资产规模、消费能力、消费频率、决策路径）
         - 空间必须精准对应客群资产等级

      2. **坪效与转化模型**：
         - 每平方米必须产生价值
         - 优化主力动线、停留节点、高转化区域、冲动消费区
         - 关键指标：客单价、停留时间、转化率、复购率

      3. **溢价符号构建**：
         - 通过尺度、材料等级、灯光层级、空间留白、稀缺性构建价值感
         - 真正溢价来自"克制"而非材料堆砌

      4. **生命周期收益**：
         - 分析建设/运营/维护/升级/二次利用成本
         - 确保10年以上价值维持能力

      **判断标准**：更新后是否改变客群结构？是否带动周边租金？

  # M5: 乡建在地型设计（Rural Context Mode）
  M5_rural_context:
    enabled: true
    target_experts:
      - "V6-1"  # 结构工程师
      - "V6-3"  # 材料工程师
      - "V8"    # 政策与治理顾问（乡村振兴政策合规与治理路径）
      - "V9"    # 产业链分析师（乡村产业链闭环与产业生态构建）
    inject_ability: "A4_material_intelligence"
    prompt_injection: |
      【M5乡建在地模式激活】

      本项目属于**乡建在地型设计**，必须重构文化×经济×空间系统：

      1. **地域文化解码**（而非符号）：
         - 提炼历史路径、生产方式、气候特征、聚落形态、生活习惯
         - 判断：如果脱离该地域仍然成立，就是伪在地

      2. **本地材料系统构建**：
         - 优先本地材料（易获得、易维护、可复制）
         - 本地材料 + 性能测试 + 现代工艺结合 + 成本控制

      3. **乡村产业嵌入**：
         - 住宿+餐饮+手工艺+农产品销售+教育体验形成闭环
         - 空间必须具备独立现金流

      4. **低成本结构优化**：
         - 结构简化、模块预制、减少复杂节点、统一施工工艺
         - 可大规模复制

      **判断标准**：材料是否本地化？是否有产业支撑？村民是否受益？

  # M6: 城市更新型设计（Urban Regeneration Mode）
  M6_urban_regeneration:
    enabled: true
    target_experts:
      - "V2"  # 设计总监
      - "V5"  # 场景专家
      - "V8"  # 政策与治理顾问（城市更新政策对齐与多方治理协调）
    inject_ability: "A11_operation_productization"
    prompt_injection: |
      【M6城市更新模式激活】

      本项目属于**城市更新型设计**，重构区域价值而非单体翻新：

      1. **土地价值重构**：
         - 重新定义土地应该值多少钱
         - 目标客群升级、新业态植入、公共空间增强
         - 判断：更新后是否改变客群结构？

      2. **公共界面塑造**：
         - 三层界面贯通：城市街道界面 → 半开放灰空间 → 内部公共空间
         - 提高可达性、强化停留点、形成社交节点

      3. **产业逻辑嵌入**：
         - 文化产业+创意办公+餐饮娱乐+社区商业+教育培训组合
         - 避免过度文创化导致的"打卡型空城"

      4. **城市IP系统构建**：
         - 视觉标志 → 叙事主题 → 文化活动 → 长期品牌运营
         - 成为"某个区域的代表"

      **判断标准**：是否形成新的公共聚集区？是否有稳定流量来源？

  # M7: 技术整合型设计（Tech Integration Mode）
  M7_tech_integration:
    enabled: true
    target_experts:
      - "V6-2"  # MEP工程师
    inject_ability: "A8_technology_integration"
    prompt_injection: |
      【M7技术整合模式激活】

      本项目属于**技术整合型设计**，技术必须改变空间结构逻辑：

      1. **系统隐形化结构**：
         - 设备外露 → 设备隐藏 → 系统融合 → 无感存在
         - 预埋管线、模块化检修口、中央控制、隐藏式传感器

      2. **数据反馈驱动结构**：
         - 空间通过数据调整自身状态（人流/光照/空气/噪音/温湿度）
         - 升级路径：手动 → 自动感应 → 数据记录 → 数据优化 → 自学习

      3. **可迭代接口设计**：
         - 为未来技术预留接口（设备/网络/模块/结构升级接口）
         - 10年后是否可升级？

      4. **人机关系平衡**：
         - 自动化+半自动+手动可控，保留人的决策权
         - 避免过度依赖系统

      **判断标准**：技术是否改变了空间结构？还是仅作为插件？

  # M8: 极端环境型设计（Extreme Condition Mode）★核心注入
  M8_extreme_condition:
    enabled: true
    target_experts:
      - "V6-1"  # 结构工程师（主要目标）
      - "V6-2"  # MEP工程师
    inject_ability: "A10_environmental_adaptation"
    prompt_injection: |
      【M8极端环境模式激活】★环境适应能力注入★

      本项目属于**极端环境型设计**（高海拔/极寒/极热/高湿/高盐雾/沙漠/海岛），
      你必须在原有结构分析基础上，追加以下4个维度的分析：

      ═══════════════════════════════════════════════════════════
      【维度1：结构抗性系统】
      ═══════════════════════════════════════════════════════════
      - **抗风压**：基于当地气候数据计算风压等级，选择抗风结构形式
      - **抗震**：地震带项目的抗震等级、结构体系、节点设计
      - **抗雪载**：高寒地区的屋顶坡度、承重梁截面
      - **抗盐雾腐蚀**（海岛/沿海）：混凝土保护层厚度、钢筋防腐等级
      - **抗紫外线老化**（高原/沙漠）：外立面材料选择、防护涂层

      **输出要求**：在你的结构分析中新增一节"极端环境抗性设计"，
      具体说明针对本项目环境的结构强化措施。

      ═══════════════════════════════════════════════════════════
      【维度2：材料适应系统】
      ═══════════════════════════════════════════════════════════
      - **高寒地区**：低导热材料、三层中空玻璃、气密性强化
      - **高盐雾地区**：不锈钢等级升级（316L）、防腐木碳化处理、阳极氧化铝合金
      - **高紫外线地区**：抗UV涂层、深色石材避免褪色
      - **高湿地区**：防潮材料、通风防霉系统

      **输出要求**：在材料建议中明确标注"极端环境适配材料清单"，
      包括材料等级、防护处理、维护周期。

      ═══════════════════════════════════════════════════════════
      【维度3：能源与生存系统】
      ═══════════════════════════════════════════════════════════
      - **低能耗供暖**（高寒）：被动式设计、地暖系统、热回收新风
      - **太阳能/风能**（偏远地区）：可再生能源系统
      - **雨水回收**（沙漠/缺水地区）：雨水收集、中水利用
      - **备用电源**（不稳定电网）：柴油发电机、储能系统
      - **供氧系统**（高海拔）：弥散供氧、制氧机房预留

      **输出要求**：在MEP系统设计中新增"极端环境生存系统"，
      说明能源自给能力、应急保障措施。

      ═══════════════════════════════════════════════════════════
      【维度4：生理舒适保障】
      ═══════════════════════════════════════════════════════════
      - **温度控制**：极寒(-30°C)或极热(45°C)条件下的室内温度维持
      - **湿度控制**：高湿（>80%）或干燥（<20%）的湿度平衡
      - **氧气浓度**（高海拔）：海拔3000m+的供氧需求（氧浓度提升至25%）
      - **气压平衡**（地下空间）：新风系统、气压差控制
      - **噪音控制**（强风地区）：隔音窗、双层结构

      **输出要求**：在舒适度分析中明确"极端环境下的人体舒适曲线达标策略"。

      ═══════════════════════════════════════════════════════════
      **判断标准**：
      - 结构是否基于当地气候数据计算？
      - 材料是否经过长期环境测试？
      - 能源系统是否可脱离城市基础设施独立运行？
      - 是否达到人体舒适曲线要求？

      ⚠️ 注意：极端环境设计的优先级是"安全第一、效率第二、美学第三"。

  # M9: 社会结构型设计（Social Structure Mode）★核心注入
  M9_social_structure:
    enabled: true
    target_experts:
      - "V7"  # 社会关系与心理洞察专家（主要目标）
      - "V8"  # 政策与治理顾问（治理结构设计与权力关系建模，A9次级能力）
    inject_ability: "A9_social_structure_modeling"
    prompt_injection: |
      【M9社会结构模式激活】★社会关系建模能力强化★

      本项目属于**社会结构型设计**（多代同堂/再婚家庭/合租/养老项目），
      这是你的核心应用场景！请全力展开Part A的6个社会结构建模能力：

      ═══════════════════════════════════════════════════════════
      【必须输出的核心字段】
      ═══════════════════════════════════════════════════════════
      请确保你的输出中`social_structure_analysis`字段完整包含以下5个子字段：

      1. **power_distance_model**（权力距离模型）
         - 识别家庭/组织的权力结构类型（高/低/混合）
         - 说明空间如何体现或平衡权力关系
         - 提供避免权力失衡导致冲突的策略

      2. **privacy_hierarchy**（隐私层级系统）
         - 划分L1公共、L2半公共、L3半私密、L4绝对私密区域
         - 检测隐私冲突（动线穿越、视线入侵、声学泄露、气味干扰）
         - 提供隐私保护的空间策略

      3. **conflict_buffer_design**（冲突缓冲机制）
         - 设计物理缓冲（灰空间、双向通道）
         - 设计时间缓冲（错峰使用机制）
         - 设计功能缓冲（独立设施降低资源争夺）
         - 设计视觉缓冲（避免监视感）

      4. **evolution_adaptability**（关系演化适配性）
         - 识别家庭生命周期当前阶段（新婚/育儿/青春/空巢/老年）
         - 预测未来5-10年的家庭变化
         - 设计可变结构（可拆分墙体、功能房转换、预留接口）

      5. **intergenerational_balance**（代际空间平衡）
         - 设计连接空间（促进代际互动）
         - 设计独立空间（保障各自生活方式）
         - 设计缓冲空间（调节距离感）
         - 控制代际互动频率（建议每天1-2次自然交汇）

      ═══════════════════════════════════════════════════════════
      【理论强化提醒】
      ═══════════════════════════════════════════════════════════
      请充分运用以下理论（已在你的theoretical_framework中）：

      - **Hofstede文化维度理论**：高/低/混合权力距离的空间表现
      - **Altman隐私调节理论**：4层隐私分级与冲突检测
      - **Pruitt & Rubin冲突管理**：物理/时间/功能/视觉四重缓冲
      - **家庭生命周期理论**：从新婚到老年的演化路径
      - **Vischer代际关系模型**：连接-独立-缓冲三元平衡
      - **Hall近体学**：亲密/个人/社交/公共四重距离控制

      ═══════════════════════════════════════════════════════════
      **置信度要求**：
      - 本类项目是你的核心场景，置信度应≥0.85
      - 如果用户提供了家庭成员结构、关系描述、冲突历史，置信度应达0.9+

      **判断标准**：
      - 空间是否预防了潜在的家庭冲突？
      - 隐私层级是否清晰无交叉？
      - 空间是否可适配未来10年的家庭变化？

  # M10: 未来推演型设计（Future Projection Mode）
  M10_future_speculation:
    enabled: true
    target_experts:
      - "V4"  # 设计研究专家
      - "V2"  # 设计总监
    inject_ability: "A12_civilizational_expression"
    prompt_injection: |
      【M10未来推演模式激活】

      本项目属于**未来推演型设计**，必须回应未来生活形态：

      1. **趋势推演模型**：
         - 识别宏观趋势（人口结构/远程办公/AI自动化/健康焦虑/家庭小型化/老龄化）
         - 推演逻辑：趋势 → 行为变化 → 空间需求变化 → 结构调整

      2. **技术接口预留系统**：
         - 为未知技术留接口（可更换墙体、模块化机电、隐藏管线冗余、网络升级）
         - 确保不拆结构即可升级

      3. **生活方式重构能力**：
         - 预测未来生活节奏（居家办公、多功能空间、共享与独立平衡、沉浸式娱乐）
         - 空间适配未来行为模式

      4. **长周期价值策略**：
         - 中性底盘+可变软装+可替换界面+长期审美不过时
         - 5-10年内不过时

      **判断标准**：当未来到来时，这个空间是否不需要改？

  # M11: 健康疗愈型设计（Healthcare & Healing Mode）
  M11_healthcare_healing:
    enabled: true
    target_experts:
      - "V5"  # 场景专家
      - "V6-1"  # 功能优化专家
      - "V3"  # 叙事专家
    inject_ability: "A13_healing_environment"
    prompt_injection: |
      【M11健康疗愈模式激活】

      本项目属于**健康疗愈型设计**，核心逻辑是降低激活而非制造高潮：

      1. **神经安全感构建**：
         - 包裹感设计（低层高、内凹座位、靠背保护）——减少背后暴露
         - 视线控制：使用者可看到入口，但外部难以窥视
         - 可撤退路径：每个主要使用点都有明确退出方向
         - 声学缓冲：背景噪音控制在45dB以下，消除突然声刺激

      2. **感官调节系统**：
         - 视觉：低饱和色（米白/浅木/灰绿），减少色彩对比与镜面反光
         - 听觉：白噪声/自然声掩蔽，房间混响时间0.3–0.6s
         - 触觉：材料温度接近体温（木/布），避免冰凉金属大面积接触
         - 光照：色温2700–3000K，散射光优先，避免直射与蓝光

      3. **尊严保护系统**：
         - 私密控制权：使用者可独立控制照明/窗帘/温度
         - 视觉隐私：床/椅方向不被走廊直视
         - 自主移动：轮椅/助行器可自由通行，无障碍但不"病态化"
         - 选择感：多个可用空间，不被强制导向单一位置

      4. **自然接触与生物亲近性**：
         - 直接自然：室内植物、庭院、景窗——本地植物优先
         - 间接自然：木纹/石纹材料、流水声景、有机形态
         - 从任何床位或主要使用点，必须可看到自然元素（植物/天空/水）

      **判断标准**：脆弱状态的人在此空间中，身体是否自然放松？尊严是否被保护？

# ═══════════════════════════════════════════════════════════
# 实施说明（Implementation Notes）
# ═══════════════════════════════════════════════════════════

implementation_hook:
  location: "intelligent_project_analyzer/workflow/expert_factory.py"
  class: "TaskOrientedExpertFactory"
  method: "_build_task_oriented_expert_prompt"

  integration_logic: |
    1. 读取 state["detected_design_modes"]（来自CapabilityDetector）
    2. 加载 config/ability_injections.yaml
    3. 遍历detected_design_modes，查询匹配的injection规则
    4. 如果专家ID在target_experts中：
       - 将prompt_injection追加到expert的system_prompt末尾
       - 在日志中记录：f"[能力注入] {expert_id} ← {mode_id} ({inject_ability})"
    5. 构建增强后的expert_prompt

  example_code: |
    # 在_build_task_oriented_expert_prompt方法中添加：

    detected_modes = state.get("detected_design_modes", [])
    if detected_modes:
        injection_config = load_yaml("config/ability_injections.yaml")
        for mode in detected_modes:
            mode_key = f"{mode}_xxx"  # 如M8_extreme_condition
            if mode_key in injection_config["mode_to_ability_injections"]:
                rule = injection_config["mode_to_ability_injections"][mode_key]
                if rule["enabled"] and expert_id in rule["target_experts"]:
                    system_prompt += "\n\n" + rule["prompt_injection"]
                    logger.info(f"[能力注入] {expert_id} ← {mode_key} ({rule['inject_ability']})")

