# 示例:蛇口菜市场城市更新项目
# 来源:q.txt Q9
# 类型:商业主导 (Commercial Dominant)
# 特征:城市更新、商业+社区复合、多客群适配、标杆对标
# 🆕 v7.999.3: 空间设计聚焦 - 38个任务全部转译为空间设计维度

example:
  project_info:
    name: 深圳蛇口20000㎡菜市场更新改造项目
    description: |
      希望对标苏州黄桥菜市场,同时融入蛇口渔村传统文化。需兼顾老居民、香港访客、
      外籍客群与社区居民,成为城市更新标杆。整体改造包括动线组织、冷链系统、文化展示策略、
      社交空间植入与空间设计策略。

    # 12维特征向量(与注册表一致)
    feature_vector:
      commercial: 0.62      # 商业空间适配
      functional: 0.58      # 动线+功能空间
      social: 0.55          # 多客群空间适配
      cultural: 0.42        # 渔村文化空间语言
      experiential: 0.50    # 市井空间体验
      sustainable: 0.38     # 可持续空间设计
      regional: 0.48        # 蛇口地域空间特色
      technical: 0.45       # 技术空间系统
      material_innovation: 0.30
      aesthetic: 0.35
      historical: 0.40      # 渔村历史
      symbolic: 0.32

    # 关键约束
    constraints:
      - 对标苏州黄桥菜市场(成功空间标杆)
      - 四类客群空间适配(老居民/港客/外籍/社区)
      - 文化展示+空间平衡
      - 城市更新标杆定位

    # 项目目标
    goals:
      - 打造具有文化深度的现代菜市场空间
      - 实现多客群适配的空间系统
      - 成为城市更新示范项目
      - 融入蛇口渔村传统文化空间语言

  # ========== 理想拆解结果 ==========
  # 🆕 v7.999.3: 空间设计聚焦优化 14→38个任务
  # 复杂度评分: 0.883 (极高) → 推荐任务数: 40+个
  # ⚠️ 本案例展示高复杂度商业空间设计项目的完整拆解逻辑(聚焦空间设计,不含运营管理)

  ideal_tasks:
    # ========== 第一阶段:标杆空间研究(Task 1-4) ==========

    # 1. 苏州黄桥菜市场空间设计研究
    - id: task_1
      title: 搜索 苏州黄桥菜市场的 空间设计策略、动线组织逻辑、功能分区方式、文化展示空间手法、尺度控制技术
      description: |
        深度调研苏州黄桥菜市场作为成功标杆的空间设计核心策略,包括空间布局如何平衡传统市井氛围与现代零售效率、
        动线组织如何引导多客群流动、功能分区的空间逻辑、文化元素如何转化为空间体验、尺度如何控制舒适感。
      task_type: research
      motivation: commercial
      support_search: true
      dimensions:
        - 空间设计策略(布局逻辑、层高处理、开放度控制)
        - 动线组织逻辑(客流引导、高效率路径、视线管理)
        - 功能分区方式(干湿分离、冷热分区、业态聚类空间)
        - 文化展示空间手法(符号转译、沉浸体验、空间叙事)
        - 尺度控制技术(通道宽度、摊位尺寸、层高舒适度)
      priority: high
      execution_order: 1

    # 2. 日本筑地市场空间组织研究
    - id: task_2
      title: 搜索 日本东京筑地市场的 空间组织逻辑、功能分区空间策略、冷链空间整合、动线分流空间设计、后勤空间系统
      description: |
        深度调研筑地市场作为全球最大鱼市的空间组织智慧,理解其如何在高密度环境下通过空间设计保持秩序与效率,
        拍卖与零售功能如何空间分离、冷链系统如何整合到空间、动线如何分流、后勤空间如何隐藏。
      task_type: research
      motivation: commercial
      support_search: true
      dimensions:
        - 空间组织逻辑(拍卖区/批发区/零售区三级空间分离)
        - 功能分区策略(时段错峰使用、垂直分层、水平分区)
        - 冷链空间整合(设备隐藏、管线整合、温控分区空间)
        - 动线分流设计(游客观光通道与商户工作动线空间隔离)
        - 后勤空间系统(仓储、垃圾处理、员工休息空间布局)
      priority: high
      execution_order: 2

    # 3. 西班牙博盖利亚市场空间体验研究
    - id: task_3
      title: 搜索 西班牙巴塞罗那博盖利亚市场的 空间体验设计、视觉美学空间表达、色彩空间系统、餐饮空间植入方式、打卡点空间设计
      description: |
        调研博盖利亚市场如何通过空间设计从传统菜市场转型为城市文化地标,理解其空间体验设计逻辑、
        色彩如何营造空间氛围、餐饮业态如何空间整合、网红打卡点如何通过空间设计吸引游客。
      task_type: research
      motivation: experiential
      support_search: true
      dimensions:
        - 空间体验设计(开放感、尺度亲切性、视线层次、空间节奏)
        - 视觉美学表达(彩色瓷砖空间应用、水果陈列空间、Instagram美学)
        - 色彩空间系统(加泰罗尼亚色彩、地中海色调、空间色彩分区)
        - 餐饮空间植入(海鲜吧台空间、果汁摊位、熟食试吃区空间占比30%)
        - 打卡点空间设计(视角设计、背景控制、光线利用、空间构图)
      priority: high
      execution_order: 3

    # 4. 台湾士东市场空间改造研究
    - id: task_4
      title: 搜索 台湾台北士东市场的 空间紧凑化技术、垂直空间利用、现代化改造空间策略、社区嵌入空间设计、卫生空间标准提升
      description: |
        研究士东市场作为亚洲传统市场现代化改造典范的空间经验,理解如何在有限空间内实现功能升级、
        垂直空间如何高效利用、空间改造如何保护摊贩利益、社区如何空间融合。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 空间紧凑化技术(立体货架空间、天花收纳空间、地下仓储空间利用)
        - 垂直空间利用(夹层空间、吊挂系统、立体动线)
        - 现代化改造策略(原址改造空间策略、分期施工空间组织)
        - 社区嵌入空间设计(楼上住宅楼下市场空间关系、邻里厨房共享空间)
        - 卫生空间标准(油烟空间处理、污水空间分流、地面防滑空间设计)
      priority: high
      execution_order: 4

    # ========== 第二阶段:地域与用户空间研究(Task 5-6) ==========

    # 5. 蛇口渔村文化与空间语言研究
    - id: task_5
      title: 搜索 深圳蛇口渔村的 历史文化空间演变、渔业建筑空间语言、码头空间特征、社区生活空间方式、传统建筑空间特色
      description: |
        调研蛇口渔村的历史文化根源,理解从传统渔业社区到现代化城区的空间演变逻辑,提取可转化的空间符号、
        生活方式空间特征与空间原型,为菜市场改造提供本土文化空间基底。
      task_type: research
      motivation: cultural
      support_search: true
      dimensions:
        - 历史文化空间演变(渔业时代空间→城市化空间转型)
        - 渔业建筑空间语言(渔棚空间构造、渔船空间尺度、渔获处理空间)
        - 码头空间特征(物流节点空间、交易空间网络、开放性空间特征)
        - 社区生活空间方式(邻里关系空间、日常活动空间、饮食习惯空间)
        - 传统建筑空间特色(材料特性、色彩系统、空间尺度、构造逻辑)
      priority: high
      execution_order: 5

    # 6. 四类客群空间行为研究
    - id: task_6
      title: 调研 老居民、香港访客、外籍客群、社区居民四类人群的 空间行为特征、空间偏好差异、停留时长空间需求、动线特征、空间舒适度要求
      description: |
        深度分析四类主要客群的空间行为差异与需求特征,理解老居民的空间习惯、香港访客的空间品质期待、
        外籍客群的空间文化体验需求、社区居民的日常空间逻辑,为空间分区、尺度设计与功能布局提供依据。
      task_type: research
      motivation: social
      support_search: true
      dimensions:
        - 空间行为特征(移动速度、停留位置、视线习惯、身体距离)
        - 空间偏好差异(尺度舒适度、私密性、开放性、社交空间需求)
        - 停留时长空间需求(快速采购空间vs闲逛体验空间)
        - 动线特征(路径选择、拐点停留、回游路线、目标性强度)
        - 空间舒适度要求(密度阈值、噪声容忍度、温度偏好、照度需求)
      priority: high
      execution_order: 6

    # ========== 第三阶段:空间功能系统(Task 7-12) ==========

    # 7. 动线组织与空间分区设计
    - id: task_7
      title: 搜索 大型公共市场的 动线空间组织原则、功能分区空间策略、流线控制空间技术、拥堵缓解空间方法、无障碍空间设计标准
      description: |
        研究国际优秀市场案例的动线空间设计方法论,理解如何通过空间布局引导客流、避免交叉拥堵、
        实现高效采购与闲逛体验空间并存、照顾特殊人群无障碍空间需求。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 动线空间组织原则(单向/环形/网格化空间系统)
        - 功能分区空间策略(干湿空间分离、冷热空间分区、业态聚类空间)
        - 流线控制空间技术(节点空间设置、宽度空间计算、视线空间引导)
        - 拥堵缓解空间方法(缓冲空间、二级通道空间、时间分流空间策略)
        - 无障碍空间设计标准(坡道空间、照明空间、标识空间系统)
      priority: high
      execution_order: 7

    # 8. 社交空间节点设计
    - id: task_8
      title: 搜索 市集类公共空间的 社交节点空间设计、休息区空间组织、活动场地空间策划、邻里交流空间机制、社区认同感空间构建
      description: |
        研究菜市场作为社区社交中心的空间策略,理解如何通过空间布置、开放空间、活动空间规划等手段
        激活邻里互动,将纯交易空间升华为社区情感连接空间。
      task_type: research
      motivation: social
      support_search: true
      dimensions:
        - 社交节点空间设计(座椅空间分布、遮阳空间设施、视线空间关系)
        - 休息区空间组织(老人友好空间、儿童安全空间、陪同等候空间)
        - 活动场地空间策划(周末市集空间、烹饪课堂空间、文化节庆空间)
        - 邻里交流空间机制(共享餐桌空间、信息公告空间、社区信箱空间)
        - 社区认同感空间构建(品牌空间命名、视觉符号空间、归属仪式空间)
      priority: medium
      execution_order: 8

    # 9. 后勤空间系统设计
    - id: task_9
      title: 搜索 商业空间的 仓储空间设计、垃圾处理空间系统、员工休息空间、物流空间动线、后勤空间隐藏策略
      description: |
        研究后勤空间系统如何支持市场高效运转,理解仓储空间的合理配比、垃圾处理空间的卫生要求、
        员工休息空间的人性化设计、物流动线的空间组织、后勤空间如何隐藏不影响顾客体验。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 仓储空间设计(立体仓储空间、冷库空间、货架空间、库存空间占比)
        - 垃圾处理空间系统(分类暂存空间、冷藏垃圾空间、负压空间、收运空间动线)
        - 员工休息空间(更衣空间、用餐空间、休息空间、卫生空间)
        - 物流空间动线(卸货空间、搬运空间通道、与顾客空间分离)
        - 后勤空间隐藏策略(背后空间布局、遮挡空间设计、地下空间利用)
      priority: medium
      execution_order: 9

    # 10. 弹性空间与多功能设计
    - id: task_10
      title: 搜索 商业空间的 弹性空间设计、多功能空间转换、临时摊位空间系统、活动空间预留、季节性空间调整策略
      description: |
        研究如何通过弹性空间设计应对市场的多变需求,理解空间如何实现多功能转换、临时摊位如何空间布置、
        活动空间如何预留、季节性变化如何空间应对。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 弹性空间设计(可移动隔断空间、模数化空间单元、快速组装空间)
        - 多功能空间转换(日间市场→夜间活动空间转换、工作日→周末空间转换)
        - 临时摊位空间系统(快闪空间位、农夫市集空间、手工市集空间)
        - 活动空间预留(中庭开放空间、广场空间、舞台空间预留)
        - 季节性空间调整(夏季遮阳空间、冬季保温空间、雨季排水空间)
      priority: low
      execution_order: 10

    # 11. 文化展示空间策略
    - id: task_11
      title: 搜索 公共商业空间的 文化符号空间转译方法、叙事路径空间设计、沉浸体验空间技术、互动装置空间应用、避免符号化浅层空间表达策略
      description: |
        研究如何将蛇口渔村文化转化为空间叙事元素,既保留历史真实性又避免符号堆砌,
        通过空间、材料、装置、灯光、声音等多维度手段营造文化空间氛围。
      task_type: research
      motivation: cultural
      support_search: true
      dimensions:
        - 文化符号空间转译(抽象化空间、材料化空间、空间原型提取)
        - 叙事路径空间设计(时间轴空间、主题线空间、情绪节奏空间)
        - 沉浸体验空间技术(声景空间、气味空间、光影空间、触觉空间)
        - 互动装置空间应用(历史照片墙空间、渔具展示空间、口述历史空间)
        - 避免浅层空间表达(文化顾问参与空间设计、原住民空间参与、深度田调支持空间设计)
      priority: medium
      execution_order: 11

    # 12. 竞争对手空间设计分析
    - id: task_12
      title: 调研 深圳及周边城市的 标杆菜市场空间案例、竞争对手空间定位、差异化空间策略、市场空白空间点、空间设计优劣势
      description: |
        分析深圳本地及香港、广州等周边市场的空间设计成功案例与竞争态势,找到蛇口菜市场的差异化空间定位,
        识别空间设计机会与潜在空间威胁。
      task_type: analysis
      motivation: commercial
      support_search: true
      dimensions:
        - 标杆空间案例研究(壹方城菜市场空间、华侨城生态广场空间等)
        - 竞争对手空间定位(价格/品质/文化/便利性空间坐标)
        - 差异化空间策略(文化深度空间+国际化空间+社区性空间三维突破)
        - 市场空白空间点(中高端生鲜空间+文化体验空间结合)
        - 空间设计优劣势(动线设计、尺度控制、材料品质、技术系统对比)
      priority: medium
      execution_order: 12

    # ========== 第四阶段:材料系统(Task 13-17) ==========

    # 13. 地面材料空间系统
    - id: task_13
      title: 搜索 公共市场地面的 材料空间选择标准、防滑空间技术、排水空间系统、耐用性空间要求、清洁维护空间策略
      description: |
        深度研究地面材料在高频使用、潮湿环境下的空间选型标准,理解防滑等级、排水坡度空间设计、
        耐磨损性能、日常清洁空间便利性与长期维护空间成本的平衡。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 材料空间选择标准(瓷砖/水磨石/环氧地坪空间性能对比)
        - 防滑空间技术(R10-R13防滑等级、湿地防滑空间处理、防滑条空间设置)
        - 排水空间系统(2%排水坡度空间设计、地漏空间间距3m、截水沟空间设计)
        - 耐用性空间要求(耐磨等级PEI5、抗冲击、耐酸碱、抗污染)
        - 清洁维护空间策略(日常拖洗空间、定期打蜡空间、深度清洁空间、局部修补空间)
      priority: medium
      execution_order: 13

    # 14. 墙面与天花材料空间系统
    - id: task_14
      title: 搜索 公共商业空间的 墙面材料空间选择、天花系统空间设计、防潮防霉空间技术、吸声降噪空间策略、视觉美学空间表达
      description: |
        研究墙面与天花系统在市场环境中的功能与美学空间要求,理解防潮防霉材料空间、吸声材料空间选型、
        管线隐藏空间策略、照明整合空间方式与整体视觉空间效果的平衡。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 墙面材料空间选择(防水涂料空间/瓷砖空间/烤漆板空间/铝塑板空间对比)
        - 天花系统空间设计(铝扣板空间/矿棉板空间/开放式桁架空间/局部吊顶空间)
        - 防潮防霉空间技术(防水涂层空间、通风空间设计、防霉空间添加剂)
        - 吸声降噪空间策略(穿孔板空间、吸声棉空间、软质材料空间占比30%)
        - 视觉美学空间表达(色彩空间系统、材料空间肌理、工业感+温度感空间)
