  # ========== 设计方法论提炼 ==========
  design_methodology:
    commercial_space_design_pattern:
      - 第一步:标杆空间研究(学习成功空间案例核心策略)
      - 第二步:地域用户空间研究(建立本土文化空间基底+用户行为空间特征)
      - 第三步:空间功能系统拆解(动线/社交/后勤/弹性/文化/竞争空间系统独立研究)
      - 第四步:材料系统研究(地面/墙面/金属/标识/环保材料空间应用)
      - 第五步:技术系统空间整合(冷链/采光/照明/通风/声学/温控/智能/能源空间)
      - 第六步:法规标准空间设计(消防/卫生/环保/无障碍/食品安全空间合规)
      - 第七步:用户体验空间优化(儿童/老年/夜间/气味/色彩/触觉空间)
      - 第八步:商业空间适配(租售空间模数化)
      - 第九步:整合输出(空间+材料+技术综合方案)

    key_focus_spatial_design:
      - 空间设计聚焦:所有任务围绕空间、材料、技术、体验展开
      - 运营管理剔除:不涉及定价、营销、供应链、会员等运营管理内容
      - 空间语言转译:所有维度转译为"空间"视角(如"冷链系统"→"冷链空间整合")
      - 技术空间化:技术系统任务强调空间整合(如"智能化"→"智能化系统空间整合")
      - 体验空间化:用户体验任务强调空间设计(如"儿童友好"→"儿童友好空间设计")

