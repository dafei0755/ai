# Few-shot示例注册表
# v7.990: 多维度标签矩阵匹配系统（from v7.980）
#
# 设计理念：
# - v7.980: 基于12维特征向量的余弦相似度匹配（单一主导维度）
# - v7.990: 基于7维标签矩阵的重叠度匹配（多维度融合）
#
# 架构优势：
# 1. 从"单一标签"到"标签矩阵" - 立体匹配
# 2. 从"8个固定类别"到"7维×多标签" - 指数级覆盖
# 3. 支持动态权重调整 - 适配不同项目类型
# 4. 保留feature_vector作为fallback - 向后兼容
#
# 匹配维度（7个）：
# 1. space_type: 空间类型（多个标签）
# 2. scale: 项目规模（单值）
# 3. design_direction: 设计方向主导（多个标签+可选权重）
# 4. user_profile: 用户特征（多个标签）
# 5. challenge_type: 项目挑战类型（多个标签）
# 6. methodology: 方法论模式（多个标签）
# 7. phase: 项目阶段（单值）

examples:
