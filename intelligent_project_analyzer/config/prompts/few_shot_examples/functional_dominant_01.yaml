      - 第五步:技术空间系统整合(声学/采光/照明/新风/温控/监控/安防/应急空间)
      - 第六步:法规空间设计(无障碍/儿童安全/消防/适老化空间合规)
      - 第七步:心理空间设计(感统训练/情绪调节/社交技能/私密边界/压力缓解空间)
      - 第八步:整合输出(空间+材料+技术+心理综合方案)

    key_focus_spatial_design:
      - 空间设计聚焦:所有任务围绕空间、材料、技术、心理体验展开
      - 运营管理剔除:不涉及装修预算、施工管理、家政服务等非空间设计内容
      - 空间语言转译:所有维度转译为"空间"视角(如"隔音系统"→"声学隔音空间系统")
      - 技术空间化:技术系统任务强调空间整合(如"智能监控"→"智能监控空间配置")
      - 心理空间化:心理需求任务强调空间设计(如"情绪调节"→"情绪调节空间设计")
      - 功能空间化:功能需求任务强调空间实现(如"照护支持"→"照护监控空间系统")

  # ========== 适用场景扩展 ==========
  extended_scenarios:
    - 特殊需求儿童家庭空间(多动症/发育迟缓/脑瘫儿童住宅空间)
    - 多代同堂住宅空间设计(三代/四代家庭空间适配)
    - 居家康复空间环境(术后康复/慢性病管理住宅空间)
    - 适老化住宅空间改造(老年人独立居住/护理空间)
    - 小户型多功能空间优化(紧凑空间高效利用)
