# 示例:自闭症家庭住宅系统设计
# 来源:q.txt Q8
# 类型:功能主导 (Functional Dominant)
# 特征:特殊需求、多代同堂、感统训练、复杂家庭结构
# 🆕 v7.999.3: 空间设计聚焦 - 36个任务全部转译为空间设计维度

example:
  project_info:
    name: 深圳前海160㎡自闭症家庭住宅空间设计
    description: |
      家庭结构复杂:35岁腾讯程序员父亲、34岁全职母亲、7岁自闭症儿童、外公外婆每年冬季短住三个月。
      需要完整空间设计框架,涵盖感统训练空间、情绪缓冲空间、长辈短住空间适配、隔音收纳空间策略
      以及家庭互动与私密空间平衡。

    # 12维特征向量(与注册表一致)
    feature_vector:
      functional: 0.82      # 感统训练空间+多代居住空间+隔音收纳空间
      social: 0.65          # 家庭互动空间+情绪缓冲空间+关系平衡空间
      technical: 0.58       # 声学空间处理+智能监控空间+安全空间系统
      experiential: 0.55    # 情绪体验空间+安全感空间+舒适度空间
      sustainable: 0.40     # 材料安全空间+长期适用空间
      aesthetic: 0.35       # 视觉舒缓空间
      material_innovation: 0.45  # 安全材料空间+感统材质空间
      symbolic: 0.30
      commercial: 0.20
      cultural: 0.25
      historical: 0.10
      regional: 0.15

    # 关键约束
    constraints:
      - 7岁自闭症儿童特殊空间需求(感统训练空间、情绪管理空间)
      - 多代同堂空间适配(4口常住+2位长辈季节性短住空间)
      - 父亲程序员工作空间(需要安静工作空间环境)
      - 母亲全职照护空间支持(高强度照护压力空间缓解)
      - 面积限制空间挑战(160㎡需容纳多功能空间)

    # 项目目标
    goals:
      - 打造支持儿童感统康复的训练空间
      - 建立情绪缓冲空间机制
      - 实现家庭互动与个体私密空间平衡
      - 适配长辈短住空间需求
      - 通过空间设计降低母亲照护负担

  # ========== 理想拆解结果 ==========
  # 🆕 v7.999.3: 空间设计聚焦优化 13→36个任务
  # 复杂度评分: 0.883 (极高) → 推荐任务数: 40+个
  # ⚠️ 本案例展示高复杂度功能主导项目的完整拆解逻辑(聚焦空间设计)

  ideal_tasks:
    # ========== 第一阶段:标杆空间研究(Task 1-3) ==========

    # 1. 自闭症友好住宅空间案例研究
    - id: task_1
      title: 搜索 国际自闭症友好住宅的 空间设计策略、感统空间整合、安全空间防护、情绪调节空间、家庭空间平衡
      description: |
        深度调研国际成功案例(如日本东京自闭症儿童之家、美国SARRC空间设计)的空间设计核心策略,
        理解如何通过空间设计支持感统训练、情绪调节、家庭生活,提取空间原型与设计逻辑。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 空间设计策略(功能空间分区、尺度空间控制、材料空间选择、色彩空间系统)
        - 感统空间整合(训练设备空间嵌入、多功能空间转换、安全空间防护)
        - 安全空间防护(防撞空间设计、防走失空间系统、危险区空间隔离)
        - 情绪调节空间(安全角空间、感官减压空间、视觉隐私空间)
        - 家庭空间平衡(共处空间与私密空间、照护空间与生活空间、医疗化空间与家庭化空间)
      priority: high
      execution_order: 1

    # 2. 多代同堂住宅空间设计研究
    - id: task_2
      title: 搜索 多代家庭住宅的 代际空间共存、独立空间需求、共享空间设计、适老空间改造、代际空间矛盾化解
      description: |
        研究多代同堂住宅的空间组织智慧,理解如何在有限空间内实现代际独立性与互动性空间平衡,
        适配不同年龄段的空间需求、生活节奏空间、隐私边界空间。
      task_type: research
      motivation: social
      support_search: true
      dimensions:
        - 代际空间共存(空间分区独立、声学空间隔离、动线空间分离)
        - 独立空间需求(老人独立卫生空间间、独立出入空间口、独立活动空间)
        - 共享空间设计(客厅共处空间、餐厅共餐空间、阳台交流空间)
        - 适老空间改造(无障碍空间通道、扶手空间配置、照明空间强化、防滑空间地面)
        - 代际空间矛盾化解(作息时间空间隔离、生活习惯空间适配、文化差异空间包容)
      priority: high
      execution_order: 2

    # 3. 居家康复空间设计案例研究
    - id: task_3
      title: 搜索 居家康复空间的 训练设备空间整合、医疗空间家庭化、康复动线空间设计、照护者空间支持、空间可成长性
      description: |
        调研居家康复空间(脑瘫、发育迟缓、自闭症等)的设计经验,理解如何将专业康复空间功能融入家庭环境,
        避免过度医疗化空间,支持儿童成长阶段空间需求变化。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 训练设备空间整合(可折叠空间设备、墙面嵌入空间、多功能空间家具)
        - 医疗空间家庭化(温馨色彩空间、家居化材料空间、隐藏治疗空间痕迹)
        - 康复动线空间设计(训练空间→休息空间→生活空间过渡路径)
        - 照护者空间支持(视线覆盖空间、快速响应空间动线、减压空间设置)
        - 空间可成长性(模块化空间设计、可调节空间高度、功能空间转换预留)
      priority: high
      execution_order: 3

    # ========== 第二阶段:用户需求空间研究(Task 4-5) ==========

    # 4. 自闭症儿童空间行为研究
    - id: task_4
      title: 搜索 自闭症儿童的 感觉统合空间特征、空间感知模式、声音敏感空间需求、视觉刺激空间反应、触觉空间偏好、情绪空间调节
      description: |
        深度研究7岁自闭症儿童的典型感官特征与空间行为,理解感统失调的空间表现、
        环境刺激的空间影响、情绪崩溃的空间触发因素与空间缓解策略。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 感觉统合空间特征(前庭觉空间需求、本体觉空间训练、触觉空间体验)
        - 空间感知模式(方向感空间、距离判断空间、空间记忆路径)
        - 声音敏感空间需求(分贝空间阈值、突发声响空间反应、白噪音空间应用)
        - 视觉刺激空间反应(色彩恐惧空间、光影变化空间、图案规律空间)
        - 触觉空间偏好(深度压力空间、材质偏好空间、温度敏感空间)
        - 情绪空间调节(自我刺激行为空间、安全角空间需求、预警信号空间识别)
      priority: high
      execution_order: 4

    # 5. 多代家庭空间需求研究
    - id: task_5
      title: 调研 程序员父亲、全职母亲、外公外婆四类人群的 工作空间需求、照护空间支持、适老空间标准、代际互动空间、私密空间边界
      description: |
        分析四类家庭成员的空间需求差异与矛盾,理解父亲的安静工作空间、母亲的视线覆盖空间、
        老人的适老化空间、儿童的安全训练空间如何在160㎡内空间协调共存。
      task_type: research
      motivation: social
      support_search: true
      dimensions:
        - 工作空间需求(隔音工作空间、专注环境空间、视频会议空间背景)
        - 照护空间支持(视线覆盖空间系统、快速响应空间动线、减压空间设置)
        - 适老空间标准(无障碍空间通道、扶手空间配置、照明空间强化、防滑空间)
        - 代际互动空间(共餐空间、交流空间节点、亲子游戏空间、祖孙互动空间)
        - 私密空间边界(卧室空间独立、卫生空间分离、个人空间领域、视线空间控制)
      priority: high
      execution_order: 5

    # ========== 第三阶段:空间功能系统(Task 6-13) ==========

    # 6. 感统训练空间设计
    - id: task_6
      title: 搜索 家用感统训练室的 空间尺度标准、设备布置空间、安全防护空间、墙面空间系统、地面空间系统、收纳空间整合
      description: |
        研究家庭环境中设置感统训练空间的专业标准,理解秋千/滑梯/攀爬架等设备的空间安装规范、
        防撞软包空间材料、地面减震空间垫层、设备收纳空间隐藏、多功能空间复用。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 空间尺度标准(最小8㎡空间、层高2.8m+空间、活动半径1.5m空间、安全间距空间)
        - 设备布置空间(秋千安装空间、滑梯落地空间、攀爬墙空间、平衡木空间、镜面墙空间)
        - 安全防护空间(软包厚度空间、防撞边角空间、安全扣具空间、承重检测空间)
        - 墙面空间系统(软包空间/软木空间/攀岩板空间/镜面空间分区应用)
        - 地面空间系统(EPDM橡胶垫空间/体操垫空间/拼接地垫空间、减震空间构造)
        - 收纳空间整合(设备折叠空间、墙面嵌入空间、移动收纳车空间、隐藏空间策略)
      priority: high
      execution_order: 6

    # 7. 情绪缓冲空间设计
    - id: task_7
      title: 搜索 情绪调节空间的 安全角空间原则、感官安抚空间策略、视觉隐私空间方法、触觉安慰空间工具、光线控制空间、可达性空间
      description: |
        研究为自闭症儿童设置情绪崩溃时的安全退缩空间,提供深度压力空间、昏暗环境空间、
        柔软触感空间等安抚元素,同时保证母亲监控空间与快速介入空间。
      task_type: research
      motivation: social
      support_search: true
      dimensions:
        - 安全角空间原则(封闭性空间+可监控空间、1.2m×1.2m最小尺度空间、柔软空间包裹)
        - 感官安抚空间策略(深压毯子空间、豆袋沙发空间、抱枕墙空间、加重玩偶空间)
        - 视觉隐私空间方法(帘幕空间/推拉门空间/软隔断空间、半透明材质空间)
        - 触觉安慰空间工具(毛绒织物空间、按摩球空间、触觉板空间、振动坐垫空间)
        - 光线控制空间(可调节LED空间、暖色温空间、夜灯模式空间、自然光控制空间)
        - 可达性空间(客厅/卧室/训练室三点15秒可达空间、视线可及空间、声音可传空间)
      priority: high
      execution_order: 7

    # 8. 照护监控空间系统
    - id: task_8
      title: 搜索 家庭监护空间的 视线覆盖空间设计、智能监控空间配置、快速响应空间动线、应急呼叫空间装置、照护者减压空间
      description: |
        研究如何通过空间设计减轻全职母亲的照护压力,实现"在厨房空间能看到客厅玩耍空间"、
        "在卧室空间能监听儿童房空间"等功能,同时为母亲提供短暂独处减压空间。
      task_type: research
      motivation: social
      support_search: true
      dimensions:
        - 视线覆盖空间设计(开放式厨房空间/客厅空间、儿童房玻璃窗空间/观察孔空间)
        - 智能监控空间配置(摄像头布点空间、监控死角空间消除、手机APP空间联动)
        - 快速响应空间动线(主要活动区三角形空间布局、10秒可达空间原则、无障碍空间通道)
        - 应急呼叫空间装置(儿童房按钮空间、可穿戴报警器空间、智能语音助手空间)
        - 照护者减压空间(阳台小茶座空间、主卧阅读角空间、卫生间泡澡空间、独处空间时刻)
      priority: high
      execution_order: 8

    # 9. 工作空间隔离设计
    - id: task_9
      title: 搜索 居家办公空间的 隔音空间标准、专注环境空间构建、人体工学空间设计、设备布线空间策略、视频会议空间背景、工作生活空间分离
      description: |
        研究如何在开放式家庭环境中为程序员父亲打造专注工作空间,隔离儿童噪音空间干扰,
        支持长时间编码空间与远程会议空间需求,同时不完全封闭空间以便紧急响应。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 隔音空间标准(隔音门空间≥35dB、墙体隔音空间≥40dB、地面减震空间)
        - 专注环境空间构建(简洁视野空间、中性色调空间、绿植点缀空间、白噪音空间选项)
        - 人体工学空间设计(升降桌空间、人体工学椅空间、显示器空间高度/距离/亮度)
        - 设备布线空间策略(隐藏式走线空间、多插座布局空间、UPS备用电源空间)
        - 视频会议空间背景(书架空间/绿植墙空间/纯色墙空间、补光灯位置空间)
        - 工作生活空间分离(推拉门空间/玻璃隔断+软帘空间、时间分区空间策略、心理边界空间)
      priority: medium
      execution_order: 9

    # 10. 长辈适老空间设计
    - id: task_10
      title: 搜索 老人友好住宅的 无障碍空间标准、卫生间适老空间改造、床具空间高度、照明空间亮度、收纳空间便利性、短住空间灵活性
      description: |
        研究如何在限定空间内为冬季短住3个月的外公外婆提供舒适独立的居住空间,
        同时不影响常住家庭的日常空间动线,考虑老人的生理空间特征与文化空间习惯。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 无障碍空间标准(走道空间≥1.2m、门宽空间≥0.9m、无高差过渡空间、扶手空间配置)
        - 卫生间适老空间改造(马桶扶手空间、防滑地砖空间、坐式淋浴空间、感应夜灯空间)
        - 床具空间高度(床面离地45-50cm空间、床垫硬度空间、起身辅助空间、床头靠背空间)
        - 照明空间亮度(基础照明300lux空间、局部阅读500lux空间、夜间导向灯空间、防眩光空间)
        - 收纳空间便利性(开放式衣柜空间、低位抽屉空间、标签化整理空间、视线可及空间)
        - 短住空间灵活性(可恢复书房空间/客房空间、模块化家具空间、独立卫生空间间配置)
      priority: medium
      execution_order: 10

    # 11. 家庭互动空间设计
    - id: task_11
      title: 搜索 融合家庭的 共处空间组织、亲子互动空间区、多代交流空间场景、私密空间划分、视线连接空间与心理边界空间、康复活动空间融入
      description: |
        研究如何在满足自闭症儿童特殊需求的同时,保留正常的家庭生活空间氛围,
        设计支持亲子游戏空间、祖孙互动空间、夫妻交流空间的多层次空间,避免过度医疗化空间或隔离化空间。
      task_type: research
      motivation: social
      support_search: true
      dimensions:
        - 共处空间组织(客厅家庭影院空间、餐厅共餐仪式空间、阳台茶歇空间、活动共享空间)
        - 亲子互动空间区(地台游戏空间、绘画墙空间、积木桌空间、亲子阅读角空间)
        - 多代交流空间场景(三代共餐桌尺寸空间、老人儿童互动安全距离空间、对话空间节点)
        - 私密空间划分(主卧夫妻空间、儿童独立房空间、长辈客房空间、个人空间领域)
        - 视线连接空间与心理边界空间(半开放隔断空间、可视化但不干扰空间、声学空间隔离)
        - 康复活动空间融入(日常生活训练空间场景、社交技能练习空间情境、自然化空间康复)
      priority: medium
      execution_order: 11

    # 12. 收纳空间系统设计
    - id: task_12
      title: 搜索 小户型住宅的 收纳空间规划、分类整理空间策略、隐藏式收纳空间技术、儿童友好收纳空间、老人便利收纳空间、模块化收纳空间系统
      description: |
        研究如何在160㎡空间中满足4口常住+2位季节性长辈的收纳空间需求,
        包括衣物、玩具、感统设备、康复资料、老人用品等多种物品的分类存储空间与快速取用空间。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 收纳空间规划(衣柜空间/储藏室空间/玄关空间/床下空间/墙面空间多维利用)
        - 分类整理空间策略(常用/备用/季节性三级分类空间、标签化管理空间、视线可及空间)
        - 隐藏式收纳空间技术(床下抽屉空间、踢脚线储物空间、吊顶收纳空间、墙内嵌入空间)
        - 儿童友好收纳空间(低位开放柜空间、透明收纳箱空间、图片标签空间、滚轮设计空间)
        - 老人便利收纳空间(中间高度柜体空间、推拉门空间、照明充足空间、分隔清晰空间)
        - 模块化收纳空间系统(宜家/无印良品标准化组件空间、可调节层板空间、灵活组合空间)
      priority: medium
      execution_order: 12

    # 13. 安全防护空间设计
    - id: task_13
