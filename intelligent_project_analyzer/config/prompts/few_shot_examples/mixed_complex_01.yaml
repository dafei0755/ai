# 示例:南昌四层复合型总部建筑室内设计
# 来源:q.txt Q23
# 类型:混合复杂 (Mixed Complex)
# 特征:四层功能分区、公私分层、新旧对撞美学、禅意极简、结构改造、材料克制体系
# 复杂度:多功能复合+事业家庭融合+风格对撞

example:
  project_info:
    name: 南昌四层复合型总部建筑室内设计
    description: |
      南昌四层总部建筑,功能垂直分层:1楼艺术展厅(公共展示)、2楼办公室(商务工作)、
      3楼家庭住宅(私密生活)、4楼带高尔夫练习场露台会所(社交休闲)。
      风格要求纯粹、极简、禅意、新旧对撞。需提出完整室内设计框架,阐述公共与私密的
      分层逻辑、结构改造策略、材料克制体系以及事业与家庭精神融合路径。

    # 12维特征向量
    feature_vector:
      commercial: 0.55       # 展厅商业展示+办公空间
      functional: 0.62       # 四层功能分区+结构改造
      aesthetic: 0.58        # 禅意极简+新旧对撞美学
      cultural: 0.48         # 禅意文化+东方美学
      experiential: 0.60     # 公私体验层次+空间叙事
      social: 0.50           # 会所社交+展厅公共性
      technical: 0.48        # 结构改造+设备整合
      material_innovation: 0.52  # 材料克制体系+新旧材料对撞
      symbolic: 0.55         # 事业家庭精神融合
      sustainable: 0.40      # 材料可持续性
      historical: 0.42       # 老建筑保留+历史痕迹
      regional: 0.35         # 南昌地域特征

    # 关键约束
    constraints:
      - 四层垂直功能分区(展厅/办公/住宅/会所)
      - 风格统一:纯粹、极简、禅意、新旧对撞
      - 公共与私密空间严格分层
      - 老建筑结构改造限制
      - 事业与家庭精神需在空间中融合表达

    # 项目目标
    goals:
      - 建立四层功能清晰的垂直空间体系
      - 实现公共到私密的渐进式空间过渡
      - 构建新旧对撞的禅意极简美学语言
      - 制定克制而有力的材料体系
      - 表达事业与家庭精神的空间融合路径

  # ========== 理想拆解结果 ==========
  # 复杂度评分: 0.78 (高) -> 推荐任务数: 16个
  # 任务分布: research 35% (6个) + design 40% (6个) + strategy 15% (2个) + analysis 10% (2个)

  ideal_tasks:
    # ========== 第一阶段:标杆研究与美学基底(Task 1-3, research) ==========

    # 1. 多功能复合建筑垂直分层案例研究
    - id: task_1
      title: 搜索 国际多功能复合建筑的 垂直功能分层策略、公私动线分离方式、楼层间过渡空间处理、混合业态空间组织逻辑
      description: |
        调研国际优秀多功能复合建筑案例(如安藤忠雄住吉的长屋、SANAA金泽的21世纪美术馆等),
        理解展厅+办公+住宅+会所四类功能如何在垂直方向上合理分层,公共与私密动线如何分离,
        楼层间过渡空间如何处理功能切换与情绪转换。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 垂直功能分层策略(公共底层→私密高层的渐进逻辑)
        - 公私动线分离方式(独立入口、专用电梯、缓冲前厅)
        - 楼层间过渡空间处理(楼梯间叙事、中间层缓冲、光线引导)
        - 混合业态空间组织逻辑(功能独立性与整体统一性平衡)
      priority: high
      execution_order: 1

    # 2. 禅意极简空间美学案例研究
    - id: task_2
      title: 搜索 禅意极简风格室内设计的 空间留白手法、光影控制技术、材料克制原则、东方美学空间转译方法
      description: |
        调研禅意极简风格的经典室内案例(如杉本博司的直岛护王神社、隈研吾的根津美术馆、
        谷口吉生的铃木大拙馆等),提取纯粹、极简、禅意的空间设计语言,理解留白、
        光影、材料克制如何共同构建东方美学空间氛围。
      task_type: research
      motivation: aesthetic
      support_search: true
      dimensions:
        - 空间留白手法(虚实比例、负空间运用、视觉呼吸感)
        - 光影控制技术(自然光引入、阴翳美学、光线层次)
        - 材料克制原则(少即是多、单一材料极致表达、触感优先)
        - 东方美学空间转译方法(侘寂精神、枯山水意象、禅宗空间原型)
      priority: high
      execution_order: 2

    # 3. 新旧对撞建筑改造美学研究
    - id: task_3
      title: 搜索 新旧对撞风格建筑改造的 历史痕迹保留策略、新旧材料碰撞手法、时间层叠空间表达、结构裸露美学处理
      description: |
        调研新旧对撞美学的成功改造案例(如大卫·奇普菲尔德柏林新博物馆、
        RCR Arquitectes巴贝里空间、张永和二分宅等),理解如何在保留老建筑历史痕迹的同时
        植入当代设计语言,实现新旧材料、新旧结构、新旧空间的对话与碰撞。
      task_type: research
      motivation: aesthetic
      support_search: true
      dimensions:
        - 历史痕迹保留策略(原始墙面、旧结构外露、时间印记)
        - 新旧材料碰撞手法(清水混凝土vs老砖墙、钢vs木、玻璃vs石)
        - 时间层叠空间表达(新旧界面处理、年代可读性、叠加而非覆盖)
        - 结构裸露美学处理(梁柱外露、管线可见化、结构即装饰)
      priority: high
      execution_order: 3

    # ========== 第二阶段:功能空间深化研究(Task 4-6, research) ==========

    # 4. 艺术展厅空间设计标准研究
    - id: task_4
      title: 搜索 当代艺术展厅的 展陈空间尺度标准、灯光照明系统要求、墙面地面材料规范、观展动线组织方式
      description: |
        调研1楼艺术展厅的专业空间设计标准,理解展陈空间的层高、墙面、照明、
        温湿度控制等技术要求,以及如何在禅意极简风格下实现专业展陈功能。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 展陈空间尺度标准(层高≥3.6m、展墙间距、观看距离)
        - 灯光照明系统要求(轨道灯、色温3000-4000K、显色性Ra≥90、防眩光)
        - 墙面地面材料规范(白墙/灰墙选择、地面反光控制、吸声处理)
        - 观展动线组织方式(单向/自由/引导式、节奏控制、视觉焦点)
      priority: high
      execution_order: 4

    # 5. 高端办公空间禅意设计研究
    - id: task_5
      title: 搜索 极简风格高端办公空间的 工作效率空间布局、会议接待空间层级、声学隔音处理、自然光办公环境营造
      description: |
        调研2楼办公空间在禅意极简风格下的设计策略,理解如何在克制美学中保障办公效率,
        会议与接待空间如何分级设置,声学隔音如何处理楼上住宅与楼下展厅的干扰。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 工作效率空间布局(开放/半开放/独立办公区配比)
        - 会议接待空间层级(正式会议室、非正式洽谈区、茶室接待)
        - 声学隔音处理(楼板隔音、墙体隔声、设备降噪)
        - 自然光办公环境营造(采光面优化、眩光控制、人工补光)
      priority: medium
      execution_order: 5

    # 6. 露台会所与高尔夫练习场空间研究
    - id: task_6
      title: 搜索 屋顶露台会所的 高尔夫练习场空间配置、室内外过渡空间设计、景观视野控制、防风遮阳技术处理
      description: |
        调研4楼露台会所的空间设计要点,理解高尔夫练习场的净空高度、挥杆空间、
        安全防护要求,以及露台空间的室内外过渡、景观视野、气候防护等技术问题。
      task_type: research
      motivation: experiential
      support_search: true
      dimensions:
        - 高尔夫练习场空间配置(净空高度≥4m、挥杆半径、安全网、模拟器)
        - 室内外过渡空间设计(半室外灰空间、可开合屋顶、落地玻璃)
        - 景观视野控制(城市天际线、远山借景、视线框取)
        - 防风遮阳技术处理(可收放遮阳系统、防风玻璃栏板、绿化屏障)
      priority: medium
      execution_order: 6

    # ========== 第三阶段:空间设计方案(Task 7-12, design) ==========

    # 7. 四层垂直功能分区空间设计
    - id: task_7
      title: 设计 四层建筑的 垂直功能分区方案、各层空间比例关系、层间过渡空间序列、公共到私密渐进体系
      description: |
        基于前期研究,设计四层建筑的整体功能分区方案:1楼艺术展厅(最公共)→2楼办公室(半公共)→
        3楼家庭住宅(私密)→4楼露台会所(半私密社交),建立从公共到私密的垂直渐进体系,
        明确各层空间比例、层高处理与层间过渡空间序列。
      task_type: design
      motivation: functional
      support_search: false
      dimensions:
        - 垂直功能分区方案(L1展厅/L2办公/L3住宅/L4会所)
        - 各层空间比例关系(公共区vs辅助区、净高与功能匹配)
        - 层间过渡空间序列(楼梯间情绪转换、电梯厅身份切换)
        - 公共到私密渐进体系(开放度递减、材料温度递增、光线柔化)
      priority: high
      execution_order: 7

    # 8. 公私动线分离与交通核设计
    - id: task_8
      title: 设计 建筑内部的 公私双动线系统、独立交通核方案、访客与家庭入口分离、安防分级控制策略
      description: |
        设计公共访客动线(展厅→办公接待)与私密家庭动线(住宅→会所)的完全分离方案,
        规划独立交通核(公共电梯+私密电梯/楼梯),设置访客与家庭的独立入口,
        建立从门禁到楼层的安防分级控制体系。
      task_type: design
      motivation: functional
      support_search: false
      dimensions:
        - 公私双动线系统(公共垂直动线+私密垂直动线独立)
        - 独立交通核方案(公共电梯厅+私密电梯/楼梯位置)
        - 访客与家庭入口分离(主入口+侧入口+地下车库直达)
        - 安防分级控制策略(L1开放/L2门禁/L3私密/L4邀请制)
      priority: high
      execution_order: 8

    # 9. 1楼艺术展厅空间设计
    - id: task_9
      title: 设计 1楼艺术展厅的 展陈空间布局、灯光系统方案、入口前厅序列、禅意极简展示语言
      description: |
        设计1楼艺术展厅的完整空间方案,在禅意极简风格下实现专业展陈功能。
        规划入口前厅的仪式感序列、展陈空间的灵活分隔、灯光系统的专业配置,
        以及新旧对撞美学在展厅中的具体表达(如保留老墙面作为展示背景)。
      task_type: design
      motivation: aesthetic
      support_search: false
      dimensions:
        - 展陈空间布局(固定展墙+活动展墙、大空间+小空间节奏)
        - 灯光系统方案(自然光+轨道灯+洗墙灯分层控制)
        - 入口前厅序列(压缩→释放→聚焦的空间节奏)
        - 禅意极简展示语言(留白墙面、素材地面、隐藏收口)
      priority: high
      execution_order: 9

    # 10. 3楼家庭住宅空间设计
    - id: task_10
      title: 设计 3楼家庭住宅的 起居空间布局、卧室私密层级、家庭互动场景、禅意生活氛围营造
      description: |
        设计3楼家庭住宅的完整空间方案,在禅意极简风格下营造温暖的家庭生活氛围。
        规划起居室、餐厨、主卧、次卧等功能空间的布局关系,建立家庭互动与个体私密的
        空间平衡,通过材料温度变化(从公共层的冷峻到住宅层的温润)表达归家感。
      task_type: design
      motivation: experiential
      support_search: false
      dimensions:
        - 起居空间布局(客厅/餐厅/厨房开放关系、阳台连接)
        - 卧室私密层级(主卧套房/次卧/书房的隔离与连通)
        - 家庭互动场景(共餐、阅读、亲子、独处多场景适配)
        - 禅意生活氛围营造(木质温度、柔光处理、触感材料、植物引入)
      priority: high
      execution_order: 10

    # 11. 新旧对撞美学空间表达设计
    - id: task_11
      title: 设计 全楼的 新旧材料碰撞界面、历史痕迹保留清单、当代介入手法、时间对话空间节点
      description: |
        设计新旧对撞美学在四层空间中的具体表达方案,明确哪些历史痕迹需要保留
        (老砖墙、原始梁柱、旧地面等),哪些位置植入当代设计语言(清水混凝土、钢板、玻璃等),
        新旧材料的碰撞界面如何处理(齐切/渐变/叠加),在关键空间节点创造时间对话的戏剧性。
      task_type: design
      motivation: aesthetic
      support_search: false
      dimensions:
        - 新旧材料碰撞界面(老砖vs清水混凝土、旧木vs钢、历史墙面vs玻璃)
        - 历史痕迹保留清单(结构梁柱、原始墙面、旧楼梯、时间印记)
        - 当代介入手法(精确切割、轻触式植入、悬浮式新增)
        - 时间对话空间节点(入口新旧交界、楼梯间时间轴、展厅历史墙)
      priority: high
      execution_order: 11

    # 12. 材料克制体系设计
    - id: task_12
      title: 设计 全楼的 核心材料清单、材料分层策略、收口工艺标准、材料情绪递进关系
      description: |
        设计全楼统一的材料克制体系,控制核心材料在5种以内(如清水混凝土、老砖、黑钢、
        白橡木、手工灰泥),建立材料从公共层到私密层的情绪递进关系(冷峻→温润),
        制定收口工艺标准确保极简风格的精确度。
      task_type: design
      motivation: aesthetic
      support_search: false
      dimensions:
        - 核心材料清单(≤5种主材+辅材控制、每种材料的空间角色)
        - 材料分层策略(L1冷峻/L2理性/L3温润/L4开放的材料温度梯度)
        - 收口工艺标准(阴角处理、材料交接、缝隙控制≤2mm)
        - 材料情绪递进关系(公共冷感→办公中性→住宅暖感→会所自然感)
      priority: high
      execution_order: 12

    # ========== 第四阶段:策略整合(Task 13-14, strategy) ==========

    # 13. 结构改造与设备整合策略
    - id: task_13
      title: 制定 老建筑的 结构改造可行性方案、楼板开洞策略、设备管线隐藏路径、结构加固与美学平衡策略
      description: |
        制定老建筑结构改造的整体策略,评估楼板开洞(中庭/天井/光井)的结构可行性,
        规划设备管线(暖通/电气/给排水)的隐藏路径,在结构加固需求与禅意极简美学之间
        找到平衡(如钢结构加固外露作为设计元素)。
      task_type: strategy
      motivation: technical
      support_search: false
      dimensions:
        - 结构改造可行性方案(承重墙识别、可拆除隔墙、加固方式)
        - 楼板开洞策略(中庭采光、垂直视线连通、结构补强)
        - 设备管线隐藏路径(吊顶整合、墙体暗藏、地面走管)
        - 结构加固与美学平衡(钢结构外露、碳纤维隐藏加固、新旧结构对话)
      priority: high
      execution_order: 13

    # 14. 事业与家庭精神融合路径策略
    - id: task_14
      title: 制定 空间叙事的 事业精神空间化表达、家庭精神空间化表达、两者融合的空间节点、业主人格的空间投射策略
      description: |
        制定事业与家庭精神在空间中融合表达的整体策略。事业精神通过1楼展厅的公共性、
        2楼办公的专业性表达;家庭精神通过3楼住宅的温暖、4楼会所的闲适表达。
        在关键空间节点(如2-3楼过渡层)实现两者的交融,将业主的人格特质投射为空间语言。
      task_type: strategy
      motivation: symbolic
      support_search: false
      dimensions:
        - 事业精神空间化表达(展厅的开放与力量、办公的秩序与效率)
        - 家庭精神空间化表达(住宅的温暖与包容、会所的闲适与自在)
        - 两者融合的空间节点(过渡层、楼梯间、共享庭院)
        - 业主人格的空间投射(纯粹=材料克制、禅意=留白、对撞=新旧并置)
      priority: high
      execution_order: 14

    # ========== 第五阶段:评估分析(Task 15-16, analysis) ==========

    # 15. 四层功能冲突与协调分析
    - id: task_15
      title: 分析 四层功能之间的 噪声干扰风险、人流交叉冲突、私密性泄露隐患、功能时段错峰可能性
