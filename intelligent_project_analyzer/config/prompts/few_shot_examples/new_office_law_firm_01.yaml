# 示例:律师事务所新办公室设计
# 来源:q.txt Q64
# 类型:功能+社会主导 (Functional + Social Dominant)
# 特征:品牌形象转型、空间透明度控制、会议空间层级、协作机制、品牌识别系统
# 适用场景:专业服务机构办公空间、品牌形象重塑、开放协作办公、会议空间体系

example:
  project_info:
    name: 律师事务所新办公室品牌转型空间设计
    description: |
      为一家律师事务所设计新办公室，核心诉求是打破传统律所严肃刻板印象，
      传递开放、协作、高效的全新品牌形象。设计策略需涵盖空间透明度控制（隐私与开放的平衡）、
      会议空间层级划分（从非正式交流到高保密会议的完整谱系）、品牌识别系统（空间中的品牌表达）、
      以及员工协作机制（促进跨部门协作的空间策略）。
      核心挑战在于法律行业对保密性和专业性的刚性需求与开放协作形象之间的张力平衡。

    feature_vector:
      functional: 0.70      # 会议层级空间+声学隐私+办公效率空间
      social: 0.65          # 协作机制空间+跨部门交流+团队互动空间
      commercial: 0.60      # 品牌形象转型+客户体验+市场竞争力
      aesthetic: 0.55       # 品牌识别系统+视觉语言+空间氛围
      experiential: 0.50    # 员工体验空间+访客感知+空间叙事
      technical: 0.45       # 智能会议系统+声学技术+透明度控制技术
      symbolic: 0.40        # 法律权威与亲和力平衡+品牌象征
      material_innovation: 0.35  # 调光玻璃+声学材料+品牌材质
      sustainable: 0.30     # 绿色办公+节能照明
      cultural: 0.25        # 法律文化传承+行业价值观
      regional: 0.15        # 本地法律市场特征
      historical: 0.10      # 事务所历史传承

    constraints:
      - 法律行业保密性刚性需求（律师-客户特权保护）
      - 传统律所形象转型（打破严肃刻板印象）
      - 多层级会议空间需求（从非正式到高保密）
      - 声学隐私与视觉开放的矛盾平衡
      - 品牌识别系统需兼顾专业权威与亲和开放

    goals:
      - 构建开放协作与保密隐私并存的空间体系
      - 建立从非正式交流到高保密会议的完整空间层级
      - 打造传递开放高效形象的品牌识别系统
      - 设计促进跨部门协作的空间机制
      - 实现专业权威感与亲和力的品牌平衡

  # ========== 理想拆解结果 ==========
  # 功能+社会主导项目: 15个任务
  # 任务分布: research 35% (5个) + design 40% (6个) + strategy 15% (2个) + analysis 10% (2个)

  ideal_tasks:
    # ========== 第一阶段:标杆研究与行业洞察 (Task 1-5) ==========

    # 1. 国际创新律所办公空间案例研究
    - id: task_1
      title: 搜索 国际创新律师事务所的 办公空间设计策略、开放协作空间模式、品牌形象空间表达、传统转型空间案例
      description: |
        深度调研国际知名律所办公空间转型案例（如Clifford Chance伦敦总部、Allen & Overy新办公室、
        金杜律师事务所等），提取打破传统律所刻板印象的空间设计策略，理解开放协作与专业权威的平衡逻辑。
      task_type: research
      motivation: commercial
      support_search: true
      dimensions:
        - 办公空间设计策略（开放式vs半开放式vs封闭式空间配比、灵活办公空间模式）
        - 开放协作空间模式（共享工位空间、协作岛空间、非正式交流空间节点）
        - 品牌形象空间表达（空间叙事空间、材质语言空间、色彩体系空间、光环境空间）
        - 传统转型空间案例（从封闭独立办公室到开放协作空间的转型路径与阻力化解）
      priority: high
      execution_order: 1

    # 2. 透明度控制技术与隐私平衡研究
    - id: task_2
      title: 搜索 办公空间透明度控制的 调光玻璃技术、视觉隐私空间策略、声学隔离空间方案、分级透明空间体系
      description: |
        研究办公空间中透明度控制的技术手段与设计策略，理解调光玻璃、智能百叶、
        磨砂膜等技术在法律办公环境中的应用，建立视觉开放与保密隐私的分级控制空间体系。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 调光玻璃技术（PDLC调光玻璃空间、SPD调光玻璃空间、电致变色玻璃空间、响应速度与透明度范围）
        - 视觉隐私空间策略（渐变磨砂空间、百叶角度控制空间、帘幕系统空间、视线高度遮挡空间）
        - 声学隔离空间方案（双层玻璃隔墙空间、声学密封条空间、白噪音掩蔽空间、隔音等级空间标准）
        - 分级透明空间体系（全透明区空间→半透明区空间→私密区空间→高保密区空间梯度设计）
      priority: high
      execution_order: 2

    # 3. 会议空间层级体系标杆研究
    - id: task_3
      title: 搜索 专业服务机构会议空间的 层级划分标准、声学隐私空间等级、智能预约空间系统、空间利用率空间优化
      description: |
        调研国际专业服务机构（律所、咨询公司、会计师事务所）的会议空间层级体系，
        理解从非正式站立交流到高保密董事会议的完整空间谱系设计逻辑与声学隐私分级标准。
      task_type: research
      motivation: functional
      support_search: true
      dimensions:
        - 层级划分标准（L1非正式交流空间→L2小组讨论空间→L3正式会议空间→L4客户会议空间→L5高保密会议空间）
        - 声学隐私空间等级（STC35开放交流空间→STC45标准会议空间→STC55保密会议空间→STC65高保密空间）
        - 智能预约空间系统（会议室预约空间、使用率监测空间、自动释放空间、容量匹配空间）
        - 空间利用率空间优化（会议室使用率数据空间、高峰时段空间调配、多功能空间转换）
      priority: high
      execution_order: 3

    # 4. 律所品牌识别系统空间化研究
    - id: task_4
      title: 搜索 专业服务品牌的 空间识别系统、品牌触点空间设计、材质品牌语言、色彩品牌空间体系
      description: |
        研究专业服务机构品牌识别系统在空间中的表达方式，理解如何通过材质、色彩、
        灯光、标识等空间元素传递品牌价值观，实现从"严肃权威"到"开放专业"的品牌感知转型。
      task_type: research
      motivation: commercial
      support_search: true
      dimensions:
        - 空间识别系统（品牌入口空间体验、导视系统空间、品牌墙空间、文化展示空间）
        - 品牌触点空间设计（前台接待空间、等候区空间、走廊空间、电梯厅空间的品牌表达）
        - 材质品牌语言（木材温暖感空间、金属精致感空间、石材稳重感空间、织物亲和感空间）
        - 色彩品牌空间体系（主色调空间应用、辅助色空间点缀、中性色空间基底、色彩心理空间效应）
      priority: high
      execution_order: 4

    # 5. 员工协作行为模式与空间需求分析
    - id: task_5
      title: 分析 律师事务所员工的 协作行为模式、跨部门交流空间需求、工作流空间特征、空间使用偏好
      description: |
        分析律所不同角色（合伙人、资深律师、初级律师、行政人员）的工作模式与协作需求，
        理解案件协作、知识共享、导师辅导等场景的空间需求特征，为协作空间设计提供行为依据。
      task_type: analysis
      motivation: social
      support_search: false
      dimensions:
        - 协作行为模式（案件团队协作空间、跨部门知识共享空间、导师辅导空间、即兴讨论空间）
        - 跨部门交流空间需求（诉讼+公司+知产等部门交叉空间、共享资源空间、联合办案空间）
        - 工作流空间特征（独立研究空间→团队讨论空间→客户会议空间→文件归档空间的流转路径）
        - 空间使用偏好（合伙人独立办公空间、资深律师半开放空间、初级律师开放协作空间、行政集中空间）
      priority: high
      execution_order: 5

    # ========== 第二阶段:核心空间系统设计 (Task 6-11) ==========

    # 6. 透明度分级控制空间设计
    - id: task_6
      title: 设计 律所办公空间的 透明度分级空间体系、视觉开放空间梯度、隐私保护空间机制、动态调节空间策略
      description: |
        基于透明度控制研究成果，设计从完全开放到高度保密的四级透明度空间体系，
        明确各功能区的透明度等级、控制技术选型、切换场景与操作逻辑，实现开放形象与保密需求的空间平衡。
      task_type: design
      motivation: functional
      support_search: false
      dimensions:
        - 透明度分级空间体系（T1全透明开放区空间、T2半透明协作区空间、T3低透明办公区空间、T4不透明保密区空间）
        - 视觉开放空间梯度（公共区全玻璃空间→协作区半高隔断空间→办公区磨砂玻璃空间→保密区实墙空间）
        - 隐私保护空间机制（调光玻璃一键切换空间、智能百叶联动空间、帘幕自动控制空间）
        - 动态调节空间策略（日常开放模式空间、客户来访模式空间、保密会议模式空间、下班节能模式空间）
      priority: high
      execution_order: 6

    # 7. 会议空间五级层级设计
    - id: task_7
      title: 设计 律所会议空间的 五级层级空间体系、声学隐私空间配置、家具空间配置、技术设备空间整合
      description: |
        设计从L1非正式站立交流到L5高保密会议的五级会议空间层级体系，
        明确每级空间的面积标准、声学隔音等级、家具配置、技术设备与品牌表达差异。
      task_type: design
      motivation: functional
      support_search: false
      dimensions:
        - 五级层级空间体系（L1咖啡吧台交流空间→L2电话亭/2-4人讨论空间→L3 6-8人标准会议空间→L4 12人客户会议空间→L5高保密会议空间）
        - 声学隐私空间配置（L1开放空间STC25→L2半封闭空间STC35→L3封闭空间STC45→L4双层玻璃空间STC55→L5实墙空间STC65）
        - 家具空间配置（L1高脚凳空间→L2软座空间→L3标准会议桌空间→L4高端会议桌空间→L5定制会议桌空间）
        - 技术设备空间整合（L1无设备空间→L2显示屏空间→L3投影+视频空间→L4全套AV空间→L5加密通讯空间）
        - 空间数量配比（L1:L2:L3:L4:L5 = 多:多:中:少:极少的空间分布逻辑）
      priority: high
      execution_order: 7

    # 8. 品牌识别系统空间落地设计
    - id: task_8
      title: 设计 律所品牌识别的 空间导视系统、品牌触点空间序列、材质色彩空间规范、品牌叙事空间节点
      description: |
        将品牌"开放、协作、高效"的核心价值观转化为空间设计语言，设计从建筑入口到办公深处的
        品牌体验空间序列，建立材质、色彩、灯光、标识的统一品牌空间规范。
      task_type: design
      motivation: commercial
      support_search: false
      dimensions:
        - 空间导视系统（楼层指引空间、功能区标识空间、会议室命名空间、无障碍导视空间）
        - 品牌触点空间序列（电梯厅品牌首印空间→前台品牌核心空间→走廊品牌延伸空间→办公区品牌渗透空间）
        - 材质色彩空间规范（品牌主色空间应用比例、辅助色空间搭配、材质空间等级对应、表面处理空间标准）
        - 品牌叙事空间节点（事务所历程展示空间、核心价值观空间、团队文化空间、客户荣誉空间）
      priority: high
      execution_order: 8

    # 9. 协作促进空间机制设计
    - id: task_9
      title: 设计 律所跨部门协作的 偶遇空间节点、共享资源空间、团队协作空间岛、知识交流空间场景
      description: |
        设计促进律师跨部门协作的空间机制，通过动线交叉节点、共享功能空间、
        非正式交流空间等策略，增加偶遇概率与知识溢出，打破部门壁垒。
      task_type: design
      motivation: social
      support_search: false
      dimensions:
        - 偶遇空间节点（咖啡区空间、打印区空间、茶水间空间、楼梯交汇空间的战略性布置）
        - 共享资源空间（法律图书馆空间、资料查阅空间、共享工具空间、打印复印空间的集中化布局）
        - 团队协作空间岛（项目作战室空间、临时组队空间、白板讨论空间、可移动家具空间）
        - 知识交流空间场景（午餐学习空间、案例分享空间、导师角落空间、新人融入空间）
      priority: high
      execution_order: 9

    # 10. 声学隐私空间系统设计
    - id: task_10
      title: 设计 律所办公空间的 声学分区空间策略、隔音构造空间详图、白噪音空间系统、声学材料空间选型
      description: |
        针对法律行业对声学隐私的刚性需求，设计全面的声学隐私空间系统，
        确保开放协作区的活力氛围不干扰专注工作区与保密会议区的声学环境。
      task_type: design
      motivation: functional
      support_search: false
      dimensions:
        - 声学分区空间策略（活力区空间→缓冲区空间→安静区空间→保密区空间的声学梯度）
        - 隔音构造空间详图（双层石膏板隔墙空间、浮筑地面空间、吸音天花空间、密封节点空间）
        - 白噪音空间系统（开放区白噪音掩蔽空间、走廊声音缓冲空间、分区独立控制空间）
        - 声学材料空间选型（吸音板空间、声学织物空间、穿孔金属板空间、声学木饰面空间）
      priority: high
      execution_order: 10

    # 11. 客户体验空间动线设计
    - id: task_11
      title: 设计 律所客户到访的 接待空间序列、等候体验空间、会议引导空间动线、品牌感知空间节奏
      description: |
        设计客户从进入律所到离开的完整空间体验动线，通过接待区、等候区、
        走廊、会议室的空间序列传递专业可信赖且开放亲和的品牌形象。
      task_type: design
      motivation: commercial
      support_search: false
      dimensions:
        - 接待空间序列（电梯厅品牌预热空间→前台专业接待空间→引导过渡空间→目的地到达空间）
        - 等候体验空间（舒适座椅空间、阅读材料空间、饮品服务空间、自然光引入空间、隐私保护空间）
        - 会议引导空间动线（避开开放办公区空间、保密动线空间分离、VIP专属通道空间）
        - 品牌感知空间节奏（入口庄重空间→过渡温暖空间→等候舒适空间→会议专业空间的情绪曲线）
      priority: medium
      execution_order: 11

    # ========== 第三阶段:策略整合与评估 (Task 12-15) ==========

    # 12. 空间使用效率与灵活性评估
    - id: task_12
      title: 分析 律所办公空间的 工位利用率空间模型、会议室使用空间效率、灵活办公空间适配度、空间冗余空间控制
      description: |
        基于律师工作模式（出庭、外勤、远程办公比例），分析空间使用效率，
        评估灵活办公策略的适用性，优化工位与会议室的配比与共享机制。
      task_type: analysis
      motivation: functional
      support_search: false
      dimensions:
        - 工位利用率空间模型（律师在岗率空间分析、共享工位空间比例、固定工位空间保留策略）
        - 会议室使用空间效率（各层级会议室空间使用率预测、高峰时段空间调配、闲置空间转化）
        - 灵活办公空间适配度（合伙人固定空间+资深律师灵活空间+初级律师共享空间的混合模式）
        - 空间冗余空间控制（未来扩展空间预留、多功能空间转换、临时空间增容方案）
      priority: medium
      execution_order: 12

    # 13. 品牌形象转型空间实施策略
    - id: task_13
      title: 制定 律所品牌转型的 空间变革管理策略、员工适应空间引导、分阶段空间实施计划、效果评估空间机制
      description: |
        制定从传统封闭律所到开放协作办公的空间变革管理策略，
        包括员工沟通计划、试点区域选择、分阶段实施路径与效果评估反馈机制。
      task_type: strategy
      motivation: commercial
      support_search: false
      dimensions:
        - 空间变革管理策略（合伙人共识空间建设、员工参与空间设计、抵触情绪空间化解）
        - 员工适应空间引导（新空间使用培训空间、行为规范空间制定、过渡期空间支持）
        - 分阶段空间实施计划（试点楼层空间→全面推广空间→持续优化空间的三阶段路径）
        - 效果评估空间机制（员工满意度空间调查、协作频率空间监测、客户反馈空间收集、空间使用数据空间分析）
      priority: medium
      execution_order: 13

    # 14. 员工协作与文化营造空间策略
    - id: task_14
      title: 制定 律所协作文化的 空间运营策略、活动空间规划、社交空间激活、团队建设空间机制
      description: |
        制定通过空间运营促进协作文化的策略，规划知识分享、团队建设、
