      - special_needs_child  # 自闭症儿童
      - full_time_caregiver  # 全职照护者
      - tech_worker          # 程序员
      - elderly_short_stay   # 长辈短住
    challenge_type:
      - special_needs_adaptation  # 特殊需求适配
