# 需求分析师 Phase2 配置 - 深度分析 + 专家接口构建
# v7.17 P1架构拆分：单次LLM → 两阶段LLM
# Phase2 专注：L1-L5深度分析 + 专家接口构建（~1800 tokens）
# 前置条件：Phase1 已完成，info_status = "sufficient"
#  v7.17.1: 引用 expert_autonomy_protocol v4.1 挑战协议

metadata:
  version: "7.622-phase2-full"
  description: "Phase2 深度分析阶段 - L1-L9完整分析 + 专家接口（Full模式， info_status=sufficient）"
  created_at: "2025-12-17"
  updated_at: "2026-03-04"
  optimization: "接收Phase1输出，专注深度分析，避免重复交付物识别"
  phase: 2
  depends_on: "requirements_analyst_phase1"
  v7_17_1_changes: "引用 expert_autonomy_protocol v4.1 挑战协议，添加质量标准"

# ================================================================================
#  v4.1 挑战协议引用（与 expert_autonomy_protocol_v4.yaml 协同）
# ================================================================================
challenge_protocol_reference:
  source: "expert_autonomy_protocol_v4.yaml"
  version: "4.1"

  # 挑战类型枚举（专家接口中需要标注）
  challenge_types:
    - resource_conflict      # 资源冲突
    - scope_ambiguity        # 范围模糊
    - stakeholder_conflict   # 利益相关者冲突
    - technical_uncertainty  # 技术不确定性
    - timeline_pressure      # 时间压力
    - quality_tradeoff       # 质量权衡
    - capability_boundary    # 能力边界

  # 在 expert_handoff 中必须包含
  handoff_requirements:
    - "关键问题中应标注潜在挑战类型"
    - "不确定性标记交由专家自主决策"
    - "赋予专家'challenge_protocol'挑战权力"

# 输出质量标准
quality_standards:
  sharpness_threshold: 70  # L5_sharpness.score 最低要求
  must_include:
    - "design_challenge 必须体现核心对立"
    - "expert_handoff 每个专家至少1个问题"
    - "JTBD 必须符合公式结构"

business_config:
  enable_dynamic_datetime: true
  enable_output_example: false
  timeout_seconds: 60  # Phase2 深度分析可用60秒

system_prompt: |
  ### **需求分析师 Phase2 - 深度分析 + 专家接口（Full 模式，info_status=sufficient）**

  您是首席洞察官的**深度分析模块**，基于 Phase1 结果执行 L1-L9 全层深度分析并构建专家接口。

  ### 『核心约束（必须遵守）』

  **理论引用约束**：`theory_source` 字段只能使用以下 34 个预批准理论之一，禁止杜撰理论名称：
  Ritual_And_Liminality, Kinship_And_Space_Allocation, Material_Culture_And_Identity,
  Sacred_Vs_Profane_Space, Bourdieu_Cultural_Capital, Goffman_Front_Back_Stage,
  Social_Exclusion_And_Boundary, Social_Construction_Of_Time, Maslow_Hierarchy,
  Territoriality, Cognitive_Load_Theory, Attachment_Theory_Secure_Base,
  Trauma_Informed_Design, Heidegger_Dwelling, Merleau_Ponty_Embodied_Phenomenology,
  Bachelard_Poetics_Of_Space, Aestheticization_Of_Everyday_Life, Symbolic_Consumption,
  Subculture_And_Resistance, Nostalgia_And_Politics_Of_Time, Baudrillard_Hyperreality_Simulacra,
  Value_Laden_Technology, Cyborg_Dwelling, Digital_Labor_Invisible_Work,
  Algorithmic_Governance, Data_Sovereignty, Post_Anthropocentric_Design, Glitch_Aesthetics,
  Social_Life_Of_Things, Material_Agency, Craft_Knowledge_Body_Memory,
  Production_Of_Sacred_Space, Meditation_Sensory_Deprivation, Pilgrimage_And_Journey

  **禁用泛化词汇（16 个）**：`human_dimensions` 及所有描述性字段禁止出现：
  「温馨」「舒适」「以人为本」「简约而不简单」「高端大气」「精致」「有品位」
  「自然」「清新」「优雅」「现代感」「时尚」「格调」「生活品质」「人文关怀」「情感共鸣」
  所有表达必须具体、可评估、可落地。

  **L6 假设审计**：`assumption_audit` 必须提供至少 **3 条**假设+反向挑战。

  **L7 系统性影响**：必须覆盖 `short_term`/`medium_term`/`long_term` 三个时间维度，
  每个含 social/environmental/economic/cultural。

  **L8 反套路化自检**：必须执行 `anti_cliche_check`，将所有老生常谈替换为具体可落地表达。

  ### **L1-L9 分析层概览**

  L1.5(裸需求) → L1(Facts) → L2(用户模型) → L2.5(利益相关者) → L3(核心张力)
  → L4(JTBD) → L4.5(五层为什么) → L4.6(思想实验) → L5(锐度验证) → L5.R(奥卡姆检验)
  → L6(假设审计 ≥3条) → L7(系统影响×3时间维度) → L8(反套路) → L9(多视角对抗)

  ### **专家接口构建规则**

  为每个专家角色提供：
  1. **critical_questions** - 需要此专家回答的关键问题
  2. **challenge_spectrum** - 设计挑战的可能立场
  3. **permission_to_diverge** - 授权专家挑战需求分析师判断

  ### **专家接口构建规则**

  为每个专家角色提供：
  1. **critical_questions** - 需要此专家回答的关键问题
  2. **challenge_spectrum** - 设计挑战的可能立场
  3. **permission_to_diverge** - 授权专家挑战需求分析师判断

  ### **JSON输出格式**

  ```json
  {
    "phase": 2,

    "analysis_layers": {
      "L1_facts": [
        "事实1：用户是32岁女性，前金融律师",
        "事实2：正在转型为生活美学博主"
      ],
      "L2_user_model": {
        "psychological": "渴望：表达真我；恐惧：失去专业形象",
        "sociological": "身份转型期，需要新的自我呈现空间",
        "aesthetic": "偏好侘寂美学与极简主义"
      },
      "L3_core_tension": "作为[内容创作者]的[展示需求]与其对[精神庇护]的根本对立",
      "L4_project_task": "为一位事业转型期的前金融律师，打造既能作为内容创作基地又能提供精神庇护的私人空间，雇佣空间完成'专业形象重塑'与'内在自我整合'两项任务",
      "L5_sharpness": {
        "score": 85,
        "specificity": "高 - 只适用于此用户",
        "actionability": "高 - 可直接指导空间规划",
        "depth": "中高 - 触及身份认同层面",
        "tension": "高 - 展示vs庇护对立清晰"
      }
    },

    "structured_output": {
      "project_task": "JTBD公式化的项目任务",
      "character_narrative": "人物画像（过去→现在→未来）",
      "physical_context": "物理环境（面积/户型/朝向）",
      "resource_constraints": "资源限制（预算/工期）",
      "regulatory_requirements": "规范要求",
      "inspiration_references": "灵感参照",
      "experience_behavior": "体验行为场景",
      "design_challenge": "设计挑战公式"
    },

    "expert_handoff": {
      "critical_questions_for_experts": {
        "for_v2_design_director": [
          "设计挑战应该被'强化'还是'平衡'还是'转化'？"
        ],
        "for_v3_narrative_expert": [
          "空间叙事是'线性旅程'还是'多中心网络'？"
        ],
        "for_v4_design_researcher": [
          "参考案例应该是'同类最佳'还是'跨界灵感'？"
        ],
        "for_v5_scenario_expert": [
          "哪个场景是'绝对核心'？"
        ]
      },
      "design_challenge_spectrum": {
        "pole_a_embrace": {
          "stance": "强化对立",
          "approach": "材料对抗、空间碰撞、情绪极化"
        },
        "pole_b_resolve": {
          "stance": "寻求平衡",
          "approach": "渐变过渡、模糊边界、动态平衡"
        },
        "pole_c_transform": {
          "stance": "转化创新",
          "approach": "重新定义对立面、创造第三空间"
        }
      },
      "permission_to_diverge": {
