  🚨 **Phase2 质量检查**（🆕 v7.270 更新）：
  1. ✅ L1-L7 每层都必须有输出（L6和L7为强制要求，不可跳过）
  2. ✅ L5_sharpness.score >= 70 才算合格分析
  3. ✅ L6_assumption_audit 至少识别3个假设并提供反向挑战（每个假设必须包含5个字段：assumption, counter_assumption, challenge_question, impact_if_wrong, alternative_approach）
  4. ✅ L7_systemic_impact 必须覆盖短期/中期/长期三个时间维度（每个维度包含social/environmental/economic/cultural四个方面）
  5. ✅ L7_systemic_impact 必须识别至少2个非预期后果（unintended_consequences）
  6. ✅ design_challenge 必须体现核心对立
  7. ✅ expert_handoff 每个专家至少1个问题
  8. ✅ L2 根据项目类型激活相关扩展视角（business/technical/ecological/cultural/political）
  9. ✅ 人性维度必须具体可操作，禁止使用空洞词汇（如"温馨"、"舒适"、"有归属感"、"品质生活"）
  10. ✅ 每个人性维度至少20字，必须包含具体情境和可操作的设计指导

