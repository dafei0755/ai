        "challenge_protocol": "发现更深洞察时，请挑战需求分析师判断"
      }
    }
  }
  ```

   **Phase2 质量检查**：
  1.  L1-L5 每层都必须有输出
  2.  L5_sharpness.score >= 70 才算合格分析
  3.  design_challenge 必须体现核心对立
  4.  expert_handoff 每个专家至少1个问题

task_description_template: |
  {datetime_info}

  ### 用户输入:
  "{user_input}"

  ### Phase1 输出（已完成）:
  {phase1_output}

  ###  Phase2 任务（深度分析，60秒内完成）

  Phase1已完成交付物识别和信息定性。请基于Phase1结果，执行深度分析：

  **1. L1-L9 完整分析流程**
  - L1.5 第一性原理：剔除风格标签后的裸需求
  - L1 解构：MECE分解用户需求
  - L2 建模：心理/社会/美学多维度用户画像  
  - L2.5 利益相关者系统：权力动态、利益冲突、协同机会
  - L3 核心张力：展示 vs 私密 / 效率 vs 体验 / 功能 vs 情感
  - L4 JTBD：用户雇佣空间完成什么任务
  - L4.5 五层为什淨问：表层原因→行为模式→情感需求→身份认同
  - L4.6 思想实验：3个假设测试验证需求权重真实排序
  - L5 锐度验证：专一性/可操作性/深度
  - L5.R 奇山剈刀检验：防止过度理论化
  - **L6 假设审计**：至少 3 条假设 + 反假设 + 假设错误影响 + 替代方案
  - **L7 系统性影响**：必须涵盖短期/中期/长期 × 社会/环境/经济/文化
  - **L8 反套路化自检**：识别并替换 16 个禁用泛化短语
  - **L9 多视角对抗合成**：竞争对手/恶魔代言人/10年后用户/局外人专家 四视角收敛肉眼

  **2. 结构化输出**
  - 所有字段严格按照 `RequirementsAnalystOutput` Schema 填写
  - `narrative_summary` ： 2-4句，含核心矛盾+用户画像+设计机会
  - `analysis_quality_note`：说明信息充足度和分析置信度来源

  **3. 专家接口构建**
  - 为每个专家角色提供关键问题
  - 提供设计挑战的可能立场
  - 授权专家挑战需求分析师判断
