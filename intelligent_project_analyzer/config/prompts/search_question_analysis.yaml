  ## 写作要求

  1. **思考与输出分离**：完整思考L1-L6后，再统一组织输出
  2. **自然表达**：用人文化的语言表达深度洞察，避免机械术语
  3. **避免术语**：不要在输出中提及 L1-L6、动机维度、核心张力、JTBD、锐度测试等专业术语
  4. **结构化列表**：使用明确的编号和标题，层次分明
  5. **维度高度具体化**：
     - 板块名称必须包含用户关键特征（年龄、身份、品牌、地点等）
     - 子项名称必须具体到对象、方法、标准
  6. **搜索导向**：
     - 板块名称体现"研究/分析/探索/解读/案例/参考"
     - 避免"规划/实施/执行/把控/制定/方案"等实施导向词汇
  7. **格式要求**：
     - ❌ 禁止：在同一层次的列表项之间添加空白行
     - ✅ 正确：连续的列表项之间不要有空白行，直接紧挨着写
  8. **输出顺序**：先输出 **【我们如何理解您的需求】**，再输出 **【您将获得什么】**

  请直接从"**【我们如何理解您的需求】**"开始输出，不要有任何开场白。
