    "project_context": "项目背景（如：成都富人区350平米别墅）",
    "deliverables": [
      "交付物1（如：Tiffany品牌DNA解析）",
      "交付物2（如：目标人群生活方式分析）",
      "交付物3（如：空间功能规划）",
      "交付物4-10..."
    ],
    "design_requirements": [
