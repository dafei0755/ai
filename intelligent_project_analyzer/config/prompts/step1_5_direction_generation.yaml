# ============================================================================
# Step 1.5: Search Direction Generation Prompt
# ============================================================================
# 核心功能：将 Step 1 的输出板块转化为具体的搜索方向
# 作为 Step 1 和 Step 2 之间的中间层
#
# Author: AI Assistant
# Created: 2026-02-05
# Version: 1.0
# ============================================================================

metadata:
  version: "1.0"
  description: "Step 1.5: 搜索方向生成 - 将板块转化为聚焦的搜索方向"
  created_at: "2026-02-05"
  flow_position: "step_1_5_of_4"

business_config:
  enable_dynamic_datetime: false
  timeout_seconds: 30

system_prompt: |
  你是一位资深的信息架构专家，擅长将复杂的主题分解为单一、聚焦的子主题。

  你的任务是将输出板块转化为具体的搜索方向，作为搜索查询生成的指导。

  ## 核心原则

  1. **单一焦点**：每个搜索方向只关注一个核心主题
  2. **可搜索性**：方向必须能通过搜索引擎找到相关信息
  3. **层次清晰**：方向应该比板块更具体，但比查询更抽象
  4. **用户特征**：方向应该包含用户关键特征

  ## 层次示例

  ```
  板块（宏观）: "Audrey Hepburn美学DNA解析与空间转化策略"
      ↓
  方向（中观）: "Audrey Hepburn经典作品的色彩与设计语言分析"
      ↓
  查询（具体）: "Audrey Hepburn在《罗马假日》中的服装色彩分析"
  ```

# 主题分解 Prompt
theme_decomposition_template: |
  ## 任务

  将以下板块分解为2-4个单一主题，每个主题必须：
  1. 只聚焦一个核心方向
  2. 可以通过搜索引擎找到相关信息
  3. 避免多个独立主题混杂

  ## 板块信息

  **板块名称**: {block_name}

  **子项列表**:
  {sub_items}

  **用户特征**: {user_characteristics}

  ## 用户动机（参考）

  {motivations}

  ## 分解原则

  1. **单一焦点**: 每个主题只关注一个核心方向
     - ✅ 好："Audrey Hepburn经典作品的色彩与设计语言分析"
     - ❌ 差："Audrey Hepburn美学分析与空间转化策略"（包含2个主题）

  2. **可搜索性**: 主题必须能通过搜索引擎找到信息
     - ✅ 好："北欧极简风格在亚热带气候下的材料选择"
     - ❌ 差："项目实施流程与时间节点把控"（需要定制，无法搜索）

  3. **层次清晰**: 主题应该比板块名称更具体，但比具体查询更抽象
     - 板块（宏观）: "Audrey Hepburn美学DNA解析与空间转化策略"
     - 主题（中观）: "Audrey Hepburn经典作品的美学分析"
     - 查询（具体）: "Audrey Hepburn在《罗马假日》中的服装色彩分析"

  ## 输出格式

  请输出JSON格式：

  ```json
  {{
    "themes": [
      {{
        "theme": "主题1的描述（15-30字）",
        "rationale": "为什么这是一个独立主题（20-50字）"
      }},
      {{
        "theme": "主题2的描述（15-30字）",
        "rationale": "为什么这是一个独立主题（20-50字）"
      }}
    ]
  }}
  ```

  请只输出JSON，不要有其他内容。

# 方向生成 Prompt
direction_generation_template: |
  ## 任务

  为以下主题生成一个具体的搜索方向，包括：
  1. 核心主题（精炼表达）
  2. 搜索范围（具体说明要搜索什么）
  3. 预期信息类型（案例、原则、数据等）
  4. 关键搜索维度（2-4个）
  5. 预期查询数量（1-3个）

  ## 主题信息

  **主题**: {theme}

  **所属板块**: {block_name}

  **用户特征**: {user_characteristics}

  ## 用户动机（参考）

  {motivations}

  **核心张力**: {tension}

  ## 生成原则

  1. **聚焦单一方向**: 搜索方向必须只关注一个核心主题
  2. **可搜索性**: 必须能通过搜索引擎找到相关信息
  3. **层次清晰**: 比板块更具体，比查询更抽象
  4. **包含用户特征**: 搜索范围应该包含用户关键特征

  ## 输出格式

  请输出JSON格式：

  ```json
  {{
    "core_theme": "核心主题（15-30字，包含用户特征）",
    "search_scope": "搜索范围说明（30-60字，具体说明要搜索什么类型的信息）",
    "expected_info_types": ["信息类型1", "信息类型2", "信息类型3"],
    "key_dimensions": ["搜索维度1", "搜索维度2", "搜索维度3"],
    "expected_query_count": 2
  }}
  ```

  **示例**：

  主题: "Audrey Hepburn经典作品的美学分析"

  输出:
  ```json
  {{
    "core_theme": "Audrey Hepburn经典电影作品的色彩与设计语言分析",
    "search_scope": "提取《罗马假日》《蒂芙尼的早餐》等经典电影中的服装色彩、珠宝设计的配色原则和设计元素",
    "expected_info_types": ["电影服装分析", "配色原则", "设计语言解读"],
    "key_dimensions": ["色彩体系", "材质搭配", "设计语言", "品牌美学"],
    "expected_query_count": 2
  }}
  ```

  请只输出JSON，不要有其他内容。

# Few-shot 示例
examples:
  - block_name: "Audrey Hepburn美学DNA解析与空间转化策略"
    sub_items: |
      - 1.1 经典电影服装分析: 从《罗马假日》提取配色原则
      - 1.2 珠宝设计语言: Tiffany合作系列分析
      - 1.3 空间转化策略: 美学元素在室内设计中的应用
    user_characteristics: "38岁, 独立女性, 200平米大平层, Audrey Hepburn"
    themes:
      - theme: "Audrey Hepburn经典作品的色彩与设计语言分析"
        rationale: "聚焦于电影和珠宝设计中的美学元素提取，是独立的研究方向"
      - theme: "经典美学元素在现代室内空间中的转化方法"
        rationale: "聚焦于如何将美学元素应用到空间设计，是独立的实践方向"

  - block_name: "38岁不婚女性的200平米大平层功能分区与动线设计"
    sub_items: |
      - 2.1 功能分区策略: 社交区vs私密区平衡
      - 2.2 动线设计: 日常生活流线优化
      - 2.3 空间灵活性: 多功能区域设计
    user_characteristics: "38岁, 不婚女性, 200平米, 大平层"
    themes:
      - theme: "38岁独立女性的现代住宅空间需求与功能分区研究"
        rationale: "聚焦于目标用户的空间需求分析和功能规划"
      - theme: "200平米大平层的动线设计与空间灵活性案例"
        rationale: "聚焦于具体户型的动线优化和多功能设计"

# 验证规则
validation_rules:
  theme_count:
    min: 2
    max: 4
    error_message: "主题数量必须在2-4个之间"

  theme_length:
    min: 10
    max: 50
    error_message: "主题描述长度必须在10-50字之间"

  single_focus:
    forbidden_patterns:
      - "与.*与"  # 多个"与"连接
      - "和.*和"  # 多个"和"连接
      - "及.*及"  # 多个"及"连接
    warning_message: "主题可能包含多个焦点，建议进一步拆分"

  searchability:
    forbidden_keywords:
      - "实施"
      - "执行"
      - "把控"
      - "管理流程"
      - "时间节点"
    warning_message: "主题可能不适合搜索，建议调整为研究/分析类表述"

# 成功标准
success_criteria:
  - "每个板块生成2-4个搜索方向"
  - "每个方向只聚焦一个核心主题"
  - "方向比板块更具体，比查询更抽象"
  - "方向包含用户关键特征"
  - "方向具有可搜索性"
  - "方向之间不重叠"
