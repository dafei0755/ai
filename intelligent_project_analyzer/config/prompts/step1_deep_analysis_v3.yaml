# ============================================================================
# Stage 3: Validation Rules (v4.0 — research_dimensions driven)
# ============================================================================

validation_rules:
  # --- v4.0: L2 动机（全面扫描，辅助理解，不驱动板块生成） ---
  l2_motivations:
    rule: "Motivation names must be from 12 standard dimensions, output all relevant (score>=3)"
    count_constraint: "flexible"  # 不限制数量，有多少相关就输出多少
    min_count: 1
    max_count: 12  # 全部12个维度都可能相关
    standard_dimensions:
      - "效率"
      - "控制"
      - "安全"
      - "归属"
      - "认同"
      - "愉悦"
      - "地位"
      - "影响"
      - "连接"
      - "意义"
      - "成长"
      - "超越"
    required_fields_per_motivation:
      - "name"
      - "type"
      - "score"
      - "scenario_expression"
    error_message: "动机名称'{name}'不在12个标准维度中。请使用：效率、控制、安全、归属、认同、愉悦、地位、影响、连接、意义、成长、超越"

  # --- v4.0: L2.5 研究维度（核心验证） ---
  research_dimensions:
    rule: "Research dimensions must be entity-anchored, MECE, and searchable"
    min_count: 5
    max_count: 10
    required_fields_per_dimension:
      - "dimension_name"
      - "why_searchable"
      - "example_queries"
      - "domain_knowledge_hints"
    entity_check:
      min_entities_per_dimension: 2  # 每个维度至少包含2个具体实体名词
      entity_types: ["品牌名", "人名", "地名", "材质名", "技术名", "文化符号名", "数字/规格"]
    mece_check:
      max_overlap_ratio: 0.3  # 任意两个维度的实体重叠不超过30%
    forbidden_patterns:
      - "创新设计理念"
      - "个人品味表达"
      - "综合考量"
      - "整体规划"
    error_message: "研究维度验证失败：{issue}"

  # --- v4.0: 人性维度（全面扫描，按需输出，不限数量） ---
  human_dimensions:
    rule: "Human dimensions: check all 5, output all relevant (thorough but not forced)"
    trigger_mode: "high_sensitivity"  # 保持高敏感模式
    available_dimensions:
      - "emotional_landscape"
      - "spiritual_aspirations"
      - "psychological_safety_needs"
      - "ritual_behaviors"
      - "memory_anchors"
    required_fields_when_enabled:
      - "enabled"
      - "trigger_reason"
    error_message: "人性维度已启用但缺少必填字段。请确保包含：trigger_reason 和至少1个维度内容"

  # --- v4.0: L4 JTBD（简化，移除 full_statement 长度要求） ---
  l4_jtbd:
    rule: "JTBD must follow template structure"
    required_fields:
      - "user_role"
      - "information_type"
      - "task_1"
      - "task_2"
    error_message: "L4 JTBD定义不完整。必须包含：user_role, information_type, task_1, task_2"

  # --- v4.0: L5 锐度测试（简化，仅保留分数+一句话理由） ---
  l5_sharpness:
    rule: "Internal quality control - 4 scores with brief reasons"
    purpose: "内部质量控制，不展示给用户"
    display_to_user: false
    required_scores:
      - "specificity_score"
      - "actionability_score"
      - "depth_score"
      - "searchability_score"
    score_range: [1, 10]
    quality_thresholds:
      retry_if_below: 5
      pass_if_above: 7
    required_fields:
      - "specificity_reason"
      - "actionability_reason"
      - "depth_reason"
      - "searchability_reason"
    error_message: "L5 锐度测试不完整。必须包含4个维度的score（1-10）和reason（一句话理由）"

  # --- v4.0: 搜索可行性检查（代码层强制执行） ---
  searchability_check:
    rule: "Research dimension names must be searchable, not implementation-oriented"
    forbidden_keywords:
      - "执行"
      - "流程"
      - "时间节点"
      - "施工管理"
      - "成本控制"
      - "把控"
      - "制定"
      - "实施"
      - "预算"
      - "如何"
    recommended_keywords:
      - "研究"
      - "分析"
      - "探索"
      - "解读"
      - "案例"
      - "参考"
      - "调研"
      - "解析"
      - "对比"
    error_message: "研究维度'{name}'包含实施类关键词'{keyword}'，请改为搜索导向的表述"

  # --- v4.0: 步骤数量（由研究维度直接映射，不再用公式） ---
  step_count:
    rule: "Step count equals research_dimensions count"
    min_count: 5
    max_count: 10
    source: "research_dimensions"  # 直接映射，不再用 L2*2+L3 公式
    error_message: "步骤数量不符合要求：当前{count}个，应为5-10个"

  # --- v4.0: 输出格式（新的"步骤 N"格式） ---
  output_format:
    rule: "Output must have 2 sections with new step format"
    required_sections:
      - "我们如何理解您的需求"
      - "深入研究计划"
    step_format: "步骤 N  研究XXX"  # 新格式
    forbidden_content:
      - "L1"
      - "L2"
      - "L3"
      - "L4"
      - "L5"
      - "动机维度"
      - "核心张力"
      - "JTBD"
      - "锐度测试"
      - "核心板块"
      - "子板块"
    error_message: "输出格式不符合要求。必须包含【我们如何理解您的需求】和【深入研究计划】，使用'步骤 N'格式，不能包含术语"

# ============================================================================
# Retry Error Messages (v4.0)
# ============================================================================

retry_error_messages:
  l2_invalid_motivation: |
    ⚠️ 验证失败：L2动机分析

    问题：发现了不在12个标准维度中的动机名称
    - 错误的动机：{invalid_motivations}

    请修正：
    - 只使用以下12个标准维度：
      功能型：效率、控制、安全
      情感型：归属、认同、愉悦
      社会型：地位、影响、连接
      精神型：意义、成长、超越
    - 最多选择2-3个最相关的动机

  research_dimensions_invalid: |
    ⚠️ 验证失败：L2.5 研究维度

    问题：{issue}

    请修正：
    - 每个维度必须包含≥2个具体实体名词（品牌名、人名、地名、材质名等）
    - 任意两个维度的实体重叠不超过30%
    - 禁止纯抽象维度（如"创新设计理念"、"个人品味表达"）
    - 每个维度必须包含 dimension_name, why_searchable, example_queries, domain_knowledge_hints

  l4_incomplete: |
    ⚠️ 验证失败：L4 JTBD定义

    问题：JTBD定义不完整
    - 缺失字段：{missing_fields}

    请修正：
    - 必须包含：user_role, information_type, task_1, task_2

  l5_incomplete: |
    ⚠️ 验证失败：L5 锐度测试

    问题：锐度测试不完整
    - 缺失字段：{missing_fields}

    请修正：
    - 必须包含4个维度的评分：
      * specificity_score (1-10) + specificity_reason
      * actionability_score (1-10) + actionability_reason
      * depth_score (1-10) + depth_reason
      * searchability_score (1-10) + searchability_reason

  dimension_overlap: |
    ⚠️ 验证失败：研究维度重叠

    问题：以下研究维度之间存在过高重叠
    {overlapping_pairs}

    请修正：
    - 合并重叠维度，或重新拆分使每个维度聚焦单一主题
    - 确保任意两个维度的实体重叠不超过30%

  dimension_too_abstract: |
    ⚠️ 验证失败：研究维度过于抽象

    问题：以下研究维度缺少具体实体名词
    {abstract_dimensions}

    请修正：
    - 每个维度必须包含≥2个具体实体名词
    - 示例：不要写"品牌设计理念"，而要写"Tiffany品牌历史、品牌DNA、标志性蓝色色彩体系、珠宝盒设计理念、经典设计元素(窗格纹、钻石切割、蝴蝶结)"

  format_violation: |
    ⚠️ 验证失败：输出格式不符合要求

    问题：{issue}

    请修正：
    - 输出2个部分：【我们如何理解您的需求】→【深入研究计划】
    - 【深入研究计划】使用"步骤 N  研究XXX"格式
    - 每个步骤必须用"研究/分析/解析"句式，禁止"如何XXX"
    - 完全避免术语：不要提及L1-L5、动机维度、核心张力、JTBD、锐度测试

# ============================================================================
# Success Criteria (v4.0)
# ============================================================================

success_criteria:
  stage1:
    - "L2动机：已逐一比对全部12个维度，输出所有score>=3的（不牵强，不遗漏）"
    - "每个L2动机都有scenario_expression"
    - "research_dimensions包含5-10个研究维度"
    - "每个研究维度包含≥2个具体实体名词"
    - "任意两个研究维度的实体重叠不超过30%"
    - "L4 JTBD包含user_role, information_type, task_1, task_2"
    - "L5包含4个维度的score和reason"
    - "人性维度：已逐一检查全部5个维度，输出所有相关的（不牵强，不遗漏）"
    - "输出是有效的JSON格式"

  stage2:
    - "输出包含【我们如何理解您的需求】和【深入研究计划】"
    - "【深入研究计划】使用'步骤 N'格式"
    - "步骤数量与research_dimensions数量一致"
    - "每个步骤用'研究/分析/解析'句式，无'如何XXX'"
    - "每个步骤包含具体领域知识（品牌元素名、文化符号名、材质名等）"
    - "步骤间无主题重叠"
    - "完全避免了术语（L1-L5、动机维度、锐度测试等）"

  overall:
    - "Stage 1和Stage 2的所有成功标准都满足"
    - "验证报告显示overall_status为'passed'"
    - "研究维度质量：实体锚定、MECE互斥、搜索导向"
