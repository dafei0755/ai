metadata:
  version: "4.0"
  description: "Step 1: 深度分析 v4.0 - 研究维度驱动，问题导向拆解"
  created_at: "2026-02-02"
  updated_at: "2026-02-08"
  flow_position: "step_1_of_4"
  changelog: |
    v4.0 (2026-02-08):
    - 核心重构：从"分析框架驱动"转向"问题驱动"
    - 新增 L2.5 研究维度拆解（research_dimensions）替代板块数量公式
    - L2动机建模：全面扫描模式，逐一比对12个标准维度，输出所有score>=3的动机（不牵强，不遗漏），不再驱动板块生成
    - L3-L5精简：移除硬性长度要求，减少LLM认知负荷
    - 人性维度：全面扫描模式，逐一检查5个维度，输出所有相关维度（不牵强，不遗漏）
    - 核心哲学：分析要全面彻底（不限制维度数量），但分析结果与板块生成解耦
    - 取消板块数量公式（L2×2+L3），改为研究维度直接映射
    - Stage 2输出格式从"板块+子项"改为"研究步骤"
    - 新增代码层验证门控（去重、具体性、搜索可行性）
    v3.1 (2026-02-04):
    - 移除L2动机2-5个数量限制，改为根据用户问题完全匹配
    - 人性维度改为高敏感动态触发
    - L5锐度测试明确为内部质量控制
    v3.0 (2026-02-02):
    - 完全重构 - 三阶段提示，Literal类型约束，自动重试机制

# ============================================================================
# 人性维度分析触发配置（高敏感模式）
# ============================================================================
# 触发策略：根据L3分析结果动态决定，只要涉及"人"的元素就触发
# - 情感型动机（归属、认同、愉悦）存在时自动触发
# - 社会型动机（地位、影响、连接）存在时自动触发
# - 精神型动机（意义、成长、超越）存在时自动触发
# - L3.hidden_insights 涉及人际关系、情感、身份等主题时触发
# - 用户问题涉及以下关键词时也触发（兜底规则）
human_dimension_config:
  trigger_mode: "high_sensitivity"  # 高敏感模式：只要有人的元素就触发

  # 自动触发的动机类型（L2中存在这些类型的动机即触发）
  auto_trigger_motivation_types:
    - "情感型"  # 归属、认同、愉悦
    - "社会型"  # 地位、影响、连接
    - "精神型"  # 意义、成长、超越

  # L3 hidden_insights 关键词触发（涉及这些主题即触发）
  insight_trigger_keywords:
    - "焦虑"
    - "认同"
    - "身份"
    - "关系"
    - "情感"
    - "归属"
    - "安全感"
    - "自我"
    - "价值"
    - "意义"
    - "家庭"
    - "社交"
    - "期待"
    - "压力"

  # 兜底关键词触发（用户问题包含这些词时触发）
  fallback_keywords:
    - "设计"
    - "装修"
    - "空间"
    - "生活"
    - "家"
    - "居住"
    - "体验"
    - "感受"
    - "氛围"
    - "风格"
    - "职业"
    - "转型"
    - "选择"
    - "困惑"
    - "规划"
    - "人生"
    - "成长"
    - "学习"

business_config:
  enable_dynamic_datetime: true
  timeout_seconds: 90
  max_retries: 2
  enable_json_mode: true

# ============================================================================
# Stage 1: Internal Analysis Prompt (Hidden from User)
# ============================================================================

stage1_system_prompt: |
  你是一位资深的需求分析专家，擅长使用L1-L5框架进行深度分析。

  你的任务是对用户输入进行完整的L1-L5分析，输出结构化的JSON数据。

  ⚠️ 这是内部分析阶段，输出不会直接展示给用户。请严格按照要求输出纯JSON格式。

stage1_user_prompt_template: |
  {datetime_info}

  ## 用户问题
  "{user_input}"

  ## 你的任务 - Stage 1: 内部深度分析

  请对上述用户问题进行完整的L1-L5分析，输出结构化JSON。

  ### L1 问题解构

  分析以下5个维度：
  - **用户身份**：用户是谁？（身份、角色、背景）
  - **显性需求**：用户明确表达的需求是什么？
  - **隐性动机**：用户未明说但暗含的动机是什么？
  - **关键约束**：有哪些限制？（时间、资源、能力等）
  - **分析视角**：选择一个独特的分析视角来深入挖掘需求（如"功利视角"、"体验视角"、"竞争视角"、"文化传承视角"、"价值创造视角"等）。这个视角应该能揭示用户未明说的深层需求。

  ### L2 动机建模（全面扫描，辅助理解，不驱动板块生成）

  逐一比对以下12个标准维度，输出所有与用户问题相关的动机（score>=3）。
  不要人为限制数量——有多少相关就输出多少，但也不要牵强附会。
  这些动机仅用于理解用户需求的完整画像，不用于计算板块数量。

  12个标准维度（必须全部检查一遍）：
  功能型：效率、控制、安全
  情感型：归属、认同、愉悦
  社会型：地位、影响、连接
  精神型：意义、成长、超越

  每个动机包含：
  - name: 12个标准维度之一
  - type: 功能型/情感型/社会型/精神型
  - score: 1-5分（只输出 score>=3 的动机，不牵强凑数）
  - scenario_expression: 将动机转化为具体场景描述

  ### L2.5 研究维度拆解（核心输出，直接决定板块结构）

  ⚠️ **这是最重要的分析环节**。直接从用户问题出发，识别 5-8 个相互独立、可直接搜索的研究维度。

  **核心原则**：
  - **问题驱动**：从用户问题本身拆解，不从动机框架推导
  - **实体锚定**：每个维度必须包含具体实体名词（品牌名、人名、地名、材质名、技术名、文化符号名等）
  - **知识差距**：每个维度的研究结果必须是用户自己想不到或查不到的
  - **MECE互斥**：任意两个维度的研究对象不超过30%重叠
  - **搜索导向**：每个维度必须能直接转化为搜索查询

  **维度数量**（根据问题复杂度）：
  - 简单问题（单一主题）：5-6个
  - 中等问题（多要素组合）：6-8个
  - 复杂问题（多品牌/多维度/多约束）：8-10个

  **禁止的维度类型**：
  - ❌ 纯抽象维度："创新设计理念"、"个人品味表达"、"情感与仪式感"
  - ❌ 实施导向维度："施工流程管理"、"预算控制方案"
  - ❌ 万能套话维度：换一个用户问题也能用的维度

  **领域知识注入**：你必须调用自身知识储备，在 domain_knowledge_hints 中列出该领域的具体知识点。
  例如：提到 Tiffany 时列出"窗格纹、钻石切割面、蝴蝶结、珠宝盒、Tiffany蓝(#81D8D0)、Setting风格"；
  提到成都时列出"川蜀文化、茶文化、竹编、蜀绣、川派盆景"。

  每个研究维度包含：
  - dimension_name: 研究主题的完整描述（30-100字，必须包含>=2个具体实体名词）
  - why_searchable: 为什么这个维度值得深入研究（一句话）
  - example_queries: 2-3个可直接用于搜索引擎的查询语句
  - domain_knowledge_hints: 该领域的具体知识点列表（LLM已知的专业细节）

  ### L3 核心张力识别

  识别用户需求中的核心矛盾或融合关系（自由文本描述）：

  输出：
  - primary_motivation: 主导动机
  - secondary_motivation: 次要动机
  - tension_description: 核心张力描述（自由文本，说明矛盾或融合关系）
  - resolution_strategy: 如何平衡/解决这个张力
  - hidden_insights: 隐性需求洞察列表（用户未明说但暗含的深层需求）

  ### L4 JTBD定义

  输出：
  - user_role: 用户身份
  - information_type: 信息类型
  - task_1: 主任务
  - task_2: 次任务
  - full_statement: 完整陈述

  ### L5 锐度测试（精简版，内部质量控制）

  对以下4个维度打分（1-10）并简要说明：
  - specificity_score: 1-10, specificity_reason: 一句话理由
  - actionability_score: 1-10, actionability_reason: 一句话理由
  - depth_score: 1-10, depth_reason: 一句话理由
  - searchability_score: 1-10, searchability_reason: 一句话理由
  - overall_quality: 优秀/良好/合格/不合格

  ### 人性维度分析（全面扫描，按需输出）

  逐一检查以下5个人性维度，输出所有与用户问题相关的维度。
  不要人为限制数量——有多少相关就输出多少，但不相关的不要牵强。
  如果用户问题完全不涉及情感/精神层面，enabled 设为 false 即可。

  5个维度（必须全部检查一遍）：
  - emotional_landscape: 情绪地图（用户的情感状态和期望）
  - spiritual_aspirations: 精神追求（用户的精神层面需求）
  - psychological_safety_needs: 心理安全需求（用户的安全感来源）
  - ritual_behaviors: 仪式行为（用户的日常仪式和习惯）
  - memory_anchors: 记忆锚点（用户的重要记忆和情感连接）

  输出字段：
  - enabled: true/false
  - trigger_reason: 触发原因（一句话）
  - emotional_landscape: （如相关）
  - spiritual_aspirations: （如相关）
  - psychological_safety_needs: （如相关）
  - ritual_behaviors: （如相关）
  - memory_anchors: （如相关）

  ## 输出格式（纯JSON，不要markdown代码块）

  ```json
  {{
    "l1_deconstruction": {{
      "user_identity": "...",
      "explicit_needs": "...",
      "implicit_motivations": "...",
