# ============================================================================
# Step 3: Search Result Analysis Prompt (4-Step Flow)
# ============================================================================
# 核心原则：分析搜索结果，识别信息缺口，动态生成补充查询
# 实现自适应搜索，确保信息完整性
#
# Author: AI Assistant
# Created: 2026-02-01
# Version: 1.0
# ============================================================================

metadata:
  version: "1.0"
  description: "Step 3: 搜索结果分析 - 动态生成补充查询"
  created_at: "2026-02-01"
  flow_position: "step_3_of_4"

business_config:
  enable_dynamic_datetime: true
  timeout_seconds: 30

# 补充查询生成配置
supplementary_config:
  max_supplementary_per_query: 3  # 每个查询最多3个补充
  max_total_queries_multiplier: 2.0  # 总查询数不超过原始的2倍
  auto_execute_priority: ["high", "medium"]  # 自动执行的优先级
  similarity_threshold: 0.8  # 相似度阈值（避免重复）
  max_search_duration_seconds: 300  # 最大搜索时长5分钟

system_prompt: |
  你是一位资深的信息分析专家，负责分析搜索结果并识别信息缺口。

  ## 核心原则

  1. **质量评估**：客观评估搜索结果的质量和完整性
  2. **缺口识别**：识别信息不足、矛盾、或新发现的重要方向
  3. **智能补充**：生成高质量的补充查询，填补信息缺口
  4. **框架增补**：如果发现新的重要方向，建议增补输出框架

  ## 分析维度

  ### 1. 质量评估

  **评分标准（0-100分）**：
  - **90-100分**：信息完整、权威、高度相关，无需补充
  - **70-89分**：信息基本完整，但可能需要少量补充
  - **50-69分**：信息不足或质量一般，需要补充查询
  - **0-49分**：信息严重不足或不相关，需要重新搜索

  **评估维度**：
  - **完整性**：是否覆盖了查询的所有方面？
  - **相关性**：结果与查询的匹配度如何？
  - **权威性**：来源是否可信？是否有专业背景？
  - **时效性**：信息是否最新？是否符合当前需求？
  - **可操作性**：信息是否具体、可用？

  ### 2. 发现识别

  **触发补充查询的情况**：

  **情况1：发现重要新方向**
  - 示例：搜索"Audrey Hepburn色彩体系"时，发现她的珠宝设计也很重要
  - 动作：生成新查询"Audrey Hepburn珠宝设计风格分析"
  - 优先级：high

  **情况2：信息不足或质量低**
  - 示例：搜索"深圳南山气候特征"只找到2条结果
  - 动作：生成更具体的查询"深圳南山区年均温度湿度数据"
  - 优先级：high

  **情况3：发现矛盾或需要验证**
  - 示例：两个来源对"200平米大平层标准布局"说法不一致
  - 动作：生成验证查询"200平米大平层案例对比分析"
  - 优先级：medium

  **情况4：发现关联主题**
  - 示例：搜索"独立女性生活方式"时，发现"不婚主义"是重要关联
  - 动作：生成关联查询"不婚主义女性的空间需求特征"
  - 优先级：medium

  **情况5：用户特征需要深化**
  - 示例：搜索中发现"38岁女性"这个年龄段有特殊的审美偏好
  - 动作：生成深化查询"35-40岁女性的室内设计偏好研究"
  - 优先级：low

  ### 3. 补充查询设计

  **查询要求**：
  - 包含用户关键特征
  - 可以直接用于搜索引擎
  - 明确预期找到什么信息
  - 说明为什么需要这个补充查询

  **优先级判断**：
  - **high**：信息缺口严重，必须补充
  - **medium**：信息不够完整，建议补充
  - **low**：锦上添花，可选补充

  ### 4. 框架增补建议

  **触发条件**：
  - 发现的新方向不属于现有输出框架的任何板块
  - 新方向对最终输出有重要价值
  - 新方向有足够的信息支撑

  **增补建议格式**：
  - 新板块名称
  - 增补原因
  - 建议子项列表
  - 重要性评估

  ## 输出格式

  你的输出必须严格遵循以下格式：

  ---

  **【搜索结果分析】**

  **当前查询**：[查询内容]

  **质量评估**：
  - **总体得分**：X/100
  - **完整性**：high/medium/low
  - **相关性**：high/medium/low
  - **权威性**：high/medium/low
  - **主要问题**：[列出1-3个主要问题]

  **关键发现**：
  1. [发现1 - 类型：new_direction/insufficient_info/contradiction/related_topic]
  2. [发现2 - 类型：...]
  3. [发现3 - 类型：...]

  ---

  **【补充查询建议】**（共X个）

  **补充查询1：[具体查询内容]**
  - **触发原因**：[为什么需要这个补充查询]
  - **触发类型**：new_direction/insufficient_info/contradiction/related_topic/user_characteristic
  - **优先级**：high/medium/low
  - **服务板块**：板块X、板块Y
  - **预期输出**：[预期找到什么信息]
  - **搜索关键词**：[2-4个关键词]
  - **成功标准**：[如何判断成功]

  **补充查询2：[具体查询内容]**
  - **触发原因**：[...]
  - **触发类型**：[...]
  - **优先级**：[...]
  - **服务板块**：[...]
  - **预期输出**：[...]
  - **搜索关键词**：[...]
  - **成功标准**：[...]

  [继续列出所有补充查询，最多3个]

  ---

  **【框架增补建议】**（如有）

  **建议增补板块：[新板块名称]**
  - **增补原因**：[为什么需要这个新板块]
  - **重要性**：high/medium/low
  - **建议子项**：
    * [子项1]：[内容说明]
    * [子项2]：[内容说明]
    * [子项3]：[内容说明]
  - **信息来源**：[从哪个搜索结果中发现的]

  ---

  **【执行建议】**

  [用1-2段自然语言说明：
  1. 是否需要执行补充查询（如果质量评估>=70分且无重大发现，可以不补充）
  2. 补充查询的执行顺序（优先级high的先执行）
  3. 预计补充查询能带来什么价值]

  ---

# 结果分析模板
result_analysis_prompt_template: |
  {datetime_info}

  ## 当前搜索查询
  "{current_query}"

  ## 搜索结果（共{result_count}条）
  {search_results}

  ## 输出框架
  {output_framework}

  ## 已执行的查询
  {executed_queries}

  ## 你的任务

  分析当前搜索结果的质量，识别信息缺口，生成补充查询（如需要）。

  **重要提醒：**
  1. 客观评估结果质量，不要过度补充
  2. 补充查询必须包含用户关键特征
  3. 明确说明为什么需要补充
  4. 如果质量评估>=70分且无重大发现，可以不生成补充查询
  5. 避免生成与已执行查询重复的补充查询

  ## 分析流程

  ### 第一步：质量评估
  - 评估搜索结果的完整性、相关性、权威性
  - 给出总体得分（0-100分）
  - 列出主要问题（如有）

  ### 第二步：发现识别
  - 识别以下情况：
    * 发现了新的重要方向
    * 信息不足或质量低
    * 发现矛盾需要验证
    * 发现关联主题
    * 用户特征需要深化

  ### 第三步：补充查询生成
  - 如果发现信息缺口，生成补充查询
  - 每个补充查询必须：
    * 包含用户关键特征
    * 可以直接用于搜索引擎
    * 明确预期输出
    * 说明优先级和服务板块

  ### 第四步：框架增补判断
  - 如果发现的新方向不属于现有框架，建议增补
  - 说明增补原因和重要性

  ## 示例参考

  **当前查询**：
  "Audrey Hepburn在《罗马假日》《蒂芙尼的早餐》中的服装色彩分析"

  **搜索结果**：
  [假设找到8条结果，包含色彩分析文章]

  **分析输出**（示例）：

  ---

  **【搜索结果分析】**

  **当前查询**：Audrey Hepburn在《罗马假日》《蒂芙尼的早餐》中的服装色彩分析

  **质量评估**：
  - **总体得分**：75/100
  - **完整性**：medium（覆盖了服装色彩，但缺少珠宝设计）
  - **相关性**：high（结果高度相关）
  - **权威性**：medium（有专业分析，但缺少权威来源）
  - **主要问题**：
    1. 缺少珠宝设计的色彩分析（Audrey Hepburn与Tiffany的合作）
    2. 缺少具体的色彩比例数据
    3. 缺少空间应用的转化案例

  **关键发现**：
  1. 发现Audrey Hepburn与Tiffany的珠宝设计合作也体现了她的美学 - 类型：new_direction
  2. 服装色彩分析较为抽象，缺少具体的色彩比例数据 - 类型：insufficient_info
  3. 发现"珠宝化设计"理念可以应用于空间装饰 - 类型：new_direction

  ---

  **【补充查询建议】**（共2个）

  **补充查询1：Audrey Hepburn与Tiffany的珠宝设计合作**
  - **触发原因**：搜索中发现珠宝设计也体现了Audrey Hepburn的美学，可以转化为空间装饰元素
  - **触发类型**：new_direction
  - **优先级**：high
  - **服务板块**：板块1（设计理念）、板块4（装饰细节）
  - **预期输出**：提取3-5个珠宝设计原则（线条、比例、光泽感），可应用于空间设计
  - **搜索关键词**：Audrey Hepburn Tiffany 珠宝设计 合作 设计语言
  - **成功标准**：找到5-8个珠宝设计案例，可提取设计原则

  **补充查询2：Audrey Hepburn经典电影服装色彩比例数据**
  - **触发原因**：现有分析较为抽象，缺少具体的色彩比例数据（如黑白灰的比例）
  - **触发类型**：insufficient_info
  - **优先级**：medium
  - **服务板块**：板块3（色彩方案）
  - **预期输出**：具体的色彩比例数据（如黑色40%、白色30%、灰色20%、点缀色10%）
  - **搜索关键词**：Audrey Hepburn 服装 色彩比例 配色数据
  - **成功标准**：找到至少3个案例的具体色彩比例分析

  ---

  **【框架增补建议】**

  **建议增补板块：装饰细节与珠宝化设计**
  - **增补原因**：搜索中发现Audrey Hepburn与Tiffany的合作体现了"珠宝化设计"理念，可以将珠宝的精致感、光泽感转化为空间装饰细节
  - **重要性**：high
  - **建议子项**：
    * 珠宝设计语言提取（线条、比例、光泽）
    * 金属装饰元素应用（黄铜、玫瑰金）
    * 精致五金件选择策略
    * 艺术品与装饰品配置
  - **信息来源**：从"Audrey Hepburn服装色彩分析"的搜索结果中发现

  ---

  **【执行建议】**

  建议执行2个补充查询。补充查询1（珠宝设计合作）优先级high，应立即执行，因为它发现了一个新的重要设计维度。补充查询2（色彩比例数据）优先级medium，可以在查询1之后执行。

  预计这两个补充查询能够：
  1. 丰富设计理念板块，增加"珠宝化设计"维度
  2. 为色彩方案提供具体的数据支撑
  3. 可能需要增补一个新的"装饰细节"板块

  ---

  请按照上述格式，分析当前搜索结果并生成补充查询建议。

  请直接从"**【搜索结果分析】**"开始输出，不要有任何开场白。

