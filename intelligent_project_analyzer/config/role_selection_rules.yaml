# ============================================================================
# 角色选择规则配置 v8.0 (Role Selection Rules)
# ============================================================================
# 版本: v8.0 (从 role_selection_strategy.yaml v7.4 重构而来)
# 创建日期: 2026-02-16
#
# 本文件是 DPD (Dynamic Project Director) 的选角规则手册。
# 只包含选角策略和规则，不包含角色元数据（已移至 role_gene_pool.yaml）。
#
# 职责边界：
# - 本文件：定义"如何选择角色"的规则和策略
# - role_gene_pool.yaml：定义"有哪些角色可选"的元数据目录
# - roles/*.yaml：定义"角色的完整配置"（system_prompt、deliverables等）
#
# 🔧 v8.0 重构变更:
# - 删除 role_gene_pool 部分（移至独立文件）
# - 保留所有选角规则和策略
# - 文件大小从 2000+ 行压缩到 500 行
# ============================================================================

version: "8.0"

# ============================================================================
# 默认策略
# ============================================================================
default_strategy:
  name: "goal_oriented_adaptive_collaboration_v7.2"
  description: "以最终输出结构为导向，自适应选择协同模式，并强制生成和应用动态角色名称。"
  min_roles: 2
  max_roles: 10

# ============================================================================
# 自定义策略 (Custom Strategies)
# ============================================================================
custom_strategies:
  goal_oriented_adaptive_collaboration_v7.2:
    name: "goal_oriented_adaptive_collaboration_v7.2"
    description: "以最终输出结构为导向，自适应选择协同模式，并强制生成和应用动态角色名称。"
    min_roles: 2
    max_roles: 10
    selection_rules:
      required_categories: []
      priority_weights:
        V2_设计总监: 1.0
        V3_人物及叙事专家: 0.8
        V4_设计研究员: 0.9
        V5_场景与用户生态专家: 0.85
        V6_专业总工程师: 1.0
        V7_社会关系与心理洞察专家: 0.75
        V8_政策与治理顾问: 0.7
        V9_产业链分析师: 0.75

# ============================================================================
# 自适应协同策略引擎 (Adaptive Collaboration Strategy Engine)
# ============================================================================
adaptive_strategy_engine:
  description: "这是一个决策树，指导AI如何根据问题选择最合理的协同模式。"

  decision_logic:
    - "第一步：深度分析需求，识别所有核心关键词和任务领域。"
    - "第二步：评估协同模式优先级。严格按照以下顺序进行判断："
    - "  优先级1 - 判断是否适用【单一专家深潜】模式：如果需求高度聚焦，关键词与基因库中某一个子角色的匹配度极高（>0.9），则选择此模式。"
    - "  优先级2 - 判断是否适用【多专家并行】模式：如果无法满足优先级1，且需求关键词明确指向同一战略角色下的多个不同子角色，则选择此模式。这是解决复杂问题的首选方案。"
    - "  优先级3 - 判断是否适用【动态角色合成】模式：如果以上两种模式均不适用，且需求具有高度的跨界性和新颖性，则启动此最终模式，合成新角色。"

  justification_principle: "在'decision_explanation'中，必须首先声明选择了哪种协同模式，并详细阐述理由。然后，在介绍每个角色时，必须使用你在`selected_roles`中为`dynamic_role_name`字段定义的那个精准名称。"

  # 同层去重规则 (Same-Layer Deduplication Rules)
  same_layer_deduplication:
    description: "同一V战略层下的子角色选择约束，避免能力重叠导致的冗余输出。适用于所有V层级。"
    applies_to: ["V2", "V3", "V4", "V5", "V6", "V7", "V8", "V9"]

    rules:
      - rule_id: "DEDUP-1"
        name: "同层单选原则"
        description: "同一V层级下(如V2-1/V2-2、V3-1/V3-2/V3-3、V5-1/V5-2等)，默认最多选择1个子角色。"
        exception: "如果需求明确需要该层级内的不同能力组合，且任务目的不同，可选择2个子角色，但需在decision_explanation中明确论证各自的独立任务边界。"

      - rule_id: "DEDUP-2"
        name: "同层多选合理性判断"
        description: "同一V层级下选择多个子角色时，必须满足以下条件之一："
        valid_conditions:
          - "任务目的明确不同：如V2-1负责'住宅空间设计'，V2-2负责'商业空间设计'"
          - "交付物类型不同：如V4-1产出'用户研究报告'，V4-2产出'材料趋势分析'"
          - "专题探讨需要：需要从不同专业视角对同一主题进行深度碰撞"
          - "业态确实不同：如V5-1处理'居住场景'，V5-2处理'商业场景'（仅当项目确实涉及多业态）"
        invalid_patterns:
          - "任务描述高度相似或重叠（如两个V6角色都被分配'成本估算'任务）"
          - "缺乏明确的任务边界划分"
          - "单一业态项目却激活多个场景专家（如纯住宅项目同时激活V5-1和V5-2）"

      - rule_id: "DEDUP-3"
        name: "交付物驱动优选"
        description: "当存在多个候选子角色时，优先选择与primary_deliverables的deliverable_owner_suggestion匹配度最高的那个。"

      - rule_id: "DEDUP-4"
        name: "各层级典型场景指引"
        layer_guidance:
          V2: "V2-1(住宅)与V2-2(商业)通常互斥，除非项目是住商混合体"
          V3: "V3-2(文化IP)与V3-3(品牌命名)可共存，但需明确各自交付物边界"
          V4: "V4-1(用户研究)与V4-2(趋势分析)可共存，服务于不同研究维度"
          V5: "V5-1(居住)与V5-2(商业)与V5-3(办公)按实际业态选择，单业态项目只选1个"
          V6: "V6-1到V6-6可按需组合，但每个工程专业最多1个"
          V7: "V7-1(家庭层面)与V7-2(组织层面)按分析尺度选择，家庭/个人层面选7-1，组织/社区层面选7-2"

# ============================================================================
# 输出结构强制声明 (Output Structure Mandate)
# ============================================================================
output_structure_mandate:
  description: "这是最终输出的黄金规则。你必须严格按照此结构生成`selected_roles`数组中的每一个对象。"

  role_object_structure:
    - "role_id: (String) 必须是来自基因库的原始ID，如 '2-1'。"
    - "role_name: (String) 必须是来自基因库的原始名称，如 '居住空间设计总监'。"
    - "dynamic_role_name: (String) **[核心必填项]** 你必须为这个角色创造一个能精准反映其在本次具体任务中核心职责的、全新的动态名称。例如：'山地别墅内外总设计师'、'多代家庭生活方式策略师'。"
    - "tasks: (Array of Strings) 必须是为这个动态角色量身定制的具体任务列表。"
    - "focus_areas: (Array of Strings) 必须是这个动态角色的核心关注点。"
    - "expected_output: (String) 必须是这个动态角色的预期交付物。"
    - "dependencies: (Array of Strings) 必须是这个动态角色的启动依赖。"

# ============================================================================
# 动态角色合成协议 (Dynamic Role Synthesis Protocol)
# ============================================================================
dynamic_role_synthesis_protocol:
  description: "当且仅当【动态角色合成】模式被激活时,必须遵循此协议来创造一个全新的角色。"

  activation_condition: "只有当adaptive_strategy_engine判定需启动优先级3模式时,才能使用此协议。禁止在其他情况下合成角色。"

  synthesis_steps:
    - "第一步：确定父角色。选择2个(最多不超过3个)最相关的现有角色作为'父角色'。优先选择不同战略层(V2-V7)的角色进行跨界融合。"
    - "第二步：创造新ID和名称。新role_id应为父角色的组合,如'2-1+5-1'。新role_name应体现其混合特性,如'生活方式驱动的居住设计专家'。dynamic_role_name应更加具体地反映本次任务,如'三代同堂居住空间与生活模式总设计师'。"
    - "第三步：融合关键词。从role_gene_pool.yaml读取所有父角色的'keywords'进行合并和去重,保留最能体现跨界融合特性的关键词。"
    - "第四步：构建新System Prompt。从roles/*.yaml读取父角色的system_prompt,以主导父角色为框架,将其'核心专业领域(你的工具箱)'部分与其他父角色的内容进行融合,创造出新的能力组合。必须保留标准结构(身份与任务/团队协作接口/核心专业领域/本次任务核心/工作方法/输出格式)。"
    - "第五步：定义新输出结构。在新的system_prompt中,综合父角色的输出字段,定义一个新的、更有针对性的输出JSON结构。必须保留'custom_analysis'和'confidence'字段。"

  synthesis_constraints:
    - "约束1：父角色必须来自不同的战略层(V2-V7),以保证跨界融合的价值。例如V2+V5, V3+V4+V6。禁止选择同一层的多个角色(如V2-1+V2-2)。"
    - "约束2：合成角色的tasks必须是深度融合的,而非简单的任务堆叠。例如,不能是'先做V2的事,再做V5的事',而应是'以V5的运营逻辑驱动V2的设计决策'。"
    - "约束3：合成角色的dependencies应尽量减少,因为它已经融合了多个角色的能力。如果必须有依赖,应仅依赖于未被合成的其他战略层角色。"

  synthesis_example: |
    **示例场景**: 用户需求"为一个三代同堂的150㎡房子设计,需要解决代际关系和日常生活流线问题"

    **合成决策**: 核心意图同时涉及居住空间设计(V2-1)和居住场景运营(V5-1),且高度跨界,启动合成模式。

    **合成结果**:
    - role_id: "2-1+5-1"
    - role_name: "生活方式驱动的居住设计专家"
    - dynamic_role_name: "三代同堂居住空间与生活模式总设计师"
    - keywords: 从role_gene_pool.yaml读取V2-1和V5-1的keywords并合并
    - tasks: ["以家庭成员的日常生活剧本为驱动,进行空间功能分区和动线设计", "平衡不同代际对隐私、交流和独立性的不同需求", "提供融合运营逻辑和设计美学的总体方案"]
    - dependencies: ["V4-1(如有家庭关系研究需求)"]

# ============================================================================
# 协同流程模型 (Collaboration Flow Model)
# ============================================================================
collaboration_flow_model:
  description: "定义一个灵活的两层依赖模型，以确保无死锁。"

  layers:
    - layer: "Upstream"
      name: "上游：策略与洞察层"
      roles: ["V3", "V4", "V5"]
      dependency_rule: "上游角色之间可以相互依赖，或不依赖。但绝不允许依赖下游角色。"

    - layer: "Downstream"
      name: "下游：设计与实现层"
      roles: ["V2", "V6"]
      dependency_rule: "下游角色必须依赖至少一个上游角色的输入。下游角色之间可以相互依赖。"

# ============================================================================
# 角色选择辅助规则
# ============================================================================
role_selection_helpers:
  # 特殊场景触发规则
  special_scenarios:
    high_complexity:
      description: "高复杂度项目的选角策略"
      triggers: ["面积>5000㎡", "跨专业(建筑+室内+景观)", "复合功能(展览+住宿+商业)", "复杂家庭结构"]
      experts_count: "6-8"
      must_include: ["V6"]
      strategy: "多个V3/V5角色协同"

    cultural_depth:
      description: "文化深度项目的选角策略"
      triggers: ["文化IP(赫本/东坡/HAY)", "生活哲学转译", "文化传承(渔村/书法/园林)"]
      core_expert: "V3-2"  # 文化符号转译专家
      auxiliary: "V4-2"  # 设计趋势研究专家
      v4_task: "研究文化原型的当代转译案例"

    special_population:
      description: "特殊人群项目的选角策略"
      triggers: [
        "儿童/老人/特殊需求(自闭症)",
        "单身/独立女性画像",
        "多代际家庭权力结构",
        "心理压力/焦虑/孤独",
        "情感需求明确",
        "文化认同",
        "身份象征",
        "精神归属",
        "文化传承情感",
        "归属感需求",
        "情感寄托",
        "文人情怀"
      ]
      core_expert: "V7-1"  # 家庭关系与情感空间专家
      auxiliary: "V3-1"  # 个体心理专家
      must_task: "社会关系建模 + 情绪地图构建 + 心理安全需求分析 + 仪式行为洞察"
      rationale: "社会关系与心理洞察专家专注于环境心理学、社会关系建模和依恋理论，更适合深度洞察空间对人情感和社会关系的影响"

    owner_portrait:
      description: "业主画像分析（所有项目必做）"
      triggers: ["所有项目必做"]
      required_analysis: ["年龄/性别/职业/收入", "原生家庭/成长经历/价值观", "审美偏好/生活方式"]
      core_expert: "V3-1"  # 个体心理与生活方式专家

    technical_integration:
      description: "技术整合项目的选角策略"
      triggers: ["智能化系统", "极端环境", "技术创新", "系统集成", "被动式设计"]
      must_include: ["V6-2", "V6-6"]  # 机电工程师 + 可持续工程师
      auxiliary: "V4-2"  # 技术趋势研究

  # 复杂度评分规则（用于判断需要多少专家）
  complexity_scoring:
    dimensions:
      - name: "空间规模"
        weight: 1.0
        scores:
          "极小(<50㎡)/命名任务": 1
          "小型(50-200㎡)": 2
          "中型(200-500㎡)": 3
          "大型(>500㎡)/多空间": 4

      - name: "用户复杂度"
        weight: 1.0
        scores:
          "单一用户/标准需求": 1
          "家庭/小团队": 2
          "多代同堂/特殊群体": 3
          "多方利益相关者": 4

      - name: "技术难度"
        weight: 1.0
        scores:
          "常规设计": 1
          "有特殊要求(声学/照明等)": 2
          "多系统集成(智能家居等)": 3
          "极端条件(极限预算/极端环境)": 4

      - name: "风格融合度"
        weight: 0.5
        scores:
          "单一明确风格": 1
          "风格细化需求": 2
          "双风格融合": 3
          "多风格冲突融合": 4

    thresholds:
      simple:
        max_score: 5
        experts: "1-3"
        description: "命名类、推荐类、单一明确任务"
      medium:
        min_score: 6
        max_score: 9
        experts: "3-5"
        description: "单一空间、标准功能、特定风格"
      complex:
        min_score: 10
        experts: "5-8"
        description: "多空间、特殊群体、技术集成、风格融合"

  # 快速通道模式（简单任务）
  fast_track_mode:
    description: "简单任务的快速选角模式"
    activation_condition: "complexity_score <= 5"
    strategy: "选择1-2个核心专家，跳过复杂的协同流程"
    typical_combinations:
      - scenario: "命名类任务"
        experts: ["V3-3"]  # 品牌命名专家
      - scenario: "风格推荐"
        experts: ["V2-1", "V4-2"]  # 设计总监 + 趋势研究
      - scenario: "单一空间设计"
        experts: ["V2-1", "V3-1"]  # 设计总监 + 心理专家

# ============================================================================
# 配置文件引用关系
# ============================================================================
config_references:
  role_metadata: "role_gene_pool.yaml"  # 角色元数据目录
  role_definitions: "roles/*.yaml"  # 角色完整定义
  task_library: "MODE_TASK_LIBRARY.yaml"  # 任务库
  evaluation_matrix: "13_Evaluation_Matrix"  # 评估标准
  dpd_prompt: "dynamic_project_director_v2.yaml"  # DPD 提示词

