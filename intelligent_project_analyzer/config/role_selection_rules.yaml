version_history:
  v8.0:
    date: "2026-02-16"
    changes:
      - "重构：删除 role_gene_pool 部分，移至独立文件"
      - "重命名：role_selection_strategy.yaml → role_selection_rules.yaml"
      - "简化：文件大小从 2000+ 行压缩到 500 行"
      - "优化：明确配置文件职责边界"
  v7.4:
    date: "2025-12-17"
    changes:
      - "新增：同层去重规则"
      - "对齐：与 v7.19 专家工厂 ROLE_LLM_PARAMS 对齐"
