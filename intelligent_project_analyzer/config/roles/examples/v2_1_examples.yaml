# Few-Shot Examples for V2-1 Design Director (Residential Space Design)
# 居住空间设计总监高质量输出示例
#
# 质量标准: 精品级 (5000-8000字符/示例)
# 示例数量: 3个
# 优先级: P1 (中频使用)

examples:
  - example_id: "v2_1_targeted_daylighting_001"
    description: "针对性问答 - 暗厅采光优化方案"
    category: "targeted_mode"
    user_request: "我家客厅是暗厅,没有直接采光窗户,整天都很暗,如何通过设计改善采光?"
    context:
      project_type: "城市公寓改造"
      complexity: "medium"
      space_type: "客厅采光优化"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "暗厅采光优化设计",
        "confidence": 0.88,
        "decision_rationale": "用户聚焦于单一痛点(暗厅采光),采用Targeted模式深度分析采光路径。基于'光的传递'和'材质的转化'两大原则,提供从空间改造到材质选择的系统性采光优化方案。权衡自然光导入、人工补光、空间通透性三者关系。",
        "targeted_analysis": {
          "daylighting_diagnosis": {
            "current_conditions": "典型暗厅场景:客厅位于户型中部,东西两侧分别是卧室和厨房,南侧阳台光线无法直达客厅,北侧是入户玄关。全天依赖人工照明,即使白天也需开灯,空间压抑且耗电。",
            "problem_areas": [
              "客厅主活动区:照度不足100lux(国标推荐300lux以上)",
              "电视墙区域:背光严重,屏幕反光",
              "沙发阅读区:侧光不足,无法舒适阅读",
              "餐厅区(如客餐厅一体):用餐时光线昏暗,影响食欲"
            ],
            "sunlight_analysis": {
              "primary_light_source": "南侧阳台(距客厅8-10米,需穿透卧室或书房)",
              "secondary_light_source": "北侧玄关(入户门透光,但光线微弱且不稳定)",
              "blocking_factors": [
                "卧室/书房墙体完全遮挡南向光线",
                "厨房墙体阻隔西侧光线(如厨房有窗)",
                "走廊狭窄,光线传导损耗大"
              ],
              "sunlight_hours": "即使南侧房间光照充足,客厅全年0小时直接日照"
            }
          },
          "optimization_strategies": [
            {
              "strategy_name": "空间打通+玻璃隔断(光线传导策略)",
              "target_space": "客厅-卧室/书房界面",
              "design_approach": "核心方案:将客厅与南侧采光房间的实体墙改为'玻璃隔断墙'或'半墙+玻璃'组合。具体做法:1) 如南侧是次卧/书房,将整面墙改为透明玻璃隔断(可选磨砂玻璃满足隐私,透光率仍达60-70%)。2) 如南侧是主卧且隐私要求高,则采用'下半部分实体墙(1.2米高)+上半部分玻璃'设计,既保隐私又导光。3) 玻璃建议使用'长虹玻璃'或'夹丝玻璃',透光不透影。",
              "light_transmission_efficiency": "可将南向自然光引入客厅,照度提升至200-300lux,接近舒适标准",
              "pros_and_cons": {
                "pros": [
                  "采光效果最显著,白天基本无需开灯",
                  "空间视觉扩大,通透感强",
                  "如使用磨砂/长虹玻璃,隐私可控"
                ],
                "cons": [
                  "需拆除承重墙以外的隔墙,施工量大",
                  "隔音效果下降(玻璃隔音性能弱于实体墙)",
                  "如次卧有人居住,可能影响其隐私感(即使用磨砂玻璃)"
                ]
              },
              "implementation_complexity": "中高(需确认墙体是否可拆,施工周期约1-2周)",
              "cost_impact": "中等(玻璃隔断约600-1200元/㎡,10㎡墙面约6000-12000元)",
              "适用场景": "南侧房间使用频率低(如客卧/书房),或家庭成员对隐私要求不高"
            },
            {
              "strategy_name": "室内窗开洞(定向导光策略)",
              "target_space": "客厅-采光房间墙体",
              "design_approach": "在客厅与南侧房间的隔墙上,开设1-2个'室内窗'(尺寸约80x120cm或60x150cm)。窗户位置选择:1) 高窗设计:距地1.8-2.0米,不影响家具摆放,光线从高处洒下,均匀照亮客厅。2) 低窗设计:距地0.8-1.0米,可结合卡座/飘窗设计,兼具采光和视觉趣味。窗户类型:可选固定窗(无法打开,仅采光)或推拉窗(可通风换气)。玻璃选择:透明玻璃(最大采光)+磨砂贴膜(隐私)或彩色玻璃(装饰)。",
              "light_transmission_efficiency": "单个室内窗可提升局部照度50-100lux,两个窗可覆盖客厅主要活动区",
              "pros_and_cons": {
                "pros": [
                  "施工成本低于全墙改造",
                  "保留墙体结构,隔音性能较好",
                  "窗户设计灵活,可成为空间亮点(如拱形窗/圆形窗/彩色玻璃窗)",
                  "不影响隔壁房间的整体隐私(窗户面积有限)"
                ],
                "cons": [
                  "采光效果不如全墙玻璃(光线传导面积小)",
                  "需精准计算窗户位置,避免正对床铺或私密家具",
                  "如开窗过多,墙体结构稳定性需评估"
                ]
              },
              "implementation_complexity": "中等(需专业师傅开洞并安装窗框,施工周期3-5天)",
              "cost_impact": "低中(单个室内窗约2000-4000元,含开洞+窗框+玻璃+安装)",
              "适用场景": "预算有限,或隔壁房间隐私要求较高,或不想大动墙体结构"
            },
            {
              "strategy_name": "镜面反射+浅色材质(光线放大策略)",
              "target_space": "客厅墙面、顶面、地面",
              "design_approach": "如无法改动墙体结构(租房/预算限制/物业不允许),则通过材质手段'放大'现有光线。具体做法:1) 墙面:选用高反光乳胶漆(如白色/米色/浅灰,光反射率≥80%),避免深色墙面吸光。可在电视墙或沙发背景墙局部使用'镜面材质'(镜面板/不锈钢/高光烤漆),反射光线。2) 顶面:白色吊顶+嵌入式灯带,模拟'天光'效果。3) 地面:浅色地板(如白橡木/浅灰瓷砖)+抛光处理,增强地面反光。4) 家具:选择浅色/白色家具(如白色沙发/浅木色茶几),深色家具会吸收光线。",
              "light_transmission_efficiency": "虽不增加自然光总量,但可通过反射将现有光线'扩散'至更大范围,让空间显得更亮。实测可提升视觉亮度感20-30%(主观感知)。",
              "pros_and_cons": {
                "pros": [
                  "无需动墙体,施工简单,租房也可实施",
                  "成本最低(主要是刷墙+换家具)",
                  "效果立竿见影,空间立刻变亮堂",
                  "可逆性强,不喜欢可随时改回"
                ],
                "cons": [
                  "无法根本解决采光不足(自然光总量未增加)",
                  "镜面材质需谨慎使用,过多会造成'眩光'和视觉疲劳",
                  "浅色系需要频繁清洁(易脏)"
                ]
              },
              "implementation_complexity": "低(自行采购材料+施工,或请装修队,周期1周内)",
              "cost_impact": "低(墙面乳胶漆约30-50元/㎡,40㎡客厅约1200-2000元;镜面装饰材料约200-500元/㎡,局部使用约2000-3000元)",
              "适用场景": "租房/预算紧张/不想大动干戈/短期改善需求"
            },
            {
              "strategy_name": "人工照明系统升级(光质优化策略)",
              "target_space": "客厅全域照明系统",
              "design_approach": "既然自然光不足,就将人工照明做到极致,模拟'自然光'的光质和层次。设计原则:1) 多光源组合:主灯(吸顶灯/吊灯)+辅助光源(筒灯/射灯/灯带)+氛围光源(落地灯/台灯/壁灯),避免单一光源造成的平面感。2) 色温分层:白天模式4000-5000K(接近自然光,清爽明亮),夜间模式2700-3000K(温暖放松)。采用智能调光系统(如米家/欧瑞博),随时切换。3) 光线方向:顶部主光(模拟天光)+侧光(模拟窗户光)+底部光(氛围),形成'天-墙-地'三维照明。4) 重点照明:沙发阅读区增设阅读灯(照度500lux以上),电视墙增设背光灯带(减少屏幕与环境亮度对比,护眼)。",
              "light_quality": "通过模拟自然光的'多层次+动态变化',让人工照明不再'生硬',接近日光的舒适感",
              "pros_and_cons": {
                "pros": [
                  "完全可控,不受天气/时间影响",
                  "智能系统可根据场景自动调节(观影/阅读/聚会/睡眠)",
                  "可与其他策略叠加使用,效果1+1>2",
                  "科技感强,提升居住品质"
                ],
                "cons": [
                  "初期投入较高(智能照明系统+多光源)",
                  "电费增加(但如使用LED,增幅有限)",
                  "需要前期规划电路点位(装修时预留)"
                ]
              },
              "implementation_complexity": "中等(需重新布线+安装多组灯具+调试智能系统,施工周期1-2周)",
              "cost_impact": "中高(智能照明系统约5000-15000元,视品牌和灯具数量;传统多光源方案约3000-8000元)",
              "适用场景": "预算充足,追求高品质照明,或结合全屋智能家居系统"
            }
          ],
          "spatial_adjustments": {
            "layout_optimization": "建议调整客厅布局,将'需要强光'的功能区(如阅读区/办公区)靠近光源方向(如靠近有室内窗的墙面),将'弱光可接受'的功能区(如观影区)放在后方。",
            "furniture_selection": "选择'镂空/透明/矮背'家具,减少光线遮挡。如沙发选择矮背款(不挡窗户);书架选择开放式/玻璃门款(透光);屏风/隔断选择镂空款或玻璃款。",
            "opening_strategy": "如客厅有小窗(如北侧玄关窗),最大化其作用:1) 拆除窗帘/百叶帘,换成透明窗纱(既采光又隐私)。2) 窗台降低或打通,增加采光面积。3) 窗户上方增设'导光板'(45度角镜面),将窗外光线反射进室内深处。"
          },
          "material_recommendations": {
            "transparent_materials": [
              "玻璃砖墙:可作为半隔断,既分隔空间又透光(透光率约50-70%)",
              "亚克力板/PC阳光板:用于室内窗或隔断,重量轻且安全性高",
              "透明树脂板:可做装饰隔断或吊顶,透光且可塑性强"
            ],
            "reflective_materials": [
              "镜面不锈钢:用于电视墙或装饰条,反光率高(注意控制面积,避免眩光)",
              "高光瓷砖/微晶石:地面或墙面,抛光后反光效果好",
              "金属马赛克:局部点缀,增加光线跳跃感"
            ],
            "light_colored_finishes": [
              "墙面:白色/米色/浅灰乳胶漆(ICI/立邦高反光系列)",
              "地面:白橡木地板/浅色木纹砖/浅灰大理石",
              "软装:白色/米色/浅蓝沙发+窗帘,避免深色吸光"
            ]
          },
          "comprehensive_solution_roadmap": {
            "phase_1_immediate_actions": {
              "timeline": "0-2周",
              "actions": [
                "更换墙面颜色为白色/浅色系(可自行刷漆或请师傅,成本约2000-3000元)",
                "增加台灯/落地灯补光(购买3-5个优质灯具,成本约1000-2000元)",
                "更换浅色窗帘或拆除不必要的遮光帘",
                "调整家具布局,让重点活动区靠近光源"
              ],
              "expected_improvement": "视觉亮度感提升20-30%,白天基本可接受,夜间需开灯但光线更柔和"
            },
            "phase_2_structural_renovation": {
              "timeline": "1-3个月(需装修/改造计划)",
              "actions": [
                "评估是否可开设室内窗或玻璃隔断(咨询物业+结构师)",
                "如可行,优先选择'室内窗方案'(性价比最高,约5000-10000元)",
                "如预算充足,考虑'半墙+玻璃'方案(约15000-25000元)",
                "同步升级照明系统(智能多光源,约8000-15000元)"
              ],
              "expected_improvement": "自然光照度提升至200-300lux,白天无需开灯,夜间照明层次丰富,接近有窗客厅的舒适度"
            },
            "phase_3_optimization_refinement": {
              "timeline": "3-6个月后(入住后微调)",
              "actions": [
                "根据实际使用感受,微调灯具位置和亮度",
                "增加绿植/艺术品等'视觉焦点',转移对光线不足的注意力",
                "如仍觉不足,可局部增加镜面装饰或更换更浅色的家具"
              ],
              "expected_improvement": "空间舒适度和美观度同步提升,暗厅不再是劣势,反而形成独特的'层次光影'美学"
            }
          },
          "design_philosophy_note": "暗厅不一定是缺陷,关键是'化劣势为特色'。通过精心设计,暗厅可以营造出'洞穴感'(温暖包裹)、'画廊感'(重点照明+艺术品)、'影院感'(适合观影追剧)。不要一味追求'越亮越好',而是追求'光线的层次和舒适度'。"
        },
        "expert_handoff_response": null,
        "challenge_flags": null
      }

  - example_id: "v2_1_targeted_storage_002"
    description: "针对性问答 - 小户型储物空间规划"
    category: "targeted_mode"
    user_request: "60平米小两居,东西太多总是乱糟糟的,如何通过设计增加储物空间?"
    context:
      project_type: "小户型住宅"
      complexity: "medium"
      pain_point: "储物不足"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "小户型储物系统规划",
        "confidence": 0.90,
        "decision_rationale": "用户核心痛点是'东西多+空间小=乱',采用Targeted模式系统性分析储物策略。基于'垂直空间利用+隐藏式储物+模块化系统'三大原则,提供从空间改造到收纳习惯的完整解决方案。权衡储物容量、取用便利性、视觉整洁度三者关系。",
        "targeted_analysis": {
          "storage_capacity_assessment": {
            "current_storage_volume": "60㎡小两居,假设套内面积约50㎡,现有储物空间估算:1) 衣柜:主卧1.8米+次卧1.5米=3.3米长,深度0.6米,高度2.4米,约4.75㎥。2) 厨房橱柜:地柜3米+吊柜3米=6米,深度0.5米,高度0.8米,约2.4㎥。3) 卫生间浴室柜:1米长x0.5米深x0.6米高=0.3㎥。4) 杂物:鞋柜/电视柜/床头柜等约1㎥。总计约8.5㎥储物空间。",
            "required_storage_volume": "两人家庭(假设)的物品量估算:1) 衣物鞋包:约200-300件衣服+40-60双鞋+10-20个包,需约6-8㎥。2) 厨房用品:餐具/厨具/食材/小家电约需3-4㎥。3) 卫浴用品:洗护/清洁/毛巾约需1㎥。4) 生活杂物:工具/药品/季节用品/行李箱等约需3-4㎥。5) 书籍/文件/爱好用品:约需2-3㎥。总计约15-20㎥。",
            "storage_gap": "缺口约6.5-11.5㎥(当前8.5㎥ vs 需求15-20㎥),相当于需要增加80-135%的储物空间!",
            "overflow_manifestation": "物品溢出现象:衣服堆在椅子/床上,鞋子塞满玄关,厨房台面摆满调料瓶,卫生间洗手台杂乱,床下/柜顶堆积杂物。"
          },
          "vertical_space_utilization_strategies": [
            {
              "strategy_name": "顶天立地柜体系统",
              "principle": "小户型最大浪费是'垂直空间':吊顶到柜顶通常有60-80cm空隙,床底/沙发底有20-30cm空隙,这些都是黄金储物区。",
              "implementation": [
                "主卧衣柜:从1.8米加高至2.4米(到顶),增加储物体积约30%。顶部放置换季被褥/行李箱(使用频率低)。",
                "次卧/书房:定制到顶书柜/储物柜,下层放常用物品,中层放书籍/装饰,上层放不常用物品(用折叠梯取用)。",
                "玄关:定制到顶鞋柜(2.4米高x1.5米宽x0.35米深),下层放常穿鞋(8-10双),中层放换季鞋,上层放帽子/包/杂物。",
                "厨房:吊柜加高至距吊顶10cm(原本可能距吊顶50cm),增加30-40%储物空间,放不常用锅具/备用餐具。"
              ],
              "space_gain": "可增加约3-5㎥储物空间(相当于原有储物量的35-60%)",
              "cost_impact": "中等(定制柜比成品柜贵30-50%,但空间利用率高。60㎡全屋定制约3-5万元)",
              "design_considerations": [
                "柜门选择:到顶柜建议用推拉门(开门需要空间)或上翻门(顶柜)",
                "取用便利性:顶层放'年用1-2次'的物品(如冬被/行李箱),中下层放常用物品",
                "视觉处理:到顶柜显高显窄,建议柜门颜色与墙面一致(隐藏感),或用玻璃门(轻盈感)"
              ]
            },
            {
              "strategy_name": "床下/沙发下储物挖掘",
