# Few-Shot Examples for V3-1 Narrative Expert (Individual Narrative & Psychological Insight)
# 个体叙事与心理洞察专家高质量输出示例
#
# 质量标准: 精品级 (5000-8000字符/示例)
# 示例数量: 3个
# 优先级: P0 (高频使用)

examples:
  - example_id: "v3_1_targeted_persona_001"
    description: "针对性问答 - 人物画像构建（独居青年原型）"
    category: "targeted_mode"
    user_request: "为城市独居青年设计住宅时,如何理解他们的人物画像和内在需求?"
    context:
      project_type: "城市小型住宅"
      complexity: "medium"
      target_audience: "25-35岁独居青年"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "城市独居青年人物原型与心理需求分析",
        "confidence": 0.91,
        "design_rationale": "用户明确聚焦于目标人群的心理画像,采用Targeted模式深度解码个体特征。基于城市独居青年的真实生活图景,从身份认同、关系需求、意义追寻三维度构建叙事。",
        "targeted_analysis": {
          "archetype_definition": {
            "primary_archetype": "城市游牧者 (Urban Nomad)",
            "archetype_essence": "在个体自由与社会连接之间寻找平衡的现代探索者",
            "core_paradox": "渴望独立又害怕孤独,追求效率又抵抗异化,寻找归属但拒绝束缚",
            "symbolic_animals": "候鸟（流动性）+ 穴居动物（安全感）的混合体"
          },
          "demographic_snapshot": {
            "age_range": "25-35岁,职业上升期",
            "occupation_profile": "互联网/设计/咨询等新经济从业者,知识工作者为主",
            "income_level": "月收入8k-20k,有消费能力但对大宗支出谨慎",
            "mobility_status": "租房为主(78%),平均2-3年更换一次居所,对空间'永久性'期待降低"
          },
          "psychological_core": {
            "identity_narrative": {
              "self_definition": "'不被定义'是核心身份标签。拒绝传统成功路径(结婚-买房-生子),但也焦虑于缺乏里程碑式成就感。",
              "role_tension": "白天是高效的'打工人',晚上是追求精神自由的'独立个体'。空间需要支持这种角色切换。",
              "control_desire": "极度重视对生活节奏和空间状态的掌控权('我的地盘我做主'),抵触任何形式的侵入(包括频繁的访客)。"
            },
            "relationship_dynamics": {
              "social_strategy": "线上社交活跃,线下社交选择性。维持5-8个深度连接的朋友,但日常交往频率<2次/周。",
              "intimacy_pattern": "'可选择的亲密'——既要有随时可以深聊的朋友,也要有随时可以关上门的权利。空间需要支持这种亲密度的弹性调节。",
              "family_boundary": "与原生家庭保持'爱但有距离'的状态。逢年过节回家,但抵触父母过度关心。独居是获得心理边界的重要方式。"
            },
            "meaning_construction": {
              "work_meaning": "工作是'生存手段+自我实现'的混合体。拒绝996但也会为感兴趣的项目主动加班。居家办公时需要仪式感来区分工作/休闲模式。",
              "leisure_philosophy": "把'取悦自己'视为正当权利。愿意为小众爱好(如手冲咖啡/唱片收藏/瑜伽)投入时间和金钱,空间需要支持这些'无用但重要'的活动。",
              "future_vision": "对长期规划模糊但对当下体验敏感。'活在当下'不是逃避,而是应对不确定性的生存策略。空间需要灵活性而非固定的功能分区。"
            }
          },
          "lifestyle_cartography": {
            "daily_rhythm": {
              "weekday_pattern": "8:00起床→深度工作时段(10:00-13:00,需要安静和专注)→午休+外卖(13:00-14:30)→下午工作(14:30-19:00)→晚间个人时间(19:00-23:00,核心生活时段)→深夜放松(23:00-01:00,拒绝睡眠焦虑)",
              "weekend_ritual": "周六:补觉(可能睡到11点)+个人爱好时间(烹饪/阅读/健身)+独处充电。周日:可能约朋友聚会(但频率不固定)+为下周做准备(洗衣/采购)。",
              "seasonal_shift": "夏季更多户外活动(周末去公园/展览),冬季更多居家活动(追剧/读书/烹饪)。空间需要支持这种季节性的功能切换。"
            },
            "spatial_behavior_map": {
              "primary_living_zone": "客厅/卧室模糊界限,最常待的是'那张终极沙发/床'(占据70%的居家时间)。需要支持多功能(工作/娱乐/用餐/睡眠)。",
              "productivity_zone": "书桌/工作台(如果有独立空间)。但30%的人习惯在沙发/床上用笔记本办公,需要可移动的支撑面和充电点位。",
              "social_boundary_zone": "玄关+客厅前区是'社交前台',卧室/工作角是'私密后台'。即使是好友来访,也有不能进入的领域。需要空间层次来支持这种边界管理。",
              "restorative_corner": "通常是靠窗的某个角落(放一把单人椅+小边几+植物),用于冥想/发呆/阅读。这是'精神充电站',面积虽小但不可或缺。"
            },
            "consumption_patterns": {
              "online_shopping_dominance": "90%的非生鲜商品线上购买。需要充足的包裹暂存区和拆箱操作台面。",
              "takeout_vs_cooking": "工作日70%外卖,周末50%自己烹饪(作为解压方式)。厨房不需要大而全,但需要支持'享受型烹饪'(如手冲咖啡器具/烤箱/料理机)。",
              "experience_economy": "更愿意为体验付费(如瑜伽课/音乐会/旅行),而非固定资产(如大型家具)。对空间的要求是'轻量化+灵活性'。"
            }
          },
          "pain_points_and_aspirations": {
            "core_pain_points": [
              {
                "pain_point": "孤独感与社交焦虑的双重折磨",
                "manifestation": "周五晚上没人约会感到失落,但有人约又懒得出门。独居时常感到空虚,但聚会后又需要长时间独处恢复能量。",
                "spatial_implication": "空间需要支持'安全的社交'(如可以在家请2-3个朋友小聚,但不是正式餐厅那种压力环境)。也需要'可见的生命迹象'(如养植物/宠物,或窗外的街景)来缓解独居的空洞感。"
              },
              {
                "pain_point": "工作与生活边界消失带来的精神内耗",
                "manifestation": "居家办公时,早上起床就开始工作,晚上躺床上还在回消息。空间单一导致角色无法切换,产生'永远在工作'的疲惫感。",
                "spatial_implication": "即使在小空间里,也需要通过'仪式性动作'(如拉帘/换灯光/移动家具)来标记工作/休闲模式的切换。需要2-3个功能可转换的区域,而非单一的'多功能空间'。"
              },
              {
                "pain_point": "对物品和关系的'断舍离'焦虑",
                "manifestation": "一方面想过'极简生活',一方面又舍不得扔掉旧物(因为每件物品都承载了某段记忆)。搬家时极度痛苦。",
                "spatial_implication": "需要'弹性储物系统'(如模块化置物架/可折叠家具),支持快速的整理和搬迁。也需要'记忆展示区'(如照片墙/纪念品架)来安放那些'无用但有意义'的物品。"
              }
            ],
            "core_aspirations": [
              {
                "aspiration": "拥有'不被打扰的自由'",
                "ideal_scenario": "周日上午,阳光洒进来,自己慢悠悠地煮咖啡,翻昨天买的书,手机调成飞行模式。整个世界只剩自己和时间。",
                "design_translation": "需要光照良好的'个人圣殿'(即使只有10㎡),隔音良好(听不到邻居吵闹),有'切断外界'的仪式感(如厚重窗帘/勿扰灯光)。"
              },
              {
                "aspiration": "空间能'与我一起成长'",
                "ideal_scenario": "这个月迷上了摄影,空间能放下新买的器材和背景布。下个月可能又不玩了,空间能快速恢复成瑜伽角。",
                "design_translation": "模块化/可移动家具系统。墙面有挂钩系统支持随时调整挂画/置物架。照明有场景模式(专注模式/放松模式/社交模式)。"
              },
              {
                "aspiration": "'小而精'的审美掌控感",
                "ideal_scenario": "虽然只有40㎡,但每个角落都是精心布置的。朋友来会说'好有生活气息',而不是'你住得好挤'。",
                "design_translation": "Curated而非Cluttered。需要设计师帮助建立'视觉秩序'(如统一的色彩体系/材质呼应),让小空间看起来是'紧凑精致'而非'局促混乱'。"
              }
            ]
          },
          "narrative_handoff_to_v2": {
            "spatial_personality": "这个空间不是'家具的仓库',而是'自我的容器'。它需要像一件合身的衣服,既保护外界的侵扰,又不束缚内在的生长。",
            "key_emotional_anchors": [
              "安全感锚点:私密卧室/可遮蔽的角落/厚实的窗帘(抵御外界的不确定性)",
              "自由感锚点:开放的起居区/灵活的家具/多功能空间(支持自我探索)",
              "掌控感锚点:智能家居系统/模块化储物/可调节的光照和温度(对环境的主宰权)",
              "意义感锚点:爱好展示区/记忆墙/植物角(证明'我不只是生存,我在生活')"
            ],
            "spatial_narrative_tension": "在'高效'与'松弛'之间游走——既要有支持深度工作的专注角,也要有'什么也不干'的发呆区。空间设计需要体现这种张力,而非强制选择one or the other。",
            "handoff_to_v2_0": "V2_0设计总监,这位'城市游牧者'需要的是'可进化的栖息地',而非固定功能的房子。请在功能分区时保持弹性(如客厅-工作区-卧室的模糊界限),在材质选择上体现'轻量化'(如可移动隔断/折叠家具),在照明设计上支持场景切换(专注模式/社交模式/休息模式)。",
            "handoff_to_v5_1": "V5_1动线专家,请注意这个人的'私密边界':玄关需要有'缓冲区'(脱外套/换鞋/放包),将'外部世界'的压力卸下。卧室入口最好有门(即使小户型也不建议完全开放),因为'关上门'是他们重要的心理仪式。"
          }
        }
      }

  - example_id: "v3_1_targeted_lifestyle_002"
    description: "针对性问答 - 生活方式叙事（新手父母家庭）"
    category: "targeted_mode"
    user_request: "为有学龄前儿童的年轻家庭设计住宅,需要理解他们的生活状态和家庭动态"
    context:
      project_type: "家庭住宅"
      complexity: "medium"
      family_structure: "夫妻+1-2个学龄前儿童"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "新手父母家庭的生活方式图谱与空间行为模式",
        "confidence": 0.89,
        "design_rationale": "用户聚焦于家庭生活状态,采用Targeted模式深入解析新手父母的时间分配、角色张力、育儿哲学与空间行为。基于'育儿阶段'这一核心变量,构建动态的生活叙事。",
        "targeted_analysis": {
          "family_lifecycle_context": {
            " developmental_stage": "育儿密集期(孩子0-6岁),家庭生活重心完全围绕儿童展开",
            "time_horizon": "当前阶段预计持续3-5年,之后进入'学龄期'(6-12岁),空间需求会再次转变",
            "strategic_implication": "不要为'当下的6岁孩子'设计固定的儿童房,而要为'未来10年的成长轨迹'设计可进化的空间系统。"
          },
          "parental_identity_tension": {
            "pre_child_vs_post_child": {
              "former_identity": "曾经是'有生活品味的都市夫妻',周末去美术馆/米其林餐厅,家里是'极简风+设计师家具'。",
              "current_reality": "客厅被玩具占领,餐桌永远堆着绘本和湿巾,卧室门口挂着婴儿监视器。'我的家'变成了'孩子的游乐场'。",
              "psychological_conflict": "一方面接受'为母则刚/为父则韧',一方面怀念'个体身份'。渴望在家中保留'成人专属区',即使只有5㎡。"
            },
            "couple_relationship_evolution": {
              "intimacy_challenge": "夫妻独处时间从婚前的'每天3小时'降到'每周3小时'。卧室不再是浪漫空间,而是'快速补觉的战场'。",
              "division_of_labor": "育儿分工是永恒的谈判话题。理想是'平等参与',现实常是'主带+辅助'模式(通常母亲主带)。空间需要支持'父母双方都能高效育儿'(如厨房视线能观察客厅)。",
              "conflict_management": "争吵增多(因为长期睡眠不足+育儿压力),但不能当着孩子面爆发。需要空间支持'情绪缓冲'(如阳台/书房等短暂逃离的角落)。"
            },
            "career_life_balance_struggle": {
              "work_mode_shift": "至少一方(通常是母亲)从全职变为兼职/居家办公/暂时离职。在家办公时,'工作'与'育儿'持续交织,边界消失导致双重疲惫。",
              "productivity_guilt": "妈妈在工作时会内疚'没陪孩子',陪孩子时会焦虑'工作落后'。空间设计需要帮助建立'时间盒'(如独立书房+可关闭的门)。",
              "future_anxiety": "担心育儿期过后'职业断层',但又无法在当下投入更多精力。这种'被暂停的自我发展'需要通过空间中的'个人角落'(如阅读区/运动角)来部分补偿。"
            }
          },
          "daily_life_choreography": {
            "weekday_routine": {
              "06:30-08:30_morning_rush": {
                "description": "家庭最混乱时段。父母起床→叫醒孩子→穿衣+洗漱(孩子高频率拒绝配合)→准备早餐(需要快速+健康)→收拾书包/玩具→送孩子上幼儿园→自己上班。",
                "spatial_bottlenecks": [
                  "玄关:需要足够面积支持'全家同时穿鞋换衣',且要有儿童高度的挂钩和鞋柜(培养孩子自理能力)。",
                  "卫生间:早高峰时段多人使用,理想情况是'双台盆+独立马桶间',避免排队冲突。",
                  "厨房:需要'备餐速度最大化'——充足台面(同时摆放早餐+儿童餐具)+易清洁材质(因为孩子会打翻牛奶)+视线通透(边做饭边看客厅的孩子)。"
                ]
              },
              "17:00-20:30_evening_peak": {
                "description": "接孩子回家→换衣服/洗手→陪玩(高质量陪伴时间,核心需求)→晚餐准备+用餐(孩子参与度高,需要开放式厨房)→洗澡(通常需要30-45分钟,因为孩子会把浴室当游乐场)→睡前阅读或动画片→哄睡(20:30-21:00,孩子入睡)。",
                "spatial_design_for_evening": "客厅需要'快速模式切换':18:00是'亲子游戏区'(地毯+软垫+玩具),21:00是'成人休闲区'(沙发+投影/电视+可收纳的玩具)。"
              },
              "21:00-23:00_parental_recovery": {
                "description": "这是'父母的黄金时段'。处理工作尾巴/做家务/难得的夫妻交流/个人放松(刷手机/追剧/阅读)。但也常常因为太累直接睡着。",
                "spatial_need": "需要'成人专属角落'——即使只是客厅沙发+好的照明+安静环境,让父母感到'这一小时属于我们'。"
              }
            },
            "weekend_rhythm": {
              "saturday_家庭日": "上午:户外活动(公园/游乐场/超市采购,孩子参与)。下午:在家自由玩耍(父母轮流看管,另一方处理家务或休息)。傍晚:可能有亲子烹饪活动(如包饺子/做披萨,孩子会'帮倒忙'但很享受)。",
              "sunday_补给日": "上午:相对慢节奏,全家睡到自然醒(如果孩子允许)。中午:可能有祖父母来访或去祖父母家(代际支持重要)。下午:为下周准备(洗衣/收纳/备餐)。",
              "social_life_shrinkage": "夫妻几乎不再有'双人约会'(因为难找可靠的临时看护)。朋友聚会变为'家庭聚会'(各自带孩子),或'快闪式见面'(趁孩子午睡时出门2小时)。"
            }
          },
          "spatial_behavior_patterns": {
            "child_centric_zones": {
              "living_room_takeover": "客厅事实上成为'儿童活动中心'。地面需要'可铺开的游戏毯'(方便收纳),储物系统需要'低位+开放式'(孩子能自己拿取玩具),电视柜需要加装'防夹手/防撞角'保护。",
              "parent_child_co_working": "餐桌不只是用餐,也是孩子画画/做手工的地方(需要易清洁台面),也是父母辅导作业的地方(需要充足照明+插座)。",
              "dynamic_boundary": "儿童房在学龄前未必常用(孩子睡觉时希望靠近父母),白天反而是'玩具仓库'。真正的'儿童活动区'是客厅+父母卧室组合。到5-6岁后,儿童房才逐渐成为'独立睡眠+个人空间'。"
            },
            "parental_retreat_zones": {
              "master_bedroom_sanctuary": "父母卧室是'最后的堡垒'。但现实中常被孩子入侵(夜晚哭闹/做噩梦/周末早起跑来)。部分家庭选择'家庭床'模式(全家睡一张大床),部分家庭坚持'独立睡眠训练'(需要隔音好的独立儿童房)。",
              "balcony_escape": "阳台常成为父母的'情绪出口'——在这里抽根烟/打个电话/发会儿呆。需要视线能观察室内(防止孩子出意外),但有空间感的分离。",
              "study_if_any": "如果有书房(通常在三居以上户型),是'稀缺的个人空间'。但现实中常兼做储物间/客房/哺乳室。"
            },
            "multi_generational_interface": {
              "grandparent_support": "约60%的家庭依赖祖父母帮忙带娃(尤其前3岁)。如果是'同住'模式,需要三代人都能接受的空间秩序(如独立卫生间/老人房靠近儿童房以便夜间照料)。",
              "guest_room_dilemma": "如果是'定期来访'模式(如每周来2-3天),次卧需要'客房+储物室'双功能,或采用'沙发床'方案。"
            }
          },
          "parenting_philosophy_spectrum": {
            "gentle_parenting_adherents": {
              "core_belief": "'尊重儿童主体性,避免惩罚和控制'。倡导'跟随孩子的节奏',反对'哭声免疫法'。",
              "spatial_translation": "需要'儿童友好的探索空间'(如开放式低柜/软包墙角/安全插座),而非'处处限制的防护栏'。接受'家里会乱',所以需要'快速复原系统'(如大型收纳筐)。"
            },
            "structured_parenting_advocates": {
              "core_belief": "'规则和作息帮助孩子建立安全感'。强调'固定的睡眠时间/用餐地点/游戏区域'。",
              "spatial_translation": "需要'功能明确的分区'(餐厅只用餐,卧室只睡觉,客厅才玩耍)。家具布局相对固定,帮助孩子建立'空间记忆'。"
            },
            "montessori_inspired_families": {
              "core_belief": "'为儿童设计儿童高度的环境,培养独立性'。",
              "spatial_translation": "儿童洗手台/儿童座椅/儿童衣柜(低矮+开放式)。厨房有'儿童操作台'(孩子可以参与备餐)。"
            }
          },
          "pain_points_and_design_opportunities": {
            "pain_point_1_chaos_management": {
              "manifestation": "玩具/绘本/儿童用品呈指数级增长,收纳永远不够。每天睡前都要'扫雷'(把散落的玩具收起来),第二天又会重新炸开。",
              "design_opportunity": "需要'模块化+可视化'收纳系统:透明收纳盒(孩子能看到内容物)+色彩分类(如红色=积木,蓝色=绘本)+滚轮设计(方便移动和重组)。也需要'临时堆放区'(如大型脏衣篓形式的玩具篓),允许'不完美的整理'。"
            },
            "pain_point_2_safety_paranoia": {
              "manifestation": "对尖角/插座/窗台/楼梯的极度焦虑。家中布满防撞条/安全门/插座保护盖,破坏美观但无法割舍。",
              "design_opportunity": "需要'原生安全设计':圆角家具(而非后贴防撞条)+隐藏式插座(而非塑料盖子)+低窗台护栏(内嵌于窗框,而非外挂式)。材质选择'软硬结合'(如客厅用软木地板+卧室用地毯,而非全屋冰冷瓷砖)。"
            },
            "pain_point_3_adult_identity_loss": {
              "manifestation": "'我的家'完全变成'孩子的家',没有任何角落能体现'成年人的审美和生活'。客厅全是卡通色玩具,卧室堆满尿布湿巾,餐桌永远油腻腻(儿童食物残渣)。",
              "design_opportunity": "需要'parallel aesthetics'(平行美学系统)——儿童用品有儿童的活泼色彩,但成人空间(如玄关柜/电视墙/主卧)保持克制优雅。通过'隔而不断'(如玻璃隔断/镂空屏风)让两种美学共存而不冲突。也需要'快速藏匿系统'(如客厅有大型储物凳,客人来访时快速收纳玩具)。"
            }
          },
          "narrative_handoff_to_v2": {
            "spatial_personality": "这不是'一个有孩子的家',而是'一个家庭正在共同成长的容器'。空间需要温柔地接纳混乱(孩子的活力),也需要坚定地守护秩序(成人的理性)。",
            "key_emotional_anchors": [
              "安全锚点:视觉通透的布局(父母在厨房能看到客厅的孩子)+软性材质+圆角设计(物理安全)",
              "陪伴锚点:客厅的'亲子共处区'(地毯+矮桌+双人沙发,支持高质量互动)+开放式厨房(做饭时也能互动)",
              "成长锚点:儿童房的'可调节系统'(如可升降书桌/可拓展储物柜)+墙面的'成长记录墙'(身高标尺/照片墙)",
              "喘息锚点:父母的'5分钟避难所'(阳台/书房/主卧的飘窗),即使很小,也是心理必需品"
            ],
            "spatial_narrative_arc": "当下(0-6岁):空间重心在'家庭公共区'(客餐厅),儿童房是'储物+午睡'辅助空间。→ 未来(7-12岁):儿童房逐渐成为'学习+睡眠'主战场,客厅回归成人休闲功能。→ 青春期(13-18岁):儿童房成为'独立小套间',家庭互动模式再次转变。设计需要为这条10-15年的叙事弧线预留'可进化接口'。"
          }
        }
      }

  - example_id: "v3_1_comprehensive_entrepreneur_003"
    description: "完整报告 - 个体叙事方案（创业者的居住+工作空间）"
    category: "comprehensive_mode"
    user_request: "为一位30岁科技创业者设计居家办公空间,他正在创业初期,需要在家中完成大部分工作"
    context:
      project_type: "SOHO/小型住宅"
      user_profile: "30岁,科技创业者,单身,居家办公为主"
      complexity: "high"

    correct_output: |
      {
        "output_mode": "comprehensive",
        "user_question_focus": "创业者个体叙事与空间需求完整方案",
        "confidence": 0.94,
        "design_rationale": "用户提供了完整的个人背景(年龄/职业/生活状态),且明确需求是'居家办公空间设计',具备构建完整个体叙事的条件。创业者的核心叙事是'在不确定性中寻找掌控感',空间需要同时支持'高强度工作'和'生活意义找寻'。",
        "persona_map": {
          "archetype_name": "数字时代的游击战士 (Digital Guerrilla)",
          "archetype_essence": "在科技创业的战场上,用极简装备和灵活战术对抗巨头的资源优势。相信'小而美'的力量,拒绝过早的规模化陷阱。",
          "core_identity_paradox": "白天是'极度自律'的创业者(每分钟都在优化效率),晚上是'自我怀疑'的普通人(担心烧光积蓄还是一无所获)。",
          "demographic_reality": {
            "age_and_stage": "30岁,处于'最后的青春豪赌期'——如果35岁前没做出点成绩,可能要回归大厂打工。时间压力巨大。",
            "financial_status": "天使轮融资200-500万,已烧掉30%。个人储蓄还能支撑1年生活费。租不起甲级写字楼,选择'居家办公+联合办公'组合模式。",
            "relationship_status": "单身(或恋爱但未同居)。被前任嫌弃'事业心太重/没时间陪伴',但认为'现在不拼,以后拿什么给家人安全感'。",
            "social_network": "核心团队3-5人(联合创始人+早期员工),远程协作为主。有几个导师/投资人,但不想频繁打扰。曾经的大厂同事已渐行渐远(因为话题不再共鸣)。"
          },
          "psychological_core": {
            "identity_drivers": {
              "autonomy_obsession": "'不想给别人打工'是核心驱动力。宁愿自己的项目一年赚30万,也不愿给大厂创造300万利润却只拿30万工资。",
              "impact_ambition": "不只是'赚钱',更想'改变行业/影响他人'。这种使命感支撑他熬过低谷期,但也导致对'小成功'的不满足。",
              "validation_seeking": "渴望证明给父母/前任/前同事看:'我的选择是对的'。但表面上装得'不在乎外界评价'。"
            },
            "emotional_landscape": {
              "dominant_emotion_work": "工作时是'亢奋+焦虑'的混合体——产品突破时极度兴奋(肾上腺素飙升),融资碰壁时极度沮丧(感觉世界末日)。",
              "dominant_emotion_life": "生活时常感到'脱节感'——朋友在讨论升职加薪/买房买车,而他在为下个月工资发愁。也有'孤独的自由感'(没人能理解创业者的处境)。",
              "coping_mechanisms": "靠'极度忙碌'逃避情绪(没时间焦虑就不会焦虑)。偶尔深夜emo时,会一个人喝酒/刷知乎'创业失败'的帖子/给大学老师发长消息。"
            }
          }
        },
        "inner_needs_system": {
          "maslow_hierarchy_mapping": {
            "physiological_needs": {
              "status": "基本满足但降级",
              "manifestations": "外卖为主(做饭太费时间),睡眠不足(平均6小时,靠咖啡续命),运动缺失(办健身卡但几乎不去)。",
              "spatial_implication": "不需要大厨房(但要有高品质咖啡角),需要'诱导运动'的空间(如健身环/瑜伽垫的专属存放+使用区)。"
            },
            "safety_needs": {
              "status": "部分缺失,焦虑源",
              "manifestations": "收入不稳定,无五险一金,不敢生病。'下个月的房租靠什么付'是常见梦魇。",
              "spatial_implication": "需要'掌控感设计'——智能家居系统(对环境的掌控补偿对人生的失控),开放式储物(财务状况可视化,避免'不知道还剩多少钱'的恐慌)。"
            },
            "esteem_needs": {
              "status": "核心追求",
              "manifestations": "产品被用户夸奖时,成就感爆棚。被投资人拒绝时,自我价值感崩塌。需要持续的'小胜利'来维持信心。",
              "spatial_implication": "需要'成就可视化系统'——进度墙(用便利贴/白板展示产品迭代里程碑),荣誉角(媒体报道截图/用户好评/融资协议复印件,虽然'装逼'但心理上必需)。"
            }
          },
          "core_spatial_needs": {
            "need_1_deep_work_zone": {
              "functional_requirement": "至少4-6小时连续工作不被打断,需要进入'心流状态'。",
              "environmental_requirement": "1)视觉:面向墙壁或窗外自然景观(避免室内杂物分散注意力)。2)听觉:隔音良好或用白噪音/音乐屏蔽外界杂音。3)光照:自然光充足(靠窗)+可调节的任务照明(夜间工作)。4)温度:可控(专注时对冷热敏感)。",
              "psychological_requirement": "这是'战斗堡垒',需要给人'安全+掌控'的感觉。桌面够大(双显示器+笔记本+手写本同时展开),插座/网络接口充足(最怕关键时刻断电断网)。"
            },
            "need_2_dynamic_space": {
              "functional_requirement": "工作模式多样:有时需要站立(站立式办公桌或吧台),有时需要走动(打电话/思考时踱步),有时需要躺平(在沙发上刷手机也是'浅层工作')。",
              "spatial_translation": "不能只有一张固定的办公桌,需要'3个工作位'的组合:1)主桌(深度工作)。2)辅助工作台/吧台(站立工作/快速会议)。3)沙发+茶几(阅读/回邮件/视频会议)。"
            },
            "need_3_boundary_management": {
              "functional_requirement": "居家办公最大挑战:'工作'和'生活'无缝衔接导致永远在工作,或永远进不了工作状态。需要物理/心理边界。",
              "ritual_design": "1)空间仪式:起床后不能直接坐到办公桌,需要'通勤仪式'(如下楼买咖啡回来,标志着'上班了')。2)时间仪式:晚上8点关闭工作电脑,换到沙发用iPad(标志着'下班了')。3)感官仪式:工作时点'专注香薰',休息时换'放松香薰'。"
            },
            "need_4_restorative_corner": {
              "functional_requirement": "连续工作2-3小时后,需要'高质量休息'(不是刷抖音那种低质量休息),如冥想/拉伸/发呆/弹吉他。",
              "spatial_requirement": "一个'与工作桌视线不相交'的角落(看不到未完成的任务才能真正放松)。自然元素(植物/阳光),舒适座椅(如豆袋/摇椅),个人爱好物品(吉他/书/茶具)。"
            }
          }
        },
        "life_patterns_cartography": {
          "typical_weekday": {
            "07:00_wake_up": "闹钟响后,第一件事是看手机(查看产品数据/是否有紧急消息)。如果数据好,心情好一整天;如果数据差,立刻焦虑。",
            "07:30_fake_commute": "下楼买咖啡+路边走10分钟,让大脑从'睡眠模式'切换到'工作模式'。回家后换上'工作服'(虽然没人看见,但对自己是仪式)。",
            "08:00_deep_work_block1": "进入第一轮深度工作(写代码/设计产品/写方案)。这是一天中效率最高的时段,拒绝一切会议和消息打扰。",
            "12:00_lunch_and_shallow_work": "外卖送到,边吃边刷行业资讯/回复非紧急消息/处理琐碎事务。",
            "13:00_meetings_and_collaboration": "团队视频会议/与投资人电话沟通/用户访谈。下午精力下降,适合做需要互动但不需要深度思考的任务。",
            "18:00_dinner_and_recovery": "外卖+追剧/看书/刷B站。这是'精神充电时段',虽然在摸鱼但也是必需的。",
            "20:00_evening_work_or_learning": "如果白天效率高,晚上会放松(玩游戏/社交)。如果白天被会议占满,晚上要补回深度工作时间。也可能用来学习新技术(看课程/读文档)。",
            "23:00_night_ritual": "睡前刷推特/即刻,看看同行在做什么。容易陷入'别人都在进步,我是不是太慢了'的焦虑。",
            "01:00_sleep": "躺下后大脑还在转(想产品功能/担心竞争对手/规划明天任务),需要30-60分钟才能入睡。"
          },
          "spatial_scenario_scripts": {
            "场景1_深度工作模式": {
              "trigger": "早上8点,咖啡喝完,打开笔记本,今天要完成产品原型设计。",
              "spatial_sequence": "坐在书桌主工作区→打开双显示器→戴上降噪耳机→播放'专注音乐'→进入2-3小时不间断工作→站起身移动到站立工作台→处理次要任务30-45分钟→走到阳台/恢复角伸展10-15分钟→回到主工作区开始下一轮深度工作。",
              "spatial_requirement": "需要'主工作位+次工作位+恢复角'三点组合,支持'专注-切换-休息'的循环。"
            },
            "场景2_视频会议模式": {
              "trigger": "下午2点,要和投资人进行线上沟通,汇报本月进展。",
              "spatial_sequence": "如果是正式会议(投资人/客户),坐在书桌前,确保背景专业(书架/白墙/品牌海报)。如果是内部团队会,可以在沙发上,背景随意。会议后需要在客厅/走廊踱步5-10分钟,边走边思考'刚才哪里说得不好/下次如何改进'。",
              "spatial_requirement": "需要'专业背景区+踱步缓冲区',支持'展示-消化'的流程。"
            },
            "场景3_情绪崩溃修复": {
              "trigger": "晚上10点,刚收到投资人拒信/产品出现重大bug/竞争对手融资成功。情绪跌入谷底。",
              "spatial_sequence": "第一步:物理上远离电脑(看着屏幕只会加剧焦虑)。走到客厅/阳台/卧室,anywhere but the desk。→ 允许自己'崩溃10分钟'(在沙发/床上)→打开冥想app或打电话给信任的朋友→情绪稳定后,坐到'精神充电角',泡茶/翻书/弹吉他30-60分钟→重新找到'我不只是一个创业者,我还是一个完整的人'的感觉。",
              "spatial_requirement": "需要'明确的非工作区',且这个区域有'疗愈性元素'(舒适/私密/有情感连接的物品)。"
            }
          }
        },
        "spatial_scenario_scripts": {
          "场景4_团队线下冲刺": {
            "trigger": "产品即将上线,团队决定来家里封闭开发48小时。",
            "spatial_transformation": "准备阶段:把客厅改造为'war room'(作战室)——餐桌变为共享工作台(摆放多台笔记本+显示器+充电器),白板/大屏展示任务看板,沙发成为临时休息区。需要充足的插座(至少6个),稳定的WiFi,24小时供应的咖啡和零食。→ 工作阶段:核心工作在餐桌(面对面沟通效率高),需要专注时各自退到不同角落(卧室/阳台/书桌),需要讨论时重新聚集。→ 休息阶段:深夜1-2点,累了就直接在沙发/地毯上躺平,不回家(节省通勤时间)。",
            "spatial_requirement": "需要'灵活的公共工作区+多个独立角落+临时住宿能力',支持'协作-专注-恢复'的快速切换。"
          }
        },
        "narrative_guidelines_for_v2": {
          "spatial_personality_statement": "这不是一个'家',而是一个'个人创业基地'(Personal Startup Lab)。它需要像瑞士军刀一样多功能,像禅修空间一样让人专注,像战壕一样提供安全感,像咖啡馆一样激发创意。",
          "core_design_principles": [
            {
              "principle": "功能可变性 > 固定分区",
              "rationale": "创业者的工作生活高度动态,今天可能需要深度工作8小时,明天可能需要团队协作12小时,后天可能情绪崩溃需要全天休息。空间不能按传统'客厅-卧室-书房'三分法,而要设计为'可快速重组的模块'。",
              "implementation": "采用轻量级/可移动家具(如带滚轮的工作台/折叠桌/模块化书架),减少固定隔墙(用帘子/屏风代替),照明采用场景模式(专注模式全亮/社交模式暖光/休息模式昏黄)。"
            },
            {
