          "核心品牌故事": {
            "起源叙事": "Aether的创始人Alex曾是生物化学博士,研究植物芳香分子在人类情绪中的作用。一次在苏格兰威士忌酒厂的实习中,他被蒸馏过程迷住——看着麦芽汁经过铜质蒸馏器,浑浊的液体变成清澈的烈酒,那一刻他意识到'蒸馏不只是物理过程,更是炼金术的现代演绎——从混沌中提取精华,从平凡中创造非凡'。回国后,他放弃了学术道路,用7年时间游历全球酒厂和植物园,学习蒸馏技艺和植物学,最终在上海开设Aether,将科学与神秘主义结合,打造'风味炼金实验室'。",
