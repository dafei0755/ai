# Few-Shot Examples for V3-2 Narrative Expert (Brand Narrative & Customer Experience)
# 品牌叙事与顾客体验专家高质量输出示例
# 质量标准: 精品级 (5000-8000字符/示例)
# 示例数量: 3个
# 优先级: P1 (中频使用)

examples:
  - example_id: "v3_2_targeted_brand_001"
    description: "针对性问答 - 精品咖啡品牌起源叙事"
    category: "targeted_mode"
    user_request: "我们要做一个精品咖啡品牌,主打单一产地豆子,如何讲好品牌故事?核心差异化在哪里?"
    context:
      project_type: "精品咖啡馆品牌策划"
      complexity: "medium"
      challenge: "市场竞争激烈,需建立独特品牌记忆点"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "精品咖啡品牌起源故事与差异化叙事",
        "confidence": 0.92,
        "decision_rationale": "用户核心需求是'讲好品牌故事'+明确差异化。采用Targeted模式深度分析品牌叙事框架,聚焦'单一产地'作为叙事锚点,构建'风土旅行者'品牌原型。核心策略是将咖啡豆从'商品'转化为'目的地故事的载体',每一杯咖啡都是一次跨越地理的味觉旅行。权衡品牌深度vs市场广度,优先建立小众高认知(宁可100个铁粉也不要1000个路人),通过产地地图墙、庄园主故事卡、季节限定形式强化'旅行者'人设。",
        "targeted_analysis": {
          "brand_story_framework": {
            "brand_name_concept": "假设品牌名为'Terroir'(风土,法语té-war),直接点明核心差异化——咖啡不是工业品,而是带有产地灵魂的风土产物。每颗豆子背后都有一片土地、一个庄园主、一段气候故事。",
            "origin_story": {
              "创始人原型": "咖啡朝圣者 (Coffee Pilgrim)",
              "起源叙事": "品牌创始人曾是建筑师,2017年因项目去埃塞俄比亚考察,在耶加雪菲产区的一个小庄园,第一次喝到庄园主Abebe亲手冲泡的日晒豆——甜感、花香、层次感完全颠覆了他对'咖啡只是提神饮料'的认知。他在庄园住了三周,从采摘、处理、晾晒全程参与,发现咖啡风味的秘密不在烘焙配方,而在那片海拔1800米的红土、那年的雨季、庄园主对发酵时间的掌控。回国后,他放弃建筑,创立了Terroir,核心理念是'让每杯咖啡都保留产地的指纹'。",
              "故事真实性策略": "即使是虚构故事,也必须有真实细节支撑:'Abebe庄园'可以是真实存在的合作伙伴,'1800米红土'是耶加雪菲的真实风土特征,'三周庄园体验'符合精品咖啡创业者的典型路径。故事不需要惊天动地,但要有'可信的细节'和'情感转折点'(建筑师→咖啡朝圣者)。"
            },
            "core_belief": {
              "品牌信念": "咖啡不是商品,而是'液体的旅行明信片' (Liquid Postcards)",
              "阐释": "每一杯咖啡都承载着一片土地的风土记忆——埃塞俄比亚的花香是热带高原的馈赠,巴拿马的蜜感是火山灰土壤的恩赐,哥斯达黎加的明亮酸是季风气候的杰作。我们拒绝拼配豆(blend),坚持单一产地(single origin),因为拼配会'抹平'产地的性格,就像旅行时不该把所有景点混在一起走马观花,而要深入一地感受文化。",
              "延伸行为准则": [
                "菜单不写'美式咖啡',而写'埃塞俄比亚 耶加雪菲 日晒 G1'(产地+处理法+等级,像红酒标签)",
                "每月推出1-2个'产地故事限定'(如'巴拿马翡翠庄园瑰夏',配文介绍庄园主故事+风土特征+冲煮建议)",
                "店内不播放流行音乐,而播放产地音乐(如埃塞俄比亚传统音乐/拉美民谣),强化'你正在进行一场味觉旅行'的沉浸感"
              ]
            },
            "value_proposition": {
              "核心价值主张": "'喝懂产地,而非喝完咖啡因' (Taste the Origin, Not Just Caffeine)",
              "客户价值": {
                "功能价值": "高品质咖啡豆(SCA评分85+),专业冲煮(手冲/虹吸/冷萃等不同方式展现豆性),新鲜烘焙(烘焙日期≤15天)",
                "情感价值": "成为'咖啡内行'的身份认同(能分辨耶加和曼特宁的区别,在朋友中成为咖啡顾问)",
                "体验价值": "咖啡教育+文化旅行(每周咖啡讲座/杯测会,如'埃塞俄比亚风土之旅',品鉴3款不同产地,讲解历史文化)",
                "社交价值": "小众圈层社交(精品咖啡爱好者社区,不是大众星巴克,是'懂咖啡的人才来的地方')"
              },
              "价值传递方式": [
                "产地地图墙:店内悬挂世界咖啡地图,用图钉标注合作庄园,每个图钉下有庄园卡片(庄园主照片+手写签名+风土特征+海拔/处理法数据)",
                "豆子透明展示:用玻璃罐陈列各产地生豆和熟豆,附标签说明(如'埃塞俄比亚 耶加雪菲:花香、柑橘、红茶,海拔1800-2000m,水洗处理')",
                "出品仪式感:手冲咖啡时,咖啡师告知'您点的是肯尼亚AA,我会用92度水温、1:15粉水比冲煮,预计风味是黑醋栗+柚子+红茶',让顾客感受专业和尊重"
              ]
            },
            "differentiation": {
              "竞品对比": {
                "星巴克": "工业化标准,全球口味一致,品牌大但'无个性',目标是'咖啡快消品'",
                "精品连锁(如Manner/M Stand)": "品质提升,但还是拼配豆为主,强调'方便+性价比',不强调产地教育",
                "独立精品咖啡馆": "品质好,但缺乏系统叙事,顾客不知道为什么要选这家而非那家",
                "Terroir差异化": "唯一将'产地风土'作为核心叙事的品牌,不只卖咖啡,卖的是'咖啡背后的地理和人文故事'"
              },
              "差异化策略三层": {
                "产品层": "100%单一产地,季节限定(如'雨季耶加'vs'旱季耶加',风味不同),可追溯(每袋豆子有庄园编码,手机扫码看庄园视频)",
                "体验层": "沉浸式产地体验(店内分区:埃塞俄比亚区/拉美区/亚洲区,不同区域装修风格和音乐不同),教育式消费(菜单附'风味轮'和'冲煮建议',咖啡师主动分享产地故事)",
                "文化层": "社区与仪式(每月'产地主题日',如'埃塞俄比亚月',店内悬挂埃塞国旗、播放传统音乐、供应埃塞配餐如Injera面饼,形成文化事件而非单纯促销)"
              }
            }
          },
          "storytelling_elements": {
            "核心故事元素库": [
              {
                "元素": "庄园主人物卡",
                "用法": "每月推1位合作庄园主故事,如'Abebe:第三代咖啡农,坚持手工采摘红果实',配照片+手写信+咖啡品鉴套装",
                "情感功能": "从抽象的'埃塞俄比亚豆子'变为具体的'Abebe的豆子',建立人与人的连接而非品牌与消费者关系"
              },
              {
                "元素": "风土符号系统",
                "用法": "为每个产地设计独特视觉符号(如埃塞=绿色山峰+咖啡果,巴拿马=蓝色鸟+瑰夏花),在杯子/包装/菜单/墙面反复出现,形成视觉记忆",
                "情感功能": "降低认知门槛(顾客不用记复杂的产地名,看到'绿色山峰'就知道是埃塞),同时强化'每个产地都有独特性格'的品牌理念"
              },
              {
                "元素": "季节性叙事",
                "用法": "咖啡是农产品,有产季。春季推'春摘新豆'(如肯尼亚春季采收),夏季推'冷萃专用豆'(中美洲水洗,适合冰饮),秋季推'日晒发酵豆'(埃塞日晒,风味浓郁),冬季推'经典老豆'(陈年曼特宁,醇厚温暖)",
                "情感功能": "创造'期待感'(每季都有新故事),同时教育顾客'咖啡不是工业品,而是有生命周期的农作物'"
              },
              {
                "元素": "旅行日记体",
                "用法": "每款新豆子上架前,创始人/咖啡师写一篇'产地探访日记'(真实或虚构但细节真实),发公众号/小红书,如'在耶加雪菲的21天:我如何找到这批G1日晒豆',配照片+视频片段",
                "情感功能": "将品牌人格化(不是冷冰冰的公司,而是'一群咖啡旅行者'),同时增强信任(你看到了豆子的来源)"
              },
              {
                "元素": "仪式化体验",
                "用法": "打造专属仪式,如'产地护照'(顾客办会员卡,设计成护照样式,每喝一个新产地咖啡,盖一个产地章,集满10个产地兑换'咖啡旅行家'认证+定制礼物),让喝咖啡变成'收集产地'的游戏",
                "情感功能": "游戏化+成就感+社交货币(顾客在社交媒体晒护照,炫耀'我已经喝过15个产地了')"
              }
            ]
          },
          "narrative_arc": {
            "叙事弧线": "从'无知的咖啡消费者'到'风土的理解者'",
            "阶段设计": {
              "第一阶段:好奇(首次到店)": {
                "顾客状态": "对精品咖啡陌生,可能只喝过星巴克",
                "品牌行为": "咖啡师主动引导:'您平时喜欢什么口味?我推荐您试试埃塞俄比亚耶加雪菲,花香很特别,像喝茉莉花茶。'不用专业术语吓跑顾客,用类比(如'像红茶'而非'柑橘调性明亮')降低门槛。",
                "关键触点": "第一杯咖啡的风味惊喜(如'原来咖啡可以不苦!')",
                "情感目标": "打破偏见,激发好奇"
              },
              "第二阶段:探索(复购2-5次)": {
                "顾客状态": "开始分辨不同产地风味,但还记不住名字",
                "品牌行为": "推出'产地盲测'活动(给顾客喝3款咖啡,猜产地,答对送小礼物),寓教于乐。菜单附'风味雷达图'(视觉化展示每款豆子的苦/酸/甜/香气强度,降低选择难度)。",
                "关键触点": "'产地护照'盖章(物理仪式强化记忆)",
                "情感目标": "建立能力感('我居然能分辨出来!'),从被动接受到主动探索"
              },
              "第三阶段:认同(资深顾客)": {
                "顾客状态": "已喝过10+产地,能准确说出偏好(如'我喜欢埃塞日晒的花香,不喜欢曼特宁的草药味')",
                "品牌行为": "邀请参加'咖啡旅行家俱乐部'(私密社群,每月1次深度杯测会+产地分享会,如邀请庄园主视频连线),给予'Co-curator'(共同策展人)身份(让资深顾客参与选豆和菜单设计,如'本月新豆由会员@XX推荐')。",
                "关键触点": "从消费者变为品牌共建者(UGC内容、口碑传播、带新人入门)",
                "情感目标": "身份认同(我是Terroir社区的一员,我是咖啡内行),品牌忠诚"
              }
            },
            "高潮设计": "终极体验是'产地溯源之旅'——品牌每年组织1-2次'埃塞俄比亚/哥伦比亚庄园探访团'(10-15人小团,费用1-2万/人),顾客亲自去产地采摘、处理、杯测,回来后成为品牌'产地大使',分享旅行故事给新顾客。这不仅是营销活动,更是品牌叙事的'现实版',让故事从虚拟变为真实体验。"
          },
          "emotional_core": {
            "情感内核": "'发现的愉悦' (The Joy of Discovery)",
            "深层心理需求": {
              "逃离标准化": "现代生活太多标准化产物(工业食品、快时尚、流水线服务),人们渴望'有个性的、独特的、有故事的'事物。Terroir提供的不是'又一杯咖啡',而是'每一杯都不一样的发现之旅'。",
              "知识型消费": "新中产不满足于'喝饱',而要'喝懂'。咖啡成为自我提升的载体(如同品红酒、听古典乐),Terroir提供'成为咖啡内行'的阶梯(从小白→爱好者→专家)。",
              "社群归属": "找到'同类人'(不是喝星巴克的大众,而是懂风土的小众群体),Terroir是线下聚集地,产地护照、杯测会、产地之旅都是社群仪式,强化'我们是一群特别的人'的身份认同。"
            },
            "品牌人格": "'博学的旅行者'(Erudite Traveler)",
            "人格特质": [
              "好奇(对世界充满兴趣,愿意分享见闻)",
              "真诚(不装腔作势,不过度商业化,像朋友推荐好东西)",
              "专业但不精英(懂很多,但不会用术语吓人,善于用通俗类比)",
              "社群导向(不是高高在上的品牌,而是社区的一员,与顾客共同成长)"
            ],
            "语言风格": "轻松但有深度,如菜单描述:'耶加雪菲 日晒 G1——想象一下在埃塞俄比亚高原的春天,空气里飘着野花香,这杯咖啡就是那个味道。甜感像蜂蜜,酸像柠檬茶,尾韵有红茶的质感。'(不是专业术语堆砌,而是场景化描述+通俗类比)。"
          },
          "narrative_activation_plan": {
            "叙事落地路线图": {
              "Phase 1: 品牌故事定调(开业前2个月)": {
                "任务": [
                  "确定品牌名/Slogan/核心故事(如Terroir/'液体的旅行明信片')",
                  "设计品牌视觉系统(风土符号、产地色彩体系、产地地图模板)",
                  "撰写创始人故事/品牌宣言(发布在官网/公众号/小红书,建立调性)"
                ],
                "预算": "5-10万(设计+内容创作)",
                "负责人": "品牌总监+内容团队"
              },
              "Phase 2: 触点故事植入(开业前1个月)": {
                "任务": [
                  "制作产地地图墙和庄园卡(打印+装裱+安装)",
                  "设计产地护照和盖章系统(定制护照本+刻章)",
                  "培训咖啡师叙事能力(每人必须会讲3个产地故事,练习通俗化表达)",
                  "准备开业季3款豆子的'产地探访日记'(图文+短视频)"
                ],
                "预算": "3-5万",
                "负责人": "运营经理+咖啡师团队"
              },
              "Phase 3: 社群冷启动(开业后1个月)": {
                "任务": [
                  "邀请50-100位种子用户(咖啡爱好者/KOL)免费体验,送产地护照,要求社交媒体打卡",
                  "举办首次'产地故事会'(如'埃塞俄比亚之夜',放纪录片+杯测+埃塞配餐)",
                  "启动'产地盲测挑战'(线上H5小游戏+线下月赛,冠军送庄园直邮豆子)"
                ],
                "KPI": "开业首月社交媒体UGC内容>500条,会员注册>300人,复购率>40%"
              },
              "Phase 4: 长期叙事迭代(开业后3-12个月)": {
                "任务": [
                  "每月推1个产地主题(内容+产品+活动联动,如'2月巴拿马月:瑰夏品鉴会+巴拿马美食+庄园主视频连线')",
                  "每季度办1次深度杯测会(资深会员专属,培养KOC)",
                  "半年组织1次产地溯源团(首批选埃塞俄比亚,10人小团,回来后办分享会扩散)"
                ],
                "预算": "月均2-5万(内容+活动+产品研发)",
                "KPI": "年度会员留存>60%,NPS(净推荐值)>50,品牌关联词'风土/产地/旅行'提及率>80%"
              }
            }
          },
          "success_metrics": {
            "叙事成功指标": {
              "认知指标": "调研100个顾客'你觉得Terroir和其他咖啡馆的区别是什么?',期望>70%提到'产地/风土/故事/旅行'等关键词(而非'好喝/便宜/方便')",
              "行为指标": "产地护照使用率>60%(说明顾客参与叙事游戏),平均喝过产地数>5个(说明探索欲被激发),杯测会报名/到场比>80%(说明深度参与)",
              "传播指标": "UGC内容中'产地地图/护照/庄园卡'出现率>50%(说明这些叙事道具成为社交货币),顾客自发讲述产地故事给朋友的比例>30%(说明叙事被内化)"
            }
          }
        },
        "expert_handoff_response": null,
        "challenge_flags": null
      }

