                "用户满意度:新产品/服务的用户NPS(net promoter score)/CSAT(customer satisfaction)提升(目标NPS>50)",
                "商业回报:创新项目的ROI/营收贡献(目标:创新项目贡献营收增长的30%+)"
              ],
              "文化指标": [
                "员工创新意愿:调研'你认为公司鼓励创新吗?''你愿意提出新想法吗?'(目标同意率>75%)",
                "创意提案量:员工主动提交的创新提案数量(目标年增长50%)",
                "跨部门协作:创新项目中跨部门合作的比例(目标>60%,打破孤岛)"
              ]
            }
          },
          "common_pitfalls": {
            "10大常见错误与解决": [
              {
                "错误1": "框架太复杂,团队学不会/不愿用",
                "原因": "一次性导入所有工具,信息过载",
                "解决": "分阶段导入,先教核心5步流程(80%场景够用),再根据需要学专业工具(如TRIZ)。提供'快速参考卡'(Cheat Sheet),1页A4总结关键步骤。"
              },
              {
                "错误2": "框架沦为形式,走过场",
                "原因": "领导不重视/没有激励机制",
                "解决": "高层支持:CEO/CTO亲自参与第一个试点项目,展示重视。激励机制:创新成功项目给予奖金/晋升加分。案例宣传:内部表彰+外部分享,形成荣誉感。"
              },
              {
                "错误3": "跳过用户研究,假设需求",
                "原因": "时间紧/预算少/觉得'我懂用户'",
                "解决": "最小用户研究:即使1周时间,也要访谈5-10个用户(好过0)。游击式研究:去目标用户出没的地方(咖啡店/商场)现场观察+聊天,成本低效果好。借用现有数据:分析产品使用数据/客服投诉/社交媒体评论,弥补一手研究不足。"
              },
              {
                "错误4": "创意工作坊效率低,开完没结果",
                "原因": "没有明确目标/参与者不对/缺少引导",
                "解决": "明确产出:工作坊前定义'今天必须输出3个可测试概念'。角色多样:邀请跨职能(不只设计师)+外部视角(如邀请1-2个目标用户参与)。专业引导:指定facilitator(引导师)控制流程+时间,所有人遵守头脑风暴规则(不批评/疯狂想法OK)。"
              },
              {
                "错误5": "原型做得太精美,舍不得改",
                "原因": "投入大量时间/金钱,产生'沉没成本谬误'",
                "解决": "低保真快速:早期用纸质/线框图,1天完成,测试后扔掉重做也不心疼。时间盒限制:给原型制作设定严格时间上限(如'3天必须完成'),避免过度打磨。心态转变:'原型是验证工具不是展示作品',失败了也是学习。"
              }
            ]
          }
        },
