    user_request: "我们有几个商业模式方向,不知道选哪个,如何系统化评估商业模式的可行性?"
    context:
      project_type: "商业策略决策"
      complexity: "medium"
      challenge: "缺乏评估标准和决策框架"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "商业模式评估框架与决策模型",
        "confidence": 0.91,
        "decision_rationale": "用户核心需求是'多个商业模式方向'+'不知道选哪个',需要Targeted模式输出系统化评估模型。核心策略是整合商业模式画布(BMC) + 精益画布(Lean Canvas) + 多维度评分矩阵,构建'3D评估模型'(Desirability用户需求度-Viability商业可行性-Feasibility技术可行性)。不是简单列指标,而是提供完整评估流程+评分工具+决策决策树,让团队能在2周内完成严谨评估并做出数据驱动决策。",
        "targeted_analysis": {
          "evaluation_framework_overview": {
            "框架命名": "'DVF商业模式评估模型'(Desirability-Viability-Feasibility Model)",
            "核心理念": "好的商业模式必须同时满足3个维度:用户想要(Desirability用户需求度)+公司能赚钱(Viability商业可行性)+技术可实现(Feasibility技术可行性)。三者缺一不可:只有需求没盈利=慈善,只有盈利没需求=空中楼阁,只有技术没市场=实验室产品。",
            "适用场景": [
              "新业务方向选择(如进入新市场/推出新产品线/转型新模式)",
              "现有业务优化(如订阅制vs一次性售卖/自营vs平台模式)",
              "投资决策(VC/内部孵化项目评审)",
              "战略规划(3-5年业务组合优化)"
            ],
            "评估对象": "任何可以用'商业模式画布'描述的业务,包括产品/服务/平台/生态"
          },
          "three_dimensional_assessment": {
            "维度1: Desirability(用户需求度) - '用户真的要吗?'": {
              "核心问题": "这个商业模式解决了用户什么问题?用户愿意为此付出什么(金钱/时间/注意力)?",
              "评估子维度": {
                "痛点强度(Pain Intensity)": {
                  "定义": "用户遇到的问题有多严重?不解决会怎样?",
                  "评分标准(1-10分)": "9-10分:生存型痛点(不解决无法生活/工作,如医疗/安全);7-8分:效率型痛点(不解决很麻烦但可忍受,如通勤/沟通);5-6分:改善型需求(有更好但没有也行,如娱乐/社交);3-4分:锦上添花(可有可无);1-2分:伪需求(用户其实不在乎)",
                  "验证方法": "用户访谈问'你上次遇到这个问题时有多焦虑/沮丧(1-10)?''如果这个问题永远无法解决,你会怎么办?'量化情绪强度。"
                },
                "市场规模(Market Size)": {
                  "定义": "有多少人有这个痛点?市场总容量多大?",
                  "评分标准": "TAM(Total Addressable Market总市场)>100亿=10分,10-100亿=8分,1-10亿=6分,<1亿=4分。SAM(Serviceable Available Market可服务市场,TAM中你能触达的部分)至少需要>10亿才值得做。",
                  "验证方法": "自上而下(Top-Down):行业报告/统计局数据估算总市场。自下而上(Bottom-Up):单客价值x潜在客户数。"
                },
                "现有解决方案满意度(Solution Satisfaction)": {
                  "定义": "用户现在如何解决这个问题?对现有方案满意吗?",
                  "评分标准": "无现有方案/用户自己DIY=10分(市场空白);有方案但用户抱怨多(NPS<0)=8分(颠覆机会);有方案用户凑合用(NPS 0-30)=6分(改良机会);有方案用户很满意(NPS>50)=2分(难切入)",
                  "验证方法": "竞品分析+用户访谈:'你现在用什么解决这个问题?''你对它满意吗(1-10)?''你愿意尝试新方案吗?为什么?'"
                },
                "用户付费意愿(Willingness to Pay)": {
                  "定义": "用户愿意为解决方案付多少钱?付费门槛多高?",
                  "评分标准": "高客单价(>5000元/用户/年)且愿意预付=10分;中客单(500-5000元)=7分;低客单(<500元)或免费增值模式=4分;完全免费靠广告=2分。",
                  "验证方法": "价格敏感度测试(Van Westendorp):问'多少钱你觉得便宜?''多贵你不会买?'找到价格甜点。MVP预售测试:先收钱再做产品,验证真实付费意愿(如Kickstarter众筹)。"
                }
              },
              "Desirability总分": "4个子维度平均分,≥8分=强需求(值得all in),6-8分=中等需求(谨慎投入),<6分=弱需求(重新验证或放弃)"
            },
            "维度2: Viability(商业可行性) - '公司能赚钱吗?'": {
              "核心问题": "这个商业模式能产生利润吗?现金流健康吗?能规模化吗?",
              "评估子维度": {
                "单位经济模型(Unit Economics)": {
                  "定义": "单个客户的价值(LTV) vs 获客成本(CAC)比例",
                  "评分标准": "LTV/CAC > 3 = 10分(健康);2-3 = 7分(可接受);1-2 = 4分(勉强);< 1 = 0分(亏本)",
                  "关键指标": {
                    "LTV(Customer Lifetime Value客户生命周期价值)": "单客贡献毛利 x 留存月数。如订阅制:199元/月 x 毛利率70% x 平均留存12个月 = 1672元LTV",
                    "CAC(Customer Acquisition Cost获客成本)": "营销费用 / 新增客户数。如10万营销预算获得500个客户 = 200元CAC",
                    "回本周期(Payback Period)": "CAC / (月均收入 x 毛利率)。如200元CAC / (199元 x 70%) = 1.4个月回本(越短越好,<12个月可接受)"
                  },
                  "验证方法": "MVP灰度测试:小规模投放广告(如5万预算),真实测量CAC。留存分析:追踪首批用户90天留存率,推算LTV。"
                },
