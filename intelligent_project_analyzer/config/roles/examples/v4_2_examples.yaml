                  "评分标准": "现金流正(盈利)=10分;月烧钱<月收入50%(runway>24个月)=8分;烧钱=收入50-100%(runway 12-24个月)=5分;烧钱>收入(runway<12个月)=2分",
                  "关键指标": {
                    "月烧钱率(Monthly Burn Rate)": "每月净亏损额。如月收入50万,月成本80万 = 烧钱30万/月",
                    "跑道(Runway)": "现有现金 / 月烧钱率。如账上300万现金,月烧30万 = 10个月runway(至少要>12个月,否则很危险)"
                  },
                  "验证方法": "财务模型:未来12-24个月收入/成本/现金流预测(乐观/中性/悲观3种情景),压力测试。"
                },
                "规模化潜力(Scalability)": {
                  "定义": "业务能否快速增长而不线性增加成本?边际成本递减吗?",
                  "评分标准": "纯数字产品(SaaS/App)边际成本≈0 = 10分;平台模式(Uber/Airbnb)边际成本低 = 8分;服务密集型(咨询/教育)需人力=人 = 5分;制造业需设备/库存 = 3分",
                  "杠杆点": {
                    "技术杠杆": "自动化/AI替代人力,如客服机器人替代人工",
                    "网络效应": "用户越多价值越大,如社交网络/交易平台",
                    "品牌杠杆": "强品牌降低获客成本,如苹果/Nike"
                  },
                  "验证方法": "成本结构分析:固定成本 vs 可变成本比例。边际成本曲线:客户从1000人→10000人,单客成本如何变化?"
                },
                "盈利时间表(Path to Profitability)": {
                  "定义": "多久能盈利?盈利前需要多少投入?",
                  "评分标准": "12个月内盈利=10分;12-24个月=7分;24-36个月=4分;>36个月或不清楚=1分",
                  "里程碑": "PMF(Product-Market Fit产品市场匹配) → 规模化增长 → 盈亏平衡 → 盈利。前期可以亏损换增长,但必须有明确盈利路径。",
                  "验证方法": "财务规划:3年Pro Forma(预测财务报表),每年收入/成本/净利润,标注盈亏平衡点时间和所需投资额。"
                }
              },
              "Viability总分": "4个子维度平均分,≥8分=商业模式健康,6-8分=需优化,<6分=商业模式有问题(重新设计或放弃)"
            },
            "维度3: Feasibility(技术可行性) - '我们能做到吗?'": {
              "核心问题": "技术上能实现吗?团队有能力吗?供应链/合作伙伴能支撑吗?",
              "评估子维度": {
                "技术难度(Technical Complexity)": {
                  "定义": "实现这个商业模式需要什么技术?是成熟技术还是前沿技术?",
                  "评分标准": "用现有技术可实现(如组合开源工具)=10分;需要一定技术创新但有成功案例=7分;需要前沿技术(AI/区块链)但不确定=4分;需要技术突破(材料/物理限制)=1分",
                  "风险类型": {
