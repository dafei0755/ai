                    "监管/政策风险": "技术可行但法规不允许(如自动驾驶/基因编辑)"
                  },
                  "验证方法": "技术调研:文献综述/专家访谈/竞品拆解。PoC(Proof of Concept概念验证):用2-4周做技术原型,验证核心技术可行性。"
                },
                "团队能力匹配度(Team Capability Match)": {
                  "定义": "现有团队有能力做吗?缺什么关键能力?能补上吗?",
                  "评分标准": "团队有成功经验(做过类似项目)=10分;团队有相关能力(需学习)=7分;团队无经验但能招到人=5分;关键能力市场稀缺难招=2分",
                  "关键能力清单": "技术开发/产品设计/市场营销/销售/运营/财务/法务等,逐一评估团队现有水平(1-10分)vs所需水平,识别能力缺口。",
                  "验证方法": "能力盘点:每个关键岗位评估'现有能力vs所需能力'差距。招聘市场调研:关键岗位市场供给如何?薪资水平/招聘难度?"
                },
                "供应链/合作伙伴就绪度(Ecosystem Readiness)": {
                  "定义": "需要哪些外部合作?上下游供应链成熟吗?合作伙伴愿意配合吗?",
                  "评分标准": "自给自足无需外部依赖=10分;有成熟供应商可选择=8分;需要定制但供应商愿意配合=6分;关键环节无供应商/合作伙伴不配合=2分",
                  "依赖分析": "列出所有外部依赖(供应商/渠道/政府审批/用户数据等),评估每个依赖的风险:可替代性/谈判能力/时间成本。",
                  "验证方法": "供应商访谈:联系潜在供应商/合作伙伴,问'你们能提供XX吗?''需要什么条件?''大概什么价格?'确认可行性。"
                },
                "时间窗口(Time to Market Window)": {
                  "定义": "多久能上市?市场机会窗口有多长?竞争对手动作如何?",
                  "评分标准": "3个月内上市且窗口期>12个月=10分;6个月上市,窗口期6-12个月=7分;>12个月上市或窗口期<6个月=3分",
                  "竞争分析": "竞品进度如何?我们有先发优势还是后发优势?窗口期过了会怎样(如政策变化/用户习惯固化/市场饱和)?",
                  "验证方法": "项目计划:Gantt图列出所有里程碑(需求确认→设计→开发→测试→上市),评估最快和最慢时间,留20-30%buffer。"
                }
              },
              "Feasibility总分": "4个子维度平均分,≥8分=技术可行,6-8分=有风险但可管理,<6分=技术门槛高(需重新评估或寻找替代方案)"
            }
          },
          "综合评估与决策": {
            "3D评分模型可视化": "用雷达图(Radar Chart)展示3个维度12个子维度的得分,直观看到强项和弱项。如某商业模式:Desirability 8.5分(强需求)+Viability 6.0分(商业模式待优化)+Feasibility 7.5分(技术可行)→总体可行但需优化商业模式。",
            "决策矩阵(Decision Matrix)": {
              "第一优先级(快速启动)": "3维都≥7分→立即启动(All Green)",
              "第二优先级(优化启动)": "2维≥7分,1维5-7分→优化弱项后启动(如Desirability和Feasibility都强,但Viability弱→优化定价/成本结构)",
              "第三优先级(谨慎试点)": "1维≥8分(超强),其他维度5-7分→小规模试点,边做边优化(如技术超强但市场不确定→做MVP验证需求)",
              "放弃(No-Go)": "任何1维<5分或3维都<6分→放弃或根本性重新设计(如需求弱+不赚钱+技术难→放弃;如需求强但技术不可行→等技术成熟再做)"
            },
            "情景对比分析(Scenario Comparison)": "如有多个商业模式方向(如A/B/C),用表格对比3维12指标得分+总分排序,辅以SWOT分析每个方向的优势/劣势/机会/威胁,最终选出最优方案或组合策略(如先做B短期获利,同时研发A长期布局)。"
          },
          "实操流程(2周完成评估)": {
            "Week 1: 数据收集与初步评分": {
              "Day 1-2": "组建评估团队(5-7人跨职能:产品/技术/商业/财务/市场),明确评估对象(如'A方案:订阅制SaaS'vs'B方案:一次性售卖+服务')。",
              "Day 3-5": "Desirability评估:用户访谈10-15人(验证痛点强度+付费意愿),市场数据收集(TAM/竞品分析),初步打分。",
              "Day 6-7": "Viability评估:财务建模(LTV/CAC/现金流预测),单位经济测算,初步打分。",
              "Day 8-10": "Feasibility评估:技术可行性调研(PoC如需要),团队能力盘点,供应链确认,初步打分。"
