# Few-Shot Examples for V4-2 Design Researcher (Methodology & Framework Architect)
# 体系与方法论架构师高质量输出示例
# 质量标准: 精品级 (5000-8000字符/示例)
# 示例数量: 3个
# 优先级: P1 (中频使用)

examples:
  - example_id: "v4_2_targeted_framework_001"
    description: "针对性问答 - 设计创新方法论框架"
    category: "targeted_mode"
    user_request: "我们团队缺乏系统的设计创新方法,每次设计都是凭感觉拍脑袋,如何建立一套可复用的创新框架?"
    context:
      project_type: "设计团队能力建设"
      complexity: "medium"
      challenge: "缺乏结构化思考和创新方法论"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "设计创新方法论框架构建",
        "confidence": 0.93,
        "decision_rationale": "用户核心痛点是'缺乏系统方法'+'凭感觉设计',需要Targeted模式深度输出可落地的创新框架。核心策略是整合Design Thinking(设计思维) + TRIZ(创造性问题解决) + 精益创新三大体系,构建'3层5步法'创新框架,既有理论深度又有实操工具。不是泛泛讲方法论,而是提供完整工具箱(模板+案例+检查清单),让团队'明天就能用'。",
        "targeted_analysis": {
          "framework_overview": {
            "框架命名": "'INS创新框架' (Insight-Novelty-Solution Framework)",
            "核心理念": "创新不是灵光一现,而是结构化的思考过程:从洞察(Insight)出发,寻找新颖性(Novelty),最终落地为解决方案(Solution)。框架整合设计思维的人本精神+TRIZ的系统性矛盾解决+精益的快速验证,形成可复用的3层5步创新路径。",
            "适用场景": [
              "产品/服务创新(如开发新款家居产品/设计新服务模式)",
              "空间设计创新(如颠覆传统办公空间/酒店大堂设计)",
              "商业模式创新(如订阅制/共享经济模式设计)",
              "用户体验优化(如简化复杂流程/提升情感价值)"
            ],
            "不适用场景": "纯技术创新(如材料科学/工程技术,需要专业工程方法)或渐进式改良(如已有方案的微调,用常规设计流程即可)"
          },
          "three_layer_structure": {
            "层级1:战略层(Why) - 创新方向定义": {
              "核心问题": "我们为什么要创新?创新的目标是什么?",
              "关键思考": [
                "用户痛点识别(用户真正的问题是什么?表面需求vs深层需求)",
                "市场机会分析(行业空白/竞品弱点/新兴趋势在哪里?)",
                "组织目标对齐(创新要支撑什么业务目标?营收/品牌/效率?)",
                "约束条件明确(时间/预算/技术/政策/文化有什么限制?)"
              ],
              "输出物": "创新简报(Innovation Brief):1页A4,包含问题陈述/目标用户/成功标准/约束条件,作为后续所有工作的北极星"
            },
            "层级2:方法层(How) - 创新路径规划": {
              "核心问题": "用什么方法解决问题?如何系统化地产生创意?",
              "三大方法论整合": {
                "Design Thinking(设计思维)": {
                  "贡献": "用户中心+发散-收敛思维+原型快速验证",
                  "适用阶段": "需求洞察+概念发散+原型测试",
                  "核心工具": "用户旅程地图/移情地图/头脑风暴/快速原型"
                },
                "TRIZ(创造性问题解决)": {
                  "贡献": "系统化矛盾分析+40发明原理+技术进化规律",
                  "适用阶段": "遇到技术/功能矛盾时的突破",
                  "核心工具": "矛盾矩阵/40发明原理卡片/理想最终结果(IFR)"
                },
                "精益创新(Lean Innovation)": {
                  "贡献": "MVP快速验证+迭代优化+数据驱动决策",
                  "适用阶段": "方案验证+市场测试+迭代优化",
                  "核心工具": "最小可行产品(MVP)/A/B测试/北极星指标"
                }
              },
              "方法选择决策树": "如果问题是'用户需求不明确'→用Design Thinking的移情+用户研究;如果是'技术矛盾难以突破'(如要轻但要强)→用TRIZ矛盾矩阵;如果是'方案不确定性高'→用精益的MVP验证。多数项目需要组合使用,如:前期DT洞察→中期TRIZ突破→后期Lean验证。"
            },
            "层级3:工具层(What) - 实操工具箱": {
              "核心问题": "具体用什么工具?每个步骤怎么做?",
              "工具分类": {
                "洞察工具(Insight Tools)": [
                  "用户访谈脚本模板(5W1H结构化问题库)",
                  "移情地图(Empathy Map):用户说什么/想什么/做什么/感受什么四象限",
                  "用户旅程地图(Customer Journey Map):触点-情绪-痛点-机会点可视化",
                  "5Why根因分析:反复问'为什么'挖掘深层需求"
                ],
                "创意工具(Ideation Tools)": [
                  "头脑风暴检查清单(规则:不批评/鼓励疯狂想法/数量优先质量/组合改进)",
                  "SCAMPER法:替代/结合/调整/修改/其他用途/消除/重组7个维度激发创意",
                  "40发明原理卡片(TRIZ精华):如'分割原理'(把整体分成独立部分)/'嵌套原理'(俄罗斯套娃)等,每张卡片配案例",
                  "强制关联法:随机词汇+项目强制结合(如'咖啡店'+'图书馆'→书店咖啡馆)"
                ],
                "评估工具(Evaluation Tools)": [
                  "创意评分矩阵:Impact(影响力) x Feasibility(可行性)四象限,优先做高Impact高Feasibility的'Quick Win'",
                  "SWOT分析:优势/劣势/机会/威胁,评估方案竞争力",
                  "假设验证清单:列出所有假设(如'用户愿意多花30%买环保材料'),逐一设计验证实验"
                ],
                "验证工具(Validation Tools)": [
                  "MVP画布:最小功能集/核心价值假设/验证指标/成本估算一页可视化",
                  "原型制作工具包:纸质原型/数字原型(Figma)/物理原型(3D打印/手工模型)",
                  "用户测试脚本:任务设计/观察记录/访谈问题结构化模板"
                ]
              }
            }
          },
          "five_step_process": {
            "完整创新流程": "从问题到方案的5步路径,每步有明确输入/活动/输出/时间估算",
            "Step 1: 深度洞察(Empathize & Define)": {
              "目标": "理解用户真实需求,定义核心问题",
              "输入": "项目背景/初步假设/利益相关方访谈",
              "关键活动": [
                "用户研究(定性访谈10-20人,观察用户真实行为2-3个场景)",
                "数据分析(如有量化数据,分析用户行为模式/痛点频次)",
                "洞察合成(团队工作坊,用便利贴聚类用户痛点,投票选出Top3核心痛点)",
                "问题重构(用'How Might We'(HMW)句式重新定义问题,如'如何让用户在忙碌时也能享受阅读?'而非'设计一个书店')"
              ],
              "输出": [
                "用户画像(Persona):2-3个典型用户,包含目标/痛点/行为模式",
                "用户旅程地图(标注情绪峰谷+痛点+机会点)",
                "创新简报(Innovation Brief):核心问题陈述(1句话)+目标用户+成功标准"
              ],
              "时间": "1-2周(取决于用户研究深度)",
              "避雷指南": [
                "不要跳过用户研究直接假设需求(80%创新失败因为做了用户不要的东西)",
                "不要只做问卷调查(问卷问不出深层需求,必须面对面访谈+观察)",
                "不要问'你需要什么?'(用户不知道自己需要什么),而要问'你上次遇到XX问题时怎么解决的?'(了解真实行为)"
              ]
            },
            "Step 2: 发散创意(Ideate)": {
              "目标": "产生大量多样化创意,突破思维定式",
              "输入": "Step 1的创新简报+用户洞察",
              "关键活动": [
                "创意工作坊(2-3小时,6-10人跨职能团队,设计师+产品+运营+技术)",
                "分轮头脑风暴(第一轮:自由发散,每人5分钟独立写想法;第二轮:分享+互相激发;第三轮:SCAMPER法强制变形已有想法)",
                "TRIZ矛盾分析(如遇到技术矛盾'要轻但要强',用矛盾矩阵查找对应发明原理,如'复合材料/多孔结构')",
                "跨界参考(看其他行业如何解决类似问题,如'酒店如何做个性化?'→学习Netflix推荐算法)"
              ],
              "输出": [
                "创意池(50-100个初步创意,不评判,全部记录在便利贴墙/Miro白板)",
                "概念分组(用亲和图法Affinity Diagram聚类,形成5-10个概念方向)",
                "初步筛选(用2x2矩阵Impact x Feasibility,选出3-5个'快速赢'概念进入下一步)"
              ],
              "时间": "3-5天(包含工作坊+整理+筛选)",
              "避雷指南": [
                "不要在发散阶段评判(会扼杀创意,统一在收敛阶段评估)",
                "不要只靠设计师(其他角色视角不同,产品懂商业/技术懂可行性/运营懂落地)",
                "不要追求'一个完美创意'(创新是组合和迭代,初期要数量)",
                "不要忽视'疯狂想法'(最疯狂的想法往往藏着突破性洞察,即使不可行也能激发新思路)"
              ]
            },
            "Step 3: 快速原型(Prototype)": {
              "目标": "将抽象创意转化为可触摸的原型,快速验证可行性",
              "输入": "Step 2筛选出的3-5个概念",
              "关键活动": [
                "原型设计(根据概念复杂度选择原型精度:纸质草图/线框图/3D渲染/功能原型/实物模型)",
                "MVP定义(确定'最小可行产品'范围:核心功能是什么?什么可以暂时省略?用MVP画布可视化)",
                "原型制作(低保真快速(如纸质原型1天完成)/中保真数字化(如Figma交互原型2-3天)/高保真实物(如3D打印模型5-7天))",
                "内部预演(团队内部模拟用户使用,发现明显问题,避免浪费用户测试时间)"
              ],
              "输出": [
                "可测试原型(3-5个概念各1个原型,形态根据验证目标选择)",
                "测试计划(每个原型要验证什么假设?用什么指标?需要测试多少用户?)",
                "原型说明书(每个原型的核心价值主张1句话+关键功能列表+已知局限)"
              ],
              "时间": "1-2周(取决于原型精度)",
              "保真度选择指南": {
                ": "验证概念可行性/用户理解度→纸质/线框图(成本最低,迭代最快)",
                "中保真": "验证交互流程/界面布局→数字交互原型(Figma/Axure,接近真实体验)",
                "高保真": "验证视觉/材质/工艺/物理体验→3D渲染/实物模型(成本高,但必要时不可省)"
              },
              "避雷指南": [
                "不要过早追求完美(原型目的是验证假设,不是最终产品,够用就好)",
                "不要做'全功能原型'(违背MVP精神,投入巨大还未验证需求,容易浪费)",
                "不要忽视'假定场景'(原型要放在真实使用场景中测试,如'咖啡店自助点餐'要在嘈杂环境中测试,而非安静会议室)"
              ]
            },
            "Step 4: 用户验证(Test & Learn)": {
              "目标": "用真实用户测试原型,收集反馈,验证/推翻假设",
              "输入": "Step 3的原型+测试计划",
              "关键活动": [
                "用户招募(5-10个目标用户/每个原型,确保代表性)",
                "测试执行(给用户真实任务'请用这个原型完成XX',观察而非指导,记录卡点/疑惑/情绪)",
                "深度访谈(测试后问'你觉得这个方案解决了你的问题吗?''你会用吗?为什么?''还有什么可以改进?')",
                "数据整理(量化数据:任务完成率/耗时/错误率;质性数据:用户引语/观察记录,用便利贴聚类)"
              ],
              "输出": [
                "验证报告(每个原型的表现:哪些假设被验证/被推翻/需要更多数据)",
                "用户反馈清单(痛点/疑问/建议分类整理,优先级排序)",
                "迭代方向(哪个概念最有潜力?需要什么改进?哪些概念放弃?)"
              ],
              "时间": "1周(招募+测试+分析)",
              "关键指标": {
                "任务成功率": ">80%说明方案可行(如'10个用户中8个能独立完成任务')",
                "用户满意度": "李克特量表1-5分,平均分>4说明接受度高",
                "核心价值认同": "'这个方案解决了我的问题'同意率>70%说明方向对",
                "付费意愿(如适用)": "'你愿意为这个方案付费吗?'yes比例>50%说明商业可行"
              },
              "避雷指南": [
                "不要'引导性测试'(如说'这里你点这个按钮',会得到虚假正面反馈,要让用户自己探索)",
                "不要只测试'朋友/同事'(他们会碍于情面给好评,必须测试真实陌生目标用户)",
                "不要忽视'沉默数据'(用户犹豫/卡顿/皱眉都是信号,不只看他们说什么,更看他们怎么做)",
                "不要过度解读单个用户(1个用户的极端意见不代表全部,看整体模式)"
              ]
            },
            "Step 5: 迭代优化(Iterate & Implement)": {
              "目标": "基于验证结果优化方案,准备落地实施",
              "输入": "Step 4的验证报告+反馈清单",
              "关键活动": [
                "优先级排序(用MoSCoW法:Must have必须有/Should have应该有/Could have可以有/Won't have暂不做,聚焦核心)",
                "方案迭代(修改原型,解决高优先级问题,可能需要2-3轮迭代+重新测试)",
                "商业模式设计(用商业模式画布Business Model Canvas:价值主张/客户细分/渠道/收入/成本等9要素)",
                "实施路线图(分阶段落地计划:MVP 1.0功能/时间/资源→2.0增强版→3.0完整版,每阶段有验证指标)"
              ],
              "输出": [
                "最终设计方案(高保真设计稿/技术规格文档/材料清单/工艺说明)",
                "商业计划(成本估算/定价策略/市场推广计划/销售预测)",
                "实施路线图(Roadmap):时间轴+里程碑+负责人+资源需求+风险预案"
              ],
              "时间": "2-4周(取决于方案复杂度)",
              "上线标准": [
                "用户验证:最终方案通过≥2轮用户测试,核心指标达标(如任务成功率>80%)",
                "技术验证:技术团队确认可实现,无重大技术风险",
                "商业验证:财务模型验证盈利可行(或战略意义明确即使短期亏损)",
                "组织准备:团队培训/流程文档/支持体系就绪"
              ],
              "避雷指南": [
                "不要'无限迭代'(设定迭代上限如3轮,避免完美主义导致永远不上线)",
                "不要'大爆炸上线'(一次性推全功能风险大,分阶段灰度发布,逐步放量)",
                "不要忽视'实施后验证'(上线后持续收集数据,用A/B测试优化,创新是持续过程不是一次性项目)"
              ]
            }
          },
          "implementation_toolkit": {
            "工具清单(立即可用)": {
              "模板文档": [
                "创新简报模板(Innovation Brief Template):1页A4 Word/PDF",
                "用户访谈脚本(Interview Script):15个结构化问题",
                "用户旅程地图模板(Journey Map Template):Excel/Miro模板",
                "头脑风暴规则海报(Brainstorm Rules Poster):A3可打印",
                "创意评分矩阵(Idea Scoring Matrix):Excel评分表",
                "MVP画布(MVP Canvas):1页可视化模板",
                "用户测试脚本(User Test Script):任务设计+观察记录表"
              ],
              "案例库": [
                "Airbnb创新案例:用Design Thinking洞察'旅行不是住酒店,是体验当地生活'→共享住宿模式",
                "Dyson吸尘器:用TRIZ解决'吸力强vs噪音大'矛盾→双气旋技术(分离结构原理)",
                "Dropbox MVP案例:用视频演示代替真实产品,验证需求后再开发→节省90%成本",
                "内部成功案例:XX项目用INS框架从0到1开发新产品,6个月上市,第一年营收XX万(如有真实案例填入)"
              ],
              "培训计划": [
                "Level 1 入门工作坊(1天):讲解框架+模拟演练小项目(如'设计更好的咖啡杯')",
                "Level 2 进阶实战(2周):真实项目应用,导师辅导,每周复盘",
                "Level 3 认证(1个月):独立完成1个完整创新项目,通过评审→成为内部创新教练"
              ]
            },
            "团队能力建设路径": {
              "第一阶段:试点(Month 1-2)": {
                "目标": "验证框架有效性,培养种子团队",
                "行动": "选1-2个低风险项目试点,由外部顾问/内部创新负责人带领,全程记录经验教训",
                "里程碑": "完成2个试点项目,输出案例+工具包本地化版本"
              },
              "第二阶段:推广(Month 3-6)": {
                "目标": "扩大使用范围,建立内部社区",
                "行动": "办3-5场内部工作坊,培训30-50人,成立'创新社区'(Creative Community)定期交流,设立'创新时间'(如每周五下午)",
                "里程碑": "至少5个项目使用框架,社区月活跃度>60%,收集10+个改进建议"
              },
              "第三阶段:制度化(Month 7-12)": {
                "目标": "框架成为组织标准流程",
                "行动": "纳入项目管理制度(所有新项目启动前必须过创新简报评审),设立'创新基金'(小额资金支持内部创意孵化),年度'创新大赛'(奖励最佳实践)",
                "里程碑": "框架使用率>80%(新项目中),至少1个项目获得外部奖项/媒体报道,形成品牌效应"
              }
            }
          },
          "success_metrics": {
            "框架有效性指标": {
              "过程指标": [
                "框架使用率:新项目中使用INS框架的比例(目标>70%)",
                "工具使用频次:各工具模板下载/使用次数(目标月均>50次)",
                "培训参与度:员工参与创新培训的比例(目标>80%)"
