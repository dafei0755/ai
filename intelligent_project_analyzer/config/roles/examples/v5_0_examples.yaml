# Few-Shot Examples for V5-0 Scenario Expert (General Scenario Strategist)
# 通用场景策略师高质量输出示例
# 质量标准: 精品级 (8000-10000字符/示例)
# 示例数量: 3个
# 优先级: P1 (中频使用)

examples:
  - example_id: "v5_0_targeted_logic_001"
    description: "针对性问答 - 会员制健身房运营逻辑分析"
    category: "targeted_mode"
    user_request: "会员制健身房的核心运营逻辑是什么?这对空间设计有什么影响?"
    context:
      project_type: "商业健身场所"
      complexity: "medium"
      challenge: "理解会员制商业模式对空间的特殊要求"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "会员制健身房运营逻辑解构",
        "confidence": 0.92,
        "decision_rationale": "用户核心疑问是'运营逻辑是什么',属于Targeted模式中的类型1:运营逻辑类。核心策略是用第一性原理解构会员制商业模式,识别价值交换本质('预付费换未来服务使用权'+'社群归属感'),分析运营阶段('获客-留存-续费'),最后转化为具体空间设计要求(如前置区重销售,训练区重体验,社交区重粘性)。不是泛泛讲健身房,而是聚焦会员制的独特运营逻辑如何影响空间配置。",
        "targeted_analysis": {
          "first_principles_analysis": {
            "商业模式本质": {
              "核心交换": "用户预付费(年卡/月卡) ⇄ 场所提供未来一段时间的健身服务使用权",
              "价值创造方式": "1)设备和空间价值:提供专业器械和锻炼环境(家庭无法复制); 2)时间价值:24小时或长时段营业,适应用户作息; 3)社交价值:提供社群环境,降低健身孤独感; 4)激励价值:已付费产生沉没成本心理,推动持续使用",
              "利润来源": "会员续费率(核心)+私教/团课增值服务+周边产品销售。关键指标:续费率>60%为健康(行业平均40-50%),私教转化率>20%",
              "成本结构": "固定成本占比高(>70%):租金+装修+设备+人力,边际成本低(多服务一个会员几乎不增加成本)→必须依靠规模化(高会员数)和高续费率分摊成本"
            },
            "与传统'单次付费健身'的区别": {
              "付费心理": "会员制=预付费,用户有'不用亏了'的心理,促进高频使用;单次付费=用一次付一次,心理门槛高,使用频率低",
              "空间定位": "会员制健身房是'第三空间'(家-公司-健身房),需要营造归属感;单次付费健身房是'功能场所',只需满足基本锻炼需求",
              "服务深度": "会员制需要长期关系维护(私教跟踪/社群活动/生日祝福等),单次付费是短期交易",
              "空间策略差异": "会员制需要更多'非训练空间'(社交/休闲/增值服务区)来提升粘性,单次付费只需核心训练区"
            }
          },
          "operational_drivers": {
            "阶段1:获客期(前3个月)": {
              "核心目标": "吸引目标客群(如白领/健身爱好者/减脂人群),快速积累会员基数(目标首月200人,3个月内500-800人)",
              "运营策略": "低价引流(99元体验月卡/0元团课体验)+销售转化(私教顾问现场转化年卡+私教包)",
              "空间要求": [
                "前台/销售区(售前区):必须靠近入口,视觉吸引力强(透明橱窗展示训练场景/LED屏滚动会员成果),面积占比10-15%,配备2-3个销售工位+沙发洽谈区+展示墙(会员前后对比照片/私教资质证书)",
                "体验动线:从入口→前台→参观通道→体验区(团课教室或器械区)→再回前台成交,全程需要'哇时刻'(Wow Moment)设计,如进门看到专业器械/明亮灯光/动感音乐,激发'我也想变成这样'的冲这",
                "明亮度和开放性:获客期需要'可见性'(透明玻璃/开放布局),让路人看到内部专业感和活力氛围,降低陌生感"
              ]
            },
            "阶段2:留存期(3-12个月)": {
              "核心目标": "提升会员活跃度(月均到店8-12次为合格,低于5次为流失预警),降低流失率(月流失率<5%)",
              "运营策略": "高频触达(私教/团课预约提醒)+社群运营(会员打卡群/线下沙龙)+体验优化(器械维护/环境清洁/教练专业度)",
              "空间要求": [
                "核心训练区(留存核心):面积占比50-60%,分为有氧区(跑步机/椭圆机/动感单车,占30%)+力量区(哑铃/杠铃/固定器械,占40%)+功能训练区(自由训练垫/TRX/壶铃,占20%)+拉伸区(泡沫轴/拉伸架,占10%)。布局逻辑:有氧区靠窗(景观好/通风佳,缓解枯燥感),力量区居中(重器械隔音/避免打扰),功能区灵活(可举办小团课)",
                "团课教室(高频工具):面积60-100平米,容纳20-30人,镜面墙+专业音响+可调灯光(动感单车课/瑜伽课光线需求不同),排课密度高(每天6-8节),是会员高频到店的引流工具",
                "社交空间(粘性关键):水吧/休息区面积占10%,提供蛋白粉/轻食/咖啡(增值收入),沙发+充电插座+社交氛围(会员间自然交流),是'第三空间'属性的体现。健身完不急着走,坐下来聊天/刷手机/约私教,延长停留时间=提升归属感",
                "更衣淋浴区(体验底线):面积占15-20%,储物柜+独立淋浴间(6-10间)+吹风/化妆台,清洁度是口碑关键(差评多因更衣室脏乱),热水充足是基本要求。高端健身房配桑拿/蒸汽房(提升会员到店意愿)"
              ]
            },
            "阶段3:续费期(10-12个月,会员卡到期前)": {
              "核心目标": "续费率>60%(行业顶级可达70-80%),提升客单价(引导升级更长周期卡如3年卡,或购买私教包)",
              "运营策略": "提前2个月触达(私教/销售顾问沟通续费优惠)+数据展示(年度锻炼报告:到店次数/体测数据/排行榜,强化成就感)+情感绑定(生日祝福/周年庆活动/老会员专属福利)",
              "空间要求": [
                "私教区(高客单转化):独立或半开放空间(6-10个私教工位),每个工位配备全套器械(哑铃/壶铃/TRX/训练凳),面积占10-15%。私教是续费关键(购买私教包的会员续费率>80%),因为私教=强关系+沉没成本(已付费私教课必须用完)",
                "体测室(数据驱动):独立房间,配备体成分分析仪(Inbody等),定期免费体测(入会/3个月/6个月/续费前),可视化身体变化(体脂率下降/肌肉量提升)是最强续费说服工具,空间需要私密性(避免会员尴尬)",
                "荣誉墙/社群展示区:展示会员成果(前后对比照/打卡天数排行榜/私教学员案例),营造'我也可以'的氛围,是情感绑定的物理载体"
              ]
            }
          },
          "spatial_requirements": {
            "功能分区占比(总面积1000平米为例)": {
              "核心训练区": "500-600平米(50-60%):有氧+力量+功能训练+拉伸",
              "团课教室": "80-100平米(8-10%):1-2间,高频排课",
              "私教区": "100-120平米(10-12%):8-10个私教工位",
              "前台/售前区": "80-100平米(8-10%):销售+前台+储物",
              "更衣淋浴区": "150-180平米(15-18%):男女更衣+淋浴8-12间+厕所",
              "社交/水吧区": "60-80平米(6-8%):休息沙发+水吧台+轻食展示",
              "其他(走廊/设备间/办公室)": "剩余空间"
            },
            "空间动线设计": {
              "会员动线": "入口刷卡→更衣区换衣→训练区锻炼→淋浴区洗澡→社交区休息→出口,流畅无折返,更衣区和淋浴区必须靠近(避免穿着运动服满场跑找淋浴)",
              "销售动线": "潜在客户入口→前台登记→参观通道(可看到训练区全景但不打扰会员)→体验区(团课教室或指定器械区)→洽谈区成交→出口,全程有销售陪同讲解",
              "教练巡场动线": "私教在私教区相对固定,团课教练在教室,巡场教练在公共训练区游走(纠正动作/解答疑问/推销私教课),需要视野开阔的布局(一眼看到大部分训练区)"
            },
            "关键设计参数": {
              "层高": "≥3.5米(训练区需要高挑感,动感单车/团课跳动时不压抑),局部如私教区可降至3米",
              "承重": "≥500kg/平米(力量区重器械+会员体重),需提前与物业确认楼板承重,住宅楼改健身房常失败于承重不足",
              "通风": "新风系统必配(训练区CO2浓度高+汗味重),换气次数≥10次/小时,或配合空调+排风扇",
              "隔音": "团课教室必须隔音(动感单车音乐>100分贝),墙体+门+天花板做隔音处理,避免扰民投诉(商业区尚可,住宅区附近健身房常因噪音关门)",
              "光照": "有氧区自然光+人工照明(明亮活跃),力量区可适当降低亮度(沉浸专注),团课教室可调光(瑜伽/动感单车需求不同),更衣区柔和灯光(舒适)",
              "地面": "训练区用橡胶地垫(减震+防滑+耐磨),私教区用厚橡胶垫(哑铃掉落不砸坏地面),团课教室用运动木地板(跳操缓冲),更衣区用防滑瓷砖(防水)"
            }
          },
          "critical_success_factors": [
            "✅ 前置销售区必须强视觉冲击:透明玻璃展示专业设备+活力氛围,吸引路人进店咨询(转化率直接影响获客成本)",
            "✅ 团课教室是留存利器:高频排课(每天6-8节)+多样化课程(瑜伽/动感单车/搏击/普拉提)→会员有理由高频到店→活跃度提升→续费率高",
            "✅ 社交空间不可省:水吧/休息区是'第三空间'核心,会员健身后停留社交→归属感→续费率。纯功能性健身房(只有器械无社交)续费率低30%+",
            "✅ 更衣淋浴区是体验底线:清洁度/热水充足/储物安全是最高频差评点,必须每天多次清洁+实时巡查,一次差体验=流失一个会员",
            "✅ 私教区是利润核心:私教客单价高(年卡3000元 vs 私教包2万元)+续费率高(>80%),空间设计要支持私密性(会员愿意展示身材缺陷给私教,但不想公开)和专业性(私教器械齐全)",
            "✅ 承重和噪音是硬伤:开业前必须确认楼板承重(重器械区≥500kg/㎡)和噪音控制(团课教室隔音),否则后期整改成本巨大甚至被迫关店",
            "⚠ 避坑:过度投资装修豪华但忽略运营逻辑→获客难/留存低→亏损。如某高端健身房花200万装修大堂和休息区(占30%面积),但训练区器械不足+团课教室太小(只能容纳10人),导致会员抱怨'中看不中用',半年关店"
          ],
          "case_reference": {
            "成功案例": "乐刻健身24小时模式:小面积(300-500平米)+低价(月卡99-199元)+高密度布点(同城市50+门店)→用规模化分摊成本+24小时营业吸引夜班人群/自律用户→单店模型验证后快速复制。空间特点:极简装修(降低成本)+纯器械无团课教室(降低人力)+无淋浴(降低水电成本),目标用户是'预算有限但愿意自己练'的健身爱好者。适用场景:一二线城市社区店/写字楼底商",
            "失败教训": "某传统健身房倒闭潮(2019-2020):预售制吸金(卖3年卡)+实际运营亏损(房租+人力成本高)→资金链断裂→跑路。核心问题:会员预付费被挪作他用(开新店/高管挥霍),而非用于维持现有店运营→老会员服务差(器械坏不修/教练流失)→口碑崩塌→恶性循环。空间设计启示:豪华装修≠长期生存,运营健康(现金流正/续费率高)才是根本,空间设计应服务于'提升续费率',而非'给投资人看的门面'"
          }
        },
        "expert_handoff_response": {
          "to_V2_design_director": "请基于以上运营逻辑,设计1000平米会员制健身房的空间布局方案:1)功能分区:核心训练区500平米(有氧/力量/功能/拉伸各多大?如何分隔?)+团课教室80平米(位置/隔音/镜面墙)+私教区100平米(开放or半开放?)+社交水吧区60平米(位置选择?)+更衣淋浴区150平米(男女比例?淋浴间数量?);2)动线设计:会员动线(入口→更衣→训练→淋浴→社交→出口如何最短?)+销售动线(潜在客户参观路线如何设计不打扰会员?);3)视觉策略:前台销售区如何设计吸引眼球(透明橱窗?LED屏?展示墙?)+训练区如何设计激励氛围(镜面墙?灯光?音乐系统?);4)关键参数确认:层高够吗?承重够吗?隔音方案?通风方案?",
          "to_V6_3_material_expert": "请提供健身房关键材料选型建议:1)地面材料:训练区橡胶地垫(厚度?品牌?价格?)+团课教室运动木地板(减震系数?)+更衣区防滑瓷砖;2)隔音材料:团课教室墙体/门/天花板隔音方案(目标隔音量>40分贝,预算?);3)镜面墙:训练区+团课教室需要大面积镜子(厚度?防雾?安装方式?);4)耐用性考虑:高频使用区域(更衣柜/淋浴间/力量区地面)材料必须耐磨耐腐蚀+易清洁,预算如何平衡?"
        },
        "challenge_flags": [
          {
            "challenge": "前期获客成本高,销售转化压力大",
            "details": "健身房获客成本200-500元/人(线上广告+地推+体验课),如果前台销售区设计不当(位置偏/不吸引/洽谈区嘈杂),转化率低→获客成本浪费→盈利困难",
            "mitigation": "前台区必须靠近入口+透明可见+软装舒适(沙发+茶水+展示墙)+销售话术配合('先参观再决定'降低抗拒)+体验课免费(团课/私教试课)快速建立信任"
          },
          {
            "challenge": "会员活跃度低导致续费率差",
            "details": "行业数据:月到店<5次的会员续费率<20%(几乎必流失),但很多健身房会员办卡后3个月不来(惰性+忙碌+效果不明显)→到期不续费",
            "mitigation": "空间设计增加'到店理由':1)团课高频排课(每天8节不同课程,总有适合的)→到店练团课;2)社交空间舒适(水吧/WiFi/充电)→到店社交而非纯锻炼;3)私教跟踪(购买私教包的会员必须定期上课)→高频到店;4)打卡激励(到店打卡墙/排行榜)→gamification游戏化"
          },
          {
            "challenge": "成本控制vs体验提升的平衡",
            "details": "健身房利润率低(净利润率5-15%,行业平均10%),过度投资装修/设备→回本周期长(3-5年)→现金流压力大;但如果过于节省(器械少/环境差/无淋浴)→会员体验差→流失率高",
            "mitigation": "分期投资策略:1)一期(开业):核心训练区设备齐全(80%预算)+更衣淋浴达标(清洁是底线),装修简洁(节省成本);2)二期(6个月后,现金流正):增加社交区软装(沙发/水吧/绿植)+团课教室升级(灯光音响);3)三期(1年后,盈利稳定):考虑增值服务(桑拿/蒸汽房/高端私教室)。核心:先保证'能用',再追求'好用',最后实现'享受'"
          }
        ]
      }

  - example_id: "v5_0_targeted_stakeholder_002"
    description: "针对性问答 - 共享办公空间利益相关方分析"
    category: "targeted_mode"
    user_request: "共享办公空间(如WeWork)的核心利益相关方有哪些?他们的需求如何影响空间设计?"
    context:
      project_type: "商业办公空间"
      complexity: "medium"
      challenge: "多元利益相关方需求冲突"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "共享办公空间利益相关方分析",
        "confidence": 0.90,
        "decision_rationale": "用户明确问'核心利益相关方有哪些',属于Targeted模式类型2:利益相关方类。核心策略是识别ALL利益相关方(不只用户,还有运营方/物业/投资人/服务商等),分析每个角色的需求/痛点/与空间的接触点,解构权力关系(谁是决策者?谁是影响者?),最后给出空间设计优先级排序(如何平衡冲突需求)。不是简单列举相关方,而是深度分析需求冲突如何通过空间设计化解(如创业者需要安静vs社交需求高的自由职业者)。",
        "targeted_analysis": {
