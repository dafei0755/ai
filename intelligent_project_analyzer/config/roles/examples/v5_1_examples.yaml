# Few-Shot Examples for V5-1 Scenario Expert (Residential Lifestyle & Circulation Planning)
# 居住场景与生活方式专家高质量输出示例
#
# 质量标准: 精品级 (5000-8000字符/示例)
# 示例数量: 3个
# 优先级: P0 (高频使用)

examples:
  - example_id: "v5_1_targeted_circulation_001"
    description: "针对性问答 - 家务动线优化(双职工家庭)"
    category: "targeted_mode"
    user_request: "双职工家庭,每天早晨时间紧张,如何优化家务动线提高效率?"
    context:
      project_type: "城市住宅"
      complexity: "medium"
      family_structure: "夫妻+1个学龄儿童"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "双职工家庭早高峰家务动线优化",
        "confidence": 0.91,
        "design_rationale": "用户聚焦于特定时段(早高峰)的动线效率问题,采用Targeted模式深度分析家务操作路径。基于双职工家庭的时间压力和多人并行活动特点,构建'冲突最小化+效率最大化'的动线策略。",
        "targeted_analysis": {
          "scenario_time_pressure_analysis": {
            "critical_time_window": "工作日06:30-08:30(120分钟黄金窗口)",
            "concurrent_activities": [
              "父母起床洗漱(06:30-07:00)",
              "准备早餐+叫醒孩子(07:00-07:20)",
              "全家用餐(07:20-07:40)",
              "收拾餐具+整理书包(07:40-08:00)",
              "换衣出门(08:00-08:30)"
            ],
            "bottleneck_identification": "核心瓶颈在于'单卫生间排队'和'厨房-餐厅-玄关的多次往返'导致总动线距离过长且存在交叉冲突。",
            "time_waste_quantification": "当前模式下,每天早晨因动线不合理损失的时间约15-20分钟(占总时间的12.5-16.7%)。"
          },
          "circulation_optimization_strategies": [
            {
              "circulation_type": "卫生间使用动线",
              "current_pain_points": [
                "单卫生间导致早高峰排队(父母-孩子-父母的串行使用)",
                "从卧室到卫生间需穿过客厅(距离约8-10米)",
                "洗漱用品分散存放(部分在卧室,部分在卫生间)"
              ],
              "optimized_solution": {
                "strategy_name": "干湿分离+双洗手台配置",
                "spatial_requirements": [
                  "主卫(4-5㎡):马桶+淋浴间+单洗手台,紧邻主卧,父母专用",
                  "次卫(3-4㎡):马桶+洗手台+镜柜,靠近儿童房,孩子专用",
                  "如空间受限:至少实现'马桶间独立+双洗手台'(一个在卫生间内,一个在卫生间外走廊)"
                ],
                "time_savings": "消除排队等待,节省8-10分钟/天",
                "implementation_cost": "中等(需要增加1个马桶+1组洗手台,约15000-25000元)",
                "priority_level": "最高(投资回报率极高,每年节省50小时)"
              },
              "alternative_solution": {
                "strategy_name": "时间错峰+动线预优化",
                "details": "如无法改造双卫,则通过洗漱用品前置(前一晚准备好衣物和洗漱包)+错峰起床(父母提前15分钟起床完成洗漱)来缓解冲突。",
                "time_savings": "减少等待时间5-7分钟/天",
                "implementation_cost": "极低(仅需调整生活习惯)",
                "priority_level": "次选方案"
              }
            },
            {
              "circulation_type": "厨房-餐厅-玄关三角动线",
              "current_pain_points": [
                "早餐准备:厨房→餐厅(往返3-4次,每次12米,总计36-48米)",
                "收拾餐具:餐厅→厨房(往返2次,24米)",
                "准备书包/公文包:卧室→客厅→玄关(往返取物,约30米)",
                "总动线长度:90-100米/天,耗时约8-10分钟"
              ],
              "optimized_solution": {
                "strategy_name": "开放式厨房+岛台中继+玄关储物强化",
                "spatial_layout_principles": [
                  "厨房-餐厅一体化:打通厨房与餐厅隔墙,形成开放式布局(无需往返传菜)",
                  "中岛/吧台设计:在厨房与餐厅交界处设置岛台(可兼做早餐台+备餐台+收纳台),减少端菜动线",
                  "玄关超级储物柜:设计3米宽玄关柜,分区存放[书包区+公文包区+钥匙盒+雨具区+鞋柜],所有出门必需品'一站式拿取'"
                ],
                "distance_reduction": "动线总长度从90-100米压缩至40-50米(减少50-60%)",
                "time_savings": "节省5-7分钟/天",
                "additional_benefits": [
                  "视线通透:父母在厨房备餐时可观察到餐厅的孩子(安全+互动)",
                  "灵活用餐:工作日可在岛台快速用餐,周末可在餐桌正式用餐",
                  "减少遗漏:玄关集中储物避免出门前'找不到东西'的焦虑"
                ],
                "implementation_cost": "中高(拆墙+岛台+玉关柜,约30000-50000元)",
                "priority_level": "高(适合有装修或改造计划的家庭)"
              },
              "quick_win_solution": {
                "strategy_name": "不改格局的动线微优化",
                "tactics": [
                  "厨房门口设置餐车/推车:将所有早餐食物一次性装车推至餐厅(减少往返次数从4次降至1次)",
                  "餐桌下方安装收纳篮:餐后餐具临时存放,晚上统一清洗(早晨不必立刻收拾)",
                  "玄关增设临时挂钩+托盘:前一晚将书包/公文包/钥匙统一放置玄关(无需早晨到处找)"
                ],
                "distance_reduction": "动线长度减少约30%(从100米降至70米)",
                "time_savings": "节省3-4分钟/天",
                "implementation_cost": "极低(购买餐车+挂钩+托盘,约500-1000元)",
                "priority_level": "最高(立即可实施,性价比极高)"
              }
            },
            {
              "circulation_type": "换衣出门动线",
              "current_pain_points": [
                "衣物分散:孩子衣服在儿童房,父母衣服在主卧,导致多次往返",
                "找衣服耗时:早晨临时翻找'今天穿什么',尤其孩子的校服/配饰",
                "鞋柜混乱:全家鞋子堆在玄关,找鞋子浪费时间"
              ],
              "optimized_solution": {
                "strategy_name": "'明日衣物预设系统'+玄关分区鞋柜",
                "workflow_design": [
                  "前夜预备仪式:每晚睡前,全家成员将明日衣物(包括校服/工作装/配饰/袜子)统一挂在卧室门后挂钩或放在床尾凳上",
                  "儿童自主训练:孩子独立完成'明日衣物打包',培养时间管理能力(父母检查即可)",
                  "玄关鞋柜分层:上层=孩子常穿鞋(高度60cm),中层=大人常穿鞋(高度80cm),下层=换季鞋收纳。每人固定位置,拿取无需翻找"
                ],
                "time_savings": "节省5-8分钟/天(找衣服3-5分钟+找鞋子2-3分钟)",
                "behavioral_impact": "培养孩子的计划性和责任感,减少早晨的'催促战争'",
                "implementation_cost": "极低(仅需购买门后挂钩+床尾凳+鞋柜分隔板,约300-800元)",
                "priority_level": "最高(立即可实施,且有教育附加值)"
              }
            }
          ],
          "spatial_adjacency_recommendations": {
            "ideal_layout_principles": [
              "垂直分层:卧室(睡眠区)→卫生间(洗漱区)→厨房/餐厅(用餐区)→玄关(出门区)应呈直线或L型布局,避免环形往返",
              "缓冲区设计:在'动态区'(厨房/餐厅/客厅)和'静态区'(卧室)之间设置走廊或储物墙作为空间过渡,避免卧室直接暴露于活动区",
              "双动线系统:规划'清洁动线'(厨房→洗衣房→阳台)和'日常动线'(卧室→卫生间→玄关)物理分离,避免交叉"
            ],
            "quantified_adjacency_matrix": [
              "主卧-主卫距离:≤3米(理想紧邻,开门即达)",
              "儿童房-次卫距离:≤5米(可接受短走廊)",
              "厨房-餐厅距离:≤2米(理想开放式一体,或半开放推拉门)",
              "餐厅-玄关距离:≤8米(孩子端书包到玄关时不宜过远)",
              "卧室-玄关距离:≤15米(从起床到出门的总动线预算)"
            ]
          },
          "circulation_kpis_framework": {
            "kpi_definition": "基于时间和距离的双重效率指标",
            "measurement_methods": [
              {
                "kpi_name": "早高峰总动线长度",
                "baseline_value": "当前平均100米/天",
                "target_value": "优化后≤60米/天(减少40%)",
                "measurement": "使用智能手环或手机计步器记录早晨06:30-08:30的室内移动距离"
              },
              {
                "kpi_name": "冲突等待时间",
                "baseline_value": "当前平均10-15分钟/天(卫生间排队+找物品)",
                "target_value": "优化后≤5分钟/天(减少60%以上)",
                "measurement": "记录'因等待卫生间'和'找不到东西'导致的时间损失"
              },
              {
                "kpi_name": "按时出门达成率",
                "baseline_value": "当前60-70%(常有迟到风险)",
                "target_value": "优化后≥90%(建立从容的早晨节奏)",
                "measurement": "统计一个月内'计划08:30出门且实际08:25前完成准备'的天数占比"
              },
              {
                "kpi_name": "家庭成员压力感知",
                "baseline_value": "当前:早晨常有争吵和催促,压力指数8/10",
                "target_value": "优化后:从容有序,压力指数≤4/10",
                "measurement": "每周家庭会议时,成员对'早晨体验'进行1-10分打分"
              }
            ]
          },
          "phased_implementation_roadmap": {
            "phase_1_quick_wins": {
              "timeline": "实施第1-2周",
              "actions": [
                "购买并安装玄关挂钩+托盘+鞋柜分隔板",
                "购买厨房餐车/推车",
                "建立'明日衣物预备'家庭仪式",
                "规划并标记'玄关储物分区'(用标签纸)"
              ],
              "expected_impact": "动线优化20-30%,时间节省5-8分钟/天",
              "investment": "约1000-1500元"
            },
            "phase_2_behavioral_adjustment": {
              "timeline": "实施第3-4周",
              "actions": [
                "全家成员适应新动线,形成肌肉记忆",
                "孩子独立完成'明日衣物打包'训练",
                "监测并记录KPI数据,识别剩余痛点"
              ],
              "expected_impact": "巩固Phase 1成果,按时出门率提升至80%"
            },
            "phase_3_spatial_renovation": {
              "timeline": "3-6个月(如有装修计划)",
              "actions": [
                "评估是否需要开放式厨房改造或增加次卫",
                "如预算充足,实施'厨房-餐厅一体化+岛台设计'",
                "如预算受限,至少实现'马桶间独立+双洗手台'"
              ],
              "expected_impact": "动线优化50-60%,时间节省10-15分钟/天,彻底解决冲突",
              "investment": "约30000-50000元(视改造范围)"
            }
          },
          "design_handoff_to_v2": {
            "critical_spatial_requirements": [
              "如新装修/改造:强烈建议双卫生间配置,即使牺牲部分储物空间",
              "开放式厨房或半开放厨房(玻璃推拉门)优于封闭式厨房",
              "玄关柜深度≥40cm,宽度≥2.5米,需分区设计(书包/公文包/钥匙/鞋柜)",
              "主卧与主卫之间不宜有长走廊,理想状态是'卧室套间'模式",
              "如空间允许,在厨房与餐厅之间设置1.2米宽岛台/吧台"
            ],
            "non_negotiable_principles": [
              "双职工家庭的'时间即金钱',空间设计必须服务于'效率最大化'",
              "早高峰是家庭矛盾高发期,好的动线设计能显著提升家庭关系质量",
              "孩子成长需要'自主性训练',玄关和衣物管理系统应便于孩子独立操作"
            ]
          }
        }
      }

  - example_id: "v5_1_targeted_growth_002"
    description: "针对性问答 - 儿童成长适应性空间设计(0-12岁跨度)"
    category: "targeted_mode"
    user_request: "家里有一个2岁的孩子,如何设计儿童房能够适应他未来10年的成长变化?"
    context:
      project_type: "家庭住宅"
      complexity: "medium"
      child_age: "2岁"

    correct_output: |
      {
        "output_mode": "targeted",
        "user_question_focus": "儿童房成长适应性设计(2岁→12岁)",
        "confidence": 0.89,
        "design_rationale": "用户关注的是单个空间的长期适应性问题,采用Targeted模式构建'阶段需求地图'+'可变空间策略'。基于儿童发展心理学和家庭经济性考虑,设计一个能陪伴孩子10年的'进化型'空间。",
        "targeted_analysis": {
          "child_development_stages_mapping": [
            {
              "stage": "学步期(2-3岁):探索敏感期",
              "cognitive_physical_characteristics": [
                "运动能力:刚学会走路/跑步,平衡感不佳,常摔倒",
                "认知特点:用嘴巴和手探索世界,喜欢扔东西/敲东西",
                "情绪特点:分离焦虑高峰,需要看见父母才有安全感",
                "睡眠模式:日间午睡1-2次,夜间需父母陪伴入睡"
              ],
              "spatial_needs": [
                "软包地面:全屋铺软木地板或泡沫拼接垫(防摔伤)",
                "低矮开放储物:高度40-60cm的开放式玩具柜(孩子能自己拿取)",
                "安全防护:家具圆角处理,插座保护盖,窗户护栏",
                "视线通透:房门可选玻璃门或半高门,父母在客厅能看到孩子"
              ],
              "furniture_configuration": [
                "婴儿床(120x60cm)或儿童床(150x70cm)带护栏",
                "低矮玩具柜(3-4层,高度60cm)",
                "爬行/游戏区(≥6㎡空地)",
                "尿布台/护理台(可移除)"
              ],
              "budget_allocation": "约15000-20000元(家具+软装+安全防护)"
            },
            {
              "stage": "学龄前期(3-6岁):想象力爆发期",
              "cognitive_physical_characteristics": [
                "运动能力:奔跑/跳跃自如,开始骑平衡车/滑板车",
                "认知特点:想象力丰富,喜欢角色扮演游戏(如'过家家'/'医生游戏')",
                "社交需求:开始有玩伴来访,需要共同游戏空间",
                "学习萌芽:对数字/字母/绘画产生兴趣,需要涂鸦和操作空间"
              ],
              "spatial_needs": [
                "多功能游戏区:可搭建'帐篷小屋'/'积木城堡'的弹性空间",
                "创意墙面:一整面墙贴白板贴或黑板漆(随意涂鸦)",
                "玩具分类储物:玩具数量爆炸性增长,需要更多储物空间",
                "小书角:低矮书架(孩子能够到)+豆袋沙发或地垫"
              ],
              "furniture_configuration": [
                "升级至标准儿童床(150x70cm→180x90cm,可用至12岁)",
                "新增儿童桌椅(可调节高度款):用于画画/手工/玩拼图",
                "玩具储物柜扩容:增加至6-8层或使用储物箱系统",
                "角色扮演道具收纳(挂钩挂服装+篮子放道具)"
              ],
              "space_transition_from_stage1": [
                "移除:尿布台/婴儿护栏(不再需要)",
                "保留:软木地板(仍会摔倒)/玩具柜底层(加高层数)",
                "新增:创意墙面(激发想象力)/小书角(培养阅读习惯)"
              ],
              "budget_allocation": "约8000-12000元(更换床+桌椅+墙面改造+增购储物)"
            },
            {
              "stage": "学龄期(6-9岁):规则建立期",
              "cognitive_physical_characteristics": [
                "学习任务:正式进入小学,有家庭作业/课外班任务",
                "自主性提升:开始有'自己的秘密',需要独立空间",
                "兴趣发展:可能学习乐器/运动/艺术,需要练习空间",
                "社交扩展:同学来访增多,需要接待和共同活动空间"
              ],
              "spatial_needs": [
                "专注学习区:独立书桌+充足照明+安静环境(远离游戏区)",
                "兴趣发展角:如钢琴角/运动角/手工台(视孩子具体兴趣)",
                "私密睡眠区:床铺独立性增强,可能需要床帘或小隔断",
                "社交游戏区:保留但面积可缩小,转向'桌游/拼装玩具'而非'过家家'"
              ],
              "furniture_configuration": [
                "保留儿童床(180x90cm仍适用)",
                "核心新增:标准学习书桌(120x60cm)+人体工学椅+台灯+书架",
                "储物转型:玩具柜逐步转为'书籍+学习用品+兴趣用品'收纳",
                "如空间允许:新增乐器(如电钢琴)/运动器材(如篮球架)放置区"
              ],
              "space_transition_from_stage2": [
                "压缩:游戏区面积从6㎡压缩至3-4㎡(玩具减少,学习用品增加)",
                "改造:涂鸦墙改为软木板墙(贴作业/奖状/课程表)",
                "强化:书桌区照明从'一般照明'升级为'台灯+护眼灯'组合",
                "分区明确:'学习区'和'休息区'物理分割(用书架或矮柜当隔断)"
              ],
              "budget_allocation": "约12000-18000元(书桌椅套装+书架+台灯+兴趣器材+储物升级)"
            },
            {
              "stage": "前青春期(9-12岁):独立意识觉醒期",
              "cognitive_physical_characteristics": [
                "隐私需求:强烈渴望'自己的领地',拒绝父母随意进入",
