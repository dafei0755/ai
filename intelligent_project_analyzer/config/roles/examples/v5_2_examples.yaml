            "target": "首年500人(月均42人),次年累计2000人(5店×400人/店)",
            "spatial_strategy": "会员专属体验区(VIP试衣间+会员休息区+会员活动优先报名,制造'会员优越感')→顾客愿意充值成为会员(充500元享8折+每月免费团课=年度权益价值1500元,顾客觉得划算)"
          },
          {
            "metric": "复购率",
            "target": "6个月内复购率30%(2400首单客户→720人复购),12个月内复购率50%(→1200人复购)",
            "spatial_strategy": "体验店作为'社群活动场所'(每月办活动,会员定期返店参加→产生'这是我的运动基地'归属感→复购)+ 线上社群运营(每周3次内容+个性化推荐,保持品牌存在感)"
          },
          {
            "metric": "客单价",
            "target": "线下即时购客单价600元(运动鞋400元+运动服200元),线上延迟购客单价400元(小程序下单,配件/服饰为主),综合客单价500元",
            "spatial_strategy": "搭配展示(体验区模特穿'全套运动装备',顾客体验后看到搭配→购买整套而非单品,客单价提升50%)+交叉销售(收银台旁'运动袜/腰包/水壶',客单价+100元)"
