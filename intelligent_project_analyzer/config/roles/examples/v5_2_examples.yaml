          "to_V2_design_director": "请基于以上动线优化策略,设计120平米女装店空间改造方案:1)**平面布局**:入口橱窗3平米(模特展示,透明玻璃)→前区过渡带(左侧墙货架10米+右侧角落折扣区)→中部环形动线(墙面货架+中岛展台3个)→深处惊喜区15平米(尽头墙重点照明)→试衣间4间(每间2.5平米,靠深处右侧)→收银台+休息区5平米(入口右侧)。请给出CAD平面图,标注:货架位置/中岛位置/试衣间/镜子/通道宽度/动线箭头(逆时针环形);2)**照明设计**:分区照明策略:前区300-500lux柔和光(不刺眼,舒适)+中部500-800lux(商品清晰可见)+深处尽头墙1000lux重点照明(射灯6盏,是视觉焦点)+试衣间800lux美颜灯光(3000K暖光,显色指数90+,让顾客皮肤白皙);3)**材质选择**:地面浅色木地板(温暖,女性喜欢,易清洁),墙面白色+局部灰色(衬托衣服颜色,不抢戏),天花板白色+轨道射灯(灵活调整照明方向),试衣间镜子防雾(冬天不起雾)+全身镜2米高(顾客能看全身);4)**关键参数**:通道宽度(入口1.5米→中部1.2米→深处1米),货架高度(墙面1.8米+中岛0.8米),试衣间门宽0.8米(轮椅可进,无障碍设计),收银台高1米;5)**视觉引导**:入口站位能看到深处尽头墙(不要用高货架遮挡视线)+天花板吊挂装饰(从入口延伸到深处,引导视线)+中岛模特是视觉锚点(顾客视线落脚处)"
