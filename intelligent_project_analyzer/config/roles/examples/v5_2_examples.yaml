            "spatial_strategy": "前台'加微信领券'话术标准化(导购培训,每个顾客离店前必问'加了微信吗?')+体验后'即时下单'引导(顾客刚体验完跑步机,导购:'您刚才穿的这双跑鞋现在小程序下单立减100元',趁热打铁转化率高)+收银台'扫码便利'(大二维码+NFC标签,1秒加微信)"
          },
