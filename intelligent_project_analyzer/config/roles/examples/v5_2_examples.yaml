            "design_hints": "1)**体验区'可见性'设计**:跑步机/攀岩墙/动感单车靠橱窗or中庭(路人/商场顾客能看到'有人在运动',吸引进店,是免费广告,体验区不赚钱但引流价值巨大)→测算:每月5000人路过看到→500人进店(10%转化率)→300人加微信→150人下单×500元=7.5万GMV,体验区'间接坪效'=7.5万×12月÷120平米=7500元/平米(可接受);2)**体验区'多功能化'**:瑜伽区20平米平时铺瑜伽垫(占地),晚上收起瑜伽垫变'活动区'(办讲座/观影会/新品发布),提升空间利用率(白天体验+晚上活动,1块地2种用途);3)**商品区'精选陈列'**:不追求SKU多(传统运动店1000+ SKU密集陈列,体验店只选500精品SKU),货架高度1.5米(低矮,不遮挡视线,顾客能看到体验区的运动场景,是'边逛边看别人运动'的动态展示),通道宽1.5米(宽敞,不拥挤,强调'逛得舒服'而非'买得多');4)**社交区'引流+转化'双重价值**:咖啡吧(顾客运动后喝咖啡休息30分钟,停留时间延长→浏览商品概率增加→转化率+15%)+休息区(陪同者/运动后顾客,坐下刷手机时导购推送'您刚才体验的跑鞋,小程序下单立减100',即时转化)+活动区(每月4场活动,每场30人,活动参与者购买概率70%,社交区间接贡献月GMV 3万);5)**动线设计'体验优先'**:入口→体验区(跑步/攀岩/体测,先玩起来)→商品区(看到喜欢的装备,导购:'您要不要试试刚才体验时穿的那双鞋?')→收银台/线上下单→社交区(运动后喝咖啡,坐下休息)→出口,全程停留45-60分钟(传统店15分钟),停留时间×3=转化率×2。"
