              "cost_level": "高",
              "applicability": "适用于跨度≥50米的大空间建筑,如体育馆、展览馆、机场航站楼",
              "estimated_unit_cost": "结构造价约1800-2200元/㎡"
            },
            {
              "option_name": "预应力混凝土梁",
