                "防火处理复杂:钢结构需做3小时以上防火涂层,增加造价15-20%",
                "节点设计要求高:焊接质量直接影响安全,需专业施工队伍",
                "热胀冷缩:温度变形大,需设置复杂的伸缩缝系统"
