            {
              "option_name": "张弦梁结构(钢-索混合)",
              "advantages": [
                "跨度能力极强:可实现80-150米超大跨度",
                "用钢量较省:通过预应力钢索承担拉力,减少钢梁尺寸,节省钢材20-30%",
                "结构高度小:梁高仅为跨度的1/40-1/50,节省建筑高度",
