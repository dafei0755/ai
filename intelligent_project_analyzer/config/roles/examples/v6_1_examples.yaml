      {
        "output_mode": "targeted",
        "user_question_focus": "大跨度结构方案比选",
        "confidence": 0.90,
        "design_rationale": "基于60米大跨度无柱展厅的核心需求,从结构实现能力、经济性、施工难度三个维度进行方案比选,推荐最优技术路径",
