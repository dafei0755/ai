              "step_name": "第5步: 填充弹性密封胶",
              "execution_method": "在收口条横边与地面的2mm间隙中,填充中性透明硅酮密封胶(如道康宁791)。密封胶采用专用填缝枪均匀注入,表面用专用修边工具刮平,形成略微凹陷的弧面(深度约0.5mm),既美观又便于清洁。密封胶颜色可选透明或与地面接近的颜色,避免视觉突兀。",
              "critical_points": [
                "密封胶必须选用中性硅酮(酸性会腐蚀不锈钢),且需防霉抗污",
                "填充前需清洁间隙内灰尘和油污,确保密封胶粘接牢固",
                "密封胶表面需光滑无气泡,否则影响美观且易藏污纳垢",
