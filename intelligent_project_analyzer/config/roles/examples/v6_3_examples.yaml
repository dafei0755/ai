              "tools_required": "道康宁791中性硅酮密封胶、填缝枪、专用修边工具、清洁剂",
              "quality_checkpoint": "目视检查密封胶表面是否光滑,颜色是否均匀,边缘是否与墙地齐平"
            },
            {
