                "luminaires": "窄角射灯 7W × 2个",
                "illuminance": "600lux(焦点照明)",
                "color_temperature": "3000K(固定暖光,突出艺术品暖色调)",
                "control": "20:00后自动关闭(睡眠模式)"
              },
              "L4_decorative": {
                "description": "床头背景墙灯带+地脚线夜灯",
                "luminaires": "RGB灯带 3m(床头) + 琥珀光地脚灯带 8m",
                "illuminance": "背景墙30lux / 地脚线5lux",
                "color_temperature": "灯带2700K可调 / 地脚灯2200K固定",
                "control": "背景墙18:00自动开启 / 地脚灯22:00人体感应启动"
              }
            }
          ]
        },
        "confidence_calibration": "本方案基于哈佛医学院、斯坦福睡眠研究中心的昼夜节律照明研究成果,技术实现成熟度高(市场已有大量可调色温智能灯具),置信度0.92。需注意个体差异:老年人(60岁+)褪黑素分泌能力降低,可能需要更强的光照刺激;青少年生物钟天然延迟,建议清晨光照提前至05:30启动。建议实施3个月后进行睡眠质量追踪(通过智能手环/睡眠日记),根据数据微调光照曲线参数。"
      }

