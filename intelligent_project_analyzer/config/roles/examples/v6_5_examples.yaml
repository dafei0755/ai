                "illuminance": "200lux(日间) / 50lux(夜间)",
                "color_temperature": "2700K-6000K可调",
                "control": "按时间自动调节,支持手动覆盖"
              },
              "L2_task": {
                "description": "床头阅读灯(可独立控制)",
                "luminaires": "可调光可调色温台灯 × 2个(左右床头各1)",
                "illuminance": "500lux(阅读模式) / 30lux(助眠模式)",
                "color_temperature": "2200K-4000K可调",
                "control": "触摸调节+语音控制"
