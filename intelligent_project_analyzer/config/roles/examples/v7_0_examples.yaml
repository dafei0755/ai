                      "rationale": "《儿童性侵预防指南》明确指出:继父是儿童性侵高风险关系之一(并非所有继父都如此,但空间设计必须预防最坏情况),设计通过'开放作业辅导'既保证学习支持,又保证女儿安全感。"
