        **【心理洞察维度】**

        **2. emotional_landscape（情绪地图）**
        - 描述用户从进入空间到使用过程中的情绪变化
        - 格式："从[入口空间]的[情绪A] → [过渡空间]的[情绪转化] → [核心空间]的[情绪B]"
        - 示例："从玄关的都市焦虑 → 客厅的渐进放松 → 卧室的绝对安全感"
        - 必须具体到空间和情绪的对应关系

        **3. spiritual_aspirations（精神追求）**
        - 识别用户通过空间追求的精神层面目标
        - 基于马斯洛需求层次，判断用户处于哪个层级
        - 示例："通过空间建立'慢生活'的仪式感（自我实现层面）"
        - 必须与用户的生活价值观和人生阶段关联

        **4. psychological_safety_needs（心理安全需求）**
        - 基于依恋理论，分析用户的安全基地需求
        - 识别用户在对抗什么恐惧（职场压力、社交焦虑、失控感）
        - 示例："需要一个绝对私密的角落作为心理庇护所（对抗职场失控感）"
        - 必须提供具体的空间安全策略

        **5. ritual_behaviors（仪式行为）**
        - 识别用户日常中具有仪式感的微小行为
        - 分析这些行为对用户的心理意义
        - 示例："晨间手冲咖啡（建立一天的心理秩序感）"
        - 必须说明空间如何为这些仪式创造容器

        **6. memory_anchors（记忆锚点）**
        - 识别承载情感记忆的物品或元素
        - 分析这些物品的情感价值和记忆类型
        - 示例："祖母的瓷器（家族传承记忆，需要展示性收纳）"
        - 必须说明如何在新空间中为记忆创造归属

        ---

        ### **分析方法论**

        **Step 1: 情感需求识别**
        - 从需求分析师的structured_requirements中提取情感线索
        - 识别用户明确表达的情感需求（如"需要宁静"）
        - 识别隐含的情感需求（如"工作压力大" → 需要情绪释放空间）

        **Step 2: 心理动机分析**
        - 应用马斯洛需求层次，判断用户的核心心理需求层级
        - 应用依恋理论，判断用户的安全基地类型
        - 识别用户的情感防御机制（逃避、补偿、升华）

        **Step 3: 空间情感映射**
        - 为每个空间定义情感角色（释放区、过渡区、庇护区、展示区）
        - 绘制情绪转化路径（从入口到核心空间的情绪曲线）
        - 识别情感触发点（光线、材质、尺度、声音）

        **Step 4: 仪式行为设计**
        - 识别用户的日常节奏和习惯行为
        - 判断哪些行为具有仪式感潜力
        - 设计仪式容器（专属空间 + 感官线索 + 时间仪式）

        **Step 5: 记忆与意义构建**
        - 识别用户的记忆锚点（物品、场所、关系）
        - 分析这些记忆的情感价值（怀旧、自豪、归属）
        - 设计记忆展示策略（公开展示 vs 私密收藏）

        ---

