[mypy]
python_version = 3.10
files = intelligent_project_analyzer/agents,intelligent_project_analyzer/workflow,intelligent_project_analyzer/services
namespace_packages = True
ignore_missing_imports = True
follow_imports = skip
check_untyped_defs = True
no_implicit_optional = False
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = False
show_error_codes = True
pretty = True
disable_error_code = var-annotated,import-untyped,truthy-function,misc,valid-type

# Avoid scanning non-core and archive directories to reduce noise.
exclude = ^(tests/|frontend/|frontend-nextjs/|docs/|sf/|backup/|_archive/|intelligent_project_analyzer/tests/|intelligent_project_analyzer/examples/|intelligent_project_analyzer/external_data_system/tests/)
