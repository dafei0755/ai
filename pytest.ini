[pytest]
# Test file search paths
testpaths = tests

# Enable legacy pytest-asyncio behavior for async tests without explicit markers
asyncio_mode = auto

# Test file and function naming patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude archived one-off verification scripts (may have import-time side effects)
norecursedirs =
    archive

# Output options
addopts =
    -v
    -s
    --showlocals
    --tb=short
    -ra
    --import-mode=importlib
    --strict-markers
    --strict-config
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning

# Test markers
markers =
    performance: Performance tests (require --run-performance)
    unit: Unit tests - test individual functions or classes
    integration: Integration tests - test multiple component interactions
    integration_critical: Critical integration tests (P0) - must pass before deployment
    regression: Regression tests - prevent known bugs from reappearing
    slow: Slow running tests
    security: Security related tests
    agents: Agent module tests
    workflow: Workflow module tests
    interaction: Interaction module tests
    api: API interface tests
    database: Database related tests
    redis: Redis related tests
    llm: LLM invocation tests (requires API keys)
    services: Service module tests (image_generator, file_processor)
    llm_factory: LLM factory and configuration tests
    input_validation: Input validation and security tests
    p2_agents: P2 Agent module tests (requirements_analyst, project_director)
    p2_questionnaire: P2 Questionnaire system tests (generators, adjusters, parsers)

# Coverage configuration
[coverage:run]
source = intelligent_project_analyzer
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */migrations/*
    */config/*
    */__pycache__/*
    */venv/*
    */env/*
    */frontend/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov

[coverage:json]
output = coverage.json
pretty_print = true
