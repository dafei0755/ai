<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精选案例展示 - 本地测试</title>
</head>
<body style="margin: 0; padding: 0;">

<!-- 嵌入全屏轮播代码 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<div id="featured-showcase-fullscreen" style="position: relative; width: 100%; height: 100vh; overflow: hidden;">
    <div class="swiper showcase-swiper-fullscreen" style="width: 100%; height: 100%;">
        <div class="swiper-wrapper" id="showcase-slides-wrapper">
            <div class="swiper-slide" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div style="text-align: center; color: white;">
                    <div class="spinner" style="display: inline-block; width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <p style="margin-top: 20px; font-size: 18px;">正在加载精选案例...</p>
                </div>
            </div>
        </div>

        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>
</div>

<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #featured-showcase-fullscreen {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .showcase-swiper-fullscreen .swiper-slide {
        position: relative;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .showcase-swiper-fullscreen .swiper-slide:hover {
        transform: scale(1.02);
    }

    .showcase-slide-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.4) 0%,
            rgba(0, 0, 0, 0.2) 50%,
            rgba(0, 0, 0, 0.6) 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        z-index: 1;
    }

    .showcase-slide-content {
        text-align: center;
        color: white;
        max-width: 900px;
        animation: fadeIn 0.8s ease-out;
    }

    .showcase-slide-title {
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 20px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        line-height: 1.2;
    }

    .showcase-slide-description {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 30px;
        opacity: 0.95;
        text-shadow: 0 1px 5px rgba(0, 0, 0, 0.2);
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
    }

    .showcase-slide-meta {
        display: flex;
        gap: 20px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 30px;
    }

    .showcase-slide-badge {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .showcase-slide-button {
        display: inline-block;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 14px 32px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        transition: all 0.3s ease;
        border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .showcase-slide-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    }

    .showcase-swiper-fullscreen .swiper-button-prev,
    .showcase-swiper-fullscreen .swiper-button-next {
        color: white;
        background: rgba(0, 0, 0, 0.3);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        backdrop-filter: blur(10px);
    }

    .showcase-swiper-fullscreen .swiper-button-prev:hover,
    .showcase-swiper-fullscreen .swiper-button-next:hover {
        background: rgba(0, 0, 0, 0.5);
    }

    .showcase-swiper-fullscreen .swiper-button-prev::after,
    .showcase-swiper-fullscreen .swiper-button-next::after {
        font-size: 20px;
    }

    .showcase-swiper-fullscreen .swiper-pagination-bullet {
        width: 12px;
        height: 12px;
        background: white;
        opacity: 0.5;
    }

    .showcase-swiper-fullscreen .swiper-pagination-bullet-active {
        opacity: 1;
        background: white;
    }

    @media (max-width: 768px) {
        .showcase-slide-title {
            font-size: 32px;
        }

        .showcase-slide-description {
            font-size: 16px;
        }

        .showcase-slide-overlay {
            padding: 20px;
        }

        .showcase-swiper-fullscreen .swiper-button-prev,
        .showcase-swiper-fullscreen .swiper-button-next {
            width: 40px;
            height: 40px;
        }
    }

    @media (max-width: 480px) {
        .showcase-slide-title {
            font-size: 24px;
        }

        .showcase-slide-description {
            font-size: 14px;
        }

        .showcase-slide-button {
            padding: 12px 24px;
            font-size: 14px;
        }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
(async function() {
    // 🔥 本地测试配置
    const API_URL = 'http://localhost:8000';
    const FRONTEND_URL = 'http://localhost:3000';

    const slidesWrapper = document.getElementById('showcase-slides-wrapper');

    try {
        console.log('🔍 开始加载精选案例...');

        const response = await fetch(`${API_URL}/api/showcase/featured`);

        if (!response.ok) {
            throw new Error(`API 请求失败: ${response.status}`);
        }

        const data = await response.json();
        console.log('📦 API响应数据:', data);

        const sessions = data.featured_sessions || [];
        const config = data.config || { rotation_interval_seconds: 5, autoplay: true };

        if (sessions.length === 0) {
            slidesWrapper.innerHTML = `
                <div class="swiper-slide" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <div style="text-align: center; color: white; max-width: 500px; padding: 40px;">
                        <div style="font-size: 64px; margin-bottom: 20px;">🎨</div>
                        <h2 style="font-size: 32px; margin-bottom: 15px;">暂无精选案例</h2>
                        <p style="font-size: 16px; opacity: 0.9;">管理员还未配置展示案例</p>
                    </div>
                </div>
            `;
        } else {
            const slidesHTML = sessions.map(session => {
                const description = session.user_input
                    ? (session.user_input.length > 150
                        ? session.user_input.substring(0, 150) + '...'
                        : session.user_input)
                    : '点击查看完整项目分析报告';

                const date = session.created_at
                    ? new Date(session.created_at).toLocaleDateString('zh-CN')
                    : '';

                const modeLabel = session.analysis_mode === 'deep_thinking'
                    ? '🧠 深度思考模式'
                    : '⚡ 快速模式';

                const imageUrl = session.concept_image?.url
                    ? (session.concept_image.url.startsWith('http')
                        ? session.concept_image.url
                        : `${API_URL}${session.concept_image.url}`)
                    : '';

                const backgroundStyle = imageUrl
                    ? `background-image: url('${imageUrl}');`
                    : `background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);`;

                return `
                    <div class="swiper-slide" style="${backgroundStyle}" data-session-id="${session.session_id}">
                        <div class="showcase-slide-overlay">
                            <div class="showcase-slide-content">
                                <h1 class="showcase-slide-title">${session.title || '未命名项目'}</h1>
                                <p class="showcase-slide-description">${description}</p>
                                <div class="showcase-slide-meta">
                                    <span class="showcase-slide-badge">${modeLabel}</span>
                                    ${date ? `<span class="showcase-slide-badge">📅 ${date}</span>` : ''}
                                </div>
                                <a href="${FRONTEND_URL}/analysis/${session.session_id}"
                                   class="showcase-slide-button"
                                   target="_blank"
                                   onclick="event.stopPropagation();">
                                    查看完整报告 →
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            slidesWrapper.innerHTML = slidesHTML;

            console.log(`✅ 成功加载 ${sessions.length} 个精选案例`);
        }

        // 初始化 Swiper
        const swiper = new Swiper('.showcase-swiper-fullscreen', {
            direction: 'horizontal',
            loop: config.loop !== false,
            speed: 800,
            effect: 'slide',
            autoplay: config.autoplay !== false ? {
                delay: (config.rotation_interval_seconds || 5) * 1000,
                disableOnInteraction: false,
            } : false,
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            keyboard: {
                enabled: true,
            },
        });

        document.querySelectorAll('.swiper-slide').forEach(slide => {
            slide.addEventListener('click', function(e) {
                if (e.target.tagName === 'A') return;

                const sessionId = this.getAttribute('data-session-id');
                if (sessionId) {
                    window.open(`${FRONTEND_URL}/analysis/${sessionId}`, '_blank');
                }
            });
        });

        console.log('✅ Swiper 初始化成功');

    } catch (error) {
        console.error('❌ 加载精选案例失败:', error);
        slidesWrapper.innerHTML = `
            <div class="swiper-slide" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div style="text-align: center; color: white; max-width: 500px; padding: 40px;">
                    <div style="font-size: 64px; margin-bottom: 20px;">⚠️</div>
                    <h2 style="font-size: 32px; margin-bottom: 15px;">加载失败</h2>
                    <p style="font-size: 16px; opacity: 0.9; margin-bottom: 20px;">
                        无法连接到服务器
                    </p>
                    <p style="font-size: 14px; opacity: 0.7; font-family: monospace;">
                        ${error.message}
                    </p>
                </div>
            </div>
        `;
    }
})();
</script>

</body>
</html>
